<header class="mainHeader">

<div class="menu" onclick="openMenu()">☰</div>

<div class="logo" onclick="location.href='index.html'">
CreatorHub
</div>

<div class="searchBox">

<input
type="text"
placeholder="Search ebooks..."
oninput="searchProduct(this.value)"
>

</div>

<div class="right">

<div class="cart" onclick="location.href='cart.html'">
🛒
</div>

<img id="profile" class="profile"
onclick="location.href='dashboard.html'">

</div>

</header>


<style>

.mainHeader{
display:flex;
align-items:center;
gap:15px;
padding:12px 16px;
background:#020617;
box-shadow:0 5px 20px rgba(0,0,0,.7);
position:sticky;
top:0;
z-index:999;
}

/* MENU */

.menu{
font-size:26px;
cursor:pointer;
color:white;
}

/* LOGO */

.logo{
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#22c55e,#4ade80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
cursor:pointer;
}

/* SEARCH */

.searchBox{
flex:1;
max-width:420px;
}

.searchBox input{
width:100%;
padding:10px 14px;
border-radius:25px;
border:none;
background:#111827;
color:white;
font-size:14px;
}

.searchBox input::placeholder{
opacity:.7;
}

/* RIGHT SIDE */

.right{
display:flex;
align-items:center;
gap:12px;
}

/* CART */

.cart{
font-size:22px;
cursor:pointer;
}

/* PROFILE */

.profile{
width:40px;
height:40px;
border-radius:50%;
border:2px solid #22c55e;
object-fit:cover;
cursor:pointer;
transition:.2s;
}

.profile:hover{
transform:scale(1.05);
}

</style>


<script>

/* PROFILE IMAGE */

let user=JSON.parse(localStorage.getItem("user")||"{}");

let profileImg=localStorage.getItem("profile_"+(user.email||"guest"));

let profile=document.getElementById("profile");

if(profile){

profile.src =
profileImg ||
"https://cdn-icons-png.flaticon.com/512/149/149071.png";

}

</script>
