<style>

/* CARD */

.card{

padding:12px;
border-radius:12px;

}

.card img{
width:90px;
aspect-ratio:2/3;
object-fit:cover;

}

.bookInfo{
flex:1;
}

.bookTitle{

font-weight:bold;
}

.price{
color:#22c55e;
margin-top:5px;
}

.buy{
padding:8px 12px;
border:none;
background:#22c55e;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:6px;
}

</style>

</head>

<script>

/* MENU FUNCTIONS */

function openMenu(){

let menu=document.getElementById("menu");
let overlay=document.getElementById("overlay");

if(menu){
menu.classList.add("open");
}

if(overlay){
overlay.style.display="block";
}

}

function closeMenu(){

let menu=document.getElementById("menu");
let overlay=document.getElementById("overlay");

if(menu){
menu.classList.remove("open");
}

if(overlay){
overlay.style.display="none";
}

}

/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("headerLoad").innerHTML=data;
loadProfile();
});

/* LOAD MENU */

fetch("menu.html")

/* PROFILE IMAGE */

/* API */

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

/* IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400";

try{

let id="";

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0];
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0];
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";
}

}catch{}

return link;

}

let allProducts=[];

/* LOAD PRODUCTS */

async function loadProducts(){

let r=await fetch(API+"?db=products&t="+Date.now());
let products=await r.json();

if(!Array.isArray(products)) products=[];

allProducts=products.reverse();

render(allProducts);

}

/* RENDER */

function render(list){

let box=document.getElementById("products");

let html="";

list.forEach(p=>{

html+=`

<div class="card" onclick="openDetails('${p.id}')">

<img src="${driveImage(p.image)}">

<div class="bookInfo">

<div class="bookTitle">${p.title||"Untitled"}</div>

<div class="price">₹ ${p.price||0}</div>

<button class="buy" onclick="buyNow(event,'${p.id}')">
Buy
</button>

</div>

</div>

`;

});

box.innerHTML=html || "No Books";

}
