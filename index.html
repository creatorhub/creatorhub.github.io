<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Marketplace</title>

<style>

html,body{
margin:0;
padding:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HERO */

.hero{
padding:40px 15px;
text-align:center;
background:linear-gradient(135deg,#020617,#111827);
}

.hero h1{
color:#22c55e;
margin:0;
}

/* PRODUCTS */

.products{
padding:15px;
display:grid;
grid-template-columns:1fr;
gap:15px;
}

/* CARD */

.card{
display:flex;
gap:15px;
background:#111827;
padding:12px;
border-radius:12px;
align-items:center;
box-shadow:0 10px 20px black;
cursor:pointer;
}

.card img{
width:90px;
aspect-ratio:2/3;
object-fit:cover;
border-radius:8px;
}

.bookInfo{
flex:1;
}

.bookTitle{
font-size:17px;
font-weight:bold;
}

.price{
color:#22c55e;
margin-top:5px;
}

.buy{
padding:8px 12px;
border:none;
background:#22c55e;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:6px;
}

</style>
</head>

<body>

<div class="hero">
<h1>CreatorHub Marketplace</h1>
<p>Sell • Buy • Earn From Digital Products</p>
</div>

<h2 style="padding:15px">All Books</h2>

<div id="products" class="products">
Loading...
</div>

<script>

/* API */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400";

try{

let id="";

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0];
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0];
}

if(id){
return "https://drive.google.com/uc?export=view&id="+id;
}

}catch{}

return link;

}

let allProducts=[];

/* LOAD PRODUCTS */

async function loadProducts(){

try{

let res=await fetch(API+"?db=products&t="+Date.now());

let products=await res.json();

if(!Array.isArray(products)){
products=[];
}

/* APPROVED ONLY */

let approved=products.filter(p=>p.status==="approved");

/* NEW FIRST */

approved.reverse();

allProducts=approved;

render(allProducts);

}catch(e){

console.log(e);

document.getElementById("products").innerHTML="Failed to load products";

}

}

/* RENDER */

function render(list){

let box=document.getElementById("products");

if(!list.length){
box.innerHTML="No Books Available";
return;
}

let html="";

list.forEach(p=>{

html+=`

<div class="card" onclick="openDetails('${p.id}')">

<img src="${driveImage(p.image)}">

<div class="bookInfo">

<div class="bookTitle">${p.title||"Untitled"}</div>

<div class="price">₹ ${p.price||0}</div>

<button class="buy" onclick="buyNow(event,'${p.id}')">
Buy
</button>

</div>

</div>

`;

});

box.innerHTML=html;

}

/* DETAILS */

function openDetails(id){
location.href="ebook.html?id="+id;
}

/* BUY */

function buyNow(e,id){

e.stopPropagation();

localStorage.setItem("buyProduct",id);

location.href="payment.html";

}

/* AUTO REFRESH */

loadProducts();

/* EVERY 5 SECOND AUTO REFRESH */

setInterval(loadProducts,5000);

</script>

</body>
</html>
