<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Marketplace – Buy & Sell eBooks</title>

<meta name="description" content="CreatorHub Marketplace – Buy and sell eBooks. Discover best sellers and earn by selling your digital books.">

<style>

html,body{
margin:0;
padding:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#020617;
color:#fff;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

/* HERO */

.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#020617,#111827);
border-bottom:1px solid #1f2937;
}

.hero h1{
font-size:32px;
color:#22c55e;
margin:0 0 10px 0;
}

.hero p{
opacity:.8;
font-size:16px;
}

/* SECTION */

.section{
margin-top:35px;
}

.section h2{
font-size:22px;
margin-bottom:15px;
color:#e5e7eb;
}

/* GRID */

.products{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

@media(min-width:600px){
.products{
grid-template-columns:1fr 1fr;
}
}

@media(min-width:900px){
.products{
grid-template-columns:repeat(4,1fr);
}
}

/* CARD */

.card{
background:#111827;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.25s;
display:flex;
flex-direction:column;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 30px rgba(0,0,0,.7);
}

/* IMAGE */

.bookImage{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
}

/* CARD BODY */

.bookBody{
padding:12px;
display:flex;
flex-direction:column;
flex:1;
}

.bookTitle{
font-size:16px;
font-weight:600;
margin-bottom:5px;
line-height:1.3;
}

.author{
font-size:13px;
opacity:.75;
margin-bottom:4px;
}

.sales{
font-size:12px;
opacity:.7;
}

.price{
color:#22c55e;
font-weight:bold;
margin-top:6px;
font-size:16px;
}

/* BUTTONS */

.buttons{
margin-top:auto;
display:flex;
gap:8px;
padding-top:10px;
}

.buy{
flex:1;
padding:8px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
}

.cart{
flex:1;
padding:8px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

.buy:hover{
background:#16a34a;
}

.cart:hover{
background:#1d4ed8;
}

/* BEST SELLER HORIZONTAL */

.bestGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

@media(min-width:700px){
.bestGrid{
grid-template-columns:repeat(4,1fr);
}
}

</style>

</head>

<body>

<div id="menuLoad"></div>
<div id="headerLoad"></div>

<!-- HERO -->

<section class="hero">

<h1>CreatorHub Marketplace – Sell • Buy • Earn</h1>

<p>Discover amazing eBooks from creators around the world</p>

</section>

<div class="container">

<!-- BEST SELLER -->

<section class="section">

<h2>🔥 Best Seller eBooks</h2>

<div id="bestSeller" class="bestGrid">
Loading...
</div>

</section>


<!-- ALL BOOKS -->

<section class="section">

<h2>📚 All eBooks</h2>

<div id="products" class="products">
Loading...
</div>

</section>

</div>

<div id="footer"></div>

<script>

/* API */

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"


/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("headerLoad").innerHTML=data
loadProfile()
})


/* LOAD MENU */

fetch("menu.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("menuLoad").innerHTML=data
})


/* LOAD FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data
})


/* PROFILE IMAGE */

function loadProfile(){

let user=JSON.parse(localStorage.getItem("user")||"{}")

let profileImg=localStorage.getItem("profile_"+(user.email||"guest"))

let profile=document.getElementById("profile")

if(profile){

profile.src=
profileImg||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

}

}


/* DRIVE IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w500"
}

}catch{}

return link

}


/* LOAD PRODUCTS */

async function loadProducts(){

try{

let res=await fetch(PRODUCT_API+"?db=products&t="+Date.now())

let products=await res.json()

if(!Array.isArray(products)){
products=[]
}

/* ONLY APPROVED */

let approved=products.filter(p=>p.status==="approved")

/* BEST SELLERS */

let best=[...approved]
.sort((a,b)=>(b.sales||0)-(a.sales||0))
.slice(0,4)

renderBest(best)

/* ALL */

approved.reverse()

render(approved)

}catch(e){

console.log(e)

document.getElementById("products").innerHTML="Failed to load products"

}

}


/* BEST SELLERS */

function renderBest(list){

let box=document.getElementById("bestSeller")

if(!list.length){
box.innerHTML="No Best Sellers Yet"
return
}

let html=""

list.forEach(p=>{

let author=p.author || p.owner || "Unknown"
let sales=Number(p.sales || 0)

html+=`

<div class="card" onclick="openDetails('${p.id}')">

<img class="bookImage" src="${driveImage(p.image)}">

<div class="bookBody">

<div class="bookTitle">${escapeHTML(p.title||"Untitled")}</div>

<div class="author">👤 ${escapeHTML(author)}</div>

<div class="sales">📈 ${sales}+ sales</div>

<div class="price">₹ ${p.price||0}</div>

</div>

</div>

`

})

box.innerHTML=html

}


/* RENDER PRODUCTS */

function render(list){

let box=document.getElementById("products")

if(!list.length){
box.innerHTML="No Books Available"
return
}

let html=""

list.forEach(p=>{

let author=p.author || p.owner || "Unknown"
let sales=Number(p.sales || 0)

html+=`

<div class="card" onclick="openDetails('${p.id}')">

<img class="bookImage" src="${driveImage(p.image)}">

<div class="bookBody">

<div class="bookTitle">${escapeHTML(p.title||"Untitled")}</div>

<div class="author">👤 ${escapeHTML(author)}</div>

<div class="sales">📈 ${sales}+ sales</div>

<div class="price">₹ ${p.price||0}</div>

<div class="buttons">

<button class="buy"
onclick="buyNow(event,'${p.id}')">
Buy
</button>

<button class="cart"
onclick="addCart(event,'${p.id}')">
Cart
</button>

</div>

</div>

</div>

`

})

box.innerHTML=html

}


/* DETAILS PAGE */

function openDetails(id){

location.href="ebook.html?id="+id

}


/* BUY */

function buyNow(e,id){

e.stopPropagation()

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}


/* CART */

function addCart(e,id){

e.stopPropagation()

let cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.includes(id)){
alert("Already added to cart")
return
}

cart.push(id)

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to Cart")

}


/* SECURITY */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}


/* INIT */

loadProducts()

/* AUTO REFRESH */

setInterval(loadProducts,20000)

</script>

</body>
</html>
