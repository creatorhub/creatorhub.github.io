<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Marketplace</title>

<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7722332127550985"
crossorigin="anonymous"></script>

<style>

html,body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:Arial;
background:#020617;
color:white;
}

header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
position:sticky;
top:0;
z-index:999;
}

.menu{font-size:26px;cursor:pointer;width:40px;}
.title{flex:1;text-align:center;font-size:22px;font-weight:bold;color:#22c55e;}
.right{display:flex;gap:12px;align-items:center;}
.cart{font-size:22px;cursor:pointer;}

.profile{
width:42px;
height:42px;
border-radius:50%;
border:2px solid #22c55e;
object-fit:cover;
cursor:pointer;
}

.side{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
transform:translateX(-100%);
transition:.3s;
z-index:9999;
box-shadow:5px 0 30px black;
}

.side.open{transform:translateX(0);}

.close{
background:#ef4444;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

.side a{
display:block;
background:#111827;
padding:12px;
margin-top:10px;
border-radius:10px;
text-decoration:none;
color:white;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
z-index:9998;
}

.search{padding:15px;}

.search input{
width:100%;
padding:14px;
border-radius:40px;
border:none;
background:#111827;
color:white;
}

.hero{
padding:40px 15px;
text-align:center;
background:linear-gradient(135deg,#020617,#111827);
}

.hero h1{color:#22c55e;margin:0;}
.hero p{opacity:.8;}

.products{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:18px;
}

.card{
background:#111827;
padding:14px;
border-radius:14px;
box-shadow:0 10px 25px black;
position:relative;
}

.card img{
width:100%;
height:210px;
object-fit:cover;
border-radius:12px;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#f97316;
color:white;
font-size:12px;
padding:4px 8px;
border-radius:6px;
font-weight:bold;
z-index:2;
}

.buy{
width:100%;
padding:12px;
margin-top:8px;
border:none;
background:linear-gradient(90deg,#22c55e,#4ade80);
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.cartBtn{
width:80%;
padding:11px;
margin-top:6px;
border:none;
background:black;
border-radius:10px;
color:white;
cursor:pointer;
}

.shareBtn{
width:18%;
padding:11px;
margin-top:6px;
border:none;
background:#2563eb;
border-radius:10px;
color:white;
cursor:pointer;
font-size:18px;
}

.rowBtns{
display:flex;
gap:6px;
}

footer{
background:black;
padding:35px;
text-align:center;
line-height:26px;
margin-top:30px;
}

footer a{
color:#22c55e;
text-decoration:none;
margin:0 6px;
}

</style>

</head>

<body>

<div id="menu" class="side">
<div class="close" onclick="closeMenu()">⬅ Close</div>
<a href="dashboard.html">Dashboard</a>
<a href="upload.html">Upload Ebook</a>
<a href="wallet.html">Wallet</a>
<a href="orders.html">Orders</a>
<a href="library.html">My Library</a>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<header>

<div class="menu" onclick="openMenu()">☰</div>

<div class="title">CreatorHub</div>

<div class="right">

<div class="cart" onclick="location.href='cart.html'">🛒</div>

<img id="profile" class="profile" onclick="location.href='dashboard.html'">

</div>

</header>

<div class="search">
<input placeholder="Search Ebook..." oninput="searchProduct(this.value)">
</div>

<div class="hero">

<h1>CreatorHub Marketplace</h1>

<p>Sell • Buy • Earn From Digital Products</p>

<p>Upload Your Ebook & Start Earning Today</p>

</div>

<h2 style="padding:15px">🔥 Trending Books</h2>
<div id="trending" class="products"></div>

<h2 style="padding:15px">🏆 Top Selling Books</h2>
<div id="topselling" class="products"></div>

<h2 style="padding:15px">⭐ Highest Rated Books</h2>
<div id="toprated" class="products"></div>

<h2 style="padding:15px">📚 All Books</h2>
<div id="products" class="products">Loading...</div>

<footer>
© 2026 CreatorHub Marketplace
</footer>

<script>

/* MENU */

const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");

function openMenu(){
menu.classList.add("open");
overlay.style.display="block";
}

function closeMenu(){
menu.classList.remove("open");
overlay.style.display="none";
}

/* PROFILE */

let user=JSON.parse(localStorage.getItem("user")) || {email:"guest"};
let profileImg=localStorage.getItem("profile_"+user.email);

document.getElementById("profile").src=
profileImg || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

/* API */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

let allProducts=[];

/* DRIVE IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400";

try{

let id="";

if(link.includes("id="))
id=link.split("id=")[1].split("&")[0];

if(link.includes("/file/d/"))
id=link.split("/file/d/")[1].split("/")[0];

if(id)
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";

}catch{}

return link;

}

/* GET DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());
let data=await r.json();

return Array.isArray(data)?data:[];

}catch{

return [];

}

}

/* SHOW PRODUCTS */

function showProducts(list,id){

let html="";

list.forEach(p=>{

html+=`

<div class="card">

${p.badge ? `<div class="badge">${p.badge}</div>` : ""}

<img src="${driveImage(p.image)}">

<h3>${p.title}</h3>

₹ ${p.price}

<button class="buy" onclick="viewBook('${p.id}')">
View Ebook
</button>

<div class="rowBtns">

<button class="cartBtn" onclick='addCart(${JSON.stringify(p)})'>
Add To Cart
</button>

<button class="shareBtn" onclick="shareProduct('${p.title}')">
🔗
</button>

</div>

</div>

`;

});

document.getElementById(id).innerHTML=html || "No Books";

}

/* LOAD PRODUCTS */

async function loadProducts(){

let products=await getDB("products");
let orders=await getDB("orders");
let reviews=await getDB("reviews");

/* ONLY APPROVED */

products=products.filter(p=>p.status==="approved");

allProducts=[...products];

/* ALL BOOKS */

showProducts([...products].reverse(),"products");

/* SALES */

let sales={};

orders.forEach(o=>{
sales[o.product]=(sales[o.product]||0)+1;
});

let topSelling=[...products]
.sort((a,b)=>(sales[b.id]||0)-(sales[a.id]||0))
.slice(0,6);

topSelling.forEach((p,i)=>{

if(i==0){
p.badge="🔥 #1 Bestseller";
}

else if(i<3){
p.badge="📈 Trending";
}

});

showProducts(topSelling,"topselling");
showProducts(topSelling,"trending");

/* RATING */

let rating={};

reviews.forEach(r=>{

if(!rating[r.product])
rating[r.product]=[];

rating[r.product].push(r.star);

});

function avg(a){
if(!a) return 0;
return a.reduce((x,y)=>x+y)/a.length;
}

let rated=[...products]
.sort((a,b)=>avg(rating[b.id])-avg(rating[a.id]))
.slice(0,6);

rated.forEach((p,i)=>{

if(i<3){
p.badge="⭐ Top Rated";
}

});

showProducts(rated,"toprated");

}

loadProducts();

/* VIEW BOOK */

function viewBook(id){
localStorage.setItem("viewProduct",id);
location.href="ebook.html";
}

/* SEARCH */

function searchProduct(q){

q=q.toLowerCase();

showProducts(
allProducts.filter(p=>
(p.title||"").toLowerCase().includes(q)
),
"products"
);

}

/* SHARE */

function shareProduct(title){

let url=window.location.href;

if(navigator.share){

navigator.share({
title:title,
text:"Check this ebook",
url:url
});

}else{

window.open(
"https://wa.me/?text="+
encodeURIComponent(title+" "+url)
);

}

}

/* CART */

function addCart(product){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

if(cart.find(x=>x.id===product.id)){
alert("Already Added");
return;
}

cart.push(product);

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added To Cart");

}

</script>

</body>
</html>
