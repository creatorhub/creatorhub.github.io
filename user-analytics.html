<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>User Analytics - CreatorHub</title><style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:linear-gradient(145deg,#111827,#020617);
border-radius:16px;
padding:20px;
border:1px solid #1f2937;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* ROW */

.row{
background:#020617;
padding:16px;
border-radius:10px;
margin-top:12px;
border:1px solid #1f2937;
line-height:26px;
}

/* STAT */

.stat{
color:#22c55e;
font-weight:bold;
}

/* BUTTON */

.refresh{
margin-top:12px;
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
font-weight:bold;
}

</style></head><body><div class="header"><div class="back" onclick="history.back()">⬅</div><div class="title">📊 User Activity Analytics</div></div><div class="container"><div class="card"><h2>All Users Activity</h2><button class="refresh" onclick="loadAnalytics()">Refresh</button>

<div id="analyticsList">
Loading...
</div></div></div><script>

/* ADMIN */

const ADMIN="ayushprajpati6@gmail.com"

/* MAIN BACKEND API */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

/* LOGIN CHECK */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email || user.email!==ADMIN){

alert("Admin Only")

location.href="index.html"

}

/* SAFE TEXT */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

/* GET DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* LOAD ANALYTICS */

async function loadAnalytics(){

let users=await getDB("users")

let products=await getDB("products")

let orders=await getDB("orders")

let box=document.getElementById("analyticsList")

box.innerHTML=""

/* NO USERS */

if(users.length===0){

box.innerHTML="No Users Found"

return

}

/* LOOP USERS */

users.reverse().forEach(u=>{

/* PRODUCTS UPLOADED */

let uploaded=products.filter(p=>p.owner===u.email)

/* PRODUCTS PURCHASED */

let bought=orders.filter(o=>

o.buyer===u.email &&
o.payment==="paid"

)

/* PURCHASE AMOUNT */

let totalBuy=0

bought.forEach(b=>{

totalBuy+=Number(b.amount||0)

})

/* SALES FROM PRODUCTS */

let totalSales=0

uploaded.forEach(prod=>{

let sales=orders.filter(o=>

String(o.productId)===String(prod.id) &&
o.payment==="paid"

)

sales.forEach(s=>{

totalSales+=Number(s.amount||0)

})

})

/* UI */

box.innerHTML+=`

<div class="row">

<b>Name:</b> ${escapeHTML(u.name||"Not Set")}
<br>

<b>Email:</b> ${escapeHTML(u.email)}

<br><br>

Uploaded Products:
<span class="stat">${uploaded.length}</span>

<br>

Products Bought:
<span class="stat">${bought.length}</span>

<br>

Total Purchase Amount:
₹ <span class="stat">${totalBuy}</span>

<br>

Total Sales From Upload:
₹ <span class="stat">${totalSales}</span>

</div>

`

})

}

loadAnalytics()

</script></body>
</html>
