<!DOCTYPE html>
<html>

<head>

<title>CreatorHub Admin Payments</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

h2{
color:#22c55e;
}

.summary{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.card{
background:#111827;
padding:15px;
margin-top:15px;
border-radius:12px;
}

.status{
margin-top:6px;
font-size:14px;
font-weight:bold;
}

.paid{
color:#22c55e;
}

.pending{
color:#f59e0b;
}

.orderId{
opacity:.7;
font-size:13px;
margin-bottom:5px;
}

</style>

</head>

<body>

<h2>CreatorHub Payment Monitor</h2>

<div class="summary">
Total Revenue ₹ <span id="revenue">0</span>
<br>
Total Paid Orders : <span id="count">0</span>
</div>

<div id="list">Loading...</div>

<script>

/* ADMIN EMAIL */

const ADMIN="ayushprajpati6@gmail.com"

/* APIs */

const PAYMENT_API=
"https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

const PRODUCT_API=
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"


/* LOGIN CHECK */

let user=null

try{
user=JSON.parse(localStorage.getItem("user"))
}catch{}

if(!user || user.email!==ADMIN){

alert("Admin Only")
location.href="index.html"

}


/* SAFE TEXT */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}


/* DATABASE */

async function getDB(api,db){

try{

let r=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}


/* LOAD PAYMENTS */

async function loadPayments(){

let orders=await getDB(PAYMENT_API,"orders")

let products=await getDB(PRODUCT_API,"products")

let box=document.getElementById("list")

if(!orders.length){

box.innerHTML="No Payments Yet"
return

}

/* PAID FIRST */

orders.sort((a,b)=>{

let aPaid=(a.status==="paid"||a.payment==="paid")
let bPaid=(b.status==="paid"||b.payment==="paid")

return bPaid-aPaid

})

let revenue=0
let paidCount=0

let html=""

orders.forEach(o=>{

let product=
products.find(p=>String(p.id)===String(o.productId))

let title=
product?escapeHTML(product.title):"Unknown Product"

let status=(o.status||o.payment||"pending")

let statusClass=status==="paid"?"paid":"pending"

if(status==="paid"){

revenue+=Number(o.amount||0)
paidCount++

}

html+=`

<div class="card">

<div class="orderId">
Order ID : ${escapeHTML(o.id||"-")}
</div>

<h3>${title}</h3>

Buyer : ${escapeHTML(o.buyer||"-")}

<br>

Seller : ${escapeHTML(o.seller||"-")}

<br>

Amount : ₹${Number(o.amount||0)}

<br>

Date : ${escapeHTML(o.date||"-")}

<div class="status ${statusClass}">

Status : ${escapeHTML(status)}

</div>

</div>

`

})

document.getElementById("revenue").innerText=revenue
document.getElementById("count").innerText=paidCount

box.innerHTML=html

}

loadPayments()

</script>

</body>

</html>
