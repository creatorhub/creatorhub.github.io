<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ebook - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-size:20px;
color:#22c55e;
font-weight:bold;
}

.bookBox{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.book{
width:180px;
height:260px;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px black;
}

.book img{
width:100%;
height:100%;
object-fit:cover;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.bookTitle{
font-size:26px;
margin-top:20px;
font-weight:bold;
}

.price{
font-size:22px;
color:#22c55e;
margin-top:5px;
}

.author{
margin-top:8px;
opacity:.85;
}

.sales{
margin-top:5px;
font-size:14px;
opacity:.7;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:12px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.buy{
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
}

.cart{
background:#2563eb;
color:white;
}

.share{
background:#111827;
color:white;
}

.desc{
margin-top:25px;
background:#111827;
padding:18px;
border-radius:12px;
line-height:1.6;
}

.reviews{
margin-top:30px;
background:#111827;
padding:18px;
border-radius:12px;
}

.review{
border-bottom:1px solid #333;
padding:10px 0;
}

</style>

</head>

<body>

<header>
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Ebook Details</div>
</header>

<div class="container">

<div id="book">Loading Ebook...</div>

<div class="reviews">

<h3>⭐ Ratings & Reviews</h3>

<div id="ratingBox"></div>

<select id="userRating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="userReview"
placeholder="Write review..."
style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none"></textarea>

<button class="btn buy" onclick="submitReview()">
Submit Review
</button>

<div id="reviewList"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const ORDER_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

let params=new URLSearchParams(location.search)
let id=params.get("id")

let user=JSON.parse(localStorage.getItem("user")||"null")

function escapeHTML(str){
return String(str).replace(/[&<>"']/g,function(m){
return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]
})
}

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let fileId=""

if(link.includes("id="))
fileId=link.split("id=")[1].split("&")[0]

if(link.includes("/file/d/"))
fileId=link.split("/file/d/")[1].split("/")[0]

if(fileId)
return "https://drive.google.com/thumbnail?id="+fileId+"&sz=w1000"

}catch{}

return link

}

async function getDB(db){

let r=await fetch(API+"?db="+db+"&t="+Date.now())
let data=await r.json()

return Array.isArray(data)?data:[]

}

async function getOrders(){

let r=await fetch(ORDER_API+"?db=orders&t="+Date.now())
let data=await r.json()

return Array.isArray(data)?data:[]

}

async function loadBook(){

let products=await getDB("products")
let orders=await getOrders()

let book=products.find(p=>String(p.id)===String(id))

if(!book){

document.getElementById("book").innerHTML="Book not found"
return

}

let sales=orders.filter(o=>String(o.productId)===String(id) && o.status==="paid").length

let authorName=escapeHTML(book.author||book.owner||"Unknown")

document.getElementById("book").innerHTML=`

<div class="bookBox">

<div class="book">
<img src="${driveImage(book.image)}">
</div>

<div class="book">
<img src="${driveImage(book.backCover||book.image)}">
</div>

</div>

<div class="bookTitle">${escapeHTML(book.title)}</div>

<div class="price">₹ ${book.price}</div>

<div class="author">👤 Author : ${authorName}</div>

<div class="sales">📈 ${sales}+ sales</div>

<button class="btn buy" onclick="buyBook('${book.id}')">
Buy Now
</button>

<button class="btn cart" onclick="addCart('${book.id}')">
Add To Cart
</button>

<button class="btn share" onclick="shareBook('${escapeHTML(book.title)}')">
Share
</button>

<div class="desc">
<h3>Description</h3>
${escapeHTML(book.description||"No description provided.")}
</div>

`

loadReviews()

}

async function loadReviews(){

let reviews=await getDB("reviews")

let list=reviews.filter(r=>String(r.productId)===String(id))

let total=0

list.forEach(r=>{
total+=Number(r.rating)
})

let avg=list.length?(total/list.length).toFixed(1):"0"

document.getElementById("ratingBox").innerHTML=
"⭐ "+avg+" / 5 ("+list.length+" reviews)"

let html=""

list.reverse().forEach(r=>{

let stars=""

for(let i=1;i<=r.rating;i++){
stars+="⭐"
}

html+=`

<div class="review">

<div>${stars}</div>

<div>${escapeHTML(r.text)}</div>

</div>

`

})

document.getElementById("reviewList").innerHTML=html

}

async function submitReview(){

if(!user){

alert("Login required")
location.href="login.html"
return

}

let rating=document.getElementById("userRating").value
let text=document.getElementById("userReview").value.trim()

if(!text){

alert("Write review")
return

}

let reviews=await getDB("reviews")

let already=reviews.find(r=>
r.productId==id && r.user===user.email
)

if(already){

alert("You already reviewed this book")
return

}

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"add_review",
productId:id,
rating:Number(rating),
text:text,
user:user.email
})
})

alert("Review Added")

document.getElementById("userReview").value=""

loadReviews()

}

function buyBook(id){

localStorage.setItem("buyProduct",id)
location.href="payment.html"

}

function addCart(id){

let cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.includes(id)){
alert("Already added")
return
}

cart.push(id)

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to Cart")

}

function shareBook(title){

let url=location.href

if(navigator.share){

navigator.share({
title:title,
text:"Check this ebook",
url:url
})

}else{

window.open(
"https://wa.me/?text="+encodeURIComponent(title+" "+url)
)

}

}

loadBook()

</script>

</body>
</html>
