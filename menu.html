<style>

.side{
position:fixed;
top:0;
left:0;
width:270px;
height:100%;
background:#020617;
padding:20px;
transform:translateX(-100%);
transition:.3s;
z-index:9999;
box-shadow:5px 0 30px black;
overflow:auto;
}

.side.open{
transform:translateX(0);
}

.menuHeader{
text-align:center;
margin-bottom:20px;
}

.menuHeader img{
width:70px;
height:70px;
border-radius:50%;
border:2px solid #22c55e;
object-fit:cover;
}

.menuHeader div{
margin-top:8px;
font-weight:bold;
}

.side a{
display:block;
background:#111827;
padding:14px;
margin-top:12px;
border-radius:12px;
text-decoration:none;
color:white;
font-size:16px;
transition:.2s;
cursor:pointer;
}

.side a:hover{
background:#1f2937;
transform:translateX(5px);
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
z-index:9998;
}

</style>


<script>

/* USER */

let user=JSON.parse(localStorage.getItem("user")||"{}")

let profile=
localStorage.getItem("profile_"+(user?.email||"guest"))

document.getElementById("menuProfile").src=
profile ||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

document.getElementById("menuName").innerText=
user.name || "Guest"


/* MENU */

function openMenu(){

let menu=document.getElementById("menu")
let overlay=document.getElementById("overlay")

menu.classList.add("open")
overlay.style.display="block"

}

function closeMenu(){

let menu=document.getElementById("menu")
let overlay=document.getElementById("overlay")

menu.classList.remove("open")
overlay.style.display="none"

}


/* LOGOUT */

function logout(){

if(!confirm("Logout from account?")) return

localStorage.removeItem("user")

location.href="login.html"

}

</script>
