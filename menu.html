<style>

.side{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
transform:translateX(-100%);
transition:.3s;
z-index:9999;
box-shadow:5px 0 30px black;
}

.side.open{
transform:translateX(0);
}

.close{
background:#ef4444;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
}

.side a{
display:block;
background:#111827;
padding:12px;
margin-top:10px;
border-radius:10px;
text-decoration:none;
color:white;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
z-index:9998;
}

</style>



<script>

function openMenu(){

let menu=document.getElementById("menu");
let overlay=document.getElementById("overlay");

if(menu){
menu.classList.add("open");
}

if(overlay){
overlay.style.display="block";
}

}

function closeMenu(){

let menu=document.getElementById("menu");
let overlay=document.getElementById("overlay");

if(menu){
menu.classList.remove("open");
}

if(overlay){
overlay.style.display="none";
}

}

</script>
