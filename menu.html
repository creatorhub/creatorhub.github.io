<style>

.side{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
transform:translateX(-100%);
transition:.3s;
z-index:9999;
box-shadow:5px 0 30px black;
overflow:auto;
}

.side.open{
transform:translateX(0);
}

.side a{
display:block;
background:#111827;
padding:14px;
margin-top:12px;
border-radius:12px;
text-decoration:none;
color:white;
font-size:16px;
transition:.2s;
}

.side a:hover{
background:#1f2937;
transform:translateX(5px);
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
z-index:9998;
}

</style>


<script>

function openMenu(){

let menu=document.getElementById("menu");
let overlay=document.getElementById("overlay");

if(menu){
menu.classList.add("open");
}

if(overlay){
overlay.style.display="block";
}

}

function closeMenu(){

let menu=document.getElementById("menu");
let overlay=document.getElementById("overlay");

if(menu){
menu.classList.remove("open");
}

if(overlay){
overlay.style.display="none";
}

}

</script>
