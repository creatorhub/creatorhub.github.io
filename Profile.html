<script>

document.addEventListener("DOMContentLoaded", async function(){

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* LOGIN CHECK */

let user=null

try{
user=JSON.parse(localStorage.getItem("user"))
}catch{
user=null
}

if(!user || !user.email){

location.href="login.html"
return

}

/* USER NAME */

const username=document.getElementById("username")

if(username){

username.innerText="Welcome "+(user.name || "User")+" 👋"

}

/* PROFILE IMAGE */

const profile=document.getElementById("profileImg")

if(profile){

const saved=localStorage.getItem("profile_"+user.email)

if(saved){
profile.src=saved
}

}

/* PROFILE UPLOAD */

window.uploadProfile=function(e){

const file=e.target.files[0]

if(!file) return

if(!file.type.startsWith("image/")){
alert("Please upload an image")
return
}

/* SIZE LIMIT */

if(file.size > 2*1024*1024){

alert("Image must be under 2MB")
return

}

const reader=new FileReader()

reader.onload=function(){

localStorage.setItem(
"profile_"+user.email,
reader.result
)

if(profile){
profile.src=reader.result
}

}

reader.readAsDataURL(file)

}

/* SAFE NAVIGATION */

window.go=function(page){

if(!page) return

location.href=page

}

/* LOAD STATS */

try{

/* PRODUCTS */

let pres=await fetch(PRODUCT_API+"?db=products&t="+Date.now())
let products=await pres.json()

if(!Array.isArray(products)) products=[]

let myProducts=products.filter(p=>p.owner===user.email)

const pc=document.getElementById("productCount")

if(pc){
pc.innerText=myProducts.length
}

/* ORDERS */

let ores=await fetch(PAYMENT_API+"?db=orders&t="+Date.now())
let orders=await ores.json()

if(!Array.isArray(orders)) orders=[]

/* ONLY PAID ORDERS */

let myOrders=orders.filter(o=>
o.seller===user.email &&
(o.status==="paid" || o.payment==="paid")
)

const oc=document.getElementById("orderCount")

if(oc){
oc.innerText=myOrders.length
}

/* EARNINGS */

let total=0

myOrders.forEach(o=>{

total += Number(o.amount || 0) * 0.92

})

const earn=document.getElementById("earnings")

if(earn){
earn.innerText="₹ "+Math.floor(total)
}

}catch(e){

console.log("Stats Error:",e)

}

})

/* LOGOUT */

function logout(){

localStorage.removeItem("user")

location.href="login.html"

}

</script>
