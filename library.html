<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Library - CreatorHub</title>

<style>

:root{
--bg:#ffffff;
--text:#111827;
--card:#f3f4f6;
--accent:#22c55e;
}

@media(prefers-color-scheme:dark){
:root{
--bg:#020617;
--text:#ffffff;
--card:#111827;
}
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:var(--bg);
box-shadow:0 5px 20px rgba(0,0,0,.4);
position:sticky;
top:0;
}

.back{
font-size:24px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.dashboard{
background:#22c55e;
padding:8px 14px;
border-radius:20px;
font-size:13px;
color:white;
text-decoration:none;
}

.container{
padding:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.card{
background:var(--card);
border-radius:14px;
padding:14px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.card img{
width:100%;
height:210px;
object-fit:cover;
border-radius:12px;
}

.bookTitle{
font-size:17px;
margin-top:10px;
font-weight:bold;
}

.price{
color:#22c55e;
margin-top:6px;
}

.read{
background:linear-gradient(90deg,#22c55e,#4ade80);
border:none;
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.download{
background:#2563eb;
border:none;
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.buy{
background:#f97316;
border:none;
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.empty{
text-align:center;
opacity:.7;
margin-top:50px;
font-size:18px;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">My Library</div>
<a class="dashboard" href="dashboard.html">Dashboard</a>
</div>

<div class="container">
<div id="library" class="grid">
Loading Library...
</div>
</div>

<script>

/* ADMIN */

const ADMIN="ayushprajpati6@gmail.com"

/* APIs */

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* USER */

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user){

alert("Login first")
location.href="login.html"

}

let isAdmin=user.email===ADMIN

/* DRIVE FUNCTIONS */

function driveId(link){

if(!link) return null

if(link.includes("id="))
return link.split("id=")[1].split("&")[0]

if(link.includes("/file/d/"))
return link.split("/file/d/")[1].split("/")[0]

return null

}

function driveImage(link){

let id=driveId(link)

if(id)
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"

return "https://picsum.photos/400"

}

function driveView(link){

let id=driveId(link)

if(id)
return "https://drive.google.com/file/d/"+id+"/preview"

return "#"

}

function driveDownload(link){

let id=driveId(link)

if(id)
return "https://drive.google.com/uc?export=download&id="+id

return "#"

}

/* GET DB */

async function getDB(api,db){

try{

let r=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* LOAD LIBRARY */

async function loadLibrary(){

let products=await getDB(PRODUCT_API,"products")

let orders=await getDB(PAYMENT_API,"orders")

let subs=await getDB(PAYMENT_API,"subscriptions")

let box=document.getElementById("library")

/* CHECK PREMIUM */

let premium=subs.find(s=>s.email===user.email)

let isPremium=false

if(premium){

let exp=new Date(premium.expiry)

if(Date.now()<exp){

isPremium=true

}

}

/* USER PURCHASE */

let myOrders=orders.filter(o=>

o.buyer===user.email &&

(o.status==="paid" || o.payment==="paid")

)

let ownedProducts=myOrders.map(o=>String(o.productId))

box.innerHTML=""

/* PRODUCTS LOOP */

products.forEach(product=>{

let purchased=ownedProducts.includes(String(product.id))

let owner=product.owner===user.email

let image=driveImage(product.image)

let view=driveView(product.pdf)

let download=driveDownload(product.pdf)

/* ACCESS */

let allow=false

if(isAdmin) allow=true
else if(owner) allow=true
else if(isPremium) allow=true
else if(purchased) allow=true

let buttons=""

/* ALLOWED */

if(allow){

buttons=`

<button class="read" onclick="window.open('${view}')">
Read Ebook
</button>

<button class="download" onclick="window.open('${download}')">
Download PDF
</button>

`

}

/* BUY */

else{

buttons=`

<button class="buy" onclick="buyBook('${product.id}')">
Buy Ebook ₹${product.price}
</button>

`

}

box.innerHTML+=`

<div class="card">

<img src="${image}">

<div class="bookTitle">
${product.title||"Untitled"}
</div>

<div class="price">
₹ ${product.price||0}
</div>

${buttons}

</div>

`

})

if(box.innerHTML===""){

box.innerHTML="<div class='empty'>No ebooks found</div>"

}

}

loadLibrary()

/* BUY */

function buyBook(id){

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}

</script>

</body>
</html>
