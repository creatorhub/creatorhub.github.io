<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Library - CreatorHub</title>

<style>

:root{
--bg:#020617;
--text:#ffffff;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* HEADER */

.topbar{
display:flex;
align-items:center;
padding:14px;
background:var(--bg);
box-shadow:0 5px 20px rgba(0,0,0,.4);
position:sticky;
top:0;
}

.back{
font-size:24px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.dashboard{
background:#22c55e;
padding:8px 14px;
border-radius:20px;
font-size:13px;
color:white;
text-decoration:none;
}

/* CONTAINER */

.container{
padding:20px;
animation:fadeUp .7s ease;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.card{
background:var(--card);
border-radius:14px;
padding:14px;
box-shadow:0 10px 25px rgba(0,0,0,.5);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 40px rgba(0,0,0,.8);
}

.card img{
width:100%;
height:210px;
object-fit:cover;
border-radius:12px;
}

/* TEXT */

.bookTitle{
font-size:17px;
margin-top:10px;
font-weight:bold;
}

.price{
color:#22c55e;
margin-top:6px;
}

/* BUTTON */

.read{
background:linear-gradient(90deg,#22c55e,#4ade80);
border:none;
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.buy{
background:#f97316;
border:none;
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* EMPTY */

.empty{
text-align:center;
opacity:.7;
margin-top:50px;
font-size:18px;
}

/* LOADER */

.loader{
text-align:center;
padding:40px;
font-size:18px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

/* PAGE ANIMATION */

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="history.back()">⬅</div>

<div class="title">My Library</div>

<a class="dashboard" href="dashboard.html">
Dashboard
</a>

</div>

<div class="container">

<div id="library" class="grid loader">
Loading Library...
</div>

</div>

<script>

const ADMIN="ayushprajpati6@gmail.com"

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user){

alert("Login first")

location.href="login.html"

}

let isAdmin=user.email===ADMIN

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

/* DRIVE IMAGE */

function driveId(link){

if(!link) return null

if(link.includes("id="))
return link.split("id=")[1].split("&")[0]

if(link.includes("/file/d/"))
return link.split("/file/d/")[1].split("/")[0]

return null

}

function driveImage(link){

let id=driveId(link)

if(id)
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"

return "https://picsum.photos/400"

}

/* GET DATABASE */

async function getDB(api,db){

try{

let r=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* LOAD LIBRARY */

async function loadLibrary(){

let products=await getDB(PRODUCT_API,"products")

let orders=await getDB(PAYMENT_API,"orders")

let box=document.getElementById("library")

box.innerHTML=""

/* MY ORDERS */

let myOrders=orders.filter(o=>

o.buyer===user.email &&
(o.status==="paid" || o.payment==="paid")

)

let ownedProducts=myOrders.map(o=>String(o.productId))

products.forEach(product=>{

/* APPROVED CHECK */

if(product.ai_status && product.ai_status!=="approved")
return

let purchased=ownedProducts.includes(String(product.id))

let owner=product.owner===user.email

let image=driveImage(product.image)

let allow=false

if(isAdmin) allow=true
else if(owner) allow=true
else if(purchased) allow=true

let buttons=""

if(allow){

buttons=`

<button class="read"
onclick="openReader('${product.id}')">

Read Ebook

</button>

`

}else{

buttons=`

<button class="buy"
onclick="buyBook('${product.id}')">

Buy Ebook ₹${product.price}

</button>

`

}

box.innerHTML+=`

<div class="card">

<img src="${image}">

<div class="bookTitle">
${escapeHTML(product.title||"Untitled")}
</div>

<div class="price">
₹ ${product.price||0}
</div>

${buttons}

</div>

`

})

if(box.innerHTML===""){

box.innerHTML="<div class='empty'>No ebooks in your library</div>"

}

}

loadLibrary()

function openReader(id){

location.href="viewer.html?id="+id

}

function buyBook(id){

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}

</script>

</body>
</html>
