<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Library - CreatorHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

:root{
--card:#0f172a;
--green:#22c55e;
--border:#1e293b;
}

/* TOPBAR */

.topbar{
position:sticky;
top:0;
z-index:100;
background:#07111f;
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,.05);
}

.back{
font-size:24px;
cursor:pointer;
}

.title{
font-size:34px;
font-weight:bold;
}

.title span{
color:var(--green);
}

.dashboard{
background:linear-gradient(90deg,#16a34a,#4ade80);
padding:12px 20px;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* MAIN */

.container{
padding:20px;
padding-bottom:180px;
max-width:1600px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:25px;
}

.stat-box{
background:var(--card);
padding:24px;
border-radius:24px;
border:1px solid var(--border);
display:flex;
align-items:center;
gap:18px;
}

.icon{
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
background:rgba(34,197,94,.15);
}

.stat-box h2{
font-size:32px;
}

.stat-box p{
opacity:.7;
margin-top:5px;
}

/* TABS */

.tabs{
display:flex;
gap:14px;
margin-top:28px;
overflow:auto;
padding-bottom:10px;
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab{
padding:14px 22px;
background:#0b1220;
border:1px solid var(--border);
border-radius:14px;
cursor:pointer;
font-weight:bold;
white-space:nowrap;
}

.tab.active{
background:linear-gradient(90deg,#16a34a,#4ade80);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:
repeat(2,minmax(0,1fr));
gap:16px;
margin-top:24px;
}

/* CARD */

.card{
background:var(--card);
padding:12px;
border-radius:24px;
border:1px solid var(--border);
transition:.3s;
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px);
}

.cover{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
border-radius:16px;
display:block;
background:#0f172a;
box-shadow:
0 8px 25px rgba(0,0,0,.45);
}

.menu{
position:absolute;
top:18px;
right:18px;
background:rgba(0,0,0,.5);
padding:8px 12px;
border-radius:12px;
font-size:18px;
}

.book-title{
font-size:18px;
font-weight:700;
margin-top:12px;
line-height:1.3;
}

.author{
opacity:.7;
margin-top:5px;
font-size:13px;
}
   
.badge{
display:inline-block;
padding:8px 14px;
border-radius:20px;
margin-top:14px;
font-size:14px;
font-weight:bold;
background:rgba(34,197,94,.15);
color:#4ade80;
}

.read-btn{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#16a34a,#4ade80);
color:white;
font-size:14px;
font-weight:bold;
margin-top:18px;
cursor:pointer;
}

.buy-btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#f97316;
color:white;
font-size:17px;
font-weight:bold;
margin-top:18px;
cursor:pointer;
}

.actions{
display:flex;
gap:12px;
margin-top:14px;
}

.actions button{
font-size:13px;
padding:10px;
}

.edit{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.delete{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-weight:bold;
cursor:pointer;
}

/* SUBSCRIPTION */

.subscription{
position:fixed;
left:14px;
right:14px;
bottom:90px;
z-index:998;
background:
linear-gradient(
90deg,
#1e1b4b,
#312e81
);

padding:18px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
box-shadow:
0 10px 40px rgba(0,0,0,.45);
border:
1px solid rgba(255,255,255,.06);
backdrop-filter:blur(18px);
}

.subscription h2{
font-size:28px;
}

.subscription p{
margin-top:8px;
opacity:.8;
}

.manage-btn{
padding:16px 24px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#16a34a,#4ade80);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:78px;
background:
rgba(7,17,31,.92);
display:flex;
justify-content:space-around;
align-items:center;
padding:8px 10px;
border-top:
1px solid rgba(255,255,255,.06);
backdrop-filter:blur(20px);
z-index:999;
box-shadow:
0 -8px 30px rgba(0,0,0,.5);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:5px;
font-size:11px;
font-weight:600;
color:#94a3b8;
cursor:pointer;
transition:.25s;
width:65px;
height:58px;
border-radius:18px;
}

.nav-item:hover{
transform:translateY(-2px);
color:white;
}

.nav-item.active{
background:
rgba(34,197,94,.14);
color:#4ade80;
box-shadow:
0 0 25px rgba(34,197,94,.25);
}
   
.nav-item.active{
color:#4ade80;
opacity:1;
}

.nav-item:hover{
color:white;
transform:translateY(-2px);
}

.nav-icon{
font-size:24px;
line-height:1;
}

.nav-item.active{
color:#4ade80;
background:
rgba(34,197,94,.12);
box-shadow:
0 0 20px rgba(34,197,94,.2);
}

/* EMPTY */

.empty{
grid-column:1/-1;
min-height:50vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
opacity:.7;
}

/* MOBILE */

@media(max-width:900px){

.stats{
grid-template-columns:1fr 1fr;
}

.title{
font-size:24px;
}

.cover{
height:260px;
}

.subscription{
text-align:center;
justify-content:center;
}

}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="back"
onclick="history.back()">
⬅
</div>

<div class="title">
My <span>Library</span>
</div>

<a href="dashboard.html"
class="dashboard">

Dashboard

</a>

</div>

<!-- MAIN -->

<div class="container">

<!-- STATS -->

<div class="stats">

<div class="stat-box">

<div class="icon">
📚
</div>

<div>

<h2 id="totalBooks">
0
</h2>

<p>Total Books</p>

</div>

</div>

<div class="stat-box">

<div class="icon">
🔓
</div>

<div>

<h2 id="unlockedBooks">
0
</h2>

<p>Unlocked</p>

</div>

</div>

<div class="stat-box">

<div class="icon">
⭐
</div>

<div>

<h2 id="premiumBooks">
0
</h2>

<p>Premium</p>

</div>

</div>

<div class="stat-box">

<div class="icon">
👑
</div>

<div>

<h2 id="subscriptionStatus">
Inactive
</h2>

<p>Subscription</p>

</div>

</div>

</div>

<!-- TABS -->

<div class="tabs">

<div class="tab active"
onclick="filterBooks('all')">

All Books

</div>

<div class="tab"
onclick="filterBooks('purchased')">

Purchased

</div>

<div class="tab"
onclick="filterBooks('subscription')">

Subscription

</div>

<div class="tab"
onclick="filterBooks('uploads')">

My Uploads

</div>

</div>

<!-- GRID -->

<div id="library"
class="grid">

</div>

<!-- SUBSCRIPTION -->

<div class="subscription">

<div>

<h2>
👑 Active Subscription
</h2>

<p>
Enjoy unlimited access to all premium ebooks
</p>

</div>

<button class="manage-btn"
onclick="location.href='subscription.html'">

Manage Subscription

</button>

</div>

</div>

<!-- NAV -->

<div class="bottom-nav">

<div class="nav-item"
onclick="location.href='index.html'">

<div class="nav-icon">🏠</div>

<div>Home</div>

</div>

<div class="nav-item"
onclick="location.href='explore.html'">

<div class="nav-icon">🔍</div>

<div>Explore</div>

</div>

<div class="nav-item active">

<div class="nav-icon">📚</div>

<div>Library</div>

</div>

<div class="nav-item"
onclick="location.href='upload.html'">

<div class="nav-icon">⬆️</div>

<div>Upload</div>

</div>

<div class="nav-item"
onclick="location.href='profile.html'">

<div class="nav-icon">👤</div>

<div>Profile</div>

</div>

</div>

<script>

/* =========================================================
CREATORHUB LIBRARY FINAL WORKING SCRIPT
100% FIXED VERSION
========================================================= */

/* ================= API ================= */

const ADMIN =
"ayushprajpati6@gmail.com"

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

const SUBSCRIPTION_API =
"https://script.google.com/macros/s/AKfycbyKnVmxYCTskDLpOk_s2Ch1nHnVvD__GVHbnztTCvl4bzYgk7sDx0F1WuJ0CXMORqs/exec"

/* ================= USER ================= */

let user =
JSON.parse(
localStorage.getItem("user") || "null"
)

if(!user){

location.href = "login.html"

}

let isAdmin =
String(user.email).toLowerCase()
===
String(ADMIN).toLowerCase()

/* ================= GLOBAL ================= */

let ALL_PRODUCTS = []

let HAS_SUBSCRIPTION = false

/* =========================================================
DRIVE IMAGE FIX
========================================================= */

function driveImage(link){

if(!link){

return "https://picsum.photos/500"

}

let id = ""

/* id= */

if(link.includes("id=")){

id =
link.split("id=")[1]
.split("&")[0]

}

/* /d/ */

else if(link.includes("/d/")){

id =
link.split("/d/")[1]
.split("/")[0]

}

/* raw id */

else{

id = link

}

return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`

}

/* =========================================================
LOADER
========================================================= */

function showLoader(){

document.getElementById("library")
.innerHTML = `

<div style="
grid-column:1/-1;
padding:80px;
text-align:center;
">

<div style="
width:70px;
height:70px;
margin:auto;
border:5px solid rgba(255,255,255,.1);
border-top:5px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
"></div>

<p style="
margin-top:20px;
font-size:18px;
opacity:.7;
">
Loading Library...
</p>

</div>

`

}

/* =========================================================
CHECK SUBSCRIPTION
========================================================= */

async function checkSubscription(){

try{

let res =
await fetch(

SUBSCRIPTION_API +
"?db=subscriptions&t=" +
Date.now()

)

let response =
await res.json()

console.log("SUBSCRIPTION:", response)

let subs = []

if(Array.isArray(response)){

subs = response

}

else if(response.subscriptions){

subs = response.subscriptions

}

HAS_SUBSCRIPTION =
subs.some(s =>

String(s.email)
.toLowerCase()

===

String(user.email)
.toLowerCase()

&&

String(s.status)
.toLowerCase()

===

"active"

)

}catch(err){

console.log(err)

HAS_SUBSCRIPTION = false

}

}

/* =========================================================
LOAD DATA
========================================================= */

async function loadData(){

try{

showLoader()

/* ================= PRODUCTS ================= */

let productRes =
await fetch(

PRODUCT_API +
"?action=products&t=" +
Date.now()

)

let raw =
await productRes.text()

console.log("RAW:", raw)

let response = {}

try{

response =
JSON.parse(raw)

}catch(err){

response = {}

}

/* ================= FIX RESPONSE ================= */

if(Array.isArray(response)){

ALL_PRODUCTS = response

}

else if(response.products){

ALL_PRODUCTS =
response.products

}

else{

ALL_PRODUCTS = []

}

/* ================= SUBSCRIPTION ================= */

await checkSubscription()

/* ================= ACCESSIBLE ================= */

let accessibleBooks =
ALL_PRODUCTS.filter(product => {

let owner =

String(product.owner)
.toLowerCase()

===

String(user.email)
.toLowerCase()

if(isAdmin) return true

if(owner) return true

if(HAS_SUBSCRIPTION) return true

return false

})

/* ================= STATS ================= */

document.getElementById(
"totalBooks"
).innerText =
ALL_PRODUCTS.length

document.getElementById(
"unlockedBooks"
).innerText =
accessibleBooks.length

document.getElementById(
"premiumBooks"
).innerText =
ALL_PRODUCTS.length

document.getElementById(
"subscriptionStatus"
).innerText =

HAS_SUBSCRIPTION
? "Active"
: "Inactive"

/* ================= RENDER ================= */

renderBooks("all")

}catch(err){

console.log(err)

document.getElementById("library")
.innerHTML = `

<div class="empty">

Failed To Load Library

</div>

`

}

}

/* =========================================================
RENDER BOOKS
========================================================= */

function renderBooks(type){

let box =
document.getElementById("library")

box.innerHTML = ""

/* ================= FILTER ================= */

let filtered =
ALL_PRODUCTS.filter(product => {

/* APPROVED */

if(
product.status &&
product.status !== "approved"
){

return false

}

/* OWNER */

let owner =

String(product.owner)
.toLowerCase()

===

String(user.email)
.toLowerCase()

/* ACCESS */

let allow = false

if(isAdmin){

allow = true

}

else if(owner){

allow = true

}

else if(HAS_SUBSCRIPTION){

allow = true

}

/* FILTERS */

if(type === "uploads"){

return owner

}

if(type === "subscription"){

return HAS_SUBSCRIPTION

}

if(type === "purchased"){

return owner

}

if(type === "all"){

return allow

}

return false

})

/* EMPTY */

if(filtered.length === 0){

box.innerHTML = `

<div class="empty">

No Ebooks Found

</div>

`

return

}

/* =========================================================
LOOP
========================================================= */

filtered.forEach(product => {

let owner =

String(product.owner)
.toLowerCase()

===

String(user.email)
.toLowerCase()

let allow = false

if(isAdmin){

allow = true

}

else if(owner){

allow = true

}

else if(HAS_SUBSCRIPTION){

allow = true

}

/* IMAGE */

let image =
driveImage(

product.front_cover ||
product.frontCover ||
product.image

)

/* BUTTON */

let button = `

<button class="read-btn"

onclick="openBook('${product.id}')">

📖 Read Ebook

</button>

`

/* MANAGE */

let manage = ""

if(owner || isAdmin){

manage = `

<div class="actions">

<button class="edit"

onclick="editBook('${product.id}')">

✏ Edit

</button>

<button class="delete"

onclick="deleteBook('${product.id}')">

🗑 Delete

</button>

</div>

`

}

/* CARD */

box.innerHTML += `

<div class="card">

<div class="menu">
⋮
</div>

<img
class="cover"
loading="lazy"
src="${image}"
onerror="this.src='https://picsum.photos/500'"
>

<div class="book-title">

${product.title || "Untitled"}

</div>

<div class="author">

${product.author || "Unknown"}

</div>

<div class="badge">

${allow
? "Unlocked"
: "Premium"}

</div>

${button}

${manage}

</div>

`

})

}

/* =========================================================
OPEN BOOK
========================================================= */

function openBook(id){

let product =
ALL_PRODUCTS.find(p =>

String(p.id) === String(id)

)

if(!product){

alert("Book not found")
return

}

/* ACCESS */

let owner =

String(product.owner)
.toLowerCase()

===

String(user.email)
.toLowerCase()

let allow = false

if(isAdmin){

allow = true

}

else if(owner){

allow = true

}

else if(HAS_SUBSCRIPTION){

allow = true

}

if(!allow){

alert(
"Subscription Required"
)

location.href =
"subscription.html"

return

}

/* PDF */

let pdf =
product.pdf_url ||
product.pdf ||
""

if(!pdf){

alert("PDF missing")
return

}

/* SAVE */

localStorage.setItem(
"viewerPDF",
pdf
)

localStorage.setItem(
"viewerBook",
JSON.stringify(product)
)

/* OPEN */

location.href =
"viewer.html?id=" + id

}

/* =========================================================
EDIT BOOK
========================================================= */

function editBook(id){

localStorage.setItem(
"editBookId",
id
)

location.href =
"edit-ebook.html"

}

/* =========================================================
DELETE BOOK
========================================================= */

async function deleteBook(id){

let ok =
confirm(
"Delete this ebook?"
)

if(!ok) return

try{

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"deleteBook",

id:id,

email:user.email

})

})

let data =
await res.json()

alert(
data.message ||
"Deleted"
)

loadData()

}catch(err){

alert(err.message)

}

}

/* =========================================================
FILTER TAB
========================================================= */

function filterBooks(type){

document
.querySelectorAll(".tab")
.forEach(tab =>

tab.classList.remove("active")

)

let clickedTab =
[...document.querySelectorAll(".tab")]
.find(tab =>

tab.innerText
.toLowerCase()
.includes(type)

)

if(clickedTab){

clickedTab.classList.add("active")

}

renderBooks(type)

}

/* =========================================================
START
========================================================= */

loadData()

</script>
   
</body>
</html>
