<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Delete Account</title><style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:30px;
border-radius:16px;
width:90%;
max-width:420px;
text-align:center;
}

h2{
color:#ef4444;
}

p{
opacity:.9;
font-size:14px;
line-height:1.6;
}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.delete{
background:#ef4444;
color:white;
}

.cancel{
background:#1f2937;
color:white;
}

</style></head><body><div class="card"><h2>Delete Account</h2><p>
Deleting your account will disable login immediately.
<br><br>
Your data will be permanently deleted after <b>90 days</b>.
<br><br>
You can recover your account before permanent deletion.
</p><button class="delete" onclick="deleteAccount()">
Delete My Account
</button><button class="cancel" onclick="location.href='dashboard.html'">
Cancel
</button></div><script>

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

let user=JSON.parse(localStorage.getItem("user"))

async function deleteAccount(){

let confirmDelete=confirm("Are you sure you want to delete your account?")

if(!confirmDelete) return

let form=new FormData()

form.append("action","delete_account")
form.append("email",user.email)

let res=await fetch(API,{
method:"POST",
body:form
})

let data=await res.json()

if(data.success){

alert("Account scheduled for deletion")

localStorage.clear()

location.href="login.html"

}else{

alert("Failed to delete account")

}

}

</script></body>
</html>
