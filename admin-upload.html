<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Upload Ebook</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
max-width:520px;
margin:auto;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#020617;
color:white;
}

textarea{
min-height:100px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="location.href='admin.html'">⬅</div>

<div class="title">
👑 Admin Upload Ebook
</div>

</div>

<div class="container">

<div class="card">

<h2>Upload Ebook (Auto Approved)</h2>

<input id="title" placeholder="Ebook Title">

<input id="price" type="number" placeholder="Price">

<input id="image" placeholder="Drive Cover Image Link">

<input id="pdf" placeholder="Drive PDF Link">

<textarea id="description" placeholder="Book Description"></textarea>

<button id="uploadBtn" onclick="uploadAdminBook()">
Upload + Auto Approve ✅
</button>

</div>

</div>

<script>

const ADMIN="ayushprajpati6@gmail.com"

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){

alert("Admin Only")
location.href="index.html"

}

/* VALIDATE DRIVE LINK */

function isDriveLink(link){

return link.includes("drive.google.com")

}

/* UPLOAD */

async function uploadAdminBook(){

let btn=document.getElementById("uploadBtn")

let title=document.getElementById("title").value.trim()
let price=Number(document.getElementById("price").value)
let image=document.getElementById("image").value.trim()
let pdf=document.getElementById("pdf").value.trim()
let description=document.getElementById("description").value.trim()

if(!title||!price||!image||!pdf){

alert("Fill All Fields")
return

}

if(price<=0){

alert("Price must be greater than 0")
return

}

if(!isDriveLink(image)||!isDriveLink(pdf)){

alert("Use Google Drive links")
return

}

btn.disabled=true
btn.innerText="Uploading..."

try{

let res=await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"uploadFile",

title:title,
price:price,
image:image,
pdf:pdf,
description:description,

author:"Admin",
owner:ADMIN,
status:"approved"

})

})

let data=await res.json()

if(data.success){

alert("Ebook Uploaded + Approved ✅")

location.reload()

}else{

alert(data.message||"Upload Failed")

btn.disabled=false
btn.innerText="Upload + Auto Approve ✅"

}

}catch(e){

alert("Server Error")

btn.disabled=false
btn.innerText="Upload + Auto Approve ✅"

}

}

</script>

</body>

</html>
