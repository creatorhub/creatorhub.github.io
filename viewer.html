<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Reader</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
overflow:hidden;
}

.topbar{
background:#111827;
padding:12px;
display:flex;
align-items:center;
}

.back{
cursor:pointer;
font-size:22px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.reader{
width:100%;
height:calc(100vh - 50px);
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
opacity:0.1;
pointer-events:none;
white-space:nowrap;
}

.block{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
font-size:22px;
opacity:.7;
}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="history.back()">⬅</div>

<div class="title">
Secure Ebook Reader
</div>

</div>

<div id="viewer"></div>

<script>

/* APIs */

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* ADMIN */

const ADMIN="ayushprajpati6@gmail.com"

/* USER */

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user){

location.href="login.html"

}

/* PRODUCT ID */

let params=new URLSearchParams(location.search)

let id=params.get("id")

if(!id){

document.getElementById("viewer").innerHTML="<div class='block'>Invalid Ebook</div>"

}

/* DRIVE ID */

function driveId(link){

if(!link) return null

if(link.includes("id="))
return link.split("id=")[1].split("&")[0]

if(link.includes("/file/d/"))
return link.split("/file/d/")[1].split("/")[0]

return null

}

/* GET DB */

async function getDB(api,db){

let res=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await res.json()

return Array.isArray(data)?data:[]

}

/* LOAD READER */

async function loadReader(){

let products=await getDB(PRODUCT_API,"products")

let orders=await getDB(PAYMENT_API,"orders")

let subs=await getDB(PAYMENT_API,"subscriptions")

let product=products.find(p=>String(p.id)===String(id))

if(!product){

document.getElementById("viewer").innerHTML="<div class='block'>Ebook not found</div>"

return

}

/* ACCESS CHECK */

let purchased=orders.find(o=>

o.productId==id &&
o.buyer===user.email &&
(o.status==="paid"||o.payment==="paid")

)

let owner=product.owner===user.email

let premium=subs.find(s=>s.email===user.email)

let isPremium=false

if(premium){

let exp=new Date(premium.expiry)

if(Date.now()<exp){

isPremium=true

}

}

let allow=false

if(user.email===ADMIN) allow=true
else if(owner) allow=true
else if(purchased) allow=true
else if(isPremium) allow=true

if(!allow){

document.getElementById("viewer").innerHTML="<div class='block'>Buy this ebook to read</div>"

return

}

/* PDF VIEW */

let fileId=driveId(product.pdf)

let url="https://drive.google.com/file/d/"+fileId+"/preview"

document.getElementById("viewer").innerHTML=

`

<div class="reader">

<iframe src="${url}" allow="autoplay"></iframe>

<div class="watermark">
${user.email}
</div>

</div>

`

}

loadReader()

/* BLOCK RIGHT CLICK */

document.addEventListener("contextmenu",e=>e.preventDefault())

/* BLOCK COPY */

document.addEventListener("copy",e=>e.preventDefault())

/* BLOCK PRINT */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="p"){

e.preventDefault()

alert("Printing disabled")

}

})

</script>

</body>
</html>
