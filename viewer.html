<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Ebook Viewer - CreatorHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* =====================================================
    CORE RESET & CREATORHUB PREMIUM THEME INTERFACES
    ===================================================== */
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body{
      background: #f6f8fc;
      color: #101828;
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* =====================================================
    TOPBAR / NAVIGATION LAYER
    ===================================================== */
    .topbar{
      min-height: 114px;
      background: #fff;
      border-bottom: 1px solid #dce4f0;
      padding: 26px 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-shrink: 0;
    }
    .topbar-left{
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .brand-logo{
      display: flex;
      align-items: center;
    }
    .brand-name{
      font-size: 25px;
      font-weight: 950;
      color: #06142c;
      letter-spacing: -0.02em;
    }
    .brand-name span{
      color: #2f62e9;
    }
    
    /* 📦 BACK BUTTON BOX DESIGN (FOR BOTH DESKTOP & MOBILE) */
    .back-btn{
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      color: #101828;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #dce4f0;
      padding: 10px 20px;
      border-radius: 10px;
      box-shadow: 0 2px 4px rgba(16, 24, 40, 0.05);
      transition: all 0.2s ease;
    }
    .back-btn:hover{
      color: #2f62e9;
      border-color: #2f62e9;
      background: #fcfde2; /* Subtle light tint effect */
      transform: translateY(-1px);
    }
    .back-btn i {
      font-size: 14px;
    }
    
    .book-header-info {
      text-align: center;
      flex: 1;
      max-width: 50%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #bookMainTitle {
      font-size: 18px;
      font-weight: 950;
      color: #06142c;
    }
    
    /* Mobile dedicated sub-bar */
    .mobile-book-title-bar {
      display: none;
      background: #eef3f9;
      padding: 10px 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #06142c;
      border-bottom: 1px solid #dce4f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge{
      padding: 6px 14px;
      border-radius: 999px;
      background: #eef3f9;
      color: #2f62e9;
      font-weight: 950;
      font-size: 13px;
      letter-spacing: 0.05em;
      border: 1px solid rgba(49, 87, 201, 0.1);
    }

    /* =====================================================
    PROFILE BLOCK Dropdown Menu
    ===================================================== */
    .profile-wrap{
      position: relative;
      display: none;
      align-items: center;
    }
    .profile-image{
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: #d9e1ec;
      border: 3px solid #fff;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.12);
      transition: transform 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }
    .profile-image:hover{
      transform: scale(1.04);
      border-color: #2f62e9;
    }
    .profile-menu{
      position: absolute;
      top: 68px;
      left: 0;
      width: 280px;
      background: #0d1628;
      border: 1px solid #182a64;
      border-radius: 14px;
      padding: 20px;
      display: none;
      box-shadow: 0 20px 45px rgba(16, 24, 40, 0.25);
      z-index: 1000;
    }
    .profile-menu.show{
      display: block;
      animation: menuFadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes menuFadeIn{
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .profile-header{
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 14px;
    }
    .menu-profile-image{
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    #menuName{
      color: #fff;
      font-size: 16px;
      font-weight: 800;
    }
    #menuEmail{
      margin-top: 3px;
      font-size: 13px;
      color: #63728a;
      word-break: break-all;
    }
    .profile-menu a{
      display: flex;
      align-items: center;
      height: 46px;
      padding: 0 14px;
      border-radius: 8px;
      color: #e7edf8;
      font-size: 15px;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s;
    }
    .profile-menu a:hover{
      background: #182a64;
      transform: translateX(4px);
    }
    .logout-btn{
      margin-top: 14px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ef4444;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .logout-btn:hover{
      opacity: 0.9;
    }

    /* =====================================================
    DYNAMIC HIGH-PERFORMANCE PDF CONTAINER FRAME
    ===================================================== */
    .viewer-container {
      flex: 1;
      width: 100%;
      background: #eef3f9;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f8fc;
      color: #63728a;
      font-weight: 700;
      z-index: 5;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #dce4f0;
      border-top-color: #2f62e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* =====================================================
    ⚡ MOBILE RESPONSIVE FIXES 
    ===================================================== */
    @media(max-width: 768px) {
      .topbar { 
        min-height: 70px; 
        padding: 12px 16px; 
        gap: 10px;
      }
      .book-header-info { 
        display: none; 
      }
      .mobile-book-title-bar {
        display: block; 
      }
      .brand-name {
        font-size: 20px; 
      }
      .badge {
        padding: 4px 10px;
        font-size: 11px;
      }
      .topbar-right {
        gap: 8px !important;
      }
      
      /* Mobile optimization for Boxed Back Button */
      .back-btn {
        font-size: 14px;
        padding: 6px 14px;
        border-radius: 8px;
      }
      
      .profile-image {
        width: 40px;
        height: 40px;
        border-width: 2px;
      }
      .profile-menu {
        top: 55px;
        width: 260px;
        position: fixed; 
        left: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <div id="profileWrap" class="profile-wrap">
        <img id="profileImage" src="https://ui-avatars.com/api/?name=User&background=2f62e9&color=fff" class="profile-image" onclick="toggleProfileMenu()" alt="Profile">
        
        <div id="profileMenu" class="profile-menu">
          <div class="profile-header">
            <img id="menuProfileImage" src="https://ui-avatars.com/api/?name=User&background=2f62e9&color=fff" class="menu-profile-image" alt="User">
            <div>
              <div id="menuName">CreatorHub User</div>
              <div id="menuEmail">user@email.com</div>
            </div>
          </div>
          <a href="profile.html">My Profile</a>
          <a href="seller-apply.html">Become Seller</a>
          <a href="tranding.html">Trending Books</a>
          <a href="library.html">Library</a>
          <a href="topselling.html">Top Selling</a>
          <div class="logout-btn" onclick="logout()">Logout</div>
        </div>
      </div>

      <!-- 📦 Boxed Back Button -->
      <div class="back-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Back</div>
    </div>

    <div class="book-header-info">
      <div id="bookMainTitle">Loading Premium Ebook Stream...</div>
    </div>

    <div class="topbar-right" style="display: flex; align-items: center; gap: 16px;">
      <div class="badge">Reader Mode</div>
      <a class="brand-logo" href="./dashboard.html">
        <span class="brand-name">Creator<span>Hub</span></span>
      </a>
    </div>
  </div>

  <!-- Mobile Screen Title Sub-Bar -->
  <div id="mobileBookTitleBar" class="mobile-book-title-bar">
    📖 Loading Premium Ebook Stream...
  </div>

  <div class="viewer-container">
    <div id="loaderState" class="empty-state">
      <div style="text-align: center;">
        <div class="spinner"></div>
        <p>Streaming encrypted secure PDF viewer tunnel...</p>
      </div>
    </div>
    
    <iframe id="pdfViewerFrame" src="" allow="autoplay"></iframe>
  </div>

  <script>
    function driveImage(url){
      if(!url) return "";
      if(url.includes("uc?id=")){
        let id = url.split("id=")[1].split("&")[0];
        return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
      }
      if(url.includes("/d/")){
        let id = url.split("/d/")[1].split("/")[0];
        return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
      }
      return url;
    }

    function toggleProfileMenu(){
      document.getElementById("profileMenu").classList.toggle("show");
    }

    window.addEventListener("click", function(e){
      let wrap = document.getElementById("profileWrap");
      if(wrap && !wrap.contains(e.target)){
        document.getElementById("profileMenu").classList.remove("show");
      }
    });

    function logout(){ localStorage.clear(); window.location.href = "login.html"; }
    function goBack(){ window.location.href = "library.html"; }

    function getLoggedUser(){
      let user = {};
      try{
        user = JSON.parse(localStorage.getItem("user") || "{}");
      }catch(e){
        user = {};
      }

      let email =
        user.email ||
        (user.user && user.user.email) ||
        localStorage.getItem("user_email") ||
        localStorage.getItem("creatorhub_profile_email") ||
        localStorage.getItem("email") ||
        "";

      let name =
        user.name ||
        (user.user && user.user.name) ||
        localStorage.getItem("user_name") ||
        localStorage.getItem("creatorhub_profile_name") ||
        localStorage.getItem("name") ||
        "CreatorHub User";

      let image =
        user.profile_image ||
        user.profileImage ||
        user.image ||
        user.picture ||
        (user.user && (user.user.profile_image || user.user.image || user.user.picture)) ||
        localStorage.getItem("profile_image") ||
        localStorage.getItem("user_image") ||
        localStorage.getItem("creatorhub_profile_image") ||
        "";

      let cachedUser = localStorage.getItem("creatorhub_profile_cache_v6");

      if(cachedUser && email){
        try{
          let cache = JSON.parse(cachedUser);
          let profile = cache[email];
          if(profile){
            name = profile.name || name;
            image = profile.profile_image || profile.image || image;
            email = profile.email || email;
          }
        }catch(e){}
      }

      if(!image){
        image = "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=2f62e9&color=fff";
      }

      return {
        email: email,
        name: name,
        image: image
      };
    }

    function updateLoginUI(){
      let profileWrap = document.getElementById("profileWrap");
      let profileImage = document.getElementById("profileImage");
      let menuProfileImage = document.getElementById("menuProfileImage");
      let menuName = document.getElementById("menuName");
      let menuEmail = document.getElementById("menuEmail");

      let user = getLoggedUser();

      if(user.email || localStorage.getItem("user") || localStorage.getItem("user_token")){
        profileWrap.style.display = "flex";
        profileImage.src = driveImage(user.image);
        menuProfileImage.src = driveImage(user.image);
        menuName.innerText = user.name || "CreatorHub User";
        menuEmail.innerText = user.email || "";
      }
    }
    
    function initializeBookViewer(){
      try {
        let pdfUrl = localStorage.getItem("viewerPDF");
        const bookDataRaw = localStorage.getItem("viewerBook");

        if(!pdfUrl) {
          alert("PDF stream source parameter empty. Routing back to library.");
          window.location.href = "library.html";
          return;
        }

        if(bookDataRaw) {
          const book = JSON.parse(bookDataRaw);
          const dynamicTitle = `📖 Reading: ${book.title || "Premium Ebook"}`;
          
          document.getElementById("bookMainTitle").innerText = dynamicTitle;
          document.getElementById("mobileBookTitleBar").innerText = dynamicTitle;
        }

        if (pdfUrl.includes("open?id=")) {
          pdfUrl = pdfUrl.replace("open?id=", "file/d/") + "/preview";
        } else if (pdfUrl.includes("uc?id=")) {
          pdfUrl = pdfUrl.replace("uc?id=", "file/d/") + "/preview";
        } else if (pdfUrl.includes("/d/") && !pdfUrl.includes("/preview")) {
          pdfUrl = pdfUrl.split("/edit")[0].split("/view")[0] + "/preview";
        }

        const frame = document.getElementById("pdfViewerFrame");
        
        frame.onload = function() {
          document.getElementById("loaderState").style.display = "none";
        };

        frame.src = pdfUrl;

      } catch (err) {
        console.log("Stream pipe execution error:", err);
        document.getElementById("loaderState").innerHTML = "<div style='color:#ef4444;'>Viewer pipeline compilation exception thrown.</div>";
      }
    }

    updateLoginUI();
    initializeBookViewer();
  </script>
</body>
</html>
