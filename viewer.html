<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
CreatorHub Reader
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#020617;

color:white;

overflow:hidden;

}

/* =========================================================
TOPBAR
========================================================= */

.topbar{

height:65px;

background:#07111f;

display:flex;

align-items:center;

padding:0 18px;

border-bottom:
1px solid rgba(255,255,255,.06);

position:fixed;

top:0;

left:0;

width:100%;

z-index:9999;

backdrop-filter:blur(20px);

}

.back{

font-size:24px;

cursor:pointer;

width:50px;

}

.title{

flex:1;

text-align:center;

font-size:22px;

font-weight:700;

}

.title span{

color:#22c55e;

}

/* =========================================================
VIEWER
========================================================= */

#viewer{

position:fixed;

top:65px;

left:0;

width:100%;

height:calc(100vh - 65px);

}

/* =========================================================
LOADER
========================================================= */

.loader{

height:100%;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:20px;

}

.spinner{

width:70px;

height:70px;

border-radius:50%;

border:5px solid rgba(255,255,255,.1);

border-top:5px solid #22c55e;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg)
}

}

/* =========================================================
READER
========================================================= */

.reader{

width:100%;

height:100%;

position:relative;

overflow:hidden;

background:#000;

}

/* =========================================================
PDF
========================================================= */

iframe{

width:100%;

height:100%;

border:none;

background:black;

}

/* =========================================================
WATERMARK
========================================================= */

.watermark{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

font-weight:bold;

opacity:.08;

transform:rotate(-30deg);

color:white;

z-index:99;

}

/* =========================================================
OVERLAY
========================================================= */

.overlay{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

background:

repeating-linear-gradient(

45deg,

rgba(255,255,255,.02),

rgba(255,255,255,.02) 2px,

transparent 2px,

transparent 8px

);

z-index:100;

}

/* =========================================================
BOTTOM CONTROLS
========================================================= */

.controls{

position:absolute;

bottom:18px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:12px;

z-index:999;

}

.control-btn{

background:
rgba(15,23,42,.92);

border:1px solid rgba(255,255,255,.08);

padding:14px 18px;

border-radius:18px;

color:white;

font-size:15px;

font-weight:bold;

cursor:pointer;

backdrop-filter:blur(20px);

transition:.3s;

}

.control-btn:hover{

transform:translateY(-2px);

}

.listen{

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

}

.stop{

background:
linear-gradient(
90deg,
#dc2626,
#ef4444
);

}

/* =========================================================
ERROR
========================================================= */

.block{

height:100%;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

opacity:.7;

padding:30px;

text-align:center;

}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:700px){

.title{

font-size:18px;

}

.watermark{

font-size:22px;

}

.controls{

bottom:12px;

gap:8px;

}

.control-btn{

padding:12px 14px;

font-size:13px;

}

}

</style>

</head>

<body>

<!-- =========================================================
TOPBAR
========================================================= -->

<div class="topbar">

<div
class="back"
onclick="history.back()">

⬅

</div>

<div class="title">

Creator<span>Hub</span> Reader

</div>

</div>

<!-- =========================================================
VIEWER
========================================================= -->

<div id="viewer">

<div class="loader">

<div class="spinner"></div>

<div>

Loading Ebook...

</div>

</div>

</div>

<!-- =========================================================
SCRIPT
========================================================= -->

<script>

/* =========================================================
CONFIG
========================================================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

const SUBSCRIPTION_API =
"https://script.google.com/macros/s/AKfycbyKnVmxYCTskDLpOk_s2Ch1nHnVvD__GVHbnztTCvl4bzYgk7sDx0F1WuJ0CXMORqs/exec"

const ADMIN =
"ayushprajpati6@gmail.com"

/* =========================================================
USER
========================================================= */

let user =
JSON.parse(
localStorage.getItem("user") || "null"
)

if(!user){

location.href =
"login.html"

}

/* =========================================================
PRODUCT ID
========================================================= */

let params =
new URLSearchParams(
location.search
)

let id =
params.get("id")

if(!id){

document.getElementById("viewer")
.innerHTML =

"<div class='block'>Invalid Ebook</div>"

}

/* =========================================================
DRIVE ID
========================================================= */

function driveId(link){

if(!link) return null

if(link.includes("id=")){

return link
.split("id=")[1]
.split("&")[0]

}

if(link.includes("/file/d/")){

return link
.split("/file/d/")[1]
.split("/")[0]

}

return null

}

/* =========================================================
GET JSON
========================================================= */

async function getJSON(url){

let res =
await fetch(url)

return await res.json()

}

/* =========================================================
CHECK SUBSCRIPTION
========================================================= */

async function checkSubscription(){

try{

let res =
await fetch(

SUBSCRIPTION_API,

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"check_subscription",

email:user.email

})

}

)

let data =
await res.json()

return data.active === true

}catch{

return false

}

}

/* =========================================================
LOAD READER
========================================================= */

async function loadReader(){

try{

/* ================= PRODUCTS ================= */

let data =
await getJSON(

PRODUCT_API +
"?action=products&t=" +
Date.now()

)

let products =
data.products || []

/* ================= FIND PRODUCT ================= */

let product =
products.find(p =>

String(p.id) === String(id)

)

if(!product){

document.getElementById("viewer")
.innerHTML =

"<div class='block'>Ebook Not Found</div>"

return

}

/* ================= ACCESS ================= */

let owner =
product.owner === user.email

let subscribed =
await checkSubscription()

let allow = false

if(user.email === ADMIN){

allow = true

}

else if(owner){

allow = true

}

else if(subscribed){

allow = true

}

if(!allow){

document.getElementById("viewer")
.innerHTML =

"<div class='block'>Subscription Required To Read This Ebook</div>"

return

}

/* ================= PDF ================= */

let pdf =

product.pdf_url ||
product.pdf ||
""

if(!pdf){

document.getElementById("viewer")
.innerHTML =

"<div class='block'>PDF Missing</div>"

return

}

let fileId =
driveId(pdf)

if(!fileId){

document.getElementById("viewer")
.innerHTML =

"<div class='block'>Invalid PDF Link</div>"

return

}

/* ================= GOOGLE PREVIEW ================= */

let preview =

"https://drive.google.com/file/d/" +
fileId +
"/preview"

/* ================= RENDER ================= */

document.getElementById("viewer")
.innerHTML = `

<div class="reader">

<iframe
src="${preview}"
allowfullscreen
loading="lazy">

</iframe>

<div class="watermark">

${user.email}

</div>

<div class="overlay"></div>

<div class="controls">

<button
class="control-btn listen"
onclick="startVoice()">

🔊 Listen

</button>

<button
class="control-btn stop"
onclick="stopVoice()">

⛔ Stop

</button>

</div>

</div>

`

}catch(err){

console.log(err)

document.getElementById("viewer")
.innerHTML =

"<div class='block'>Failed To Load Ebook</div>"

}

}

loadReader()

/* =========================================================
VOICE READER
========================================================= */

function startVoice(){

let text =
document.body.innerText

let speech =
new SpeechSynthesisUtterance(text)

speech.lang =
"en-US"

speech.rate = 1

speech.pitch = 1

speech.volume = 1

window.speechSynthesis
.speak(speech)

}

function stopVoice(){

window.speechSynthesis
.cancel()

}

/* =========================================================
BLOCK ACTIONS
========================================================= */

document.addEventListener(

"contextmenu",

e => e.preventDefault()

)

document.addEventListener(

"copy",

e => e.preventDefault()

)

document.addEventListener(

"keydown",

function(e){

if(

e.ctrlKey &&

(

e.key === "p" ||

e.key === "s" ||

e.key === "u"

)

){

e.preventDefault()

alert("Blocked")

}

}

)

</script>

</body>
</html>
