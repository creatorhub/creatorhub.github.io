<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>CreatorHub Reader</title><style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
overflow:hidden;
}

/* TOPBAR */

.topbar{
background:#111827;
padding:12px;
display:flex;
align-items:center;
box-shadow:0 5px 20px black;
}

.back{
cursor:pointer;
font-size:22px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

/* LOADING */

.loading{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
font-size:20px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

/* READER */

.reader{
width:100%;
height:calc(100vh - 50px);
position:relative;
}

/* PDF */

iframe{
width:100%;
height:100%;
border:none;
}

/* WATERMARK */

.watermark{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:.12;
font-size:38px;
display:flex;
align-items:center;
justify-content:center;
animation:moveWatermark 18s linear infinite;
}

@keyframes moveWatermark{

0%{transform:translate(-20%,-20%)}

50%{transform:translate(20%,20%)}

100%{transform:translate(-20%,-20%)}

}

/* BLOCK MESSAGE */

.block{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
font-size:22px;
opacity:.7;
}

/* SCREEN OVERLAY */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:repeating-linear-gradient(
45deg,
rgba(255,255,255,0.02),
rgba(255,255,255,0.02) 2px,
transparent 2px,
transparent 6px
);
}

</style></head><body><div class="topbar"><div class="back" onclick="history.back()">⬅</div><div class="title">
Secure Ebook Reader
</div></div><div id="viewer" class="loading">
Loading Ebook...
</div><script>

  <div style="padding:10px;text-align:center">

<button onclick="startVoice()">🔊 Listen</button>

<button onclick="stopVoice()">⛔ Stop</button>

<button onclick="translateBook()">🌍 Translate</button>

</div>
  
/* APIs */

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

const ADMIN="ayushprajpati6@gmail.com"

/* USER */

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user){

location.href="login.html"

}

/* PRODUCT ID */

let params=new URLSearchParams(location.search)

let id=params.get("id")

if(!id){

document.getElementById("viewer").innerHTML="<div class='block'>Invalid Ebook</div>"

}

/* DRIVE ID */

function driveId(link){

if(!link) return null

if(link.includes("id="))
return link.split("id=")[1].split("&")[0]

if(link.includes("/file/d/"))
return link.split("/file/d/")[1].split("/")[0]

return null

}

/* GET DB */

async function getDB(api,db){

let res=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await res.json()

return Array.isArray(data)?data:[]

}

/* LOAD READER */

async function loadReader(){

let products=await getDB(PRODUCT_API,"products")

let orders=await getDB(PAYMENT_API,"orders")

let product=products.find(p=>String(p.id)===String(id))

if(!product){

document.getElementById("viewer").innerHTML="<div class='block'>Ebook not found</div>"

return

}

/* ACCESS CHECK */

let purchased=orders.find(o=>

o.productId==id &&
o.buyer===user.email &&
(o.status==="paid"||o.payment==="paid")

)

let owner=product.owner===user.email

let allow=false

if(user.email===ADMIN) allow=true
else if(owner) allow=true
else if(purchased) allow=true

if(!allow){

document.getElementById("viewer").innerHTML="<div class='block'>Buy this ebook to read</div>"

return

}

/* PDF VIEW */

let fileId=driveId(product.pdf)

let url="https://drive.google.com/file/d/"+fileId+"/preview"

document.getElementById("viewer").innerHTML=

`

<div class="reader">

<iframe src="${url}" allow="autoplay"></iframe>

<div class="watermark">
${user.email}
</div>

<div class="overlay"></div>

</div>

`

}

loadReader()

/* BLOCK RIGHT CLICK */

document.addEventListener("contextmenu",e=>e.preventDefault())

/* BLOCK COPY */

document.addEventListener("copy",e=>e.preventDefault())

  /* ================= VOICE READER ================= */

function startVoice(){

let text=document.body.innerText

let speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

speech.rate=1

speech.pitch=1

speechSynthesis.speak(speech)

}

function stopVoice(){

speechSynthesis.cancel()

}


/* ================= TRANSLATE ================= */

async function translateBook(){

alert("Translation starting...")

let text=document.body.innerText

let res=await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"translate",
text:text

})

})

let data=await res.json()

if(data.translated){

document.body.innerText=data.translated

}else{

alert("Translation failed")

}

}
  
/* BLOCK PRINT */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && (e.key==="p" || e.key==="s")){

e.preventDefault()

alert("Action blocked")

}

})

</script></body>
</html>
