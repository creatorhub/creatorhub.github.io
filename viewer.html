<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>CreatorHub Reader</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
overflow:hidden;
}

/* ================= TOPBAR ================= */

.topbar{
height:60px;
background:#07111f;
display:flex;
align-items:center;
padding:0 18px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
border-bottom:
1px solid rgba(255,255,255,.06);
}

.back{
font-size:24px;
cursor:pointer;
}

.title{
flex:1;
text-align:center;
font-size:20px;
font-weight:bold;
}

.title span{
color:#22c55e;
}

/* ================= VIEWER ================= */

.viewer{
position:fixed;
top:60px;
left:0;
width:100%;
height:calc(100vh - 60px);
background:#000814;
}

/* ================= PDF ================= */

iframe{
width:100%;
height:100%;
border:none;
}

/* ================= WATERMARK ================= */

.watermark{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
opacity:.08;
font-size:34px;
font-weight:bold;
color:white;
transform:rotate(-30deg);
z-index:9;
}

/* ================= LOADER ================= */

.loader{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
}

.spinner{
width:70px;
height:70px;
border-radius:50%;
border:
5px solid rgba(255,255,255,.08);

border-top:
5px solid #22c55e;

animation:spin 1s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

/* ================= BLOCK ================= */

.block{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
gap:20px;
}

.block h1{
font-size:28px;
}

.block p{
opacity:.7;
line-height:1.7;
}

.btn{
padding:14px 24px;
border:none;
border-radius:14px;
background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* ================= MOBILE ================= */

@media(max-width:700px){

.title{
font-size:17px;
}

.watermark{
font-size:22px;
}

}

</style>

</head>

<body>

<!-- ================= TOPBAR ================= -->

<div class="topbar">

<div class="back"
onclick="history.back()">
⬅
</div>

<div class="title">
Creator<span>Hub</span> Reader
</div>

</div>

<!-- ================= APP ================= -->

<div id="app">

<div class="loader">

<div class="spinner"></div>

<p>Loading Ebook...</p>

</div>

</div>

<script>

/* =========================================================
CONFIG
========================================================= */

const ADMIN =
"ayushprajpati6@gmail.com"

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

const SUBSCRIPTION_API =
"https://script.google.com/macros/s/AKfycbyKnVmxYCTskDLpOk_s2Ch1nHnVvD__GVHbnztTCvl4bzYgk7sDx0F1WuJ0CXMORqs/exec"

/* =========================================================
USER
========================================================= */

let user =
JSON.parse(
localStorage.getItem("user")
|| "null"
)

if(!user){

location.href =
"login.html"

}

/* =========================================================
GET ID
========================================================= */

let params =
new URLSearchParams(
location.search
)

let id =
params.get("id")

if(!id){

document.getElementById("app")
.innerHTML = `

<div class="block">

<h1>Invalid Ebook</h1>

<p>
Book ID Missing
</p>

<button class="btn"
onclick="history.back()">

Go Back

</button>

</div>

`

throw new Error(
"Invalid ID"
)

}

/* =========================================================
DRIVE ID
========================================================= */

function driveId(link){

if(!link) return ""

/* id= */

if(link.includes("id=")){

return link
.split("id=")[1]
.split("&")[0]

}

/* /d/ */

if(link.includes("/d/")){

return link
.split("/d/")[1]
.split("/")[0]

}

/* RAW */

return link

}

/* =========================================================
GET DB
========================================================= */

async function getDB(api,db){

try{

let res =
await fetch(

api +
"?db=" + db +
"&t=" + Date.now()

)

let data =
await res.json()

return Array.isArray(data)
? data
: []

}catch(err){

console.log(err)

return []

}

}

/* =========================================================
LOAD READER
========================================================= */

async function loadReader(){

try{

/* ================= PRODUCTS ================= */

let products =
await getDB(
PRODUCT_API,
"products"
)

/* ================= SUBSCRIPTIONS ================= */

let subs =
await getDB(
SUBSCRIPTION_API,
"subscriptions"
)

/* ================= FIND PRODUCT ================= */

let product =
products.find(p =>

String(p.id)
=== String(id)

)

if(!product){

document.getElementById("app")
.innerHTML = `

<div class="block">

<h1>Ebook Not Found</h1>

<p>
This ebook does not exist
</p>

<button class="btn"
onclick="history.back()">

Go Back

</button>

</div>

`

return

}

/* =========================================================
ACCESS CHECK
========================================================= */

let owner =

String(product.owner)
.toLowerCase()

===

String(user.email)
.toLowerCase()

let sub = subs.find(s =>

String(s.email)
.toLowerCase()

===

String(user.email)
.toLowerCase()

&&

(
s.status === "active" ||
s.status === "paid"
)

)

let allow = false

/* ADMIN */

if(
String(user.email)
.toLowerCase()

===

String(ADMIN)
.toLowerCase()
){

allow = true

}

/* OWNER */

else if(owner){

allow = true

}

/* SUBSCRIPTION */

else if(sub){

allow = true

}

/* =========================================================
BLOCK
========================================================= */

if(!allow){

document.getElementById("app")
.innerHTML = `

<div class="block">

<h1>
Subscription Required
</h1>

<p>
You need active subscription
to read this ebook.
</p>

<button class="btn"
onclick="location.href='subscription.html'">

Get Subscription

</button>

</div>

`

return

}

/* =========================================================
PDF
========================================================= */

let pdf =

product.pdf ||
product.pdf_url ||
product.pdfLink ||
""

if(!pdf){

document.getElementById("app")
.innerHTML = `

<div class="block">

<h1>
PDF Missing
</h1>

<p>
This ebook PDF was not found
</p>

<button class="btn"
onclick="history.back()">

Go Back

</button>

</div>

`

return

}

let fileId =
driveId(pdf)

let previewUrl =

"https://drive.google.com/file/d/" +
fileId +
"/preview"

/* =========================================================
RENDER
========================================================= */

document.getElementById("app")
.innerHTML = `

<div class="viewer">

<iframe
src="${previewUrl}"
allow="autoplay">

</iframe>

<div class="watermark">

${user.email}

</div>

</div>

`

}catch(err){

console.log(err)

document.getElementById("app")
.innerHTML = `

<div class="block">

<h1>
Something Went Wrong
</h1>

<p>
${err.message}
</p>

<button class="btn"
onclick="history.back()">

Go Back

</button>

</div>

`

}

}

loadReader()

/* =========================================================
BLOCK RIGHT CLICK
========================================================= */

document.addEventListener(
"contextmenu",
e => e.preventDefault()
)

/* =========================================================
BLOCK COPY
========================================================= */

document.addEventListener(
"copy",
e => e.preventDefault()
)

/* =========================================================
BLOCK SAVE / PRINT
========================================================= */

document.addEventListener(
"keydown",
function(e){

if(
e.ctrlKey &&
(
e.key === "s" ||
e.key === "p"
)
){

e.preventDefault()

alert(
"Action Blocked"
)

}

}
)

</script>

</body>
</html>
