<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
CreatorHub Reader
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
overflow:hidden;
}

/* =========================================================
TOPBAR
========================================================= */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:
linear-gradient(
90deg,
#07111f,
#0f172a
);
display:flex;
align-items:center;
padding:0 16px;
z-index:9999;
border-bottom:
1px solid rgba(255,255,255,.05);
}

.back{
font-size:24px;
cursor:pointer;
}

.reader-title{
flex:1;
text-align:center;
font-size:18px;
font-weight:bold;
}

.reader-title span{
color:#22c55e;
}

/* =========================================================
VIEWER
========================================================= */

#viewer{
position:fixed;
top:60px;
left:0;
width:100%;
height:calc(100vh - 60px);
background:#020617;
overflow:auto;
}

/* =========================================================
LOADER
========================================================= */

.loader-wrap{
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.loader{
width:70px;
height:70px;
border-radius:50%;
border:5px solid rgba(255,255,255,.08);
border-top:5px solid #22c55e;
animation:spin 1s linear infinite;
}

.loading-text{
margin-top:20px;
font-size:18px;
opacity:.8;
animation:pulse 1.4s infinite;
}

/* =========================================================
PDF
========================================================= */

.reader{
position:relative;
width:100%;
height:100%;
}

iframe{
width:100%;
height:100vh;
border:none;
background:white;
}

/* =========================================================
WATERMARK
========================================================= */

.watermark{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
opacity:.08;
color:white;
animation:move 15s linear infinite;
text-align:center;
padding:30px;
}

/* =========================================================
OVERLAY
========================================================= */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;

background:
repeating-linear-gradient(
45deg,
rgba(255,255,255,.01),
rgba(255,255,255,.01) 2px,
transparent 2px,
transparent 6px
);
}

/* =========================================================
REVIEWS
========================================================= */

.review-section{

position:absolute;

right:20px;
bottom:20px;

width:340px;

background:
rgba(2,6,23,.92);

backdrop-filter:blur(20px);

padding:20px;

border-radius:24px;

border:
1px solid rgba(255,255,255,.06);

z-index:9999;

}

.review-section h2{

margin-bottom:16px;

font-size:22px;

}

.rating-row{

display:flex;
gap:10px;

margin-bottom:16px;

}

.rating-row button{

flex:1;

height:50px;

border:none;
border-radius:14px;

background:#0f172a;

font-size:24px;

cursor:pointer;

transition:.3s;

color:white;

}

.rating-row button.active{

background:#22c55e;

transform:scale(1.05);

}

#reviewComment{

width:100%;
height:120px;

border:none;
outline:none;

resize:none;

padding:16px;

border-radius:18px;

background:#0f172a;

color:white;

font-size:15px;

margin-bottom:16px;

}

.submit-review{

width:100%;
height:52px;

border:none;
border-radius:18px;

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

}

#reviewStatus{

margin-top:12px;

font-size:14px;

opacity:.8;

}

/* =========================================================
ERROR
========================================================= */

.error{
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
}

.error h1{
font-size:34px;
margin-bottom:12px;
}

.error p{
opacity:.7;
margin-bottom:30px;
}

.error button{
padding:14px 28px;
border:none;
border-radius:14px;
background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* =========================================================
ANIMATION
========================================================= */

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

@keyframes pulse{

0%{
opacity:.4;
}

50%{
opacity:1;
}

100%{
opacity:.4;
}

}

@keyframes move{

0%{
transform:
translate(-20%,-20%)
rotate(-20deg);
}

50%{
transform:
translate(20%,20%)
rotate(-20deg);
}

100%{
transform:
translate(-20%,-20%)
rotate(-20deg);
}

}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:700px){

.reader-title{
font-size:15px;
}

.watermark{
font-size:18px;
}

.review-section{

position:relative;

width:100%;

right:auto;
bottom:auto;

margin-top:20px;

}

}

</style>

</head>

<body>

<!-- =========================================================
TOPBAR
========================================================= -->

<div class="topbar">

<div class="back"
onclick="history.back()">

⬅

</div>

<div class="reader-title">

Creator<span>Hub</span> Reader

</div>

</div>

<!-- =========================================================
VIEWER
========================================================= -->

<div id="viewer">

<div class="loader-wrap">

<div class="loader"></div>

<div class="loading-text">

Loading Ebook...

</div>

</div>

</div>

<script>

/* =========================================================
API
========================================================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

/* =========================================================
USER
========================================================= */

let user =
JSON.parse(
localStorage.getItem("user") || "null"
)

if(!user){

location.href =
"login.html"

}

/* =========================================================
GET ID
========================================================= */

let params =
new URLSearchParams(
location.search
)

let id =
params.get("id")

/* =========================================================
GLOBAL PRODUCT
========================================================= */

let product = null

/* =========================================================
DRIVE ID
========================================================= */

function driveId(link){

if(!link) return null

if(link.includes("id=")){

return link
.split("id=")[1]
.split("&")[0]

}

if(link.includes("/d/")){

return link
.split("/d/")[1]
.split("/")[0]

}

return link

}

/* =========================================================
REVIEW SYSTEM
========================================================= */

let CURRENT_RATING = 0

function setRating(num){

CURRENT_RATING = num

document
.querySelectorAll(
".rating-row button"
)
.forEach((btn,index)=>{

btn.classList.remove("active")

if(index < num){

btn.classList.add("active")

}

})

}

/* =========================================================
SUBMIT REVIEW
========================================================= */

async function submitReview(){

try{

let comment =
document.getElementById(
"reviewComment"
).value.trim()

if(!CURRENT_RATING){

alert("Select Rating")

return

}

if(!comment){

alert("Write Review")

return

}

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"addReview",

id:product.id,

rating:CURRENT_RATING,

comment:comment,

email:user.email

})

})

let data =
await res.json()

console.log(data)

document.getElementById(
"reviewStatus"
).innerHTML =

"✅ Review Submitted"

document.getElementById(
"reviewComment"
).value = ""

}catch(err){

console.log(err)

alert(err.message)

}

}

/* =========================================================
LOAD VIEWER
========================================================= */

async function loadViewer(){

try{

let res =
await fetch(

PRODUCT_API +
"?action=products&t=" +
Date.now()

)

let raw =
await res.text()

let data = {}

try{

data =
JSON.parse(raw)

}catch(e){

data = []

}

let products = []

if(Array.isArray(data)){

products = data

}

else if(data.products){

products = data.products

}

/* =========================================================
GET PRODUCT
========================================================= */

let savedBook =
JSON.parse(
localStorage.getItem(
"viewerBook"
) || "null"
)

product =
products.find(p =>

String(p.id).trim()
===

String(id).trim()

)

if(!product && savedBook){

product = savedBook

}

localStorage.setItem(
"viewerBook",
JSON.stringify(product)
)

/* =========================================================
ERROR
========================================================= */

if(!product){

document.getElementById(
"viewer"
).innerHTML = `

<div class="error">

<h1>
Ebook Not Found
</h1>

<p>
This ebook does not exist
</p>

<button onclick="history.back()">

Go Back

</button>

</div>

`

return

}

/* =========================================================
PDF
========================================================= */

let pdf =

product.pdf_url ||
product.pdf ||
""

if(!pdf){

document.getElementById(
"viewer"
).innerHTML = `

<div class="error">

<h1>
PDF Missing
</h1>

<p>
No PDF found for this ebook
</p>

<button onclick="history.back()">

Go Back

</button>

</div>

`

return

}

/* =========================================================
PDF ID
========================================================= */

let fileId =
driveId(pdf)

if(!fileId){

document.getElementById(
"viewer"
).innerHTML = `

<div class="error">

<h1>
Invalid PDF
</h1>

<p>
Drive file id missing
</p>

<button onclick="history.back()">

Go Back

</button>

</div>

`

return

}

/* =========================================================
PREVIEW URL
========================================================= */

let url =
`https://drive.google.com/file/d/${fileId}/preview`

/* =========================================================
UPDATE STATS
========================================================= */

product.reads =
Number(product.reads || 0) + 1

product.trending =
Math.min(
100,
Number(product.trending || 0) + 1
)

fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"updateStats",

id:product.id,

reads:product.reads,

rating:product.rating || "5.0",

revenue:product.revenue || 0,

trending:product.trending,

email:user.email

})

})

/* =========================================================
RENDER
========================================================= */

document.getElementById(
"viewer"
).innerHTML = `

<div class="reader">

<iframe
src="${url}"
allow="autoplay"
sandbox="
allow-scripts
allow-same-origin
allow-forms
allow-popups
">
</iframe>

<div class="watermark">

${user.email}
• CreatorHub Protected

</div>

<div class="overlay"></div>

<div class="review-section">

<h2>
⭐ Reader Reviews
</h2>

<div class="rating-row">

<button onclick="setRating(1)">
⭐
</button>

<button onclick="setRating(2)">
⭐
</button>

<button onclick="setRating(3)">
⭐
</button>

<button onclick="setRating(4)">
⭐
</button>

<button onclick="setRating(5)">
⭐
</button>

</div>

<textarea
id="reviewComment"
placeholder="Write your review..."
></textarea>

<button
class="submit-review"
onclick="submitReview()"
>

Submit Review

</button>

<div id="reviewStatus"></div>

</div>

</div>

`

}catch(err){

console.log(err)

document.getElementById(
"viewer"
).innerHTML = `

<div class="error">

<h1>
Loading Failed
</h1>

<p>
${err.message}
</p>

<button onclick="location.reload()">

Retry

</button>

</div>

`

}

}

loadViewer()

/* =========================================================
BLOCK
========================================================= */

document.addEventListener(
"contextmenu",
e => e.preventDefault()
)

document.addEventListener(
"copy",
e => e.preventDefault()
)

document.addEventListener(
"keydown",
function(e){

if(
e.ctrlKey &&
(
e.key === "s" ||
e.key === "p" ||
e.key === "u"
)
){

e.preventDefault()

alert("Action Blocked")

}

}
)

</script>

</body>
</html>
