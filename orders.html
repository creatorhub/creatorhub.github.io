<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Orders</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:15px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-bottom:15px;
display:flex;
gap:15px;
align-items:center;
}

.cover{
width:80px;
height:110px;
object-fit:cover;
border-radius:8px;
}

.info{
flex:1;
}

.status{
padding:5px 10px;
border-radius:8px;
font-size:13px;
display:inline-block;
margin-top:6px;
}

.placed{background:#f59e0b}
.printing{background:#3b82f6}
.shipped{background:#6366f1}
.delivery{background:#10b981}
.delivered{background:#22c55e}

.empty{
text-align:center;
padding:60px;
opacity:.7;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">My Orders</div>
</div>

<div class="container">
<div id="orders">Loading orders...</div>
</div>

<script>

/* APIs */

const ORDER_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"


/* USER */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){

alert("Login first")
location.href="login.html"

}


/* SAFE TEXT */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}


/* DRIVE IMAGE */

function driveImage(link){

if(!link) return "https://picsum.photos/200"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w500"
}

}catch{}

return link

}


/* GET DB */

async function getDB(api,db){

let res=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await res.json()

return Array.isArray(data)?data:[]

}


/* LOAD ORDERS */

async function loadOrders(){

let box=document.getElementById("orders")

box.innerHTML="Loading..."

try{

let orders=await getDB(ORDER_API,"orders")

let products=await getDB(PRODUCT_API,"products")


/* USER ORDERS */

let myOrders=orders.filter(
o=>o.buyer===user.email
)

myOrders.reverse()

if(myOrders.length===0){

box.innerHTML="<div class='empty'>No orders yet 📦</div>"
return

}

box.innerHTML=""

myOrders.forEach(o=>{

let product=products.find(
p=>String(p.id)===String(o.productId)
)

let title=product?product.title:"Unknown Product"

let image=product?product.image:""

let status=o.status || "Order Placed"

let statusClass="placed"

if(status==="Printing") statusClass="printing"
if(status==="Shipped") statusClass="shipped"
if(status==="Out for Delivery") statusClass="delivery"
if(status==="Delivered") statusClass="delivered"

box.innerHTML+=`

<div class="card">

<img class="cover"
src="${driveImage(image)}">

<div class="info">

<b>${escapeHTML(title)}</b>

<br><br>

<b>Order ID:</b> ${escapeHTML(o.id)}

<br>

<b>Amount:</b> ₹ ${Number(o.amount||0)}

<br>

<b>Date:</b> ${escapeHTML(o.date || "")}

<br><br>

<span class="status ${statusClass}">
${escapeHTML(status)}
</span>

</div>

</div>

`

})

}catch(e){

box.innerHTML="Failed to load orders ❌"

}

}


/* INIT */

loadOrders()

</script>

</body>

</html>
