<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Orders</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */

.topbar{
display:flex;
align-items:center;
padding:15px;
background:#020617;
box-shadow:0 5px 20px black;
position:sticky;
top:0;
z-index:99;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
animation:fadeUp .6s ease;
}

/* CARD */

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-bottom:15px;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 10px 25px rgba(0,0,0,.5);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,.8);
}

.cover{
width:80px;
height:110px;
object-fit:cover;
border-radius:8px;
}

.info{
flex:1;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:8px;
font-size:13px;
display:inline-block;
margin-top:6px;
font-weight:bold;
}

.placed{background:#f59e0b}
.printing{background:#3b82f6}
.shipped{background:#6366f1}
.delivery{background:#10b981}
.delivered{background:#22c55e}

/* EMPTY */

.empty{
text-align:center;
padding:60px;
opacity:.7;
}

/* LOADER */

.loader{
text-align:center;
padding:40px;
font-size:18px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

/* PAGE ANIMATION */

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* TABLET */
@media (max-width: 768px){

.container{
padding:12px;
}

.card{
display:flex;
flex-direction:row;
align-items:flex-start;
padding:14px;
gap:12px;
border-radius:12px;
}

.cover{
width:70px;
height:95px;
min-width:70px;
object-fit:cover;
}

.info{
flex:1;
font-size:13px;
line-height:1.5;
word-break:break-word;
}

.info b:first-child{
font-size:15px;
display:block;
margin-bottom:4px;
}

.status{
font-size:11px;
padding:5px 10px;
}

  .topbar {
    padding: 12px 16px;
    display: flex !important;
    align-items: center !important;
    justify-content: flex-start !important;
  }

  .back {
    font-size: 20px;
    width: auto;
    cursor: pointer;
    order: 1;
    padding-right: 8px;
  }

  .title {
    font-size: 18px;
    text-align: left !important; /* मोबाइल पर हेडर ऐप जैसा लुक देगा */
    order: 2;
  }
  

/* MOBILE */
@media (max-width:480px){

.container{
padding:10px;
}

.card{
padding:12px;
gap:10px;
}

.cover{
width:60px;
height:85px;
min-width:60px;
}

.info{
font-size:12px;
}

.info b:first-child{
font-size:14px;
}

.status{
font-size:10px;
padding:4px 8px;
}

.title{
font-size:17px;
}

}

/* EXTRA SMALL DEVICES */
@media (max-width:360px){

.cover{
width:55px;
height:80px;
min-width:55px;
}

.info{
font-size:11px;
}

.info b:first-child{
font-size:13px;
}

.status{
font-size:9px;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="history.back()">⬅</div>

<div class="title">My Orders</div>

</div>

<div class="container">

<div id="orders" class="loader">
Loading orders...
</div>

</div>

<script>

/* APIs */

const ORDER_API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

const PRODUCT_API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"
/* USER */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){

alert("Login first")
location.href="login.html"

}

/* SAFE TEXT */

function escapeHTML(str){
return String(str).replace(/[&<>"']/g,function(m){
return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]
})
}

/* DRIVE IMAGE */

function driveImage(link){

if(!link) return "https://picsum.photos/200"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w500"
}

}catch{}

return link

}

/* GET DB */

async function getDB(api,db){

let res=await fetch(api+"?db="+db+"&t="+Date.now())
let data=await res.json()

return Array.isArray(data)?data:[]

}

/* LOAD ORDERS WITHOUT FLICKERING */
let PREVIOUS_DATA_HASH = ""; // Tracks modifications to stop refresh flashes

async function loadOrders() {
  let box = document.getElementById("orders");

  try {
    let orders = await getDB(ORDER_API, "orders");
    let products = await getDB(PRODUCT_API, "products");

    /* ONLY PAID ORDERS */
    let myOrders = orders.filter(o =>
      o.buyer === user.email &&
      (o.payment === "paid" || o.status === "paid")
    );

    myOrders.reverse();

    // Create a unique footprint layout representation to compare changes
    let currentHash = JSON.stringify(myOrders.map(o => ({ id: o.id, status: o.status })));
    
    // If nothing changed, block innerHTML execution to eliminate flickering loops
    if (currentHash === PREVIOUS_DATA_HASH && box.querySelectorAll('.card').length > 0) {
      return; 
    }
    PREVIOUS_DATA_HASH = currentHash;

    if (myOrders.length === 0) {
      box.innerHTML = "<div class='empty'>No orders yet 📦</div>";
      return;
    }

    let htmlContent = "";

    myOrders.forEach(o => {
      let product = products.find(p => String(p.id) === String(o.productId));

      /* APPROVED CHECK */
      if (product && product.ai_status && product.ai_status !== "approved") return;

      let title = product ? product.title : "Unknown Product";
      let image = product ? product.image : "";
      let status = o.status || "Order Placed";
      let statusClass = "placed";

      if (status === "Printing") statusClass = "printing";
      if (status === "Shipped") statusClass = "shipped";
      if (status === "Out for Delivery") statusClass = "delivery";
      if (status === "Delivered") statusClass = "delivered";

      let date = o.date ? new Date(o.date).toLocaleDateString() : "";

      htmlContent += `
        <div class="card">
          <img class="cover" src="${driveImage(image)}" onerror="this.src='https://picsum.photos/200'">
          <div class="info">
            <b>${escapeHTML(title)}</b>
            <br><br>
            <b>Order ID:</b> ${escapeHTML(o.id)}
            <br>
            <b>Amount:</b> ₹ ${Number(o.amount || 0).toLocaleString("en-IN")}
            <br>
            <b>Date:</b> ${date}
            <br><br>
            <span class="status ${statusClass}">
              ${escapeHTML(status)}
            </span>
          </div>
        </div>
      `;
    });

    box.innerHTML = htmlContent;

  } catch (e) {
    // Keep showing existing cards if network request breaks temporarily
    if(box.querySelectorAll('.card').length === 0) {
      box.innerHTML = "Failed to load orders ❌";
    }
  }
  }
  
/* INIT */

loadOrders()
  
setInterval(loadOrders,5000)

</script>

</body>

</html>
