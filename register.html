<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorHub • Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================================================
   CREATORHUB STANDARD LIGHT UI INTERFACE VARIABLES
   ========================================================= */
:root {
    --bg-primary: #f8fafc;       /* Soft workspace canvas white */
    --bg-secondary: #ffffff;     /* Pure white high-fidelity cards */
    --text-primary: #0f172a;     /* Deep slate text colors */
    --text-secondary: #475569;   /* Muted labels track */
    --text-muted: #94a3b8;
    --accent-blue: #2563eb;      /* Platform Royal Blue Theme */
    --accent-blue-hover: #1d4ed8;
    --accent-blue-light: #eff6ff;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.02);
    --shadow-lg: 0 30px 60px -15px rgba(15,23,42,0.12);
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

html{
    scroll-behavior: smooth;
}

body{
    background-color: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* BLUR ATMOSPHERE BACKGROUND SHIELDS */
.bg-blur-1{
    position: fixed;
    top: -250px;
    right: -200px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.06), transparent);
    z-index: 0;
}

.bg-blur-2{
    position: fixed;
    bottom: -250px;
    left: -200px;
    width: 650px;
    height: 650px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.04), transparent);
    z-index: 0;
}

/* INTERFACE LOGICAL CARD BLOCK */
.card{
    position: relative;
    z-index: 2;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    padding: 40px 35px;
    border-radius: 24px;
    width: 100%;
    max-width: 460px;
    box-shadow: var(--shadow-lg);
    animation: fadePage .4s ease;
}

.back{
    position: absolute;
    top: 22px;
    left: 22px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    cursor: pointer;
    font-size: 16px;
    color: var(--text-secondary);
    transition: all 0.2s ease;
}

.back:hover{
    transform: translateX(-3px);
    color: var(--accent-blue);
    border-color: var(--accent-blue);
}

/* CARD HEAD HEADLINES */
.card h2{
    font-size: 32px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.02em;
    margin-top: 25px;
    color: var(--text-primary);
}

.card h2 span {
    color: var(--accent-blue);
}

.card-sub{
    margin-top: 8px;
    text-align: center;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-secondary);
    margin-bottom: 24px;
}

/* DATA FIELD MODULES */
.group {
    margin-bottom: 16px;
}

.label {
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    display: block;
}

.input{
    width: 100%;
    height: 54px;
    padding: 0 16px;
    outline: none;
    border-radius: 12px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--border-color);
    transition: all 0.2s ease;
}

.input:focus{
    border-color: var(--accent-blue);
    background: var(--bg-secondary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

/* DISPATCH COMMAND ACTION BUTTON */
.register-btn{
    width: 100%;
    height: 54px;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    background: var(--accent-blue);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    transition: all 0.2s ease;
}

.register-btn:hover:not(:disabled){
    background-color: var(--accent-blue-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
}

.register-btn:disabled {
    background-color: var(--text-muted);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
}

/* UTILITY PATH LINK */
.link{
    margin-top: 24px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
}

.link:hover{
    color: var(--accent-blue);
}

@keyframes fadePage{
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@media(max-width: 480px){
    .card{ padding: 30px 20px; border-radius: 20px; }
    .card h2{ font-size: 26px; }
    .input, .register-btn { height: 50px; }
}
</style>
</head>

<body>

<div class="bg-blur-1"></div>
<div class="bg-blur-2"></div>

<div class="card">
    <div class="back" onclick="location.href='index.html'">A🡠</div>

    <h2>Creator<span>Hub</span> Register</h2>
    <div class="card-sub">Create your digital profile to join the marketplace grid ecosystem.</div>

    <!-- FIELD: Full Name -->
    <div class="group">
        <label class="label">Full Name</label>
        <input id="name" class="input" placeholder="Enter your full name">
    </div>

    <!-- FIELD: Email Address -->
    <div class="group">
        <label class="label">Email Address</label>
        <input id="email" class="input" type="email" placeholder="Enter your email address">
    </div>

    <!-- FIELD: Secure Password -->
    <div class="group">
        <label class="label">Password</label>
        <input id="password" class="input" type="password" placeholder="Create secure password">
    </div>

    <!-- BUTTON DISPATCH TRIGGER -->
    <button id="registerBtn" class="register-btn" onclick="registerUser()">
        Create Account
    </button>

    <div class="link" onclick="location.href='login.html'">
        Already have account? Login to Platform
    </div>
</div>

<script>
/* =========================================================
   CORE CONFIG PIPELINE MATRIX
   ========================================================= */
const API = "https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec";

async function registerUser(){
    let btn = document.getElementById("registerBtn");

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value.trim();

    if(!name || !email || !password){
        alert("Please fill all fields");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Creating Account Gateway...";

    try{
        let formData = new FormData();
        formData.append("action", "register");
        formData.append("name", name);
        formData.append("email", email);
        formData.append("password", password);

        let res = await fetch(API, {
            method: "POST",
            body: formData
        });

        let text = await res.text();
        console.log("API REGISTER RESPONSE:", text);
        let data = JSON.parse(text);

        if(data.success){
            btn.innerText = "Authenticating Secure Session...";

            // 🔥 AUTO LOGIN PIPELINE
            let loginRes = await fetch(API, {
                method: "POST",
                body: new URLSearchParams({
                    action: "login",
                    email: email,
                    password: password
                })
            });

            let loginText = await loginRes.text();
            let loginData = JSON.parse(loginText);

            // 🔐 SECURE SESSION WRITE OPERATION
            if(loginData.success){
                localStorage.setItem("user_email", loginData.user.email);
                localStorage.setItem("user_name", loginData.user.name || "User");
                localStorage.setItem("user_token", loginData.token || "");

                if(loginData.user.profile_image){
                    localStorage.setItem("user_image", loginData.user.profile_image);
                }

                localStorage.setItem("user", JSON.stringify({
                    email: loginData.user.email,
                    token: loginData.token
                }));
            }

            alert("Account Created Successfully ✅");
            window.location.href = "dashboard.html";

        } else {
            alert(data.message || "Registration sequence failed");
            btn.disabled = false;
            btn.innerText = "Create Account";
        }

    } catch(err) {
        console.error("Critical identity pipeline sync crash:", err);
        alert("Server error ❌");
        btn.disabled = false;
        btn.innerText = "Create Account";
    }
}
</script>

</body>
</html>
