<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Register</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

/* CARD */

.card{
background:#111827;
padding:32px;
border-radius:18px;
width:100%;
max-width:420px;
border:1px solid #1f2937;
box-shadow:0 20px 40px rgba(0,0,0,0.7);
position:relative;
}

/* BACK */

.back{
position:absolute;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
}

/* TITLE */

h2{
text-align:center;
color:#22c55e;
margin-top:0;
}

/* INPUT */

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
border:1px solid #1f2937;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

/* LINK */

.link{
margin-top:16px;
text-align:center;
opacity:.8;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="back" onclick="location.href='index.html'">⬅</div>

<h2>CreatorHub Register</h2>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="registerBtn" onclick="registerUser()">
Create Account
</button>

<div class="link" onclick="location.href='login.html'">
Already have account? Login
</div>

</div>

<script>

/* CORRECT API */

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

/* REGISTER */

async function registerUser(){

let btn=document.getElementById("registerBtn")

let name=document.getElementById("name").value.trim()

let email=document.getElementById("email").value.trim().toLowerCase()

let password=document.getElementById("password").value.trim()

if(!name || !email || !password){

alert("Fill all fields")

return

}

btn.disabled=true

btn.innerText="Creating Account..."

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"register",

name:name,

email:email,

password:password

})

})

let data=await res.json()

if(!data.success){

alert(data.message || "Register failed")

btn.disabled=false

btn.innerText="Create Account"

return

}

/* AUTO LOGIN */

localStorage.setItem("user",

JSON.stringify({

email:email,

name:name

})

)

alert("Account Created Successfully")

location.href="dashboard.html"

}

catch(e){

alert("Server error")

btn.disabled=false

btn.innerText="Create Account"

}

}

</script>

</body>
</html>
