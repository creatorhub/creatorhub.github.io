<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Register</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:#111827;
padding:32px;
border-radius:18px;
width:100%;
max-width:420px;
border:1px solid #1f2937;
box-shadow:0 20px 40px rgba(0,0,0,0.7);
position:relative;
}

.back{
position:absolute;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
}

h2{
text-align:center;
color:#22c55e;
margin-top:0;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
border:1px solid #1f2937;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.link{
margin-top:16px;
text-align:center;
opacity:.8;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="back" onclick="location.href='index.html'">⬅</div>

<h2>CreatorHub Register</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="registerBtn" onclick="registerUser()">
Create Account
</button>

<div class="link" onclick="location.href='login.html'">
Already have account? Login
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

async function registerUser(){

let btn=document.getElementById("registerBtn")

let name=document.getElementById("name").value.trim()
let email=document.getElementById("email").value.trim().toLowerCase()
let password=document.getElementById("password").value.trim()

if(!name || !email || !password){
alert("Please fill all fields")
return
}

btn.disabled=true
btn.innerText="Creating..."

try{

let formData=new FormData()

formData.append("action","register")
formData.append("name",name)
formData.append("email",email)
formData.append("password",password)

let res=await fetch(API,{
method:"POST",
body:formData
})

let text=await res.text()

console.log("API RESPONSE:",text)

let data=JSON.parse(text)

if(data.success){

// 🔥 AUTO LOGIN
let loginRes = await fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"login",
email:email,
password:password
})
})

let loginText = await loginRes.text()
let loginData = JSON.parse(loginText)

// 🔐 TOKEN SAVE
if(loginData.success){
localStorage.setItem("user", JSON.stringify({
email: loginData.user.email,
token: loginData.token
}))
}

alert("Account Created Successfully ✅")

location.href="dashboard.html"

}else{

alert(data.message || "Register failed")

btn.disabled=false
btn.innerText="Create Account"

}

}catch(err){

console.error(err)

alert("Server error ❌")

btn.disabled=false
btn.innerText="Create Account"

}

}

</script>

</body>
</html>
