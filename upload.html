<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorHub Upload Ebook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>
/* ✅ SAME DESIGN — NO CHANGE */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:linear-gradient(135deg,#020617,#071426,#04111f);color:white;min-height:100vh;}
.navbar{height:70px;background:#07111f;display:flex;justify-content:space-between;align-items:center;padding:0 25px;}
.logo{font-size:32px;font-weight:bold;}
.logo span{color:#22c55e;}
.container{width:95%;max-width:1400px;margin:auto;padding:25px;}
input,textarea,select{width:100%;padding:14px;background:#020617;border:1px solid #1f2937;border-radius:10px;color:white;}
.upload-btn{width:100%;padding:18px;margin-top:20px;background:linear-gradient(90deg,#16a34a,#4ade80);border:none;border-radius:12px;color:white;cursor:pointer;}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Creator<span>Hub</span></div>
</div>

<div class="container">

<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name">

<textarea id="description" placeholder="Description"></textarea>

<input id="category" placeholder="Category">
<input id="price" placeholder="Price">
<input id="pages" placeholder="Pages">

<input type="file" id="pdf">
<input type="file" id="front">
<input type="file" id="back">

<button class="upload-btn" onclick="uploadBook()">Upload Ebook</button>

</div>

<script>

/******** CONFIG ********/
const UPLOAD_API="https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec";

/******** GOOGLE KEYS ********/
const CLIENT_ID="PASTE_CLIENT_ID";
const API_KEY="PASTE_API_KEY";

let accessToken="";

/******** GOOGLE LOGIN ********/
async function initGoogle(){
return new Promise((resolve)=>{
gapi.load("client",async()=>{
await gapi.client.init({
apiKey:API_KEY,
discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]
});

const tokenClient=google.accounts.oauth2.initTokenClient({
client_id:CLIENT_ID,
scope:"https://www.googleapis.com/auth/drive.file",
callback:(res)=>{
accessToken=res.access_token;
resolve();
}
});

tokenClient.requestAccessToken();
});
});
}

/******** DRIVE UPLOAD ********/
async function uploadToDrive(file){

let form=new FormData();

form.append("metadata",new Blob([JSON.stringify({
name:file.name,
mimeType:file.type
})],{type:"application/json"}));

form.append("file",file);

let res=await fetch(
"https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
{
method:"POST",
headers:{Authorization:"Bearer "+accessToken},
body:form
});

let data=await res.json();
return data.id;
}

/******** MAIN UPLOAD ********/
async function uploadBook(){

try{

let user = JSON.parse(localStorage.getItem("user") || "{}");

if(!user.token){
alert("Login required");
return;
}

alert("Google Login...");
await initGoogle();

let pdfFile=pdf.files[0];
let frontFile=front.files[0];
let backFile=back.files[0];

if(!pdfFile || !frontFile || !backFile){
alert("All files required");
return;
}

alert("Uploading to Drive...");

let pdfId=await uploadToDrive(pdfFile);
let frontId=await uploadToDrive(frontFile);
let backId=await uploadToDrive(backFile);

alert("Sending to backend...");

let res=await fetch(UPLOAD_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"uploadEbook",
token:user.token,

title:title.value,
description:description.value,
category:category.value,
author_name:author.value,
pages:pages.value,
price:price.value,

pdfId:pdfId,
frontCoverId:frontId,
backCoverId:backId
})
});

let data=await res.json();

if(data.success){
alert("✅ Upload Success");
}else{
alert("❌ "+data.message);
}

}catch(e){
console.log(e);
alert("Error: "+e);
}

}

</script>

</body>
</html>
