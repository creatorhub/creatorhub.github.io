<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Ebook - CreatorHub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
}

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
background:#020617;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
max-width:650px;
margin:auto;
}

.card{
background:#111827;
padding:25px;
border-radius:16px;
border:1px solid #1f2937;
}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

textarea{min-height:80px;}

button{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
}

img{
width:100%;
margin-top:12px;
border-radius:10px;
display:none;
}

.progress{
height:18px;
background:#020617;
border-radius:10px;
margin-top:15px;
overflow:hidden;
border:1px solid #1f2937;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.4s;
}

label{
margin-top:14px;
display:block;
font-size:14px;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Upload Ebook</div>
</div>

<div class="container">
<div class="card">

<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name">
<button type="button" onclick="aiHelp()">AI Suggest Title & Description</button>
<textarea id="description" placeholder="Book Description"></textarea>
<input id="price" type="number" placeholder="Price ₹">

<label>Total Pages</label>
<input id="pages" placeholder="Auto detected from PDF" readonly>

<label>Front Cover</label>
<input type="file" id="frontCover" accept="image/*">
<img id="previewFront">

<label>Back Cover</label>
<input type="file" id="backCover" accept="image/*">
<img id="previewBack">

<label>PDF File</label>
<input type="file" id="pdf" accept="application/pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button id="uploadBtn" onclick="upload()">Upload Ebook</button>

</div>
</div>

<script>

const API="YOUR_APPS_SCRIPT_URL"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* PREVIEW */

function preview(fileInput,imgId){

let file=fileInput.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=e=>{
let img=document.getElementById(imgId)
img.src=e.target.result
img.style.display="block"
}

reader.readAsDataURL(file)

}

document.getElementById("frontCover").onchange=function(){
preview(this,"previewFront")
}

document.getElementById("backCover").onchange=function(){
preview(this,"previewBack")
}

/* PDF PAGE DETECT */

document.getElementById("pdf").addEventListener("change",async function(){

let file=this.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(reader.result)

let pdf=await pdfjsLib.getDocument(typedarray).promise

document.getElementById("pages").value=pdf.numPages

}

reader.readAsArrayBuffer(file)

})

/* FILE TO BASE64 */

function toBase64(file){

return new Promise((resolve,reject)=>{

let reader=new FileReader()

reader.onload=()=>resolve(reader.result)

reader.onerror=reject

reader.readAsDataURL(file)

})

}

/* UPLOAD */

async function upload(){

let title=document.getElementById("title").value.trim()
let author=document.getElementById("author").value.trim()
let description=document.getElementById("description").value.trim()
let price=document.getElementById("price").value
let pages=document.getElementById("pages").value

let front=document.getElementById("frontCover").files[0]
let back=document.getElementById("backCover").files[0]
let pdf=document.getElementById("pdf").files[0]

if(!title||!author||!description||!price||!front||!back||!pdf){
alert("Please fill all fields")
return
}

if(front.size>2*1024*1024){
alert("Front cover must be below 2MB")
return
}

if(back.size>2*1024*1024){
alert("Back cover must be below 2MB")
return
}

if(pdf.size>10*1024*1024){
alert("PDF must be below 10MB")
return
}

let bar=document.getElementById("bar")
let btn=document.getElementById("uploadBtn")

btn.disabled=true
btn.innerText="Uploading..."

try{

bar.style.width="20%"
let front64=await toBase64(front)

bar.style.width="40%"
let back64=await toBase64(back)

bar.style.width="60%"
let pdf64=await toBase64(pdf)

bar.style.width="80%"

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

action:"uploadEbook",

title:title,
author:author,
description:description,
price:Number(price),
pages:pages,

email:user.email,

front_cover:front64,
back_cover:back64,
file:pdf64

})
})

let data=await res.json()

bar.style.width="100%"

if(data.success){

if(data.status=="published"){
alert("✅ Ebook uploaded and published successfully")
}else{
alert("📄 Ebook uploaded. Waiting for AI review")
}

location.reload()

}else{

alert(data.message || "Upload failed")

}

}catch(e){

alert("Upload error")
console.log(e)

}

btn.disabled=false
btn.innerText="Upload Ebook"

}

</script>

</body>
</html>
