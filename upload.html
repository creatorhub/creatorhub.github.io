<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Ebook - CreatorHub</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
background:#020617;
z-index:99;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

/* CONTAINER */

.container{
padding:20px;
max-width:650px;
margin:auto;
}

/* CARD */

.card{
background:#111827;
padding:25px;
border-radius:16px;
border:1px solid #1f2937;
}

/* INPUT */

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

textarea{min-height:80px;}

/* BUTTON */

button{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
}

/* IMAGE */

img{
width:100%;
margin-top:12px;
border-radius:10px;
display:none;
}

/* PROGRESS */

.progress{
height:18px;
background:#020617;
border-radius:10px;
margin-top:15px;
overflow:hidden;
border:1px solid #1f2937;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.4s;
}

label{
margin-top:14px;
display:block;
font-size:14px;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Upload Ebook</div>
</div>

<div class="container">

<div class="card">

<input id="title" placeholder="Book Title">

<input id="author" placeholder="Author Name">

<textarea id="description" placeholder="Book Description"></textarea>

<input id="price" type="number" placeholder="Price ₹">

<label>Front Cover</label>
<input type="file" id="frontCover" accept="image/*">
<img id="previewFront">

<label>Back Cover</label>
<input type="file" id="backCover" accept="image/*">
<img id="previewBack">

<label>PDF File</label>
<input type="file" id="pdf" accept="application/pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button id="uploadBtn" onclick="upload()">Upload Ebook</button>

</div>
</div>

<script>

const API="YOUR_APPS_SCRIPT_URL_HERE"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* IMAGE PREVIEW */

function preview(fileInput,imgId){

let file=fileInput.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=e=>{
let img=document.getElementById(imgId)
img.src=e.target.result
img.style.display="block"
}

reader.readAsDataURL(file)

}

document.getElementById("frontCover").onchange=function(){
preview(this,"previewFront")
}

document.getElementById("backCover").onchange=function(){
preview(this,"previewBack")
}

/* FILE TO BASE64 */

function toBase64(file){
return new Promise((resolve,reject)=>{
let reader=new FileReader()
reader.onload=()=>resolve(reader.result)
reader.onerror=reject
reader.readAsDataURL(file)
})
}

/* UPLOAD FUNCTION */

async function upload(){

let title=document.getElementById("title").value.trim()
let author=document.getElementById("author").value.trim()
let description=document.getElementById("description").value.trim()
let price=document.getElementById("price").value

let front=document.getElementById("frontCover").files[0]
let back=document.getElementById("backCover").files[0]
let pdf=document.getElementById("pdf").files[0]

if(!title||!author||!description||!price||!front||!back||!pdf){
alert("Please fill all fields")
return
}

/* SIZE CHECK */

if(front.size>2*1024*1024){
alert("Front cover must be below 2MB")
return
}

if(back.size>2*1024*1024){
alert("Back cover must be below 2MB")
return
}

if(pdf.size>10*1024*1024){
alert("PDF must be below 10MB")
return
}

let bar=document.getElementById("bar")
let btn=document.getElementById("uploadBtn")

btn.disabled=true
btn.innerText="Uploading..."

try{

bar.style.width="20%"

let front64=await toBase64(front)

bar.style.width="40%"

let back64=await toBase64(back)

bar.style.width="60%"

let pdf64=await toBase64(pdf)

bar.style.width="80%"

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"upload_ebook",
title:title,
author:author,
description:description,
price:Number(price),
email:user.email,
front_cover:front64,
back_cover:back64,
file:pdf64
})
})

let data=await res.json()

bar.style.width="100%"

if(data.success){
alert("Ebook uploaded successfully")
location.reload()
}else{
alert(data.message || "Upload failed")
}

}catch(e){

alert("Upload error")
console.log(e)

}

btn.disabled=false
btn.innerText="Upload Ebook"

}

</script>

</body>
</html>
