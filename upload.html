<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Ebook</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Upload Ebook</div>
</div>

<div class="container">

<div class="card">

<h2>Upload New Ebook</h2>

<input id="title" placeholder="Ebook Title">

<textarea id="desc" placeholder="Description"></textarea>

<input id="price" type="number" placeholder="Price ₹">

<label>Cover Image</label>
<input type="file" id="cover" accept="image/*">

<img id="coverPreview" class="preview">

<label>PDF File</label>
<input type="file" id="pdf" accept="application/pdf">

<button onclick="uploadEbook()">
Upload Ebook 🚀
</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzsaFkxtK_iyH2EeYepSAKTRvmIW_QBsWM0rnj-uLWPpx6JE17bamcoa2njWurpFRob/exec";

let user=JSON.parse(localStorage.getItem("user"));

if(!user){

alert("Login First");
location.href="login.html";

}

/* COVER PREVIEW */

document.getElementById("cover").addEventListener("change",function(e){

let file=e.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(ev){

let img=document.getElementById("coverPreview");

img.src=ev.target.result;
img.style.display="block";

};

reader.readAsDataURL(file);

});


/* UPLOAD EBOOK */

async function uploadEbook(){

let title=document.getElementById("title").value.trim();
let desc=document.getElementById("desc").value.trim();
let price=document.getElementById("price").value;

let cover=document.getElementById("cover").files[0];
let pdf=document.getElementById("pdf").files[0];

if(!title || !desc || !price || !cover || !pdf){

alert("Fill all fields");
return;

}

let readerCover=new FileReader();
let readerPdf=new FileReader();

readerCover.onload=function(){

readerPdf.onload=async function(){

try{

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

action:"upload_ebook",
title:title,
desc:desc,
price:price,
owner:user.email,
cover:readerCover.result,
pdf:readerPdf.result

})
});

let data=await res.json();

if(data.success){

alert("Ebook Uploaded Successfully ✅");

location.href="dashboard.html";

}else{

alert("Upload Failed");

}

}catch(err){

console.log(err);
alert("Server Error");

}

};

readerPdf.readAsDataURL(pdf);

};

readerCover.readAsDataURL(cover);

}

</script>

</body>
</html>
