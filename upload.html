<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Ebook - CreatorHub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 4px 15px rgba(0,0,0,.5);
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
max-width:520px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:18px;
background:#f97316;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.preview{
width:100%;
margin-top:15px;
border-radius:10px;
display:none;
}

canvas{
width:100%;
margin-top:10px;
border-radius:8px;
}

.pageinfo{
margin-top:10px;
color:#22c55e;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='dashboard.html'">⬅</div>
<div class="title">Upload Ebook</div>
</div>

<div class="container">

<div class="card">

<h2>Upload Digital Ebook</h2>

<input id="titleInput" placeholder="Ebook Title">
<input id="authorInput" placeholder="Author Name">

<select id="languageInput">
<option>English</option>
<option>Hindi</option>
<option>Other</option>
</select>

<textarea id="descriptionInput" placeholder="Book Description"></textarea>

<input id="keywordsInput" placeholder="Keywords">

<select id="categoryInput">
<option>Business</option>
<option>Education</option>
<option>Technology</option>
<option>Self Improvement</option>
<option>Finance</option>
<option>Other</option>
</select>

<input id="priceInput" type="number" placeholder="Price ₹">

<p>Cover Image (KDP size 1600 × 2560)</p>

<input type="file" accept="image/*" onchange="previewImage(event)">
<img id="preview" class="preview">

<p>Select Ebook PDF</p>

<input type="file" accept="application/pdf" onchange="loadPDF(event)">

<div id="pageCount" class="pageinfo"></div>
<div id="pdfPages"></div>

<button id="uploadBtn" onclick="uploadBook()">Upload Ebook</button>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx6U5oGFpD5HSl8wlwjv_z4zSMa_C25LLXmh2DYRZZxu-ac4iowrKEwXCNkua85U8dQ/exec";
const API_KEY="CREATORHUB_SECURE_KEY";

let user=JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Login First");
location.href="login.html";
}

let imageBase64="";
let pdfBase64="";

/* IMAGE PREVIEW */

function previewImage(e){

let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(ev){

let img=new Image();

img.src=ev.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");
canvas.width=1600;
canvas.height=2560;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,1600,2560);

imageBase64=canvas.toDataURL("image/jpeg",0.85);

preview.src=imageBase64;
preview.style.display="block";

};

};

reader.readAsDataURL(file);

}

/* PDF PREVIEW */

function loadPDF(e){

let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=async function(){

pdfBase64=reader.result;

let typedarray=new Uint8Array(
atob(pdfBase64.split(',')[1]).split('').map(c=>c.charCodeAt(0))
);

let pdf=await pdfjsLib.getDocument({data:typedarray}).promise;

pageCount.innerText="Pages : "+pdf.numPages;

let page=await pdf.getPage(1);

let viewport=page.getViewport({scale:1});

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.height=viewport.height;
canvas.width=viewport.width;

await page.render({canvasContext:ctx,viewport}).promise;

pdfPages.innerHTML="";
pdfPages.appendChild(canvas);

};

reader.readAsDataURL(file);

}

/* DATABASE API */

async function getDB(db){

let r=await fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
api_key:API_KEY,
action:"getDB",
db:db
})
});

let data=await r.json();

return data.data||[];

}

async function saveDB(db,data){

await fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
api_key:API_KEY,
action:"saveDB",
db:db,
data:data
})
});

}

/* UPLOAD */

async function uploadBook(){

let btn=document.getElementById("uploadBtn");

btn.disabled=true;
btn.innerText="Uploading...";

let title=document.getElementById("titleInput").value.trim();
let price=document.getElementById("priceInput").value.trim();
let author=document.getElementById("authorInput").value.trim();
let description=document.getElementById("descriptionInput").value.trim();
let keywords=document.getElementById("keywordsInput").value.trim();
let category=document.getElementById("categoryInput").value;
let language=document.getElementById("languageInput").value;

if(!title||!price||!imageBase64||!pdfBase64){

alert("Fill All Fields");

btn.disabled=false;
btn.innerText="Upload Ebook";

return;

}

let products=await getDB("products");

try{

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
api_key:API_KEY,
action:"uploadFile",
imageBase64:imageBase64.split(',')[1],
pdfBase64:pdfBase64.split(',')[1]
})
});

let result=await res.json();

if(!result.success){

alert("Drive Upload Failed");

btn.disabled=false;
btn.innerText="Upload Ebook";

return;

}

products.push({

id:Date.now(),
title:title,
author:author,
description:description,
keywords:keywords,
category:category,
language:language,
price:Number(price),
image:result.image,
pdf:result.pdf,
owner:user.email,
status:"pending",
date:new Date().toLocaleString()

});

await saveDB("products",products);

alert("Upload Success ✅");

location.href="products.html";

}catch(e){

alert("Upload Error");

btn.disabled=false;
btn.innerText="Upload Ebook";

}

}

</script>

</body>
</html>
