<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Ebook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
align-items:center;
padding:15px;
background:#1e293b;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:15px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.ai-btn{
background:#3b82f6;
}

.hidden{
display:none;
}

.loader{
text-align:center;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
<div class="back" onclick="goBack()">⬅</div>
<h3>Upload Ebook</h3>
</div>

<div class="container">

<div id="loading" class="loader">
Checking seller status...
</div>

<div id="notSeller" class="hidden">
<h3>Seller Required</h3>
<p>You must be an approved seller to upload ebooks.</p>
<button onclick="goApply()">Apply as Seller</button>
</div>

<div id="uploadForm" class="hidden">

<button class="ai-btn" onclick="aiHelp()">
✨ Auto Fill With AI
</button>

<input id="title" placeholder="Ebook Title">

<textarea
id="description"
placeholder="Description">
</textarea>

<input id="category" placeholder="Category">

<input
id="pages"
type="number"
placeholder="Page Count">

<input
id="price"
type="number"
placeholder="Price">

<select id="size">
<option value="A4">A4</option>
<option value="A5">A5</option>
<option value="6x9">6x9</option>
</select>

<label>Upload PDF</label>
<input
type="file"
id="pdf"
accept="application/pdf">

<label>Front Cover</label>
<input
type="file"
id="front"
accept="image/*">

<label>Back Cover</label>
<input
type="file"
id="back"
accept="image/*">

<button
id="uploadBtn"
onclick="upload()">
Upload Ebook
</button>

</div>

</div>

<script>

/* APIs */

const SELLER_API =
"https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec";

const GEMINI_API =
"https://script.google.com/macros/s/AKfycbxOofkiVgf-0yh_v-I7cXCdxqmyauk6XEOX7pQ04zOkZ6n0oEdSNm6jwmc4HaEcqEEfnw/exec";

const UPLOAD_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec";


/* USER */

let user =
JSON.parse(
localStorage.getItem("user")
);

if(!user || !user.email){
alert("Login required");
location.href="login.html";
}


/* NAV */

function goBack(){
window.history.back();
}

function goApply(){
window.location.href="apply.html";
}


/* BASE64 */

function toBase64(file){
return new Promise((resolve,reject)=>{

let reader = new FileReader();

reader.readAsDataURL(file);

reader.onload = ()=>{
resolve(reader.result);
};

reader.onerror = reject;

});
}


/* SELLER CHECK */

async function checkSeller(){

try{

console.log("Checking seller for:", user.email);

let res = await fetch(SELLER_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"seller_status",
email:user.email
})
});

let data = await res.json();

console.log("Seller response:", data);

document.getElementById("loading")
.style.display="none";

if(
data.success &&
(data.status || "")
.toLowerCase() === "approved"
){
document.getElementById("uploadForm")
.classList.remove("hidden");
}
else{

document.getElementById("notSeller")
.classList.remove("hidden");

if(data.status==="pending"){
alert("Your seller request is pending approval");
}

if(data.status==="not_applied"){
alert("Apply for seller account first");
}
}

}catch(e){

console.log("Seller error:", e);

document.getElementById("loading")
.style.display="none";

alert(
"Seller server error: " + e.message
);

}
}

checkSeller();


/* AI HELP */

async function aiHelp(){

try{

let pdf =
document.getElementById("pdf")
.files[0];

if(!pdf){
alert("Upload PDF first");
return;
}

let pdfBase64 =
await toBase64(pdf);

let res =
await fetch(GEMINI_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
pdfText:pdfBase64
})
});

let data =
await res.json();

console.log(data);

if(
data.status !== "approved"
){
alert(
data.message ||
"AI rejected file"
);
return;
}

document.getElementById("title").value =
data.title || "";

document.getElementById("description").value =
data.description || "";

document.getElementById("category").value =
data.category || "";

document.getElementById("pages").value =
data.pages || "";

alert("AI autofill completed");

}catch(e){

console.log(e);

alert(
"AI error: " + e.message
);

}
}


/* UPLOAD */

async function upload(){

let btn =
document.getElementById(
"uploadBtn"
);

btn.disabled=true;
btn.innerText="Uploading...";

try{

let title =
document.getElementById("title")
.value.trim();

let description =
document.getElementById("description")
.value.trim();

let category =
document.getElementById("category")
.value.trim();

let pages =
Number(
document.getElementById("pages")
.value
);

let price =
Number(
document.getElementById("price")
.value
);

let pdf =
document.getElementById("pdf")
.files[0];

let front =
document.getElementById("front")
.files[0];

let back =
document.getElementById("back")
.files[0];


/* validation */

if(!title) throw "Enter title";
if(!description) throw "Enter description";
if(!category) throw "Enter category";
if(!pages || pages<=0) throw "Enter valid pages";
if(!price || price<=0) throw "Enter valid price";
if(!pdf || !front || !back) throw "Upload all files";

if(
pdf.size >
10 * 1024 * 1024
){
throw "PDF max size is 10MB";
}


/* convert */

let pdfBase64 =
await toBase64(pdf);

let frontBase64 =
await toBase64(front);

let backBase64 =
await toBase64(back);


/* upload */

let res =
await fetch(UPLOAD_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"uploadEbook",
email:user.email,
title:title,
description:description,
category:category,
pages:pages,
price:price,
pdf:pdfBase64,
front_cover:frontBase64,
back_cover:backBase64
})
});

let data =
await res.json();

console.log(data);

if(data.success){

alert(
"✅ Ebook uploaded successfully"
);

location.href=
"dashboard.html";

}else{
throw (
data.message ||
"Upload failed"
);
}

}catch(err){

console.log(err);

alert(
"❌ " + err
);

}

btn.disabled=false;
btn.innerText=
"Upload Ebook";

}

</script>

</body>
</html>
