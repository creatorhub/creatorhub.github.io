<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Ebook - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding:20px;
overflow-x:hidden;
}

.topbar{
display:flex;
align-items:center;
margin-bottom:20px;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.card{
background:#111827;
padding:25px;
border-radius:14px;
max-width:600px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#f97316;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ea580c;
}

img{
width:100%;
margin-top:12px;
border-radius:10px;
display:none;
}

.progress{
height:22px;
background:#1f2937;
border-radius:12px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
border-radius:12px;
transition:.3s;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<h2>Upload Ebook</h2>
</div>

<div class="card">

<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name">
<textarea id="description" placeholder="Book Description"></textarea>
<input id="price" type="number" placeholder="Price ₹">

<p>Cover Image</p>
<input type="file" id="cover" accept="image/*">
<img id="preview">

<p>PDF File</p>
<input type="file" id="pdf" accept="application/pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button onclick="upload()">Upload Ebook</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx-Bu9s127GGueMP9w-BHp-J2oGz4YNLpPhaQ33oYGZNPpOnXRVl1BVKhCQz2y8E14R/exec";

/* USER */

let user = JSON.parse(localStorage.getItem("user") || "{}");

if(!user.email){
alert("Login First");
location.href="login.html";
}

/* SELLER CHECK */

async function checkSeller(){

try{

let res = await fetch(API+"?db=sellers&t="+Date.now())

let sellers = await res.json()

let seller = sellers.find(s=>s.email===user.email)

if(!seller){

alert("First open seller account to upload ebooks")

location.href="seller-apply.html"

}

}catch(e){

console.log("Seller check error",e)

}

}

checkSeller()

/* IMAGE PREVIEW */

document.getElementById("cover").onchange=function(){

let file=this.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=e=>{
let preview=document.getElementById("preview");
preview.src=e.target.result;
preview.style.display="block";
};

reader.readAsDataURL(file);

};

/* BASE64 CONVERT */

function toBase64(file){

return new Promise((resolve,reject)=>{

let reader=new FileReader();

reader.onload=()=>resolve(reader.result);
reader.onerror=reject;

reader.readAsDataURL(file);

});

}

/* UPLOAD */

async function upload(){

let title=document.getElementById("title").value.trim();
let author=document.getElementById("author").value.trim();
let description=document.getElementById("description").value.trim();
let price=document.getElementById("price").value.trim();

let cover=document.getElementById("cover").files[0];
let pdf=document.getElementById("pdf").files[0];

if(!title||!price||!author||!description||!cover||!pdf){

alert("Fill All Fields");
return;

}

let bar=document.getElementById("bar");

try{

bar.style.width="10%";

let image=await toBase64(cover);

bar.style.width="40%";

let pdfBase64=await toBase64(pdf);

bar.style.width="70%";

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"uploadFile",

title:title,
author:author,
description:description,
price:Number(price),

owner:user.email,

image:image,
pdf:pdfBase64

})

});

bar.style.width="90%";

let result=await res.json();

bar.style.width="100%";

if(result.success){

alert("Ebook Uploaded Successfully ✅");

setTimeout(()=>{
location.reload();
},1000);

}else{

alert(result.message || "Upload Failed");

}

}catch(err){

console.log(err);

alert("Upload Error");

}

}

</script>

</body>
  </html>
