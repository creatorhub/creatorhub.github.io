<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Ebook | CreatorHub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

/* GLOBAL */
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* HEADER */
.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
background:#020617;
z-index:10;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
transition:.3s;
}

.back:hover{
transform:translateX(-5px);
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

/* CARD */
.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:rgba(17,24,39,0.9);
padding:25px;
border-radius:18px;
border:1px solid #1f2937;
backdrop-filter:blur(10px);
animation:fadeUp .6s ease;
}

/* INPUTS */
input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:white;
transition:.3s;
}

input:focus,textarea:focus{
border-color:#22c55e;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #22c55e;
}

/* IMAGE */
img{
width:100%;
margin-top:12px;
border-radius:10px;
display:none;
}

/* PROGRESS */
.progress{
height:18px;
background:#020617;
border-radius:10px;
margin-top:15px;
overflow:hidden;
border:1px solid #1f2937;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.4s;
}

/* ANIMATION */
@keyframes fadeUp{
0%{opacity:0;transform:translateY(40px);}
100%{opacity:1;transform:translateY(0);}
}

label{
margin-top:14px;
display:block;
font-size:14px;
color:#9ca3af;
}

</style>

</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Upload Ebook</div>
</div>

<div class="container">

<div class="card">

<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name">

<button onclick="aiHelp()">✨ AI Suggest</button>

<textarea id="description" placeholder="Description"></textarea>

<input id="price" type="number" placeholder="Price ₹">

<label>Pages</label>
<input id="pages" readonly>

<label>Front Cover</label>
<input type="file" id="front" accept="image/*">
<img id="frontPreview">

<label>Back Cover</label>
<input type="file" id="back" accept="image/*">
<img id="backPreview">

<label>PDF File</label>
<input type="file" id="pdf" accept="application/pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button id="uploadBtn" onclick="upload()">Upload Ebook</button>

</div>

</div>

<script>

const API="YOUR_BACKEND_URL_HERE"

/* USER CHECK */
let user = JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* PREVIEW */
function preview(input,id){
let file=input.files[0]
if(!file) return

let reader=new FileReader()
reader.onload=e=>{
let img=document.getElementById(id)
img.src=e.target.result
img.style.display="block"
}
reader.readAsDataURL(file)
}

front.onchange=()=>preview(front,"frontPreview")
back.onchange=()=>preview(back,"backPreview")

/* PDF PAGES */
pdf.addEventListener("change",async function(){

let file=this.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=async function(){
let typed=new Uint8Array(reader.result)
let pdfDoc=await pdfjsLib.getDocument(typed).promise
pages.value=pdfDoc.numPages
}

reader.readAsArrayBuffer(file)

})

/* AI HELP */
function aiHelp(){

let t=title.value

if(!t){
alert("Enter title first")
return
}

description.value="Learn "+t+" step by step with practical examples."
}

/* BASE64 */
function toBase64(file){
return new Promise((resolve)=>{
let reader=new FileReader()
reader.onload=()=>resolve(reader.result)
reader.readAsDataURL(file)
})
}

/* UPLOAD */
async function upload(){

let t=title.value.trim()
let d=description.value.trim()
let p=price.value
let f=front.files[0]
let b=back.files[0]
let pdfFile=pdf.files[0]

if(!t||!d||!p||!f||!b||!pdfFile){
alert("Fill all fields")
return
}

let bar=document.getElementById("bar")
let btn=document.getElementById("uploadBtn")

btn.disabled=true
btn.innerText="Uploading..."

try{

bar.style.width="20%"

let f64=await toBase64(f)

bar.style.width="40%"

let b64=await toBase64(b)

bar.style.width="60%"

let pdf64=await toBase64(pdfFile)

bar.style.width="80%"

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"uploadEbook",
title:t,
description:d,
price:Number(p),
pages:pages.value,
email:user.email,
front_cover:f64,
back_cover:b64,
pdf:pdf64
})
})

let data=await res.json()

bar.style.width="100%"

if(data.success){
alert("✅ Upload Success")
location.reload()
}else{
alert(data.message)
}

}catch(e){
alert("Upload failed")
console.log(e)
}

btn.disabled=false
btn.innerText="Upload Ebook"

}

</script>

</body>
</html>
