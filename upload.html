<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Ebook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
align-items:center;
padding:15px;
background:#1e293b;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:15px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.ai-btn{
background:#3b82f6;
}

.hidden{
display:none;
}

.loader{
text-align:center;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="goBack()">⬅</div>
<h3>Upload Ebook</h3>
</div>

<div class="container">

<div id="loading" class="loader">Checking seller status...</div>

<div id="notSeller" class="hidden">
<h3>Seller Required</h3>
<p>You must be an approved seller to upload ebooks.</p>
<button onclick="goApply()">Apply as Seller</button>
</div>

<div id="uploadForm" class="hidden">

<button class="ai-btn" onclick="aiHelp()">✨ AI Help</button>

<input id="title" placeholder="Ebook Title">

<textarea id="description" placeholder="Description"></textarea>

<input id="price" type="number" placeholder="Price">

<select id="size">
<option value="A4">A4</option>
<option value="A5">A5</option>
<option value="6x9">6x9</option>
</select>

<label>Upload PDF</label>
<input type="file" id="pdf" accept="application/pdf">

<label>Front Cover</label>
<input type="file" id="front" accept="image/*">

<label>Back Cover</label>
<input type="file" id="back" accept="image/*">

<button onclick="upload()">Upload Ebook</button>

</div>

</div>

<script>

/* ================= CONFIG ================= */

const API_URL = "https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec";

/* ================= NAV ================= */

function goBack(){
window.history.back();
}

function goApply(){
window.location.href = "apply.html";
}

/* ================= USER ================= */

let user = JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Login required");
location.href="login.html";
}

/* ================= SELLER CHECK ================= */

async function checkSeller(){

try{

let res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"seller_status",
email:user.email
})
})

let data = await res.json()

document.getElementById("loading").style.display="none"

if(data.status === "approved"){
document.getElementById("uploadForm").classList.remove("hidden")
}
else if(data.status === "pending"){
document.getElementById("notSeller").classList.remove("hidden")
alert("Your seller request is under review")
}
else{
document.getElementById("notSeller").classList.remove("hidden")
}

}catch(e){
alert("Server error")
}

}

checkSeller()

/* ================= FILE → BASE64 ================= */

function toBase64(file){
return new Promise((resolve,reject)=>{
let reader = new FileReader()
reader.readAsDataURL(file)
reader.onload = ()=>resolve(reader.result)
reader.onerror = reject
})
}

/* ================= AI HELP ================= */

async function aiHelp(){

let text = document.getElementById("description").value

if(!text){
alert("Write something first")
return
}

let res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"ai_help",
text:text
})
})

let data = await res.json()

if(data.title) document.getElementById("title").value = data.title
if(data.description) document.getElementById("description").value = data.description

}

/* ================= UPLOAD ================= */

async function upload(){

let title = document.getElementById("title").value.trim()
let description = document.getElementById("description").value.trim()
let price = document.getElementById("price").value
let size = document.getElementById("size").value

let pdf = document.getElementById("pdf").files[0]
let front = document.getElementById("front").files[0]
let back = document.getElementById("back").files[0]

/* VALIDATION */

if(!title || title.length < 3){
alert("Enter valid title")
return
}

if(!description || description.length < 20){
alert("Description too short")
return
}

if(!price || price <= 0){
alert("Invalid price")
return
}

if(!pdf || !front || !back){
alert("Upload all files")
return
}

/* CONVERT */

let pdfBase64 = await toBase64(pdf)
let frontBase64 = await toBase64(front)
let backBase64 = await toBase64(back)

/* SEND */

let res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"uploadEbook",
email:user.email,
title:title,
description:description,
price:price,
size:size,
pdf:pdfBase64,
front_cover:frontBase64,
back_cover:backBase64
})
})

let data = await res.json()

if(data.success){
alert("✅ Uploaded! Waiting for approval")
location.href="dashboard.html"
}else{
alert("❌ " + data.message)
}

}

</script>

</body>
</html>
