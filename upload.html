<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Ebook | CreatorHub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.header{
display:flex;
padding:16px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
color:#22c55e;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
display:none; /* IMPORTANT */
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
background:#020617;
color:white;
border:1px solid #1f2937;
border-radius:8px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.progress{
height:15px;
background:#020617;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}
</style>

</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Upload Ebook</div>
</div>

<div class="container">

<div class="card">

<input id="title" placeholder="Book Title">
<textarea id="description" placeholder="Description"></textarea>
<input id="price" type="number" placeholder="Price">

<input type="file" id="front">
<input type="file" id="back">
<input type="file" id="pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button onclick="upload()">Upload Ebook</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

let user = JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* ✅ SELLER CHECK */
async function checkSeller(){

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"seller_status",
email:user.email
})
})

let data = await res.json()

if(data.status==="approved"){
document.querySelector(".container").style.display="block"
return
}

document.body.innerHTML=`<h2 style="text-align:center;margin-top:50px;">
${data.status==="pending"?"⏳ Approval Pending":"🚫 Apply as Seller"}
</h2>`
}

/* BASE64 */
function toBase64(file){
return new Promise((resolve)=>{
let reader=new FileReader()
reader.onload=()=>resolve(reader.result)
reader.readAsDataURL(file)
})
}

/* UPLOAD */
async function upload(){

let t=title.value.trim()
let d=description.value.trim()
let p=price.value
let f=front.files[0]
let b=back.files[0]
let pdfFile=pdf.files[0]

if(!t||!d||!p||!f||!b||!pdfFile){
alert("Fill all fields")
return
}

let bar=document.getElementById("bar")

try{

bar.style.width="20%"

let f64=await toBase64(f)

bar.style.width="40%"

let b64=await toBase64(b)

bar.style.width="60%"

let pdf64=await toBase64(pdfFile)

bar.style.width="80%"

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"uploadEbook",
title:t,
description:d,
price:Number(p),
email:user.email,
front_cover:f64,
back_cover:b64,
pdf:pdf64
})
})

let data=await res.json()

console.log("SERVER RESPONSE:",data) /* DEBUG */

bar.style.width="100%"

if(data.success){
alert("✅ Upload Success")
location.reload()
}else{
alert("❌ "+data.message)
}

}catch(e){
console.log(e)
alert("Upload error")
}

}

/* RUN */
checkSeller()

</script>

</body>
</html>
