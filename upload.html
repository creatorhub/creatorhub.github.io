<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload Ebook - CreatorHub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
background:#020617;
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
max-width:650px;
margin:auto;
}

.card{
background:#111827;
padding:25px;
border-radius:16px;
border:1px solid #1f2937;
}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

textarea{min-height:80px;}

button{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
}

img{
width:100%;
margin-top:12px;
border-radius:10px;
display:none;
}

.progress{
height:18px;
background:#020617;
border-radius:10px;
margin-top:15px;
overflow:hidden;
border:1px solid #1f2937;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.4s;
}

label{
margin-top:14px;
display:block;
font-size:14px;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="header">
<div class="title">Upload Ebook</div>
</div>

<div class="container">
<div class="card">

<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name">

<button onclick="aiHelp()">AI Suggest Description</button>

<textarea id="description" placeholder="Book Description"></textarea>

<input id="price" type="number" placeholder="Price ₹">

<label>Total Pages</label>
<input id="pages" readonly>

<label>Front Cover</label>
<input type="file" id="frontCover" accept="image/*">
<img id="previewFront">

<label>Back Cover</label>
<input type="file" id="backCover" accept="image/*">
<img id="previewBack">

<label>PDF File</label>
<input type="file" id="pdf" accept="application/pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button id="uploadBtn" onclick="upload()">Upload Ebook</button>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* IMAGE PREVIEW */

function preview(fileInput,imgId){

let file=fileInput.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=e=>{
let img=document.getElementById(imgId)
img.src=e.target.result
img.style.display="block"
}

reader.readAsDataURL(file)

}

frontCover.onchange=()=>preview(frontCover,"previewFront")
backCover.onchange=()=>preview(backCover,"previewBack")

/* PDF PAGE DETECT */

pdf.addEventListener("change",async function(){

let file=this.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(reader.result)
let pdfDoc=await pdfjsLib.getDocument(typedarray).promise

pages.value=pdfDoc.numPages

}

reader.readAsArrayBuffer(file)

})

/* AI HELP */

function aiHelp(){

let titleVal=title.value

if(!titleVal){
alert("Enter title first")
return
}

description.value="Learn "+titleVal+" step by step with examples."

}

/* BASE64 */

function toBase64(file){

return new Promise((resolve,reject)=>{

let reader=new FileReader()

reader.onload=()=>resolve(reader.result.split(",")[1])

reader.onerror=reject

reader.readAsDataURL(file)

})

}

/* UPLOAD */

async function upload(){

let titleVal=title.value.trim()
let authorVal=author.value.trim()
let descVal=description.value.trim()
let priceVal=price.value
let pagesVal=pages.value

let front=frontCover.files[0]
let back=backCover.files[0]
let pdfFile=pdf.files[0]

if(!titleVal||!authorVal||!descVal||!priceVal||!front||!back||!pdfFile){
alert("Please fill all fields")
return
}

let bar=document.getElementById("bar")
let btn=document.getElementById("uploadBtn")

btn.disabled=true
btn.innerText="Uploading..."

try{

bar.style.width="20%"

let front64=await toBase64(front)

bar.style.width="40%"

let back64=await toBase64(back)

bar.style.width="60%"

let pdf64=await toBase64(pdfFile)

bar.style.width="80%"

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

action:"uploadEbook",
title:titleVal,
author:authorVal,
description:descVal,
price:priceVal,
pages:pagesVal,
email:user.email,

front_cover:front64,
back_cover:back64,
pdf:pdf64

})
})

let data=await res.json()

bar.style.width="100%"

if(data.success){

alert("✅ Ebook Uploaded Successfully")

location.reload()

}else{

alert(data.message)

}

}catch(e){

alert("Upload Error")
console.log(e)

}

btn.disabled=false
btn.innerText="Upload Ebook"

}

</script>

</body>
  </html>
