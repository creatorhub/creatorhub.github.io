<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Upload Ebook | CreatorHub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
min-height:100vh;
}

/* HEADER */
.header{
display:flex;
align-items:center;
padding:15px;
background:#020617;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
z-index:100;
}

.back{
font-size:24px;
cursor:pointer;
margin-right:15px;
transition:.3s;
}

.back:hover{
transform:translateX(-5px);
}

.header h2{
color:#22c55e;
}

/* CONTAINER */
.container{
max-width:700px;
margin:auto;
padding:20px;
animation:fadeUp .8s ease;
}

/* CARD */
.card{
background:#111827;
padding:25px;
border-radius:20px;
border:1px solid #1f2937;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

/* INPUTS */
input,textarea,select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#020617;
color:white;
border:1px solid #1f2937;
}

textarea{
height:120px;
resize:none;
}

/* FILE */
.file-box{
margin-top:15px;
}

/* BUTTON */
button{
width:100%;
padding:15px;
margin-top:20px;
background:linear-gradient(90deg,#22c55e,#4ade80);
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px #22c55e;
}

/* PREVIEW */
.preview{
width:100%;
margin-top:10px;
display:none;
border-radius:12px;
}

/* PROGRESS */
.progress{
margin-top:20px;
height:18px;
background:#020617;
border-radius:10px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.5s;
}

/* CHECKBOX */
.check{
display:flex;
align-items:center;
gap:10px;
margin-top:15px;
}

/* SUCCESS */
.success{
display:none;
text-align:center;
margin-top:20px;
color:#22c55e;
font-weight:bold;
}

/* ANIMATION */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<h2>Upload Ebook</h2>
</div>

<div class="container">
<div class="card">

<input id="title" placeholder="Book Title">

<input id="author_name" placeholder="Author Name">

<textarea id="description" placeholder="Book Description"></textarea>

<button type="button" onclick="aiHelp()" id="aiBtn">
✨ AI Help Auto Fill
</button>

<div id="aiStatus" style="text-align:center;color:#22c55e;margin-top:10px;"></div>
  
<input id="category" placeholder="Category">

<input id="language" placeholder="Language">

<select id="book_size">
<option value="">Select Book Size</option>
<option value="A4">A4</option>
<option value="A5">A5</option>
<option value="6x9">6x9</option>
</select>

<input id="tags" placeholder="Tags (comma separated)">

<input id="isbn" placeholder="ISBN Number">

<input id="price" type="number" placeholder="Price ₹">

<input id="pages" readonly placeholder="Pages auto detected">

<div class="check">
<input type="checkbox" id="print_available">
<label>Print Version Available</label>
</div>

<div class="file-box">
<label>Front Cover</label>
<input type="file" id="front" accept="image/*">
<img id="frontPreview" class="preview">
</div>

<div class="file-box">
<label>Back Cover</label>
<input type="file" id="back" accept="image/*">
<img id="backPreview" class="preview">
</div>

<div class="file-box">
<label>PDF File</label>
<input type="file" id="pdf" accept="application/pdf">
</div>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<button onclick="uploadBook()" id="uploadBtn">
Upload Ebook
</button>

<div class="success" id="successMsg">
✅ Ebook Uploaded Successfully
</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

/* USER */
let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* IMAGE PREVIEW */
function previewImage(input,id){
let file=input.files[0]
if(!file) return

let reader=new FileReader()
reader.onload=e=>{
let img=document.getElementById(id)
img.src=e.target.result
img.style.display="block"
}
reader.readAsDataURL(file)
}

front.onchange=()=>previewImage(front,"frontPreview")
back.onchange=()=>previewImage(back,"backPreview")

/* PDF PAGE DETECT */
pdf.addEventListener("change",async function(){

let file=this.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=async function(){

let typedArray=new Uint8Array(reader.result)

let pdfDoc=await pdfjsLib.getDocument(typedArray).promise

document.getElementById("pages").value=pdfDoc.numPages
}

reader.readAsArrayBuffer(file)

})

/* BASE64 */
function convertBase64(file){
return new Promise((resolve)=>{
let reader=new FileReader()
reader.onload=()=>resolve(reader.result)
reader.readAsDataURL(file)
})
}

/* AI AUTO FILL */

async function aiHelp(){

let title =
document.getElementById("title").value.trim()

let description =
document.getElementById("description").value.trim()

let pdfFile =
document.getElementById("pdf").files[0]

if(!pdfFile){
alert("Upload PDF first")
return
}

document.getElementById("aiStatus").innerHTML =
"AI analyzing PDF..."

try{

let pdfBase64 = await convertBase64(pdfFile)

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"suggest",
title:title,
description:description,
pdf:pdfBase64
})
})

let data = await res.json()

console.log(data)

document.getElementById("aiStatus").innerHTML=""

if(data.success){

let ai = data.ai

document.getElementById("title").value =
ai.improved_title || title

document.getElementById("description").value =
ai.improved_description || description

document.getElementById("category").value =
ai.category || ""

document.getElementById("pages").value =
ai.pages || ""

alert("AI auto-filled data successfully")

}else{
alert(data.message || "AI failed")
}

}catch(e){

console.log(e)

document.getElementById("aiStatus").innerHTML=""
alert("AI error")

}
}

/* UPLOAD */
async function uploadBook(){

let title=document.getElementById("title").value.trim()
let author_name=document.getElementById("author_name").value.trim()
let description=document.getElementById("description").value.trim()
let category=document.getElementById("category").value.trim()
let language=document.getElementById("language").value.trim()
let book_size=document.getElementById("book_size").value
let tags=document.getElementById("tags").value.split(",")
let isbn=document.getElementById("isbn").value.trim()
let price=document.getElementById("price").value
let pages=document.getElementById("pages").value
let print_available=document.getElementById("print_available").checked

let frontFile=document.getElementById("front").files[0]
let backFile=document.getElementById("back").files[0]
let pdfFile=document.getElementById("pdf").files[0]

if(!title || !description || !category || !price || !pdfFile){
alert("Please fill all required fields")
return
}

let progress=document.getElementById("progress")
let bar=document.getElementById("bar")
let btn=document.getElementById("uploadBtn")

btn.disabled=true
btn.innerText="Uploading..."
progress.style.display="block"

try{

bar.style.width="20%"

let frontBase64=await convertBase64(frontFile)

bar.style.width="40%"

let backBase64=await convertBase64(backFile)

bar.style.width="60%"

let pdfBase64=await convertBase64(pdfFile)

bar.style.width="80%"

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"uploadEbook",
email:user.email,
title:title,
author_name:author_name,
description:description,
category:category,
language:language,
book_size:book_size,
tags:tags,
isbn:isbn,
print_available:print_available,
price:price,
pages:pages,
pdf:pdfBase64,
front_cover:frontBase64,
back_cover:backBase64
})
})

let data=await res.json()

bar.style.width="100%"

if(data.success){
document.getElementById("successMsg").style.display="block"
setTimeout(()=>{
location.reload()
},2000)
}else{
alert(data.message)
}

}catch(e){
alert("Upload failed")
console.log(e)
}

btn.disabled=false
btn.innerText="Upload Ebook"

}

</script>

</body>
</html>
