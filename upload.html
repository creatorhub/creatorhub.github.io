<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Ebook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:white;
animation:fadePage .5s ease;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
background:#020617;
z-index:10;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
transition:.2s;
}

.back:hover{
transform:scale(1.2);
}

.title{
font-size:20px;
font-weight:bold;
color:var(--accent);
}

/* CONTAINER */

.container{
padding:20px;
max-width:650px;
margin:auto;
}

/* CARD */

.card{
background:linear-gradient(145deg,#111827,#020617);
padding:25px;
border-radius:16px;
border:1px solid #1f2937;
box-shadow:0 10px 25px rgba(0,0,0,.6);
animation:fadeUp .6s ease;
}

/* INPUT */

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

textarea{min-height:90px}

/* BUTTON */

button{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #22c55e;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

/* IMAGE */

img{
width:100%;
margin-top:12px;
border-radius:10px;
display:none;
}

/* PROGRESS */

.progress{
height:18px;
background:#020617;
border-radius:10px;
margin-top:15px;
overflow:hidden;
border:1px solid #1f2937;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.4s;
}

/* LOADER */

.loading{
text-align:center;
margin-top:10px;
opacity:.7;
}

/* ANIMATION */

@keyframes fadePage{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Upload Ebook</div>
</div>

<div class="container">

<div class="card">

<input id="title" placeholder="Book Title">

<input id="author" placeholder="Author Name">

<button onclick="aiHelp()">AI Suggest Description</button>

<textarea id="description" placeholder="Book Description"></textarea>

<input id="price" type="number" placeholder="Price ₹">

<label>Total Pages</label>
<input id="pages" readonly>

<label>Front Cover</label>
<input type="file" id="frontCover" accept="image/*">
<img id="previewFront">

<label>Back Cover</label>
<input type="file" id="backCover" accept="image/*">
<img id="previewBack">

<label>PDF File</label>
<input type="file" id="pdf" accept="application/pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="status" class="loading"></div>

<button id="uploadBtn" onclick="upload()">
Upload Ebook
</button>

</div>

</div>

<script>

/* ================= API ================= */

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

/* ================= USER ================= */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* ================= SELLER CHECK ================= */

async function checkSeller(){

try{

let res = await fetch(API+"?db=sellers&t="+Date.now())
let sellers = await res.json()

let s = sellers.find(x=>x.email===user.email)

if(!s || s.status!=="approved"){

document.getElementById("uploadBtn").disabled=true
document.getElementById("uploadBtn").innerText="Seller Approval Required"

document.getElementById("status").innerText="⚠️ Apply for seller first"

}

}catch{

document.getElementById("status").innerText="Server error"

}

}

checkSeller()

/* ================= PREVIEW ================= */

function preview(fileInput,imgId){

let file=fileInput.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=e=>{
let img=document.getElementById(imgId)
img.src=e.target.result
img.style.display="block"
}

reader.readAsDataURL(file)
}

frontCover.onchange=()=>preview(frontCover,"previewFront")
backCover.onchange=()=>preview(backCover,"previewBack")

/* ================= PDF PAGE ================= */

pdf.addEventListener("change",async function(){

let file=this.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=async function(){

let typedarray=new Uint8Array(reader.result)
let pdfDoc=await pdfjsLib.getDocument(typedarray).promise

pages.value=pdfDoc.numPages

}

reader.readAsArrayBuffer(file)

})

/* ================= AI HELP ================= */

function aiHelp(){

if(!title.value){
alert("Enter title first")
return
}

description.value="Learn "+title.value+" with easy step by step guide."

}

/* ================= BASE64 ================= */

function toBase64(file){

return new Promise((resolve,reject)=>{
let reader=new FileReader()
reader.onload=()=>resolve(reader.result.split(",")[1])
reader.onerror=reject
reader.readAsDataURL(file)
})

}

/* ================= UPLOAD ================= */

async function upload(){

let btn=document.getElementById("uploadBtn")
let bar=document.getElementById("bar")
let status=document.getElementById("status")

let titleVal=title.value.trim()
let authorVal=author.value.trim()
let descVal=description.value.trim()
let priceVal=price.value

let front=frontCover.files[0]
let back=backCover.files[0]
let pdfFile=pdf.files[0]

if(!titleVal||!authorVal||!descVal||!priceVal||!front||!back||!pdfFile){

alert("Fill all fields")
return

}

btn.disabled=true
btn.innerText="Uploading..."
status.innerText="Processing..."

try{

bar.style.width="20%"
let front64=await toBase64(front)

bar.style.width="40%"
let back64=await toBase64(back)

bar.style.width="60%"
let pdf64=await toBase64(pdfFile)

bar.style.width="80%"

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

action:"uploadEbook",

title:titleVal,
author:authorVal,
description:descVal,
price:Number(priceVal),

pages:pages.value,
email:user.email,

front_cover:front64,
back_cover:back64,
pdf:pdf64

})
})

let data=await res.json()

bar.style.width="100%"

if(data.success){

status.innerText="✅ Upload Successful"
alert("Ebook uploaded")

location.reload()

}else{

status.innerText="❌ "+data.message
alert(data.message)

}

}catch(e){

status.innerText="Server Error"
alert("Upload failed")

}

btn.disabled=false
btn.innerText="Upload Ebook"

}

</script>

</body>
  </html>
