<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Ebook</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
display:flex;
align-items:center;
padding:15px;
background:#1e293b;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:15px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.ai-btn{
background:#3b82f6;
}

.hidden{
display:none;
}

.loader{
text-align:center;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
<div class="back" onclick="goBack()">⬅</div>
<h3>Upload Ebook</h3>
</div>

<div class="container">

<div id="loading" class="loader">Checking seller status...</div>

<div id="notSeller" class="hidden">
<h3>Seller Required</h3>
<p>You must be an approved seller to upload ebooks.</p>
<button onclick="goApply()">Apply as Seller</button>
</div>

<div id="uploadForm" class="hidden">

<button class="ai-btn" onclick="aiHelp()">✨ AI Help</button>

<input id="title" placeholder="Ebook Title">
<textarea id="description" placeholder="Description"></textarea>
<input id="price" type="number" placeholder="Price">

<select id="size">
<option value="A4">A4</option>
<option value="A5">A5</option>
<option value="6x9">6x9</option>
</select>

<label>Upload PDF</label>
<input type="file" id="pdf" accept="application/pdf">

<label>Front Cover</label>
<input type="file" id="front" accept="image/*">

<label>Back Cover</label>
<input type="file" id="back" accept="image/*">

<button id="uploadBtn" onclick="upload()">Upload Ebook</button>

</div>

</div>

<script>

/* ================= API ================= */

const SELLER_API = "PASTE_YOUR_SELLER_API";
const UPLOAD_API = "PASTE_YOUR_UPLOAD_API";

/* ================= NAV ================= */

function goBack(){
window.history.back();
}

function goApply(){
window.location.href="apply.html";
}

/* ================= USER ================= */

let user = JSON.parse(localStorage.getItem("user"));

if(!user || !user.email){
alert("Login required");
location.href="login.html";
}

/* ================= SELLER CHECK ================= */

async function checkSeller(){

try{

let res = await fetch(SELLER_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"seller_status",
email:user.email
})
})

let data = await res.json()

document.getElementById("loading").style.display="none"

if((data.status || "").toLowerCase() === "approved"){
document.getElementById("uploadForm").classList.remove("hidden")
}else{
document.getElementById("notSeller").classList.remove("hidden")

if(data.status === "pending"){
alert("Your seller request is under review")
}
}

}catch(e){
alert("Server error")
}

}

checkSeller()

/* ================= BASE64 ================= */

function toBase64(file){
return new Promise((resolve,reject)=>{
let reader = new FileReader()
reader.readAsDataURL(file)
reader.onload = ()=>resolve(reader.result)
reader.onerror = reject
})
}

/* ================= AI HELP ================= */

async function aiHelp(){

let text = document.getElementById("description").value

if(!text){
alert("Write description first")
return
}

let res = await fetch(UPLOAD_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"ai_help",
text:text
})
})

let data = await res.json()

if(data.title) document.getElementById("title").value = data.title
if(data.description) document.getElementById("description").value = data.description

}

/* ================= UPLOAD ================= */

async function upload(){

let btn = document.getElementById("uploadBtn")
btn.disabled = true
btn.innerText = "Uploading..."

try{

let title = document.getElementById("title").value.trim()
let description = document.getElementById("description").value.trim()
let price = Number(document.getElementById("price").value)
let size = document.getElementById("size").value

let pdf = document.getElementById("pdf").files[0]
let front = document.getElementById("front").files[0]
let back = document.getElementById("back").files[0]

/* VALIDATION */

if(!title || title.length < 3) throw "Enter valid title"
if(!description || description.length < 20) throw "Description too short"
if(!price || price <= 0) throw "Invalid price"
if(!pdf || !front || !back) throw "Upload all files"

/* FILE SIZE */

if(pdf.size > 10 * 1024 * 1024){
throw "PDF too large (Max 10MB)"
}

/* CONVERT */

let pdfBase64 = await toBase64(pdf)
let frontBase64 = await toBase64(front)
let backBase64 = await toBase64(back)

/* SEND */

let res = await fetch(UPLOAD_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"uploadEbook",
email:user.email,
title:title,
description:description,
price:price,
size:size,
pdf:pdfBase64,
front_cover:frontBase64,
back_cover:backBase64
})
})

let data = await res.json()

if(data.success){
alert("✅ Uploaded! Waiting for approval")
location.href="dashboard.html"
}else{
throw data.message || "Upload failed"
}

}catch(err){
alert("❌ " + err)
}

/* RESET */

btn.disabled = false
btn.innerText = "Upload Ebook"

}

</script>

</body>
</html>
