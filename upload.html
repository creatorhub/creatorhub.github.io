<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Ebook</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
}

.header{
display:flex;
align-items:center;
padding:15px;
background:#1e293b;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:15px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.ai-btn{
background:#3b82f6;
margin-bottom:10px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="goBack()">⬅</div>
<h3>Upload Ebook</h3>
</div>

<div class="container">

<div id="notSeller" class="hidden">
<h3>Seller Required</h3>
<p>You must apply and get approved to upload ebooks.</p>
<button onclick="goApply()">Apply as Seller</button>
</div>

<div id="uploadForm" class="hidden">

<button class="ai-btn" onclick="aiHelp()">✨ AI Help</button>

<input id="title" placeholder="Ebook Title">

<textarea id="description" placeholder="Description"></textarea>

<input id="price" type="number" placeholder="Price">

<select id="size">
<option value="A4">A4</option>
<option value="A5">A5</option>
<option value="6x9">6x9</option>
</select>

<input type="file" id="pdf" accept="application/pdf">
<input type="file" id="front" accept="image/*">
<input type="file" id="back" accept="image/*">

<button onclick="upload()">Upload Ebook</button>

</div>

</div>

<script>

/* ================= CONFIG ================= */

const API_URL = "YOUR_DEPLOYED_SCRIPT_URL";

/* ================= NAV ================= */

function goBack(){
window.history.back();
}

function goApply(){
window.location.href = "apply.html";
}

/* ================= USER ================= */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Login required");
location.href = "login.html";
}

/* ================= SELLER CHECK ================= */

async function checkSeller(){

let res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"getSellerStatus",
email:user.email
})
})

let data = await res.json()

if(data.status === "approved"){
document.getElementById("uploadForm").classList.remove("hidden")
}else{
document.getElementById("notSeller").classList.remove("hidden")
}

}

checkSeller()

/* ================= FILE → BASE64 ================= */

function toBase64(file){
return new Promise((resolve,reject)=>{
let reader = new FileReader()
reader.readAsDataURL(file)
reader.onload = ()=>resolve(reader.result)
reader.onerror = reject
})
}

/* ================= AI HELP ================= */

async function aiHelp(){

let text = document.getElementById("description").value

if(!text){
alert("Write something first")
return
}

let res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"aiHelp",
text:text
})
})

let data = await res.json()

if(data.title) document.getElementById("title").value = data.title
if(data.description) document.getElementById("description").value = data.description

}

/* ================= UPLOAD ================= */

async function upload(){

let title = document.getElementById("title").value
let description = document.getElementById("description").value
let price = document.getElementById("price").value
let size = document.getElementById("size").value

let pdf = document.getElementById("pdf").files[0]
let front = document.getElementById("front").files[0]
let back = document.getElementById("back").files[0]

if(!title || !description || !price || !pdf || !front || !back){
alert("Fill all fields")
return
}

let pdfBase64 = await toBase64(pdf)
let frontBase64 = await toBase64(front)
let backBase64 = await toBase64(back)

let res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"uploadEbook",
email:user.email,
title:title,
description:description,
price:price,
size:size,
pdf:pdfBase64,
front_cover:frontBase64,
back_cover:backBase64
})
})

let data = await res.json()

if(data.success){
alert("Uploaded successfully!")
location.href="dashboard.html"
}else{
alert(data.message)
}

}

</script>

</body>
</html>
