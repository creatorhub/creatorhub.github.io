<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Ebook - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 4px 15px rgba(0,0,0,.5);
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
max-width:520px;
margin:auto;
}

input,textarea,select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
width:100%;
padding:15px;
margin-top:18px;
background:#f97316;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

small{
color:#9ca3af;
display:block;
margin-top:4px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="back"
onclick="location.href='dashboard.html'">
⬅
</div>

<div class="title">
Upload Ebook
</div>

</div>


<div class="container">

<div class="card">

<h2>Upload Digital Ebook</h2>

<input id="title" placeholder="Ebook Title">

<input id="author" placeholder="Author Name">

<select id="language">
<option>English</option>
<option>Hindi</option>
<option>Other</option>
</select>

<textarea id="description"
placeholder="Book Description"></textarea>

<input id="keywords"
placeholder="Keywords (example: online earning, business, education)">

<select id="category">
<option>Business</option>
<option>Education</option>
<option>Technology</option>
<option>Self Improvement</option>
<option>Finance</option>
<option>Other</option>
</select>

<input id="price"
type="number"
placeholder="Price ₹">

<p>Cover Image</p>

<small>
CreatorHub Cover Standard:  
2560 x 1600 pixels  
Ratio 1.6:1  
JPG / PNG Recommended
</small>

<input type="file"
accept="image/*"
onchange="previewImage(event)">

<img id="preview"
class="preview">

<p>Select Ebook File</p>

<small>
Supported Format: PDF  
High quality files supported
</small>

<input type="file"
accept="application/pdf"
onchange="loadPDF(event)">

<button id="uploadBtn"
onclick="uploadBook()">
Upload Ebook 
</button>

</div>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

let user=JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Login First");
location.href="login.html";
}

async function getDB(db){
let r=await fetch(API+"?db="+db+"&t="+Date.now());
let data=await r.json();
return Array.isArray(data)?data:[];
}

async function sellerSecurity(){

if(user.guest===true || user.email.includes("guest")){
alert("Guest Cannot Upload Ebook ❌");
location.href="dashboard.html";
return;
}

let users=await getDB("users");

let me=users.find(u=>u.email===user.email);

if(!me){
alert("User Not Found");
location.href="dashboard.html";
return;
}

if(!me.seller && !me.sellerRequest){
alert("Apply Seller First ⭐");
location.href="become-seller.html";
return;
}

if(me.sellerRequest===true && !me.seller){
alert("Waiting Admin Approval ⏳");
location.href="dashboard.html";
return;
}

}

sellerSecurity();

let imageBase64="";
let pdfBase64="";

function previewImage(e){

let file=e.target.files[0];
if(!file)return;

let img=new Image();
let reader=new FileReader();

reader.onload=function(event){

img.src=event.target.result;

img.onload=function(){

if(img.width!==2560 || img.height!==1600){

alert("Cover Image Must Be 2560 x 1600 pixels");

return;

}

imageBase64=event.target.result;

preview.src=imageBase64;

preview.style.display="block";

};

};

reader.readAsDataURL(file);

}

function loadPDF(e){

let file=e.target.files[0];
if(!file)return;

let reader=new FileReader();

reader.onload=()=>{
pdfBase64=reader.result;
};

reader.readAsDataURL(file);

}

async function saveDB(db,data){

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify({
db:db,
data:data
})
});

}

async function uploadBook(){

let btn=document.getElementById("uploadBtn");

btn.disabled=true;
btn.innerText="Uploading...";

let title=document.getElementById("title").value.trim();
let price=document.getElementById("price").value.trim();
let author=document.getElementById("author").value.trim();
let description=document.getElementById("description").value.trim();
let keywords=document.getElementById("keywords").value.trim();
let category=document.getElementById("category").value;
let language=document.getElementById("language").value;

if(!title||!price||!imageBase64||!pdfBase64){
alert("Fill All Fields");
btn.disabled=false;
btn.innerText="Upload Ebook ";
return;
}

try{

let upload=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify({
action:"uploadFile",
image:imageBase64,
pdf:pdfBase64
})
});

let result=await upload.json();

if(!result.success){
alert("Drive Upload Failed");
throw "fail";
}

let products=await getDB("products")||[];

products.push({
id:Date.now(),
title:title,
author:author,
description:description,
keywords:keywords,
category:category,
language:language,
price:Number(price),
image:result.image,
pdf:result.pdf,
owner:user.email,
status:"pending",
date:new Date().toLocaleString()
});

await saveDB("products",products);

alert("Upload Success ✅");
location.href="products.html";

}catch(e){

alert("Upload Error ❌");
btn.disabled=false;
btn.innerText="Upload Ebook ";

}

}

</script>

</body>
</html>
