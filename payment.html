<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Buy Ebook</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* TOP BAR */

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

/* CONTAINER */

.container{
padding:20px;
display:flex;
justify-content:center;
}

/* CARD */

.card{
background:#111827;
padding:22px;
border-radius:16px;
max-width:520px;
width:100%;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

/* IMAGE CENTER */

.card img{
width:260px;
height:260px;
object-fit:cover;
border-radius:12px;
display:block;
margin:0 auto 15px auto;
}

/* BUTTON */

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-size:16px;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">CreatorHub</div>
</div>

<div class="container">
<div class="card">

<h2>Buy Ebook</h2>

<img id="cover">

<h3 id="title">Loading...</h3>

<h2 id="price"></h2>

<button id="buyBtn" onclick="buyNow()">Buy Now</button>

</div>
</div>

<script>

/* ================= APIs ================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

/* NEW DEPLOYED PAYMENT API */

const PAYMENT_API =
"https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"


/* ================= USER ================= */

let user = JSON.parse(localStorage.getItem("user") || "{}")

if(!user.email){

alert("Please login first")
location.href="login.html"

}


/* ================= PRODUCT ID ================= */

let buyId = localStorage.getItem("buyProduct")

if(!buyId){

alert("Product Missing")
location.href="index.html"

}


/* ================= DRIVE IMAGE ================= */

function driveImage(link){

if(!link) return "https://picsum.photos/500"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"
}

}catch{}

return link

}


/* ================= LOAD PRODUCT ================= */

let product=null

async function loadProduct(){

try{

let res = await fetch(PRODUCT_API+"?db=products&t="+Date.now())

let products = await res.json()

product = products.find(p => String(p.id) === String(buyId))

if(!product){

alert("Product not found")
location.href="index.html"
return

}

document.getElementById("title").innerText = product.title || "Untitled"

document.getElementById("price").innerText = "₹ "+(product.price || 0)

document.getElementById("cover").src = driveImage(product.image)

}catch(e){

console.log(e)
alert("Failed to load product")

}

}

loadProduct()


/* ================= BUY ================= */

async function buyNow(){

if(!product){

alert("Product not loaded")
return

}

let btn=document.getElementById("buyBtn")

btn.innerText="Creating Order..."
btn.disabled=true

try{

let res = await fetch(PAYMENT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"create_order",
productId:product.id,
buyer:user.email

})

})

let data = await res.json()

console.log("API Response:",data)

/* PAYMENT REDIRECT */

if(data.payment_session_id){

let paymentURL =
"https://sandbox.cashfree.com/pg/view/payment-session-id?payment_session_id="
+data.payment_session_id

window.location.href = paymentURL

}else{

alert(data.message || "Payment initialization failed")

btn.innerText="Buy Now"
btn.disabled=false

}

}catch(err){

console.log(err)

alert("Payment server error")

btn.innerText="Buy Now"
btn.disabled=false

}

}

</script>

</body>
</html>
