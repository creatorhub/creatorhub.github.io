<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Buy Ebook</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
max-width:520px;
margin:auto;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">CreatorHub</div>
</div>

<div class="container">
<div class="card">

<h2>Buy Ebook</h2>

<img id="cover">
<h3 id="title"></h3>
<h2 id="price"></h2>

<button onclick="buyNow()">
Buy Now
</button>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx7vyDJEi9v2RO7ujHdMAnlgUX8AV2JVOfydtw8DJU4AI-7vcTlWMEt07KFcFr1lYTa/exec";

/* USER CHECK */

let user=null;

try{
user=JSON.parse(localStorage.getItem("user"));
}catch{
user=null;
}

if(!user || !user.email){

alert("Login First");
location.href="login.html";

}

/* PRODUCT ID */

let buyId=localStorage.getItem("buyProduct");

if(!buyId){

alert("Product Missing");
location.href="index.html";

}

/* DRIVE IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/500";

try{

let id="";

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0];
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0];
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";
}

}catch{}

return link;

}

let product=null;

/* LOAD PRODUCT */

async function load(){

try{

let res=await fetch(API+"?db=products&t="+Date.now());

let products=await res.json();

if(!Array.isArray(products)) products=[];

product=products.find(p=>String(p.id)===String(buyId));

if(!product){

alert("Product Missing");
location.href="index.html";
return;

}

document.getElementById("cover").src=driveImage(product.image);
document.getElementById("title").innerText=product.title || "Untitled";
document.getElementById("price").innerText="₹ "+(product.price || 0);

}catch{

alert("Failed to load product");

}

}

load();

/* BUY NOW */

async function buyNow(){

if(!product){

alert("Product Missing");
return;

}

try{

let res = await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"create_order",
productId:product.id,
buyer:user.email

})

});

let data=await res.json();

if(data.payment_link){

window.location.href=data.payment_link;

}else{

alert("Payment initialization failed");

}

}catch{

alert("Payment server error");

}

}

</script>

</body>
</html>
