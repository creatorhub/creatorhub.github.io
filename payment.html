<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Buy Ebook</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
max-width:520px;
margin:auto;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">CreatorHub</div>
</div>

<div class="container">
<div class="card">

<h2>Buy Ebook</h2>

<img id="cover">
<h3 id="title"></h3>
<h2 id="price"></h2>

<button onclick="buyNow()">
Buy Now 
</button>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

/* SAFE USER LOAD */

let user=JSON.parse(localStorage.getItem("user")||"null");

if(!user){
alert("Login First");
location.href="login.html";
}

/* PRODUCT ID */

let buyId=localStorage.getItem("buyProduct");

if(!buyId){
alert("Product Missing");
location.href="index.html";
}

/* IMAGE FIX */

function driveImage(link){

if(!link)return "https://picsum.photos/500";

try{

let id="";

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0];
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0];
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";
}

}catch{}

return link;

}

/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let data=await r.json();

return Array.isArray(data)?data:[];

}catch{

return [];

}

}

let product=null;

/* LOAD PRODUCT */

async function load(){

let products=await getDB("products");

product=products.find(p=>String(p.id)===String(buyId));

if(!product){
alert("Product Missing");
location.href="index.html";
return;
}

document.getElementById("cover").src=driveImage(product.image);
document.getElementById("title").innerText=product.title||"Untitled";
document.getElementById("price").innerText="₹ "+(product.price||0);

}

load();

/* BUY */

async function buyNow(){

if(!product){
alert("Product Missing");
return;
}

let order=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"create_order",

productId:product.id,

buyer:user.email,

seller:product.owner,

amount:product.price

})

});

let res=await order.json();

if(res.payment_link){

window.location.href=res.payment_link;

}else{

alert("Payment Failed");

}

}

</script>

</body>
</html>
