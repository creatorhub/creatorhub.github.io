<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Buy Ebook</title>

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:white;
animation:fadePage .6s ease;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
}

.container{
padding:20px;
display:flex;
justify-content:center;
}

.card{
background:var(--card);
padding:22px;
border-radius:16px;
max-width:520px;
width:100%;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.6);
animation:fadeUp .6s ease;
}

.card img{
width:260px;
height:260px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#020617;
color:white;
border:1px solid #1f2937;
}

textarea{
min-height:80px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-size:16px;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px #22c55e;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

/* animation */

@keyframes fadePage{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">CreatorHub</div>
</div>

<div class="container">
<div class="card">

<h2>Buy Ebook</h2>

<img id="cover">

<h3 id="title">Loading...</h3>

<h2 id="price"></h2>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Delivery Address"></textarea>

<input id="pincode" placeholder="Pincode">

<button id="buyBtn" disabled onclick="buyNow()">
Loading Product...
</button>

</div>
</div>

<script>

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API =
"https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* USER */

let user = JSON.parse(localStorage.getItem("user") || "{}")

if(!user.email){

alert("Please login first")
location.href="login.html"

}

/* PRODUCT ID */

let buyId = localStorage.getItem("buyProduct")

if(!buyId){

alert("Product Missing")
location.href="index.html"

}

function driveImage(link){

if(!link) return "https://picsum.photos/500"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"
}

}catch{}

return link

}

let product=null

async function loadProduct(){

try{

let res = await fetch(PRODUCT_API+"?db=products&t="+Date.now())

let products = await res.json()

if(!Array.isArray(products)) products=[]

product = products.find(p => String(p.id) === String(buyId))

if(!product){

alert("Product not found")
location.href="index.html"
return

}

document.getElementById("title").innerText =
product.title || "Untitled"

document.getElementById("price").innerText =
"₹ "+Number(product.price)

document.getElementById("cover").src =
driveImage(product.image)

let btn=document.getElementById("buyBtn")

btn.disabled=false
btn.innerText="Pay & Buy"

}catch(e){

alert("Failed to load product")

}

}

loadProduct()

async function buyNow(){

if(!product) return

let name=document.getElementById("name").value.trim()
let phone=document.getElementById("phone").value.trim()
let address=document.getElementById("address").value.trim()
let pincode=document.getElementById("pincode").value.trim()

if(!name || !phone || !address || !pincode){

alert("Fill address details")
return

}

if(!/^[0-9]{10}$/.test(phone)){

alert("Invalid phone number")
return

}

if(!/^[0-9]{6}$/.test(pincode)){

alert("Invalid pincode")
return

}

let btn=document.getElementById("buyBtn")

btn.innerText="Creating Order..."
btn.disabled=true

try{

let res = await fetch(PAYMENT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"create_order",
productId:product.id,
type:"ebook",
buyer:user.email,

name:name,
phone:phone,
address:address,
pincode:pincode

})

})

let data = await res.json()

if(data.success && data.payment_session_id){

let cashfree = Cashfree({
mode:"sandbox"
})

cashfree.checkout({
paymentSessionId: data.payment_session_id,
redirectTarget: "_self"
})

}else{

alert(data.message || "Payment failed")

btn.innerText="Pay & Buy"
btn.disabled=false

  }

let cashfree = Cashfree({
mode:"sandbox"
})

cashfree.checkout({
paymentSessionId: data.payment_session_id,
redirectTarget: "_self"
})

}else{

alert(data.message || "Payment failed")

btn.innerText="Pay & Buy"
btn.disabled=false

}

}else{

alert(data.message || "Payment failed")

btn.innerText="Pay & Buy"
btn.disabled=false

}

}catch{

alert("Payment server error")

btn.innerText="Pay & Buy"
btn.disabled=false

}

}

</script>

</body>
</html>
