<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payment Success</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:linear-gradient(145deg,#111827,#020617);
padding:35px;
border-radius:18px;
max-width:420px;
width:100%;
text-align:center;
border:1px solid #1f2937;
box-shadow:0 20px 40px rgba(0,0,0,0.7);
animation:fadeUp .6s ease;
}

h1{
color:#22c55e;
margin-bottom:10px;
}

#status{
opacity:.8;
font-size:14px;
}

button{
margin-top:22px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
font-weight:bold;
cursor:pointer;
display:none;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #22c55e;
}

.loader{
margin-top:25px;
font-size:14px;
animation:pulse 1.2s infinite;
}

.progress{
margin-top:10px;
font-size:12px;
opacity:.7;
}

@keyframes pulse{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

@keyframes fadeUp{
0%{opacity:0;transform:translateY(40px);}
100%{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">

<h1 id="title">Payment Successful</h1>

<p id="status">
Verifying payment and unlocking your ebook...
</p>

<div id="loader" class="loader">
⏳ Please wait...
</div>

<div id="progress" class="progress">
Attempt 1 / 10
</div>

<button id="libraryBtn" onclick="goLibrary()">
Go To My Library
</button>

</div>

<script>

const PAYMENT_API = "https://script.google.com/macros/s/AKfycbyKnVmxYCTskDLpOk_s2Ch1nHnVvD__GVHbnztTCvl4bzYgk7sDx0F1WuJ0CXMORqs/exec"

/* USER */

let user = JSON.parse(localStorage.getItem("user")||"null")

if(!user){
alert("Login required")
location.href="login.html"
}

/* GET ORDER ID */

function getOrderId(){
let params = new URLSearchParams(window.location.search)
return (
params.get("order_id") ||
params.get("orderId") ||
params.get("cf_order_id") ||
params.get("order-id") ||
params.get("order")
)
}

let orderId = getOrderId()

let retry = 0
const maxRetry = 10

async function verifyPayment(){

if(!orderId){

document.getElementById("title").innerText="Order Error"
document.getElementById("status").innerText="Order ID not found"
document.getElementById("loader").style.display="none"

return
}

if(retry >= maxRetry){

document.getElementById("title").innerText="Verification Timeout"
document.getElementById("status").innerText="Payment verification failed"
document.getElementById("loader").style.display="none"
document.getElementById("libraryBtn").style.display="block"

return
}

document.getElementById("progress").innerText =
"Attempt " + (retry+1) + " / " + maxRetry

try{

let res = await fetch(
PAYMENT_API +
"?action=verify&orderId=" + orderId
)

let data = await res.json()

if(data.success){

document.getElementById("status").innerText =
"Ebook unlocked successfully!"

document.getElementById("loader").style.display="none"
document.getElementById("progress").style.display="none"
document.getElementById("libraryBtn").style.display="block"

localStorage.removeItem("buyProduct")

setTimeout(()=>{
goLibrary()
},3000)

}else{

retry++
setTimeout(verifyPayment,3000)

}

}catch(e){

retry++
document.getElementById("status").innerText =
"Retrying verification..."
setTimeout(verifyPayment,3000)

}

}

verifyPayment()

function goLibrary(){
location.href="library.html"
}

</script>

</body>
</html>
