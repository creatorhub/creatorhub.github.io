<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Payment Success</title><style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

/* CARD */

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:35px;

border-radius:18px;

max-width:420px;

width:100%;

text-align:center;

border:1px solid #1f2937;

box-shadow:0 20px 40px rgba(0,0,0,0.7);

}

/* TITLE */

h1{

color:#22c55e;

margin-bottom:10px;

}

/* STATUS */

#status{

opacity:.8;

font-size:14px;

}

/* BUTTON */

button{

margin-top:22px;

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:linear-gradient(90deg,#22c55e,#4ade80);

color:black;

font-weight:bold;

cursor:pointer;

display:none;

}

/* LOADER */

.loader{

margin-top:25px;

font-size:14px;

animation:pulse 1.2s infinite;

}

@keyframes pulse{

0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}

}

</style></head><body><div class="card"><h1 id="title">Payment Successful 🎉</h1><p id="status">
Verifying payment and unlocking your ebook...
</p><div id="loader" class="loader">
⏳ Please wait...
</div><button id="libraryBtn" onclick="goLibrary()">
Go To My Library
</button></div><script>

/* PAYMENT API */

const PAYMENT_API=
"https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* USER CHECK */

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user){

alert("Login required")

location.href="login.html"

}

/* GET ORDER ID */

function getOrderId(){

let params=new URLSearchParams(window.location.search)

return(
params.get("order_id")||
params.get("orderId")||
params.get("cf_order_id")||
params.get("order-id")
)

}

let orderId=getOrderId()

/* RETRY SYSTEM */

let retry=0

const maxRetry=10

/* VERIFY PAYMENT */

async function verifyPayment(){

if(!orderId){

document.getElementById("title").innerText="Order Error"

document.getElementById("status").innerText=
"Order ID not found"

document.getElementById("loader").style.display="none"

return

}

/* STOP AFTER LIMIT */

if(retry>=maxRetry){

document.getElementById("title").innerText="Verification Timeout"

document.getElementById("status").innerText=
"Payment verification failed. Contact support."

document.getElementById("loader").style.display="none"

document.getElementById("libraryBtn").style.display="block"

return

}

try{

let res=await fetch(PAYMENT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"verify",
orderId:orderId

})

})

let data=await res.json()

/* SUCCESS */

if(data.success){

document.getElementById("status").innerText=
"Ebook unlocked successfully!"

document.getElementById("loader").style.display="none"

document.getElementById("libraryBtn").style.display="block"

/* CLEAR CART */

localStorage.removeItem("buyProduct")

}

/* RETRY */

else{

retry++

setTimeout(verifyPayment,3000)

}

}

catch(e){

retry++

document.getElementById("status").innerText=
"Verification error. Retrying..."

setTimeout(verifyPayment,3000)

}

}

verifyPayment()

/* LIBRARY */

function goLibrary(){

location.href="library.html"

}

</script></body>
</html>
