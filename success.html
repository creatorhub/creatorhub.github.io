<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payment Success</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:35px;
border-radius:16px;
max-width:420px;
width:90%;
text-align:center;
box-shadow:0 10px 30px black;
}

h1{
color:#22c55e;
margin-bottom:10px;
}

p{
opacity:.8;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

.loader{
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h1>Payment Successful 🎉</h1>

<p id="status">
Verifying payment and unlocking your ebook...
</p>

<div id="loader" class="loader">
⏳ Please wait...
</div>

<button onclick="goLibrary()">
Go To My Library
</button>

</div>

<script>

/* ================= API ================= */

const API =
"https://script.google.com/macros/s/AKfycbx7vyDJEi9v2RO7ujHdMAnlgUX8AV2JVOfydtw8DJU4AI-7vcTlWMEt07KFcFr1lYTa/exec";

/* ================= USER ================= */

let user = JSON.parse(localStorage.getItem("user") || "null");

if(!user){

alert("Login required");

location.href="login.html";

}

/* ================= GET ORDER ID ================= */

function getOrderId(){

let params = new URLSearchParams(window.location.search);

return (
params.get("order_id") ||
params.get("orderId") ||
params.get("cf_order_id") ||
params.get("order-id")
);

}

let orderId = getOrderId();

/* ================= VERIFY PAYMENT ================= */

async function verifyPayment(){

if(!orderId){

document.getElementById("status").innerText =
"Order ID not found";

document.getElementById("loader").style.display="none";

return;

}

try{

let res = await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"verify",
orderId:orderId

})

});

let data = await res.json();

if(data.status==="PAID"){

document.getElementById("status").innerText =
"Ebook unlocked successfully!";

document.getElementById("loader").style.display="none";

localStorage.removeItem("buyProduct");

}else{

/* Retry after 3 seconds */

setTimeout(verifyPayment,3000);

}

}catch(e){

document.getElementById("status").innerText =
"Verification failed, retrying...";

setTimeout(verifyPayment,3000);

}

}

verifyPayment();

/* ================= LIBRARY ================= */

function goLibrary(){

location.href="library.html";

}

</script>

</body>
</html>
