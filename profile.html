<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Profile</title><style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

.topbar{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:500px;
margin:auto;
padding:20px;
}

/* CARD */

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:25px;

border-radius:18px;

border:1px solid #1f2937;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

text-align:center;

}

/* IMAGE */

.profileImg{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid #22c55e;

margin-bottom:15px;

}

/* INPUT */

input{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:12px;

background:#020617;

color:white;

}

/* BUTTON */

button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#22c55e,#4ade80);

color:black;

font-weight:bold;

cursor:pointer;

}

</style></head><body><div class="topbar"><div class="back"
onclick="location.href='dashboard.html'">⬅

</div><div class="title">My Profile

</div></div><div class="container"><div class="card"><img id="profileImg"
class="profileImg">

<input id="name"
placeholder="Your Name">

<button onclick="saveProfile()">Save Profile

</button></div></div><script>

/* MAIN API */

const API=
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

/* USER */

let user=
JSON.parse(localStorage.getItem("user")||"null")

if(!user){

location.href="login.html"

}

/* LOAD DATA */

document.getElementById("name").value=
user.name || ""

document.getElementById("profileImg").src=

localStorage.getItem("profile_"+user.email) ||

"https://cdn-icons-png.flaticon.com/512/149/149071.png"

/* SAVE PROFILE */

async function saveProfile(){

let newName=
document.getElementById("name")
.value.trim()

if(!newName){

alert("Enter name")

return

}

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"update_profile",

email:user.email,

name:newName

})

})

let data=await res.json()

if(data.success){

user.name=newName

localStorage.setItem(
"user",
JSON.stringify(user)
)

alert("Profile updated ✅")

}else{

alert(data.message || "Update failed")

}

}catch{

alert("Server error")

}

}

</script></body></html>
