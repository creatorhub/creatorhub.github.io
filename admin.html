<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub SUPER ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.big{
font-size:30px;
color:#22c55e;
}

button{
border:none;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:white;
}

.open{
background:#22c55e;
width:100%;
}

.row{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:10px;
}

canvas{
background:#020617;
border-radius:10px;
padding:10px;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='dashboard.html'">⬅</div>
<div class="title">CreatorHub SUPER ADMIN PANEL</div>
</div>

<div class="container">

<div class="card">
<h2>Owner Profit</h2>
₹ <span id="profit" class="big">0</span>
</div>

<div class="card">
<h2>Earnings Analytics</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Seller Approval Requests</h2>
<div id="sellerList">Loading...</div>
</div>

<div class="card">
<h2>Product Control</h2>
<button class="open" onclick="location.href='product-control.html'">
Open Product Control Panel
</button>
</div>

<div class="card">
<h2>Seller Control</h2>
<button class="open" onclick="location.href='seller-control.html'">
Open Seller Control
</button>
</div>

<div class="card">
<h2>USER WALLET BALANCE</h2>
<button class="open" onclick="location.href='wallet-balance.html'">
Open Wallet Balance Panel
</button>
</div>

<div class="card">
<h2>User Activity Analytics</h2>
<button class="open" onclick="location.href='user-analytics.html'">
Open User Analytics
</button>
</div>

</div>

<script>

/* ADMIN EMAIL */

const ADMIN="ayushprajpati6@gmail.com";

/* APIs */

const API_AUTH="https://script.google.com/macros/s/AKfycbx-Bu9s127GGueMP9w-BHp-J2oGz4YNLpPhaQ33oYGZNPpOnXRVl1BVKhCQz2y8E14R/exec";

const API_PAYMENT="https://script.google.com/macros/s/AKfycbx7vyDJEi9v2RO7ujHdMAnlgUX8AV2JVOfydtw8DJU4AI-7vcTlWMEt07KFcFr1lYTa/exec";

/* USER */

let user=JSON.parse(localStorage.getItem("user")||"{}");

if(!user || user.email!==ADMIN){
alert("Admin Only");
location.href="index.html";
}

/* DATABASE ROUTER */

function getAPI(db){

if(db==="orders" || db==="subscriptions" || db==="wallet"){
return API_PAYMENT;
}

return API_AUTH;

}

async function getDB(db){

try{

let r=await fetch(getAPI(db)+"?db="+db+"&t="+Date.now());

let d=await r.json();

return Array.isArray(d)?d:[];

}catch(e){

console.log("DB ERROR",e);
return [];

}

}

async function saveDB(db,data){

try{

await fetch(getAPI(db),{

method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify({db:db,data:data})

});

}catch(e){

console.log("SAVE ERROR",e);

}

}

/* PREMIUM AUTO EXPIRY */

async function checkPremiumExpiry(){

let users=await getDB("users");

let now=new Date();

let changed=false;

users.forEach(u=>{

if(u.premium && u.premiumExpiry){

let exp=new Date(u.premiumExpiry);

if(now>exp){

u.premium=false;
changed=true;

}

}

});

if(changed){
await saveDB("users",users);
}

}

checkPremiumExpiry();

/* OWNER PROFIT */

let chart=null;

async function loadProfit(){

let orders=await getDB("orders");
let subscriptions=await getDB("subscriptions");

let profit=0;

orders.forEach(o=>{
profit+=Number(o.amount||0)*0.20;
});

subscriptions.forEach(s=>{
profit+=Number(s.amount||0);
});

document.getElementById("profit").innerText=Math.floor(profit);

/* CHART DATA */

let chartData=[];

orders.forEach(o=>{
chartData.push(Number(o.amount||0)*0.20);
});

subscriptions.forEach(s=>{
chartData.push(Number(s.amount||0));
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:chartData.map((_,i)=>"Sale "+(i+1)),
datasets:[{
label:"Owner Profit",
data:chartData,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,.2)",
tension:.4
}]
}

});

}

loadProfit();

/* SELLER REQUESTS */

async function loadSellerRequests(){

let users=await getDB("users");

let box=document.getElementById("sellerList");

box.innerHTML="";

let pending=users.filter(u=>u.sellerRequest===true && !u.seller);

if(pending.length===0){
box.innerHTML="No Seller Requests";
return;
}

pending.forEach(u=>{

box.innerHTML+=`

<div class="row">

<b>${escapeHTML(u.name||"User")}</b>
<br>
${escapeHTML(u.email)}
<br>

<button class="open" onclick="approveSeller('${u.email}')">
Approve Seller
</button>

</div>

`;

});

}

loadSellerRequests();

async function approveSeller(email){

let users=await getDB("users");

let index=users.findIndex(u=>u.email===email);

if(index>-1){

users[index].seller=true;
users[index].sellerRequest=false;

}

await saveDB("users",users);

alert("Seller Approved");

loadSellerRequests();

}

/* SECURITY */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m];

});

}

</script>

</body>
</html>
