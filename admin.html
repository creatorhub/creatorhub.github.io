<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub SUPER ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
}

.big{
font-size:30px;
color:#22c55e;
}

button{
border:none;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:white;
}

.open{
background:#22c55e;
width:100%;
}

.row{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:10px;
}

canvas{
background:#020617;
border-radius:10px;
padding:10px;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='dashboard.html'">⬅</div>
<div class="title">CreatorHub SUPER ADMIN PANEL</div>
</div>

<div class="container">

<div class="grid">

<div class="card">
Total Users
<div id="users" class="big">0</div>
</div>

<div class="card">
Total Books
<div id="books" class="big">0</div>
</div>

<div class="card">
Total Orders
<div id="orders" class="big">0</div>
</div>

<div class="card">
Owner Profit
₹ <span id="profit" class="big">0</span>
</div>

</div>

<div class="card">
<h2>Earnings Analytics</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Seller Approval Requests</h2>
<div id="sellerList">Loading...</div>
</div>

<div class="card">
<h2>Product Control</h2>
<button class="open" onclick="location.href='product-control.html'">
Open Product Control Panel
</button>
</div>

<div class="card">
<h2>Seller Control</h2>
<button class="open" onclick="location.href='seller-control.html'">
Open Seller Control
</button>
</div>

<div class="card">
<h2>User Wallet Balance</h2>
<button class="open" onclick="location.href='wallet-balance.html'">
Open Wallet Panel
</button>
</div>

<div class="card">
<h2>User Activity Analytics</h2>
<button class="open" onclick="location.href='user-analytics.html'">
Open User Analytics
</button>
</div>

</div>

<script>

const ADMIN="ayushprajpati6@gmail.com"

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){

alert("Admin Only")
location.href="index.html"

}

function getAPI(db){

if(db==="orders"||db==="subscriptions"||db==="wallets"){
return PAYMENT_API
}

return PRODUCT_API

}

async function getDB(db){

try{

let r=await fetch(getAPI(db)+"?db="+db+"&t="+Date.now())
let d=await r.json()

return Array.isArray(d)?d:[]

}catch{

return[]

}

}

let chart=null

async function loadDashboard(){

let users=await getDB("users")
let products=await getDB("products")
let orders=await getDB("orders")
let subs=await getDB("subscriptions")
let sellers=await getDB("sellers")

document.getElementById("users").innerText=users.length
document.getElementById("books").innerText=products.length

let paidOrders=orders.filter(o=>o.status==="paid")

document.getElementById("orders").innerText=paidOrders.length

let profit=0

paidOrders.forEach(o=>{
profit+=Number(o.amount||0)*0.08
})

subs.forEach(s=>{
profit+=Number(s.amount||0)
})

document.getElementById("profit").innerText=Math.floor(profit)

let chartMap={}

paidOrders.forEach(o=>{

let d=o.date||"Unknown"

if(!chartMap[d]) chartMap[d]=0

chartMap[d]+=Number(o.amount||0)*0.08

})

subs.forEach(s=>{

let d=s.date||"Unknown"

if(!chartMap[d]) chartMap[d]=0

chartMap[d]+=Number(s.amount||0)

})

let labels=Object.keys(chartMap)
let values=Object.values(chartMap)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Owner Profit",
data:values,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,.2)",
tension:.4
}]
}

})

let pending=sellers.filter(s=>s.status==="pending")

let box=document.getElementById("sellerList")

if(pending.length===0){

box.innerHTML="No Seller Requests"

}else{

box.innerHTML=""

pending.forEach(s=>{

box.innerHTML+=`

<div class="row">

<b>${escapeHTML(s.name||"User")}</b>
<br>
${escapeHTML(s.email)}

</div>

`

})

}

}

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

loadDashboard()

</script>

</body>
</html>
