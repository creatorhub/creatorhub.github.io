<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub SUPER ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;

}

.title{
flex:1;
text-align:center;
color:#22c55e;

}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.big{
font-size:30px;
color:#22c55e;
}

button{
border:none;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:white;
}

.open{
background:#22c55e;
width:100%;
}

.row{
background:#020617;
padding:15px;

canvas{

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='dashboard.html'">⬅</div>
<div class="title">CreatorHub SUPER ADMIN PANEL</div>
</div>

<div class="container">

<div class="card">
<h2>Owner Profit</h2>
₹ <span id="profit" class="big">0</span>
</div>

<div class="card">
<h2>Earnings Analytics</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Seller Approval Requests</h2>
<div id="sellerList">Loading...</div>
</div>

<div class="card">
<h2>Product Control</h2>
<button class="open" onclick="location.href='product-control.html'">
Open Product Control Panel
</button>
</div>

<div class="card">
<h2>Seller Control</h2>
<button class="open" onclick="location.href='seller-control.html'">
Open Seller Control
</button>
</div>

<div class="card">
<h2>USER WALLET BALANCE</h2>
<button class="open" onclick="location.href='wallet-balance.html'">
Open Wallet Balance Panel
</button>
</div>

<div class="card">
<h2>User Activity Analytics</h2>
<button class="open" onclick="location.href='user-analytics.html'">
Open User Analytics
</button>
</div>

</div>

<script>

/* ADMIN EMAIL */

const ADMIN="ayushprajpati6@gmail.com";

/* APIs */

const API_PRODUCTS="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

const API_PAYMENT="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec";


/* USER */

let user=JSON.parse(localStorage.getItem("user")||"{}");

if(!user || user.email!==ADMIN){
alert("Admin Only");
location.href="index.html";
}


/* DATABASE ROUTER */

function getAPI(db){

if(db==="orders" || db==="subscriptions" || db==="wallets"){
return API_PAYMENT;
}

return API_PRODUCTS;

}

async function getDB(db){

try{

let r=await fetch(getAPI(db)+"?db="+db+"&t="+Date.now());

let d=await r.json();

return Array.isArray(d)?d:[];

}catch(e){

console.log("DB ERROR",e);
return [];

}

}


/* OWNER PROFIT */

let chart=null;

async function loadProfit(){

let orders=await getDB("orders");
let subscriptions=await getDB("subscriptions");

let profit=0;

orders.forEach(o=>{
profit+=Number(o.amount||0)*0.20;
});

subscriptions.forEach(s=>{
profit+=Number(s.amount||0);
});

document.getElementById("profit").innerText=Math.floor(profit);

/* CHART DATA */

let chartData=[];

orders.forEach(o=>{
chartData.push(Number(o.amount||0)*0.20);
});

subscriptions.forEach(s=>{
chartData.push(Number(s.amount||0));
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:chartData.map((_,i)=>"Sale "+(i+1)),
datasets:[{
label:"Owner Profit",
data:chartData,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,.2)",
tension:.4
}]
}

});

}

loadProfit();


/* SELLER REQUESTS */

async function loadSellerRequests(){

let sellers=await getDB("sellers");

let box=document.getElementById("sellerList");

box.innerHTML="";

let pending=sellers.filter(s=>s.status==="pending");

if(pending.length===0){
box.innerHTML="No Seller Requests";
return;
}

pending.forEach(s=>{

box.innerHTML+=`

<div class="row">

<b>${escapeHTML(s.name||"User")}</b>
<br>
${escapeHTML(s.email)}
<br>

<button class="open" onclick="approveSeller('${s.email}')">
Approve Seller
</button>

</div>

`;

});

}

loadSellerRequests();


function approveSeller(email){

alert("Seller approval should be handled in seller-control panel");

}


/* SECURITY */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m];

});

}

</script>

</body>
</html>
