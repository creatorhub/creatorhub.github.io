<body>

<div class="topbar">

🔥 CreatorHub SUPER ADMIN PANEL
</div>

<div class="container">


<div class="card">
<h2>💰 Owner Profit</h2>
₹ <span id="profit" class="big">0</span>
</div>


<div class="card">
<h2>📊 Earnings Analytics</h2>
<canvas id="chart"></canvas>
</div>

<h2>⭐ Seller Approval Requests</h2>

onclick="location.href='wallet-balance.html'">
Open Wallet Balance Panel

</div>


<div class="card">
<h2>📊 User Activity Analytics</h2>
<button class="open"
onclick="location.href='user-analytics.html'">
Open User Analytics
</button>
</div>

<script>

const ADMIN="ayushprajpati6@gmail.com";

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

let user=JSON.parse(localStorage.getItem("user"));

if(!user || user.email!==ADMIN){

alert("Admin Only");
location.href="index.html";

}


/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let d=await r.json();

return Array.isArray(d)?d:[];

}catch(e){

return [];

}

}


async function saveDB(db,data){

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify({
db:db,
data:data
})
});

}


/* PREMIUM AUTO EXPIRY */

async function checkPremiumExpiry(){

let users=await getDB("users");

let now=new Date();

let changed=false;

users.forEach(u=>{

if(u.premium && u.premiumExpire){

let exp=new Date(u.premiumExpire);

if(now>exp){

u.premium=false;

changed=true;

}

}

});

if(changed){

await saveDB("users",users);

}

}

checkPremiumExpiry();


/* OWNER PROFIT */

async function loadProfit(){

let orders=await getDB("orders");

let subscriptions=await getDB("subscriptions");

let profit=0;

orders.forEach(o=>{
profit+=Number(o.amount||0)*0.20;
});

subscriptions.forEach(s=>{
profit+=Number(s.amount||0);
});

document.getElementById("profit").innerText=Math.floor(profit);


let chartData=[];

orders.forEach(o=>{
chartData.push(Number(o.amount||0)*0.20);
});

subscriptions.forEach(s=>{
chartData.push(Number(s.amount||0));
});


new Chart(
document.getElementById("chart"),
{
type:"line",
data:{
labels:chartData.map((_,i)=>"Sale "+(i+1)),
datasets:[{
label:"Owner Profit",
data:chartData,
borderColor:"#22c55e",
tension:.4
}]
}
});

}

loadProfit();


/* SELLER REQUESTS */

async function loadSellerRequests(){

let users=await getDB("users");

let box=document.getElementById("sellerList");

box.innerHTML="";

let pending=
users.filter(u=>u.sellerRequest===true && !u.seller);

if(pending.length===0){

box.innerHTML="No Seller Requests";

return;

}

pending.forEach(u=>{

box.innerHTML+=`

<div class="row">

<b>${u.name||"User"}</b>

<br>

${u.email}

<br>

<button class="open"
onclick="approveSeller('${u.email}')">

Approve Seller

</button>

</div>

`;

});

}

loadSellerRequests();


async function approveSeller(email){

let users=await getDB("users");

let index=users.findIndex(u=>u.email===email);

if(index>-1){

users[index].seller=true;
users[index].sellerRequest=false;

}

await saveDB("users",users);

alert("Seller Approved");

loadSellerRequests();

}

</script>

</body>
