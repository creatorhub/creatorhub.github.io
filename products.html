<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>CreatorHub Store</title><style>

:root{
--bg:#020617;
--text:#ffffff;
--accent:#22c55e;
--card:#111827;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
animation:fadePage .6s ease;
}

/* TOPBAR */

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px rgba(0,0,0,.5);
position:sticky;
top:0;
z-index:99;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
transition:.2s;
}

.back:hover{
transform:scale(1.1);
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
font-size:18px;
}

/* HEADER */

header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

.profile{
width:40px;
height:40px;
border-radius:50%;
border:2px solid #22c55e;
object-fit:cover;
cursor:pointer;
transition:.2s;
}

.profile:hover{
transform:scale(1.1);
}

/* GRID */

.products{
padding:20px;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.card{
background:var(--card);
border-radius:15px;
padding:15px;
box-shadow:0 0 20px rgba(0,0,0,.5);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 40px rgba(0,0,0,.8);
}

.card img{
width:100%;
height:210px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.card:hover img{
transform:scale(1.05);
}

/* BUTTONS */

.buy{
background:linear-gradient(90deg,#22c55e,#4ade80);
border:none;
width:100%;
padding:13px;
margin-top:10px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.buy:hover{
box-shadow:0 0 15px #22c55e;
}

.cart{
background:black;
color:white;
border:none;
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.cart:hover{
background:#1f2937;
}

/* SKELETON */

.skeleton{
background:#1f2937;
height:260px;
border-radius:12px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

/* TOAST */

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
padding:12px 20px;
border-radius:10px;
border:1px solid #22c55e;
color:#22c55e;
font-weight:bold;
box-shadow:0 0 10px rgba(34,197,94,.4);
animation:fadeUp .3s ease;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
opacity:.7;
}

/* MOBILE */

@media(max-width:768px){

.products{
grid-template-columns:repeat(2,1fr);
}

.card img{
height:170px;
}

header{
flex-direction:column;
gap:10px;
}

}

/* ANIMATION */

@keyframes fadePage{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
from{opacity:0;transform:translate(-50%,20px);}
to{opacity:1;transform:translate(-50%,0);}
}

</style></head><body><div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">CreatorHub</div>
</div><header><div class="logo">
CreatorHub Store
</div><img id="profile"
class="profile"
onclick="location.href='dashboard.html'">

</header><h2 style="padding:15px">
All Digital Products
</h2><div id="products" class="products"><div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div></div><footer>
CreatorHub © 2026
<br>
Digital Products Marketplace
</footer><script>

/* API */

const API =
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* USER */

let user =
JSON.parse(localStorage.getItem("user")||"null");

/* PROFILE IMAGE */

let profile =
localStorage.getItem("profile_"+(user?.email||"guest"));

document.getElementById("profile").src =
profile ||
"https://cdn-icons-png.flaticon.com/512/149/149071.png";

/* SAFE HTML */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

/* DATABASE */

async function getDB(db){

try{

let res =
await fetch(API+"?db="+db+"&t="+Date.now());

let data = await res.json();

return Array.isArray(data)?data:[];

}catch{

return[];

}

}

/* DRIVE IMAGE */

function driveImage(link){

if(!link)
return "https://picsum.photos/400";

try{

let id="";

if(link.includes("id="))
id=link.split("id=")[1].split("&")[0];

else if(link.includes("/file/d/"))
id=link.split("/file/d/")[1].split("/")[0];

if(id)
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";

}catch{}

return "https://picsum.photos/400";

}

/* LOAD PRODUCTS */

async function loadProducts(){

let box =
document.getElementById("products");

let products =
await getDB("products");

products =
products.filter(p=>p.ai_status==="approved");

if(products.length===0){

box.innerHTML="<h3>No Products Found</h3>";
return;

}

products.reverse();

let html="";

products.forEach(p=>{

html+=`

<div class="card">

<img
src="${driveImage(p.image)}"
onclick="openProduct('${p.id}')"
>

<h3>${escapeHTML(p.title || "Untitled Ebook")}</h3>

<p>₹ ${Number(p.price||0)}</p>

<button
class="buy"
onclick="buyNow(event,'${p.id}')">
Buy Ebook
</button>

<button
class="cart"
onclick="addCart(event,'${p.id}')">
Add Cart
</button>

</div>

`;

});

box.innerHTML = html;

}

loadProducts();

/* OPEN PRODUCT */

function openProduct(id){
location.href="ebook.html?id="+id;
}

/* BUY */

function buyNow(e,id){

e.stopPropagation();

if(!user){

showToast("Login required");
location.href="login.html";
return;

}

localStorage.setItem("buyProduct",id);
location.href="payment.html";

}

/* CART */

function addCart(e,id){

e.stopPropagation();

let cart =
JSON.parse(localStorage.getItem("cart")||"[]");

if(cart.indexOf(id)!==-1){

showToast("Already in cart");
return;

}

cart.push(id);

localStorage.setItem("cart",JSON.stringify(cart));

showToast("Added to Cart ✅");

}

/* TOAST */

function showToast(msg){

let div=document.createElement("div");

div.className="toast";

div.innerText=msg;

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},3000);

}

</script></body>
</html>
