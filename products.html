<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorHub Store | Premium Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================================================
   CREATORHUB CORE THEME PARALLEL TO DASHBOARD (image_b36c0c.jpg)
   ========================================================= */
:root {
    --bg-primary: #f1f5f9;       /* Light layout workspace canvas */
    --bg-secondary: #ffffff;     /* Pure white card block modules */
    --text-primary: #0f172a;     /* Deep dark slate brand text */
    --text-secondary: #475569;   /* Muted paragraph descriptors */
    --text-muted: #94a3b8;
    --accent-blue: #2f62e9;      /* Authentic Royal Blue from screenshot */
    --accent-blue-hover: #1e40af;
    --accent-blue-light: #eff6ff;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.02);
    --shadow-md: 0 12px 30px -5px rgba(15,23,42,0.08);
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body{
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    animation: fadePage .4s ease-out;
}

a{
    text-decoration: none;
    color: inherit;
}

/* TOPBAR NAVIGATION BLOCK */
.topbar{
    height: 80px;
    background-color: #0f172a; /* Matched perfectly to dashboard deep navy sidebar */
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: #94a3b8;
    font-weight: 700;
    font-size: 14px;
    transition: all 0.2s ease;
    user-select: none;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 18px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

.back-btn:hover {
    color: #ffffff;
    border-color: var(--accent-blue);
    background-color: var(--accent-blue);
    transform: translateX(-3px);
}

.title-header{
    flex: 1;
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.02em;
}

.title-header span {
    color: var(--accent-blue);
}

/* HEAD HERO MATRIX HEADER */
header{
    width: 90%;
    max-width: 1400px;
    margin: 40px auto 20px auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-secondary);
    padding: 24px 32px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
}

.logo-brand {
    font-size: 26px;
    font-weight: 950;
    letter-spacing: -0.02em;
    color: var(--text-primary);
}

.logo-brand i {
    color: var(--accent-blue);
    margin-right: 8px;
}

.profile-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2.5px solid var(--border-color);
    object-fit: cover;
    background-color: var(--bg-primary);
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
}

.profile-avatar:hover {
    border-color: var(--accent-blue);
    transform: scale(1.06);
}

/* SECTION SUBTITLE LABEL */
.section-headline {
    width: 90%;
    max-width: 1400px;
    margin: 30px auto 16px auto;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text-primary);
}

/* PRODUCT MAPPED CARDS CANVAS MATRIX */
.products-container {
    width: 90%;
    max-width: 1400px;
    margin: 16px auto 80px auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 32px;
}

/* DETAILED RENDER CARDS HOVER LOGICS */
.card{
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 22px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
}

.card:hover{
    transform: translateY(-6px);
    box-shadow: var(--shadow-md);
    border-color: rgba(47, 98, 233, 0.25);
}

.image-wrapper {
    width: 100%;
    height: 240px;
    border-radius: 12px;
    overflow: hidden;
    background-color: var(--bg-primary);
    margin-bottom: 18px;
    border: 1px solid var(--border-color);
}

.card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.card:hover img{
    transform: scale(1.05);
}

.card h3{
    font-size: 16px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.45;
    margin-bottom: 8px;
    min-height: 46px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.price-tag {
    font-size: 22px;
    font-weight: 950;
    color: var(--accent-blue);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
}

/* CALL TO ACTION BUTTON CONTROL STYLES */
.btn-buy{
    background: var(--accent-blue);
    color: white;
    border: none;
    width: 100%;
    height: 48px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(47, 98, 233, 0.2);
}

.btn-buy:hover{
    background-color: var(--accent-blue-hover);
    box-shadow: 0 6px 16px rgba(47, 98, 233, 0.3);
}

.btn-cart{
    background: var(--bg-primary);
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
    width: 100%;
    height: 46px;
    margin-top: 10px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
}

.btn-cart:hover{
    background-color: #e2e8f0;
    color: var(--text-primary);
    border-color: var(--text-secondary);
}

/* LOADING TIMEOUT SHIMMERS */
.skeleton{
    background: linear-gradient(90deg, #ffffff 25%, #e2e8f0 50%, #ffffff 75%);
    background-size: 200% 100%;
    height: 400px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    animation: loadingShimmer 1.5s infinite ease-in-out;
}

@keyframes loadingShimmer{
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.no-data {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    color: var(--text-secondary);
    box-shadow: var(--shadow-sm);
}

/* NOTIFICATION SLIDER TOAST */
.toast{
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f172a;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 16px 28px;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    animation: fadeUp .3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 12px;
}

footer{
    background-color: #ffffff;
    border-top: 1px solid var(--border-color);
    text-align: center;
    padding: 45px 20px;
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 600;
    line-height: 1.7;
}

/* RESPONSIVE RENDERING MEDIA BREAKPOINTS */
@media(max-width:768px){
    .products-container { grid-template-columns: repeat(2, 1fr); gap: 16px; width: 94%; }
    .image-wrapper { height: 180px; }
    header { width: 94%; padding: 16px; }
    .logo-brand { font-size: 20px; }
    .section-headline { width: 94%; font-size: 22px; }
    .topbar { padding: 0 20px; height: 70px; }
    .card { padding: 14px; border-radius: 12px; }
    .card h3 { font-size: 14px; min-height: 40px; }
    .price-tag { font-size: 18px; margin-bottom: 14px; }
    .btn-buy, .btn-cart { height: 42px; font-size: 13px; }
}

@media(max-width:480px){
    .products-container { grid-template-columns: 1fr; gap: 20px; }
    .image-wrapper { height: 230px; }
}

@keyframes fadePage{ from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp{ from { opacity:0; transform:translate(-50., 20px); } to { opacity:1; transform:translate(-50., 0); } }
</style>
</head>

<body>

<!-- TOPBAR INTERFACE PANEL -->
<div class="topbar">
    <div class="back-btn" onclick="location.href='index.html'">
        <span>←</span> Back Home
    </div>
    <div class="title-header">Creator<span>Hub</span> Store</div>
</div>

<!-- SUB LOGO BRAND PROFILE WRAPPER -->
<header>
    <div class="logo-brand">
        <i class="fa-solid fa-bag-shopping"></i> Premium Marketplace
    </div>
    <img id="profile" class="profile-avatar" alt="User Avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
</header>

<h2 class="section-headline">All Approved Ebooks</h2>

<!-- MAIN DYNAMIC CARDS CONTAINER HUB -->
<div id="products" class="products-container">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
</div>

<!-- COMPONENT FOOTER -->
<footer>
    <strong>CreatorHub Marketplace © 2026</strong><br>
    <span style="font-size:12px; color: var(--text-muted); margin-top:4px; display:inline-block;">Secure Cloud Datastore Ecosystem Grid Interface</span>
</footer>

<script>
/* =========================================================
   HOMEPAGE VERIFIED ORIGINAL EXACT API CONNECTORS
   ========================================================= */
const API = "https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* PARSE SECURE USER CREDENTIAL LOCKS */
let user = JSON.parse(localStorage.getItem("user") || "null");

/* INITIALIZE SESSION PROFILE ATTACHMENTS */
if(user) {
    let savedEmail = user.email || "";
    let savedName = localStorage.getItem("user_name") || "User";
    let savedImage = localStorage.getItem("user_image") || "";
    
    if(savedImage) {
        document.getElementById("profile").src = savedImage;
    } else {
        document.getElementById("profile").src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(savedName) + "&background=2f62e9&color=fff";
    }
}
document.getElementById("profile").onclick = function(){ location.href = 'dashboard.html'; };

/* INJECTION SANITIZATION STRING LOGIC */
function escapeHTML(str){
    return String(str).replace(/[&<>"']/g, function(m){
        return({
            '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
        })[m]
    });
}

/* ASYNC POOL DATA RECOVERY FROM CLOUD DATABASE */
async function getDB(db){
    try{
        let res = await fetch(API + "?db=" + db + "&t=" + Date.now());
        let data = await res.json();
        return Array.isArray(data) ? data : [];
    }catch(err){
        console.error(err);
        return [];
    }
}

/* THUMBNAIL ID CONVERTOR SYSTEM */
function driveImage(link){
    if(!link) return "https://images.unsplash.com/photo-1543002588-bfa74002ed7e?q=80&w=600&auto=format&fit=crop";
    try{
        let id = "";
        if(link.includes("id=")) id = link.split("id=")[1].split("&")[0];
        else if(link.includes("/file/d/")) id = link.split("/file/d/")[1].split("/")[0];
        if(id) return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
    }catch(e){}
    return link;
}

/* FEED BUILD CONTAINER LOGIC SYSTEM LOOP */
async function loadProducts(){
    let box = document.getElementById("products");
    let products = await getDB("products");
    
    // Filters approved rows matching parameters smoothly
    products = products.filter(function(p){ return p.ai_status === "approved"; });

    if(products.length === 0){
        box.innerHTML = `
        <div class="no-data">
            <i class="fa-solid fa-folder-open" style="font-size:40px; color:var(--text-muted); margin-bottom:16px; display:block;"></i>
            <h3>No Approved Digital Assets Found</h3>
        </div>`;
        return;
    }

    products.reverse();
    let html = "";

    products.forEach(function(p){
        html += `
        <div class="card">
            <div class="image-wrapper">
                <img src="${driveImage(p.image)}" alt="Ebook Cover Preview" onclick="openProduct('${p.id}')" loading="lazy">
            </div>
            <h3>${escapeHTML(p.title || "Untitled Premium Ebook")}</h3>
            <div class="price-tag">₹${Number(p.price || 0)}</div>
            
            <button class="btn-buy" onclick="buyNow(event,'${p.id}')">
                <i class="fa-solid fa-bolt"></i> Buy Ebook
            </button>
            
            <button class="btn-cart" onclick="addCart(event,'${p.id}')">
                <i class="fa-solid fa-cart-plus"></i> Add to Cart
            </button>
        </div>
        `;
    });

    box.innerHTML = html;
}

loadProducts();

function openProduct(id){ location.href = "book.html?id=" + id; }

function buyNow(e, id){
    e.stopPropagation();
    if(!user){
        showToast("<i class='fa-solid fa-circle-exclamation'></i> Login is required to checkout.");
        setTimeout(function(){ location.href = "login.html"; }, 1500);
        return;
    }
    localStorage.setItem("buyProduct", id);
    location.href = "payment.html";
}

function addCart(e, id){
    e.stopPropagation();
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    if(cart.indexOf(id) !== -1){
        showToast("<i class='fa-solid fa-info-circle'></i> Item already present inside basket.");
        return;
    }
    cart.push(id);
    localStorage.setItem("cart", JSON.stringify(cart));
    showToast("<i class='fa-solid fa-circle-check'></i> Added to Basket successfully!");
}

function showToast(msg){
    let div = document.createElement("div");
    div.className = "toast";
    div.innerHTML = msg;
    document.body.appendChild(div);
    setTimeout(function(){ div.remove(); }, 3000);
}
</script>

</body>
</html>
