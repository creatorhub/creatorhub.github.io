<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorHub Store | Premium Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================================================
   CREATORHUB CORE THEME VARIABLE MATRIX (image_b36c0c.jpg)
   ========================================================= */
:root {
    --bg-primary: #f1f5f9;       /* Light canvas area wrapper */
    --bg-secondary: #ffffff;     /* Pure white components card base */
    --sidebar-dark: #0f172a;     /* Exact Deep Navy Sidebar color from screenshot */
    --sidebar-hover: #1e293b;    /* Active node item background color */
    --text-primary: #0f172a;     
    --text-secondary: #475569;   
    --text-muted: #94a3b8;
    --accent-blue: #2f62e9;      /* Exact active blue indicator */
    --accent-blue-hover: #1e40af;
    --border-color: #e2e8f0;
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body{
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
}

/* =========================================================
   LEFT SIDEBAR LAYOUT FRAMEWORK (100% MATCHING SCREENSHOT)
   ========================================================= */
.sidebar {
    width: 260px;
    background-color: var(--sidebar-dark);
    min-height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar-brand {
    padding: 28px 24px;
    font-size: 22px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.02em;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sidebar-brand span {
    color: var(--accent-blue);
}

.sidebar-menu {
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
}

.menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: #94a3b8;
    font-size: 14px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.menu-item:hover {
    background-color: var(--sidebar-hover);
    color: #ffffff;
}

.menu-item.active {
    background-color: var(--accent-blue);
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(47, 98, 233, 0.25);
}

.menu-item i {
    font-size: 16px;
    width: 20px;
    text-align: center;
}

/* =========================================================
   RIGHT MAIN LAYOUT LAYER CONTAINER
   ========================================================= */
.main-wrapper {
    margin-left: 260px; /* Precise layout margin push to handle fixed sidebar */
    width: calc(100% - 260px);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* TOPBAR HEADER ACTIONS */
.topbar{
    height: 75px;
    background-color: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 90;
}

.page-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
}

.topbar-actions {
    display: flex;
    align-items: center;
    gap: 20px;
}

.profile-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border-color);
    object-fit: cover;
    background-color: var(--bg-primary);
    cursor: pointer;
    transition: all 0.2s ease;
}

.profile-avatar:hover {
    border-color: var(--accent-blue);
    transform: scale(1.05);
}

/* CONTENT CONTAINER BOUNDS */
.content-area {
    padding: 40px;
    flex: 1;
}

.section-headline {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 24px;
}

/* PRODUCTS DYNAMIC GRID SYSTEM */
.products-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
}

/* CARD DETAILS PRE-RENDERS */
.card{
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
}

.card:hover{
    transform: translateY(-5px);
    box-shadow: var(--shadow-md);
    border-color: rgba(47, 98, 233, 0.2);
}

.image-wrapper {
    width: 100%;
    height: 220px;
    border-radius: 12px;
    overflow: hidden;
    background-color: var(--bg-primary);
    margin-bottom: 16px;
    border: 1px solid var(--border-color);
}

.card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.card:hover img{
    transform: scale(1.04);
}

.card h3{
    font-size: 15px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.4;
    margin-bottom: 6px;
    min-height: 42px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.price-tag {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent-blue);
    margin-bottom: 18px;
}

/* CONTROL TRIGGERS ACCENTS */
.btn-buy{
    background: var(--accent-blue);
    color: white;
    border: none;
    width: 100%;
    height: 46px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.btn-buy:hover{
    background-color: var(--accent-blue-hover);
}

.btn-cart{
    background: var(--bg-primary);
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
    width: 100%;
    height: 44px;
    margin-top: 8px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
}

.btn-cart:hover{
    background-color: #e2e8f0;
    color: var(--text-primary);
}

/* SHIMMER RUNNERS LOOP LOADING SKELETONS */
.skeleton{
    background: linear-gradient(90deg, #ffffff 25%, #e2e8f0 50%, #ffffff 75%);
    background-size: 200% 100%;
    height: 380px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    animation: loadingShimmer 1.4s infinite ease-in-out;
}

@keyframes loadingShimmer{
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

.no-data {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    color: var(--text-secondary);
}

/* SYSTEM NOTIFICATION TOAST OVERLAYS */
.toast{
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f172a;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 14px 26px;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

footer{
    background-color: var(--bg-secondary);
    border-top: 1px solid var(--border-color);
    text-align: center;
    padding: 30px 20px;
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 600;
}

/* RESPONSIVE RENDERING COMPRESSION SCALES */
@media(max-width:1050px){
    .sidebar { width: 70px; }
    .sidebar-brand span, .menu-item span { display: none; }
    .sidebar-brand { padding: 24px 0; text-align: center; font-size: 18px; }
    .menu-item { padding: 14px; justify-content: center; }
    .main-wrapper { margin-left: 70px; width: calc(100% - 70px); }
}

@media(max-width:768px){
    .products-container { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .content-area { padding: 20px; }
    .topbar { padding: 0 20px; }
    .image-wrapper { height: 160px; }
}

@media(max-width:480px) {
    .products-container { grid-template-columns: 1fr; }
    .image-wrapper { height: 210px; }
}

@keyframes fadeUp{ from { opacity:0; transform:translate(-50%, 15px); } to { opacity:1; transform:translate(-50%, 0); } }
</style>
</head>

<body>

<aside class="sidebar">
    <div class="sidebar-brand">Creator<span>Hub</span></div>
    <div class="sidebar-menu">
        <div class="menu-item" onclick="location.href='index.html'">
            <i class="fa-solid fa-house"></i> <span>Home</span>
        </div>
        <div class="menu-item" onclick="location.href='dashboard.html'">
            <i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span>
        </div>
        <div class="menu-item active" onclick="location.href='store.html'">
            <i class="fa-solid fa-bag-shopping"></i> <span>Product Store</span>
        </div>
        <div class="menu-item" onclick="location.href='library.html'">
            <i class="fa-solid fa-book-open"></i> <span>Library</span>
        </div>
        <div class="menu-item" onclick="location.href='wallet.html'">
            <i class="fa-solid fa-wallet"></i> <span>Wallet</span>
        </div>
        <div class="menu-item" onclick="location.href='settings.html'">
            <i class="fa-solid fa-gear"></i> <span>Settings</span>
        </div>
    </div>
</aside>

<div class="main-wrapper">
    
    <header class="topbar">
        <div class="page-title">Marketplace Ebooks</div>
        <div class="topbar-actions">
            <img id="profile" class="profile-avatar" alt="User Avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
    </header>

    <main class="content-area">
        <h2 class="section-headline">All Approved Digital Assets</h2>

        <div id="products" class="products-container">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </main>

    <footer>
        <strong>CreatorHub Store Engine © 2026</strong>
    </footer>
</div>

<script>
/* =========================================================
   HOMEPAGE VERIFIED ORIGINAL EXACT API CONNECTORS
   ========================================================= */
const API = "https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* PARSE SECURE USER CREDENTIAL LOCKS */
let user = JSON.parse(localStorage.getItem("user") || "null");

/* INITIALIZE SESSION PROFILE ATTACHMENTS */
if(user) {
    let savedName = localStorage.getItem("user_name") || "User";
    let savedImage = localStorage.getItem("user_image") || "";
    
    if(savedImage) {
        document.getElementById("profile").src = savedImage;
    } else {
        document.getElementById("profile").src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(savedName) + "&background=2f62e9&color=fff";
    }
}
document.getElementById("profile").onclick = function(){ location.href = 'dashboard.html'; };

/* INJECTION SANITIZATION STRING LOGIC */
function escapeHTML(str){
    return String(str).replace(/[&<>"']/g, function(m){
        return({
            '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
        })[m]
    });
}

/* ASYNC POOL DATA RECOVERY FROM CLOUD DATABASE */
async function getDB(db){
    try{
        let res = await fetch(API + "?db=" + db + "&t=" + Date.now());
        let data = await res.json();
        return Array.isArray(data) ? data : [];
    }catch(err){
        console.error(err);
        return [];
    }
}

/* THUMBNAIL ID CONVERTOR SYSTEM */
function driveImage(link){
    if(!link) return "https://images.unsplash.com/photo-1543002588-bfa74002ed7e?q=80&w=600&auto=format&fit=crop";
    try{
        let id = "";
        if(link.includes("id=")) id = link.split("id=")[1].split("&")[0];
        else if(link.includes("/file/d/")) id = link.split("/file/d/")[1].split("/")[0];
        if(id) return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
    }catch(e){}
    return link;
}

/* FEED BUILD CONTAINER LOGIC SYSTEM LOOP */
async function loadProducts(){
    let box = document.getElementById("products");
    let products = await getDB("products");
    
    // Filters approved rows matching parameters smoothly
    products = products.filter(function(p){ return p.ai_status === "approved"; });

    if(products.length === 0){
        box.innerHTML = `
        <div class="no-data">
            <i class="fa-solid fa-folder-open" style="font-size:40px; color:var(--text-muted); margin-bottom:16px; display:block;"></i>
            <h3>No Approved Digital Assets Found</h3>
        </div>`;
        return;
    }

    products.reverse();
    let html = "";

    products.forEach(function(p){
        html += `
        <div class="card">
            <div class="image-wrapper">
                <img src="${driveImage(p.image)}" alt="Ebook Cover Preview" onclick="openProduct('${p.id}')" loading="lazy">
            </div>
            <h3>${escapeHTML(p.title || "Untitled Premium Ebook")}</h3>
            <div class="price-tag">₹${Number(p.price || 0)}</div>
            
            <button class="btn-buy" onclick="buyNow(event,'${p.id}')">
                <i class="fa-solid fa-bolt"></i> Buy Ebook
            </button>
            
            <button class="btn-cart" onclick="addCart(event,'${p.id}')">
                <i class="fa-solid fa-cart-plus"></i> Add to Cart
            </button>
        </div>
        `;
    });

    box.innerHTML = html;
}

loadProducts();

function openProduct(id){ location.href = "book.html?id=" + id; }

function buyNow(e, id){
    e.stopPropagation();
    if(!user){
        showToast("<i class='fa-solid fa-circle-exclamation'></i> Login is required to checkout.");
        setTimeout(function(){ location.href = "login.html"; }, 1500);
        return;
    }
    localStorage.setItem("buyProduct", id);
    location.href = "payment.html";
}

function addCart(e, id){
    e.stopPropagation();
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    if(cart.indexOf(id) !== -1){
        showToast("<i class='fa-solid fa-info-circle'></i> Item already present inside basket.");
        return;
    }
    cart.push(id);
    localStorage.setItem("cart", JSON.stringify(cart));
    showToast("<i class='fa-solid fa-circle-check'></i> Added to Basket successfully!");
}

function showToast(msg){
    let div = document.createElement("div");
    div.className = "toast";
    div.innerHTML = msg;
    document.body.appendChild(div);
    setTimeout(function(){ div.remove(); }, 3000);
}
</script>

</body>
</html>
