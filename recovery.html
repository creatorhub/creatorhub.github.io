<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recover Account</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:35px;
border-radius:18px;
width:90%;
max-width:420px;
}

h2{
text-align:center;
color:#22c55e;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Recover Account</h2>

<input id="email" placeholder="Enter your email">

<button onclick="recover()">Recover Account</button>

</div>

<script>

function recover(){

let email=document.getElementById("email").value

alert("If account exists, login using this email: "+email)

}

</script>

</body>
</html>
