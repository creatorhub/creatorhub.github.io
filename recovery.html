<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recover Account • CreatorHub</title><style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
--border:#1f2937;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
animation:fadePage .6s ease;
}

/* CARD */

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:35px;

border-radius:18px;

width:100%;

max-width:600px;

border:1px solid var(--border);

box-shadow:0 20px 50px rgba(0,0,0,.7);

animation:slideUp .7s ease;

}

/* TITLE */

h1{
text-align:center;
color:var(--accent);
margin-top:0;
}

/* INFO */

.info{

background:#0f172a;

padding:16px;

border-radius:12px;

margin-bottom:20px;

font-size:14px;

line-height:1.6;

border:1px solid #22c55e33;

}

/* INPUT */

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
border:1px solid #1f2937;
transition:.2s;
}

input:focus{
outline:none;
border:1px solid #22c55e;
box-shadow:0 0 6px #22c55e55;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:16px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 10px #22c55e55;
}

/* SECOND BUTTON */

.secondary{
background:#1f2937;
color:white;
}

/* MOBILE */

@media(max-width:600px){

.card{
padding:25px;
}

}

/* ANIMATION */

@keyframes slideUp{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadePage{

0%{
opacity:0;
}

100%{
opacity:1;
}

}

</style></head><body><div class="card"><h1>Recover Your Account</h1><div class="info">If you recently deleted your CreatorHub account, you can recover it within <b>90 days</b>.

Your data is temporarily stored during the recovery period.

Steps to recover your account:

• Enter your registered email
• Verify the OTP sent to your email
• Restore your account access

</div><input id="email" placeholder="Enter your registered email"><button onclick="sendOTP()">
Send OTP
</button><input id="otp" placeholder="Enter OTP"><button onclick="verifyOTP()">
Verify OTP
</button><button onclick="recoverAccount()">
Recover Account
</button><button class="secondary" onclick="location.href='login.html'">
Back to Login
</button></div><script>

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

/* SEND OTP */

async function sendOTP(){

let email=document.getElementById("email").value.trim()

if(!email){
alert("Enter email")
return
}

let form=new FormData()

form.append("action","send_otp")
form.append("email",email)

let res=await fetch(API,{method:"POST",body:form})

let data=await res.json()

if(data.success){
alert("OTP sent to your email")
}else{
alert("Failed to send OTP")
}

}

/* VERIFY OTP */

async function verifyOTP(){

let email=document.getElementById("email").value
let otp=document.getElementById("otp").value

let form=new FormData()

form.append("action","verify_otp")
form.append("email",email)
form.append("otp",otp)

let res=await fetch(API,{method:"POST",body:form})

let data=await res.json()

if(data.success){
alert("OTP verified")
}else{
alert("Invalid OTP")
}

}

/* RECOVER ACCOUNT */

async function recoverAccount(){

let email=document.getElementById("email").value

let form=new FormData()

form.append("action","recover_account")
form.append("email",email)

let res=await fetch(API,{method:"POST",body:form})

let data=await res.json()

if(data.success){

alert("Account recovered successfully")

location.href="login.html"

}else{

alert(data.message || "Recovery failed")

}

}

</script></body>
</html>
