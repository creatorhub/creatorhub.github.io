<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Dashboard</title><style>

:root{
--bg:#020617;
--text:#ffffff;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--text);
}

/* TOPBAR */

.topbar{
display:flex;
align-items:center;
padding:14px;
background:var(--bg);
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
color:var(--accent);
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
font-size:18px;
}

.homeBtn{
padding:8px 12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
cursor:pointer;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:16px;
}

.profile{
width:48px;
height:48px;
border-radius:50%;
border:2px solid var(--accent);
cursor:pointer;
}

/* USER */

.top{
text-align:center;
padding:35px;
background:linear-gradient(90deg,#2563eb,#22c55e);
border-radius:0 0 25px 25px;
}

.name{
font-size:22px;
font-weight:bold;
}

.email{
opacity:.9;
}

/* DASHBOARD */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
}

.card{
background:#111827;
padding:22px;
border-radius:16px;
cursor:pointer;
text-align:center;
border:1px solid #1f2937;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* LOGOUT */

.logout{
margin:20px;
}

.logout button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-weight:bold;
cursor:pointer;
}

</style></head><body><div class="topbar">
<div class="back" onclick="location.href='index.html'">⬅</div>
<div class="title">CreatorHub</div>
<button class="homeBtn" onclick="location.href='index.html'">🏠 Home</button>
</div><div class="header">
CreatorHub Dashboard
<img id="profile" class="profile" onclick="go('profile.html')">
</div><div class="top">
<div id="name" class="name">User</div>
<div id="email" class="email">email</div>
</div><div class="container"><div class="card" onclick="go('products.html')">
Browse Products
</div><div class="card" onclick="go('library.html')">
My Library
</div><div class="card" onclick="go('orders.html')">
Orders
</div><div class="card" onclick="go('wallet.html')">
Wallet
</div><div class="card" onclick="go('upload.html')">
Upload Ebook
</div><div class="card" onclick="openSeller()">
Become Seller
</div><div class="card" onclick="go('delete-account.html')">
⚠ Delete My Account
</div><div id="adminBox" class="card" style="display:none" onclick="go('admin.html')">
⚙ Admin Panel
</div></div><div class="logout">
<button onclick="logout()">Logout</button>
</div><script>

const ADMIN="ayushprajpati6@gmail.com"

let user=null

try{
user=JSON.parse(localStorage.getItem("user"))
}catch{}

if(!user || !user.email){
location.href="login.html"
}

document.getElementById("name").innerText=user.name||"User"
document.getElementById("email").innerText=user.email

document.getElementById("profile").src=
localStorage.getItem("profile_"+user.email)||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

if(user.email===ADMIN){
document.getElementById("adminBox").style.display="block"
}

function go(page){
location.href=page
}

function logout(){
localStorage.removeItem("user")
location.href="login.html"
}

async function openSeller(){
location.href="seller-apply.html"
}

</script></body>
</html>
