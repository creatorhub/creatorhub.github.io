<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Dashboard</title>

<style>

:root{
--bg:#020617;
--text:#ffffff;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:var(--bg);
box-shadow:0 4px 15px rgba(0,0,0,.3);
position:sticky;
top:0;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
}

.homeBtn{
margin-left:10px;
padding:6px 12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:13px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:15px;
box-shadow:0 5px 20px black;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
border:2px solid #22c55e;
cursor:pointer;
}

.top{
text-align:center;
padding:30px;
background:linear-gradient(90deg,#2563eb,#22c55e);
border-radius:0 0 25px 25px;
}

.name{
font-size:22px;
font-weight:bold;
}

.email{
opacity:.9;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
}

.card{
background:#111827;
padding:18px;
border-radius:15px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.card:hover{
transform:translateY(-5px);
}

.logout{
margin:20px;
}

.logout button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='index.html'">⬅</div>
<div class="title">CreatorHub</div>
<button class="homeBtn" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div class="header">
CreatorHub Dashboard
<img id="profile" class="profile" onclick="go('profile.html')">
</div>

<div class="top">
<div id="name" class="name">User</div>
<div id="email" class="email">email</div>
</div>

<div class="container">

<div class="card" onclick="go('products.html')">
📚 Browse Products
</div>

<div class="card" onclick="go('library.html')">
📖 My Library
</div>

<div class="card" onclick="go('orders.html')">
📦 Orders
</div>

<div class="card" onclick="go('wallet.html')">
💰 Wallet
</div>

<div class="card" onclick="go('upload.html')">
⬆ Upload Ebook
</div>

<div class="card" onclick="openSeller()">
🧑‍💻 Become Seller
</div>

<div class="card" onclick="deleteAccount()">
⚠ Delete My Account
</div>

<div id="adminBox" class="card" style="display:none" onclick="go('admin.html')">
👑 Admin Panel
</div>

</div>

<div class="logout">
<button onclick="logout()">Logout</button>
</div>

<script>

/* APIs */

const API_PRODUCTS="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"
const API_PAYMENT="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

const ADMIN="ayushprajpati6@gmail.com"

/* SAFE USER LOAD */

let user=null

try{
user=JSON.parse(localStorage.getItem("user"))
}catch{}

if(!user || !user.email){

location.href="login.html"

}

/* PROFILE */

document.getElementById("name").innerText=user.name||"User"
document.getElementById("email").innerText=user.email

document.getElementById("profile").src=
localStorage.getItem("profile_"+user.email)||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

/* ADMIN PANEL */

if(user.email===ADMIN){

document.getElementById("adminBox").style.display="block"

}

/* NAVIGATION */

function go(page){

if(!page) return

location.href=page

}

/* DATABASE */

async function getDB(db){

try{

let api=(db==="wallets"||db==="orders")
?API_PAYMENT
:API_PRODUCTS

let res=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await res.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* BECOME SELLER */

async function openSeller(){

try{

let sellers=await getDB("sellers")

let exist=sellers.find(s=>s.email===user.email)

if(exist){

if(exist.status==="pending"){
alert("Seller request already pending")
return
}

if(exist.status==="approved"){
alert("You are already a seller")
return
}

}

location.href="seller-apply.html"

}catch{

alert("Server error")

}

}

/* DELETE ACCOUNT */

function deleteAccount(){

let ok=confirm("⚠️ Your account will be removed from this device.\nContinue?")

if(!ok) return

localStorage.clear()

alert("Account removed")

location.href="login.html"

}

/* LOGOUT */

function logout(){

localStorage.removeItem("user")

location.href="login.html"

}

</script>

</body>
</html>
