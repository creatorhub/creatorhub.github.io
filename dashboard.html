<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Dashboard</title><style>

:root{
--bg:#020617;
--text:#ffffff;
--card:#111827;
--accent:#22c55e;
}

/* PAGE */

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--text);
animation:fadePage .6s ease;
}

/* TOPBAR */

.topbar{
display:flex;
align-items:center;
padding:14px;
background:var(--bg);
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
z-index:99;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
color:var(--accent);
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
font-size:18px;
}

.homeBtn{
padding:8px 12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
cursor:pointer;
font-size:13px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:16px;
box-shadow:0 5px 20px black;
}

.profile{
width:48px;
height:48px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--accent);
cursor:pointer;
transition:.3s;
}

.profile:hover{
transform:scale(1.05);
}

/* USER INFO */

.top{
text-align:center;
padding:35px;
background:linear-gradient(90deg,#2563eb,#22c55e);
border-radius:0 0 25px 25px;
}

.name{
font-size:22px;
font-weight:bold;
}

.email{
opacity:.9;
font-size:14px;
}

/* DASHBOARD */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
animation:fadeUp .7s ease;
}

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:22px;

border-radius:16px;

cursor:pointer;

transition:.3s;

box-shadow:0 0 20px rgba(0,0,0,.6);

text-align:center;

font-size:16px;

border:1px solid #1f2937;

}

.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 15px 40px rgba(0,0,0,.8);
}

/* LOGOUT */

.logout{
margin:20px;
}

.logout button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ef4444,#dc2626);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.logout button:hover{
transform:scale(1.03);
}

/* MOBILE */

@media(max-width:768px){

.container{
grid-template-columns:repeat(2,1fr);
}

}

/* ANIMATION */

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadePage{

0%{
opacity:0;
}

100%{
opacity:1;
}

}

</style></head><body><div class="topbar">
<div class="back" onclick="location.href='index.html'">⬅</div>
<div class="title">CreatorHub</div>
<button class="homeBtn" onclick="location.href='index.html'">🏠 Home</button>
</div><div class="header">
CreatorHub Dashboard
<img id="profile" class="profile" onclick="go('profile.html')">
</div><div class="top">
<div id="name" class="name">User</div>
<div id="email" class="email">email</div>
</div><div class="container"><div class="card" onclick="go('products.html')">
📚 Browse Products
</div><div class="card" onclick="go('library.html')">
📖 My Library
</div><div class="card" onclick="go('orders.html')">
🧾 Orders
</div><div class="card" onclick="go('wallet.html')">
💰 Wallet
</div><div class="card" onclick="go('upload.html')">
⬆ Upload Ebook
</div><div class="card" onclick="openSeller()">
🧑‍💻 Become Seller
</div><div class="card" onclick="deleteAccount()">
⚠ Delete My Account
</div><div id="adminBox" class="card" style="display:none" onclick="go('admin.html')">
⚙ Admin Panel
</div></div><div class="logout">
<button onclick="logout()">Logout</button>
</div><script>

/* APIs */

const API_PRODUCTS="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"
const API_PAYMENT="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

const ADMIN="ayushprajpati6@gmail.com"

/* USER */

let user=null

try{
user=JSON.parse(localStorage.getItem("user"))
}catch{}

if(!user || !user.email){
location.href="login.html"
}

/* PROFILE */

document.getElementById("name").innerText=user.name||"User"
document.getElementById("email").innerText=user.email

document.getElementById("profile").src=
localStorage.getItem("profile_"+user.email)||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

/* ADMIN PANEL */

if(user.email===ADMIN){
document.getElementById("adminBox").style.display="block"
}

/* NAV */

function go(page){
location.href=page
}

/* DATABASE */

async function getDB(db){

try{

let api=(db==="wallets"||db==="orders")
?API_PAYMENT
:API_PRODUCTS

let res=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await res.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* SELLER */

async function openSeller(){

let sellers=await getDB("sellers")

let exist=sellers.find(s=>s.email===user.email)

if(exist){

if(exist.status==="pending"){
alert("Seller request already pending")
return
}

if(exist.status==="approved"){
alert("You are already a seller")
return
}

}

location.href="seller-apply.html"

}

/* DELETE */

function deleteAccount(){

let ok=confirm("⚠️ Your account will be removed from this device.\nContinue?")

if(!ok) return

localStorage.clear()

alert("Account removed")

location.href="login.html"

}

/* LOGOUT */

function logout(){
localStorage.removeItem("user")
location.href="login.html"
}

</script></body>
</html>
