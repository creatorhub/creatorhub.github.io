<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Dashboard</title>

<style>
:root{
--bg:#020617;
--text:#ffffff;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:var(--bg);
box-shadow:0 4px 15px rgba(0,0,0,.3);
position:sticky;
top:0;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
}

.homeBtn{
margin-left:10px;
padding:6px 12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:13px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:15px;
box-shadow:0 5px 20px black;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
border:2px solid #22c55e;
cursor:pointer;
}

.top{
text-align:center;
padding:30px;
background:linear-gradient(90deg,#2563eb,#22c55e);
border-radius:0 0 25px 25px;
}

.name{
font-size:22px;
font-weight:bold;
}

.email{
opacity:.9;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
}

.card{
background:#111827;
padding:18px;
border-radius:15px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.card:hover{
transform:translateY(-5px);
}

.logout{
margin:20px;
}

.logout button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='index.html'">⬅</div>
<div class="title">CreatorHub</div>
<button class="homeBtn" onclick="location.href='index.html'">🏠 Home</button>
</div>

<div class="header">
CreatorHub Dashboard
<img id="profile" class="profile" onclick="go('profile.html')">
</div>

<div class="top">
<div id="name" class="name">User</div>
<div id="email" class="email">email</div>
</div>

<div class="container">
<div class="card" onclick="go('products.html')">Browse Products</div>
<div class="card" onclick="go('library.html')">My Library</div>
<div class="card" onclick="go('orders.html')">Orders</div>
<div class="card" onclick="go('wallet.html')">Wallet</div>
<div class="card" onclick="go('upload.html')">Upload Ebook</div>
<div class="card" onclick="go('seller-apply.html')">Become Seller</div>
<div class="card" onclick="deleteAccount()">Delete My Account</div>
<div id="adminBox" class="card" style="display:none" onclick="go('admin.html')">Admin Panel</div>
</div>

<div class="logout">
<button onclick="logout()">Logout</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw7xwjcEGIdj3xS8q7qhRNCSbch2uVsXFGFJYWgMNU4UPA-2BSfhq79PHsQ_oCEeYTm/exec";
const ADMIN="ayushprajpati6@gmail.com";

let user=JSON.parse(localStorage.getItem("user"));

if(!user || !user.email){
location.href="login.html";
}

document.getElementById("name").innerText=user.name||"User";
document.getElementById("email").innerText=user.email;

document.getElementById("profile").src=
localStorage.getItem("profile_"+user.email)||
"https://cdn-icons-png.flaticon.com/512/149/149071.png";

function go(page){
location.href=page;
}

async function getDB(db){
let res=await fetch(API+"?db="+db+"&t="+Date.now());
let data=await res.json();
return Array.isArray(data)?data:[];
}

async function saveDB(db,data){
await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({db,data})
});
}

/* LOAD USER */

async function loadUser(){

let users=await getDB("users");

let index=users.findIndex(u=>u.email===user.email);

if(index===-1){

users.push({
email:user.email,
name:user.name,
seller:false,
banned:false,
deleted:false,
deleteDate:"",
created:new Date().toLocaleString()
});

await saveDB("users",users);

}

/* CHECK DELETED ACCOUNT */

if(users[index]?.deleted){

let deleteDate=new Date(users[index].deleteDate);

let diff=(Date.now()-deleteDate)/(1000*60*60*24);

if(diff<7){

alert("Account deleted but recoverable for 7 days");

location.href="recover.html";
return;

}

}

/* ADMIN PANEL */

if(user.email===ADMIN){
document.getElementById("adminBox").style.display="block";
}

}

loadUser();

/* DELETE ACCOUNT */

async function deleteAccount(){

let ok=confirm(
"⚠️ Account will be disabled for 7 days.\nYou can recover anytime."
);

if(!ok) return;

let users=await getDB("users");

let index=users.findIndex(u=>u.email===user.email);

if(index==-1){
alert("User not found");
return;
}

users[index].deleted=true;
users[index].deleteDate=new Date().toISOString();

await saveDB("users",users);

localStorage.clear();

alert("Account disabled for 7 days");

location.href="login.html";

}

/* AUTO CLEANUP AFTER 7 DAYS */

async function cleanupDeleted(){

let users=await getDB("users");
let wallets=await getDB("wallet");

let changed=false;

users=users.filter(u=>{

if(!u.deleted) return true;

let deleteDate=new Date(u.deleteDate);
let diff=(Date.now()-deleteDate)/(1000*60*60*24);

if(diff>=7){

let wallet=wallets.find(w=>w.email===u.email);

if(wallet){

let adminWallet=wallets.find(w=>w.email===ADMIN);

if(adminWallet){
adminWallet.balance=
Number(adminWallet.balance||0)+Number(wallet.balance||0);
}else{
wallets.push({
email:ADMIN,
balance:Number(wallet.balance||0)
});
}

wallets=wallets.filter(w=>w.email!==u.email);

}

changed=true;

return false;

}

return true;

});

if(changed){
await saveDB("users",users);
await saveDB("wallet",wallets);
}

}

cleanupDeleted();

/* LOGOUT */

function logout(){
localStorage.removeItem("user");
location.href="login.html";
}

</script>

</body>
</html>
