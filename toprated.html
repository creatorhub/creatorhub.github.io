<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Highest Rated Books</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
padding:18px;
}

/* LIST */

.list{
display:flex;
flex-direction:column;
gap:15px;
}

/* CARD */

.card{
display:flex;
gap:15px;
background:#111827;
padding:12px;
border-radius:12px;
align-items:center;
box-shadow:0 10px 20px black;
cursor:pointer;
}

/* IMAGE */

.card img{
width:90px;
aspect-ratio:2/3;
object-fit:cover;
border-radius:8px;
}

/* INFO */

.info{
flex:1;
}

.name{
font-size:17px;
font-weight:bold;
}

.rating{
color:gold;
margin-top:4px;
font-size:14px;
}

.buy{
padding:8px 12px;
border:none;
background:#22c55e;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:6px;
}

.badge{
font-size:11px;
background:gold;
color:black;
padding:2px 6px;
border-radius:6px;
margin-left:6px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="history.back()">⬅</div>

<div class="title">
⭐ Highest Rated Books
</div>

</div>

<div class="container">

<div id="books" class="list">
Loading...
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";


/* DRIVE IMAGE */

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"
}

}catch{}

return link

}


/* STAR DISPLAY */

function stars(r){

r=Math.round(Number(r||0))

let s=""

for(let i=1;i<=5;i++){

if(i<=r){
s+="⭐"
}else{
s+="☆"
}

}

return s

}


/* LOAD BOOKS */

async function load(){

try{

let r=await fetch(API+"?db=products&t="+Date.now())

let products=await r.json()

if(!Array.isArray(products)) products=[]


/* SORT BY RATING */

products.sort((a,b)=>(b.rating||0)-(a.rating||0))


let box=document.getElementById("books")

let html=""

products.slice(0,20).forEach((p,i)=>{

html+=`

<div class="card" onclick="openBook('${p.id}')">

<img src="${driveImage(p.image)}">

<div class="info">

<div class="name">

${p.title || "Untitled"}

${i<3?'<span class="badge">Top Rated</span>':''}

</div>

<div class="rating">

${stars(p.rating)} (${p.rating||0})

</div>

<button class="buy"
onclick="buyNow(event,'${p.id}')">
Buy
</button>

</div>

</div>

`

})

box.innerHTML=html || "No Books Found"

}catch{

document.getElementById("books").innerHTML="Books Loading Failed"

}

}


/* OPEN DETAILS */

function openBook(id){

location.href="ebook.html?id="+id

}


/* BUY */

function buyNow(e,id){

e.stopPropagation()

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}


load()

</script>

</body>
</html>
