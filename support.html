<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Support</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

/* BODY */

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
height:100dvh;
display:flex;
flex-direction:column;
animation:fadePage .4s ease;
}

/* PAGE ANIMATION */

@keyframes fadePage{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
border-bottom:1px solid #1f2937;
flex-shrink:0;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
font-size:18px;
}

/* CHAT AREA */

.chat{
flex:1;
min-height:0;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

/* WELCOME */

.welcome{
background:#111827;
padding:18px;
border-radius:14px;
border:1px solid #1f2937;
}

.welcome h3{
margin:0 0 6px;
color:#22c55e;
}

/* QUICK BUTTONS */

.quick{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.quick button{
background:#1f2937;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:13px;
transition:.2s;
}

.quick button:hover{
background:#22c55e;
color:black;
transform:scale(1.05);
}

/* MESSAGE */

.msg{
margin:8px 0;
padding:12px 14px;
max-width:85%;
border-radius:14px;
font-size:14px;
line-height:1.5;
word-wrap:break-word;
animation:msgSlide .25s ease;
}

/* MESSAGE ANIMATION */

@keyframes msgSlide{
from{opacity:0;transform:translateY(10px) scale(.95);}
to{opacity:1;transform:translateY(0) scale(1);}
}

/* USER */

.user{
margin-left:auto;
background:linear-gradient(90deg,#2563eb,#3b82f6);
border-bottom-right-radius:4px;
box-shadow:0 3px 10px rgba(0,0,0,.4);
}

/* BOT */

.bot{
margin-right:auto;
background:#111827;
border:1px solid #1f2937;
color:#22c55e;
border-bottom-left-radius:4px;
box-shadow:0 3px 10px rgba(0,0,0,.4);
}

/* TYPING DOTS */

.typing{
display:flex;
gap:5px;
}

.typing span{
width:6px;
height:6px;
background:#22c55e;
border-radius:50%;
animation:typing 1s infinite;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes typing{
0%,80%,100%{opacity:.2;transform:translateY(0);}
40%{opacity:1;transform:translateY(-4px);}
}

/* INPUT AREA */

.inputBox{
display:flex;
align-items:flex-end;
padding:10px;
background:#020617;
border-top:1px solid #1f2937;
gap:10px;
position:sticky;
bottom:0;
}

/* TEXTAREA */

textarea{
flex:1;
resize:none;
max-height:120px;
padding:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
font-size:14px;
line-height:1.4;
}

/* SEND BUTTON */

.sendBtn{
width:45px;
height:45px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:.25s;
}

.sendBtn:hover{
transform:scale(1.1);
box-shadow:0 0 15px #22c55e;
}

</style>

</head>

<body>

<div class="header">
<div class="back" onclick="location.href='index.html'">⬅</div>
<div class="title">CreatorHub Support</div>
<div style="width:40px"></div>
</div>

<div class="chat" id="chat">

<div class="welcome">

<h3>How can we help you?</h3>
<p>Ask anything related to CreatorHub marketplace.</p>

<div class="quick">
<button onclick="quick('How to upload ebook?')">Upload ebook</button>
<button onclick="quick('How to withdraw earnings?')">Withdraw</button>
<button onclick="quick('Seller approval time')">Seller approval</button>
<button onclick="quick('Payment issue')">Payment issue</button>
</div>

</div>

</div>

<div class="inputBox">

<textarea id="msg"
placeholder="Type your message..."
rows="1"
onkeydown="enterSend(event)"></textarea>

<button class="sendBtn" onclick="send()">➤</button>

</div>

<script>

const SUPPORT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"
const CHAT_API="https://script.google.com/macros/s/AKfycbzMCnhAdxOSnSl7tO6u3yZZEARctzq9kQIenT-PoO8Y68gN5kXWViEFD01BiRObxOY1/exec"

function quick(q){
document.getElementById("msg").value=q
send()
}

function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")
div.className="msg "+type
div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function enterSend(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
send()
}
}

const textarea=document.getElementById("msg")

textarea.addEventListener("input",()=>{
textarea.style.height="auto"
textarea.style.height=textarea.scrollHeight+"px"
})

async function send(){

let input=document.getElementById("msg")
let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""
textarea.style.height="auto"

let loading=document.createElement("div")
loading.className="msg bot"
loading.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`

document.getElementById("chat").appendChild(loading)

let reply=""

try{

let res=await fetch(SUPPORT_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"support",message:text})
})

let data=await res.json()
reply=data.reply

}catch{}

if(!reply){

try{

let res=await fetch(CHAT_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()
reply=data.reply

}catch{}

}

loading.remove()

addMessage(reply || "Support team will respond soon.","bot")

}

</script>

</body>
  </html>
