<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Support</title><style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
background:#0f172a;
font-weight:bold;
text-align:center;
}

.chat{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
margin:10px 0;
padding:10px;
max-width:80%;
border-radius:10px;
}

.user{
margin-left:auto;
background:#2563eb;
}

.ai{
background:#111827;
color:#22c55e;
}

.inputBox{
display:flex;
background:#0f172a;
padding:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
background:#22c55e;
color:white;
border-radius:8px;
cursor:pointer;
}

</style></head><body><div class="header">CreatorHub AI Support</div><div class="chat" id="chat"></div><div class="inputBox"><input id="msg" placeholder="Ask anything..."><button onclick="send()">Send</button>

</div><script>

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="msg "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function send(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"support",
message:text
})
})

let data=await res.json()

addMessage(data.reply,"ai")

}

</script></body>
</html>
