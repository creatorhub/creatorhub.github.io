<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Support</title><style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
--border:#1f2937;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
border-bottom:1px solid var(--border);
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
font-size:18px;
}

/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
scroll-behavior:smooth;
}

/* WELCOME */

.welcome{
background:var(--card);
padding:18px;
border-radius:14px;
border:1px solid var(--border);
}

.welcome h3{
margin:0 0 6px;
color:var(--accent);
}

/* QUICK BUTTONS */

.quick{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.quick button{
background:#1f2937;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:13px;
transition:.2s;
}

.quick button:hover{
background:var(--accent);
color:black;
}

/* MESSAGE */

.msg{
margin:6px 0;
padding:12px 14px;
max-width:85%;
border-radius:14px;
font-size:14px;
line-height:1.5;
word-wrap:break-word;
}

.user{
margin-left:auto;
background:linear-gradient(90deg,#2563eb,#3b82f6);
}

.bot{
background:var(--card);
border:1px solid var(--border);
}

/* TYPING */

.typing{
display:flex;
gap:4px;
}

.typing span{
width:6px;
height:6px;
background:var(--accent);
border-radius:50%;
animation:typing 1s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes typing{
0%,80%,100%{opacity:.2;transform:translateY(0)}
40%{opacity:1;transform:translateY(-4px)}
}

/* INPUT */

.inputBox{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid var(--border);
gap:10px;
}

textarea{
flex:1;
resize:none;
max-height:120px;
padding:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
font-size:14px;
}

.sendBtn{
width:45px;
height:45px;
border:none;
border-radius:10px;
background:var(--accent);
color:black;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

</style></head><body><div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">CreatorHub Support</div>
<div style="width:40px"></div>
</div><div class="chat" id="chat"><div class="welcome">
<h3>How can we help you?</h3>
<p>Ask anything related to CreatorHub marketplace.</p><div class="quick">
<button onclick="quick('How to upload ebook?')">Upload ebook</button>
<button onclick="quick('How to withdraw earnings?')">Withdraw</button>
<button onclick="quick('Seller approval time')">Seller approval</button>
<button onclick="quick('Payment issue')">Payment issue</button>
<button onclick="quick('How to reset password?')">Reset password</button>
<button onclick="quick('How to recover deleted account?')">Recover account</button>
</div></div></div><div class="inputBox"><textarea id="msg"
placeholder="Type your message..."
rows="1"
onkeydown="enterSend(event)"></textarea><button class="sendBtn" onclick="send()">➤</button>

</div><script>

/* API */

const SUPPORT_API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

/* QUICK */

function quick(q){
document.getElementById("msg").value=q
send()
}

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")
div.className="msg "+type
div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* ENTER SEND */

function enterSend(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
send()
}
}

/* AUTO RESIZE */

const textarea=document.getElementById("msg")

textarea.addEventListener("input",()=>{
textarea.style.height="auto"
textarea.style.height=textarea.scrollHeight+"px"
})

/* SEND MESSAGE */

async function send(){

let input=document.getElementById("msg")
let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""
textarea.style.height="auto"

/* typing animation */

let loading=document.createElement("div")
loading.className="msg bot"

loading.innerHTML=`<div class="typing">
<span></span>
<span></span>
<span></span>
</div>`

document.getElementById("chat").appendChild(loading)

let reply=""

try{

let res=await fetch(
SUPPORT_API+"?action=support&message="+encodeURIComponent(text)
)

let data=await res.json()

reply=data.reply || "No response"

}catch(err){

reply="Support system is busy. Please try again."

}

loading.remove()

addMessage(reply,"bot")

}

</script></body>
</html>
