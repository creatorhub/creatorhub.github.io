<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Support</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:var(--accent);
font-size:18px;
}

/* CHAT AREA */

.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

/* WELCOME CARD */

.welcome{
background:#111827;
padding:18px;
border-radius:14px;
margin-bottom:15px;
border:1px solid #1f2937;
}

.welcome h3{
margin:0 0 6px;
color:#22c55e;
}

.quick{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.quick button{
background:#1f2937;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:13px;
}

.quick button:hover{
background:#22c55e;
color:black;
}

/* MESSAGE */

.msg{
margin:10px 0;
padding:12px;
max-width:75%;
border-radius:12px;
font-size:14px;
line-height:1.5;
}

.user{
margin-left:auto;
background:#2563eb;
}

.bot{
background:#111827;
border:1px solid #1f2937;
color:#22c55e;
}

/* INPUT */

.inputBox{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #1f2937;
gap:10px;
}

textarea{
flex:1;
resize:none;
max-height:120px;
padding:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
font-size:14px;
}

.sendBtn{
width:45px;
height:45px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="back" onclick="location.href='index.html'">⬅</div>

<div class="title">CreatorHub Support</div>

<div style="width:40px"></div>

</div>


<!-- CHAT -->

<div class="chat" id="chat">

<div class="welcome">

<h3>How can we help you?</h3>

<p>Ask anything related to CreatorHub marketplace.</p>

<div class="quick">

<button onclick="quick('How to upload ebook?')">Upload ebook</button>

<button onclick="quick('How to withdraw earnings?')">Withdraw</button>

<button onclick="quick('Seller approval time')">Seller approval</button>

<button onclick="quick('Payment issue')">Payment issue</button>

</div>

</div>

</div>


<!-- INPUT -->

<div class="inputBox">

<textarea id="msg"
placeholder="Type your message..."
rows="1"
onkeydown="enterSend(event)"></textarea>

<button class="sendBtn" onclick="send()">➤</button>

</div>


<script>

/* APIs */

const SUPPORT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const CHAT_API="https://script.google.com/macros/s/AKfycbzMCnhAdxOSnSl7tO6u3yZZEARctzq9kQIenT-PoO8Y68gN5kXWViEFD01BiRObxOY1/exec"

/* QUICK QUESTION */

function quick(q){

document.getElementById("msg").value=q

send()

}

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="msg "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* ENTER SEND */

function enterSend(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault()

send()

}

}

/* AUTO HEIGHT */

const textarea=document.getElementById("msg")

textarea.addEventListener("input",()=>{

textarea.style.height="auto"

textarea.style.height=textarea.scrollHeight+"px"

})

/* SEND */

async function send(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""
textarea.style.height="auto"

let loading=document.createElement("div")

loading.className="msg bot"

loading.innerText="Please wait..."

document.getElementById("chat").appendChild(loading)

let reply=""

try{

let res=await fetch(SUPPORT_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"support",
message:text
})
})

let data=await res.json()

reply=data.reply

}catch{}

if(!reply){

try{

let res=await fetch(CHAT_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
})

let data=await res.json()

reply=data.reply

}catch{}

}

loading.remove()

addMessage(reply || "Support team will respond soon.","bot")

}

</script>

</body>
</html>
