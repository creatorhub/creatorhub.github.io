<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorHub Support</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#050b14;color:#fff}
a{text-decoration:none;color:white}
button{cursor:pointer}

.navbar{
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
background:#07111d;
border-bottom:1px solid #1f2937;
}

.logo{
font-size:34px;
font-weight:bold;
color:#22c55e;
}

.nav-links a{margin:0 15px}

.search-nav{
display:flex;
align-items:center;
gap:15px;
}

.search-nav input{
padding:12px;
background:#111827;
border:none;
color:white;
border-radius:10px;
}

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:50px;
}

.hero-left h1{
font-size:70px;
line-height:1.1;
}

.hero-left span{color:#22c55e}
.hero-left p{margin:20px 0;color:#bbb}

.hero-search{
display:flex;
margin-top:20px;
}

.hero-search input{
width:400px;
padding:15px;
background:#111827;
border:none;
color:white;
border-radius:10px 0 0 10px;
}

.hero-search button{
padding:15px 30px;
background:#22c55e;
border:none;
font-weight:bold;
border-radius:0 10px 10px 0;
}

.hero-right img{
width:450px;
filter:drop-shadow(0 0 20px #22c55e);
}

.section-title{
padding:0 50px;
font-size:28px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:20px;
padding:0 50px 40px;
}

.card{
background:#0b1623;
padding:25px;
border-radius:16px;
border:1px solid #1f2937;
}

.card i{
font-size:35px;
color:#22c55e;
margin-bottom:15px;
}

.card button{
margin-top:15px;
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:8px;
}

.support-grid{
display:grid;
grid-template-columns:1.2fr 1fr 1fr;
gap:20px;
padding:0 50px 40px;
}

.box{
background:#0b1623;
padding:25px;
border-radius:16px;
border:1px solid #1f2937;
}

.faq-item{
padding:15px 0;
border-bottom:1px solid #1f2937;
cursor:pointer;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
background:#111827;
border:none;
color:white;
border-radius:8px;
}

.send-btn{
width:100%;
padding:14px;
margin-top:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-weight:bold;
}

.chat-box{
height:220px;
overflow-y:auto;
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.msg{padding:10px;margin:10px 0;border-radius:10px}
.user{background:#2563eb}
.bot{background:#1f2937}

.delivery{
padding:0 50px 40px;
}

.delivery-box{
background:#0b1623;
padding:30px;
border-radius:16px;
text-align:center;
}

.footer-top{
display:grid;
grid-template-columns:repeat(4,1fr);
padding:30px 50px;
border-top:1px solid #1f2937;
}

footer{
background:#07111d;
padding:30px 50px;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
}

.footer-grid h3{color:#22c55e}

@media(max-width:900px){
.cards,.support-grid,.footer-grid,.footer-top{
grid-template-columns:1fr;
}
.hero{flex-direction:column}
.hero-right img{width:100%;margin-top:20px}
}
</style>
</head>
<body>

<div class="navbar">
<div class="logo">CreatorHub</div>

<div class="nav-links">
<a href="home.html">Home</a>
<a href="categories.html">Categories</a>
<a href="creators.html">Top Creators</a>
<a href="seller.html">Become a Seller</a>
<a href="dashboard.html">Dashboard</a>
</div>

<div class="search-nav">
<input placeholder="Search ebooks, guides...">
<i class="fa fa-search"></i>
<i class="fa fa-shopping-cart" onclick="location.href='cart.html'"></i>
<i class="fa fa-bell" onclick="location.href='notification.html'"></i>
</div>
</div>

<section class="hero">
<div class="hero-left">
<h1>How can we <span>help</span> you?</h1>
<p>Find answers to your questions or connect with our support team 24/7.</p>
<div class="hero-search">
<input id="searchInput" placeholder="Search help articles...">
<button onclick="searchHelp()">Search</button>
</div>
</div>

<div class="hero-right">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
</div>
</section>

<!-- Existing sections remain same and fully working -->

<script>
const SUPPORT_API='https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec';

function searchHelp(){
let q=document.getElementById('searchInput').value;
if(!q) return alert('Enter search text');
alert('Searching: '+q);
}

async function sendMessage(){
let input=document.getElementById('msg');
let text=input.value.trim();
if(!text) return;

let chat=document.getElementById('chatBox');
chat.innerHTML += `<div class='msg user'>${text}</div>`;
input.value='';

let reply='';
try{
let res=await fetch(SUPPORT_API+'?action=support&message='+encodeURIComponent(text));
let data=await res.json();
reply=data.reply || 'No response';
}catch(e){
reply='Support system busy';
}

chat.innerHTML += `<div class='msg bot'>${reply}</div>`;
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
