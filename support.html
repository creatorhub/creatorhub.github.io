<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Support</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
padding:15px;
background:#020617;
border-bottom:1px solid #1f2937;
text-align:center;
font-weight:bold;
color:var(--accent);
font-size:18px;
}

/* CHAT */

.chat{
flex:1;
overflow:auto;
padding:15px;
}

/* MESSAGE */

.msg{
margin:10px 0;
padding:12px;
max-width:75%;
border-radius:12px;
font-size:14px;
line-height:1.5;
}

/* USER */

.user{
margin-left:auto;
background:#2563eb;
}

/* BOT */

.bot{
background:#111827;
color:#22c55e;
border:1px solid #1f2937;
}

/* INPUT */

.inputBox{
display:flex;
background:#020617;
border-top:1px solid #1f2937;
padding:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
outline:none;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
CreatorHub Support
</div>

<div class="chat" id="chat"></div>

<div class="inputBox">

<input id="msg"
placeholder="Ask your question..."
onkeydown="enterSend(event)">

<button onclick="send()">
Send
</button>

</div>

<script>

/* APIs */

const SUPPORT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const CHAT_API="https://script.google.com/macros/s/AKfycbzMCnhAdxOSnSl7tO6u3yZZEARctzq9kQIenT-PoO8Y68gN5kXWViEFD01BiRObxOY1/exec"

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="msg "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* ENTER SEND */

function enterSend(e){

if(e.key==="Enter"){

send()

}

}

/* SEND MESSAGE */

async function send(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

/* loading message */

let loading=document.createElement("div")

loading.className="msg bot"

loading.innerText="Please wait..."

document.getElementById("chat").appendChild(loading)

let reply=""

try{

/* first api */

let res=await fetch(SUPPORT_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"support",
message:text
})
})

let data=await res.json()

reply=data.reply

}catch{}

/* fallback second api */

if(!reply){

try{

let res=await fetch(CHAT_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
})

let data=await res.json()

reply=data.reply

}catch{}

}

loading.remove()

addMessage(reply || "Support team will respond soon.","bot")

}

</script>

</body>
</html>
