<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Wallet</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.pageTitle{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
padding:18px;
}

.card{
background:#111827;
padding:18px;
border-radius:16px;
margin-bottom:18px;
}

.balance{
font-size:34px;
font-weight:bold;
color:#22c55e;
margin-top:10px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:linear-gradient(90deg,#22c55e,#4ade80);
border-radius:12px;
font-weight:bold;
color:white;
cursor:pointer;
}

.item{
background:#020617;
padding:12px;
border-radius:10px;
margin-top:8px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="pageTitle">Creator Wallet</div>
</div>

<div class="container">

<div class="card">
<h3>Available Balance</h3>
₹ <span id="balance" class="balance">0</span>
</div>

<div class="card">

<h3>Withdraw Money</h3>

<input id="upi" placeholder="Enter UPI ID">
<input id="amount" type="number" placeholder="Withdraw Amount ₹">

<button onclick="withdraw()">Withdraw 🚀</button>

</div>

<div class="card">
<h3>Earnings History</h3>
<div id="history">Loading...</div>
</div>

</div>

<script>

/* PAYMENT API */

const API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user){

alert("Login First")
location.href="login.html"

}

/* GET DB */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())
let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* LOAD WALLET */

let currentBalance=0

async function loadWallet(){

let wallets=await getDB("wallets")

let my=wallets.find(w=>w.email===user.email)

currentBalance=my?Number(my.balance||0):0

document.getElementById("balance").innerText=currentBalance

/* HISTORY */

let orders=await getDB("orders")

let myOrders=orders.filter(o=>

o.seller===user.email &&
o.status==="paid"

)

let box=document.getElementById("history")

if(!myOrders.length){

box.innerHTML="No Earnings Yet"
return

}

box.innerHTML=""

myOrders.reverse().forEach(o=>{

let earn=Math.floor(Number(o.amount||0)*0.8)

box.innerHTML+=`

<div class="item">

<div>₹ ${earn}</div>

<div>Ebook Sale</div>

</div>

`

})

}

loadWallet()

/* UPI VALIDATION */

function validUPI(vpa){

return /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(vpa)

}

/* WITHDRAW */

async function withdraw(){

let amount=Number(document.getElementById("amount").value)
let upi=document.getElementById("upi").value.trim()

if(!amount || !upi){

alert("Fill all details")
return

}

if(!validUPI(upi)){

alert("Invalid UPI")
return

}

if(amount<100){

alert("Minimum withdraw ₹100")
return

}

if(amount>currentBalance){

alert("Insufficient balance")
return

}

if(!confirm("Confirm withdraw request?")) return

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"withdraw",
email:user.email,
amount:amount,
upi:upi

})

})

let data=await res.json()

if(data.success){

alert("Withdraw request sent")

location.reload()

}else{

alert(data.message || "Withdraw failed")

}

}catch{

alert("Server error")

}

}

</script>

</body>
</html>
