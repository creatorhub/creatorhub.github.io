<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>CreatorHub Wallet</title><style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
background:#020617;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

/* CONTAINER */

.container{
padding:20px;
max-width:700px;
margin:auto;
}

/* CARD STYLE (Homepage same) */

.card{

background:linear-gradient(145deg,#111827,#020617);

border-radius:16px;

padding:20px;

margin-bottom:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.6);

border:1px solid #1f2937;

}

/* BALANCE */

.balance{

font-size:36px;

font-weight:bold;

margin-top:10px;

color:#22c55e;

}

/* INPUT */

input{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:10px;

background:#020617;

color:white;

border:1px solid #1f2937;

outline:none;

}

/* BUTTON */

button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:12px;

font-weight:bold;

background:linear-gradient(90deg,#22c55e,#4ade80);

color:black;

cursor:pointer;

}

/* HISTORY ITEM */

.item{

background:#020617;

padding:12px;

border-radius:10px;

margin-top:8px;

display:flex;

justify-content:space-between;

border:1px solid #1f2937;

}

</style></head><body><div class="header"><div class="back" onclick="history.back()">⬅</div><div class="title">Creator Wallet</div></div><div class="container"><div class="card"><h3>Available Balance</h3><div class="balance">₹ <span id="balance">0</span></div></div><div class="card"><h3>Withdraw Money</h3><input id="upi" placeholder="Enter UPI ID"><input id="amount" type="number" placeholder="Withdraw Amount ₹"><button onclick="withdraw()">Withdraw Money 🚀</button>

</div><div class="card"><h3>Earnings History</h3><div id="history">Loading...</div></div></div><script>

/* BACKEND API */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

/* USER */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){

alert("Login First")

location.href="login.html"

}

/* GET DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* LOAD WALLET */

let currentBalance=0

async function loadWallet(){

let wallets=await getDB("wallets")

let my=wallets.find(w=>w.email===user.email)

currentBalance=my?Number(my.balance||0):0

document.getElementById("balance").innerText=currentBalance

/* HISTORY */

let orders=await getDB("orders")

let myOrders=orders.filter(o=>

o.seller===user.email &&
o.payment==="paid"

)

let box=document.getElementById("history")

if(!myOrders.length){

box.innerHTML="No Earnings Yet"

return

}

box.innerHTML=""

myOrders.reverse().forEach(o=>{

let earn=Math.floor(Number(o.amount||0)*0.8)

box.innerHTML+=`

<div class="item">

<div>₹ ${earn}</div>

<div>Ebook Sale</div>

</div>

`

})

}

loadWallet()

/* UPI VALIDATION */

function validUPI(vpa){

return /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(vpa)

}

/* WITHDRAW */

async function withdraw(){

let amount=Number(document.getElementById("amount").value)

let upi=document.getElementById("upi").value.trim()

if(!amount || !upi){

alert("Fill all details")

return

}

if(!validUPI(upi)){

alert("Invalid UPI")

return

}

if(amount<100){

alert("Minimum withdraw ₹100")

return

}

if(amount>currentBalance){

alert("Insufficient balance")

return

}

if(!confirm("Confirm withdraw request?")) return

try{

let res=await fetch(API,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

action:"withdraw",

email:user.email,

amount:amount,

upi:upi

})

})

let data=await res.json()

if(data.success){

alert("Withdraw request sent")

location.reload()

}else{

alert(data.message || "Withdraw failed")

}

}catch{

alert("Server error")

}

}

</script></body>
</html>
