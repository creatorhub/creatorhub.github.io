<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Wallet</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.pageTitle{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
padding:18px;
}

.card{
background:#111827;
padding:18px;
border-radius:16px;
margin-bottom:18px;
}

.balance{
font-size:34px;
font-weight:bold;
color:#22c55e;
margin-top:10px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:linear-gradient(90deg,#22c55e,#4ade80);
border-radius:12px;
font-weight:bold;
color:white;
cursor:pointer;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.item{
background:#020617;
padding:12px;
border-radius:10px;
margin-top:8px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="pageTitle"> Creator Wallet</div>
</div>

<div class="container">

<div class="card">
<h3>Available Balance</h3>
₹ <span id="balance" class="balance">0</span>
</div>

<div class="card">

<h3>Withdraw Money (20% Platform Fee)</h3>

<input id="upi" placeholder="Enter UPI ID">

<input id="amount" type="number" placeholder="Withdraw Amount ₹">

<button id="withdrawBtn" onclick="withdraw()">Withdraw Request 🚀</button>

</div>

<div class="card">
<h3>📜 Earnings History</h3>
<div id="history">Loading...</div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx7vyDJEi9v2RO7ujHdMAnlgUX8AV2JVOfydtw8DJU4AI-7vcTlWMEt07KFcFr1lYTa/exec";

const ADMIN_NUMBER="918543936339";

let user=JSON.parse(localStorage.getItem("user"));

if(!user){

alert("Login First");
location.href="login.html";

}

let balance=0;

/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let data=await r.json();

return Array.isArray(data)?data:[];

}catch{

return [];

}

}

async function saveDB(db,data){

await fetch(API,{

method:"POST",

headers:{"Content-Type":"text/plain"},

body:JSON.stringify({

db:db,
data:data

})

});

}

/* LOAD WALLET */

async function loadWallet(){

let wallets=await getDB("wallet");

let my=wallets.find(w=>w.email===user.email);

balance=my?Number(my.balance)||0:0;

document.getElementById("balance").innerText=balance;

/* HISTORY */

let orders=await getDB("orders");

let myOrders=orders.filter(o=>o.seller===user.email);

let box=document.getElementById("history");

if(!myOrders.length){

box.innerHTML="No Earnings Yet";

return;

}

box.innerHTML="";

myOrders.reverse().forEach(o=>{

let earn=Math.floor((Number(o.amount)||0)*0.8);

box.innerHTML+=`

<div class="item">
<div>₹ ${earn}</div>
<div>Ebook Sale</div>
</div>

`;

});

}

loadWallet();

/* VALIDATE UPI */

function validUPI(vpa){

return /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(vpa);

}

/* WITHDRAW */

async function withdraw(){

let btn=document.getElementById("withdrawBtn");

let amount=Number(document.getElementById("amount").value);

let upi=document.getElementById("upi").value.trim();

/* VALIDATIONS */

if(!amount || !upi){

alert("Fill Details");

return;

}

if(amount<=0){

alert("Invalid Amount");

return;

}

if(!validUPI(upi)){

alert("Invalid UPI ID");

return;

}

if(amount>balance){

alert("Low Balance");

return;

}

btn.disabled=true;

/* CALCULATE SHARE */

let sendAmount=Math.floor(amount*0.8);

let adminCommission=amount-sendAmount;

/* LOAD DB */

let wallets=await getDB("wallet");

let withdraws=await getDB("withdraw");

/* FIND USER */

let index=wallets.findIndex(w=>w.email===user.email);

if(index===-1){

alert("Wallet Missing");

btn.disabled=false;

return;

}

/* UPDATE BALANCE */

wallets[index].balance=Number(wallets[index].balance)-amount;

/* SAVE REQUEST */

withdraws.push({

email:user.email,
requestAmount:amount,
sendAmount:sendAmount,
adminCommission:adminCommission,
upi:upi,
status:"Pending",
date:new Date().toLocaleString()

});

await saveDB("wallet",wallets);

await saveDB("withdraw",withdraws);

/* WHATSAPP ADMIN ALERT */

let msg=encodeURIComponent(

" CreatorHub Withdraw Request\n\n"+
"User : "+user.email+"\n"+
"UPI : "+upi+"\n\n"+
"Requested ₹"+amount+"\n"+
"Send ₹"+sendAmount+"\n"+
"Admin ₹"+adminCommission

);

window.open(
"https://wa.me/"+ADMIN_NUMBER+"?text="+msg,
"_blank"
);

alert("Withdraw Request Sent ✅");

location.reload();

}

</script>

</body>
</html>
