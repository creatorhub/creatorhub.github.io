<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>CreatorHub Wallet</title><style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
animation:fadePage .6s ease;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
background:#020617;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
z-index:99;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
font-size:20px;
font-weight:bold;
color:var(--accent);
}

/* CONTAINER */

.container{
padding:20px;
max-width:700px;
margin:auto;
}

/* CARD */

.card{
background:linear-gradient(145deg,#111827,#020617);
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
border:1px solid #1f2937;
transition:.35s;
animation:fadeUp .6s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 45px rgba(0,0,0,.9);
}

/* BALANCE */

.balance{
font-size:36px;
font-weight:bold;
margin-top:10px;
color:var(--accent);
animation:pulseGlow 2s infinite;
}

/* INPUT */

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#020617;
color:white;
border:1px solid #1f2937;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 18px #22c55e;
}

/* HISTORY */

.item{
background:#020617;
padding:12px;
border-radius:10px;
margin-top:8px;
display:flex;
justify-content:space-between;
border:1px solid #1f2937;
font-size:14px;
animation:slideIn .5s ease;
}

/* ANIMATIONS */

@keyframes fadePage{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes slideIn{
from{
opacity:0;
transform:translateX(-20px);
}
to{
opacity:1;
transform:translateX(0);
}
}

@keyframes pulseGlow{
0%{text-shadow:0 0 5px #22c55e}
50%{text-shadow:0 0 20px #22c55e}
100%{text-shadow:0 0 5px #22c55e}
}

/* MOBILE */

@media(max-width:768px){

.balance{
font-size:30px;
}

}

</style></head><body><div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Creator Wallet</div>
</div><div class="container"><div class="card"><h3>Available Balance</h3><div class="balance">
₹ <span id="balance">0</span>
</div></div><div class="card"><h3>Withdraw Money</h3><input id="amount" type="number" placeholder="Withdraw Amount ₹"><button onclick="withdraw()">Withdraw Money</button>

</div><div class="card"><h3>Earnings History</h3><div id="history">Loading...</div></div></div><script>

/* API */

const API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"
  
/* USER */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){

alert("Login First")
location.href="login.html"

}

/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())
let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* WALLET */

let currentBalance=0

async function loadWallet(){

let wallets=await getDB("wallets")

let my=wallets.find(w=>w.email===user.email)

currentBalance=my?Number(my.balance||0):0

document.getElementById("balance").innerText=currentBalance

/* HISTORY */

let orders=await getDB("orders")

let myOrders=orders.filter(o=>

o.seller===user.email &&
o.payment==="paid"

)

let box=document.getElementById("history")

if(!myOrders.length){

box.innerHTML="No Earnings Yet"
return

}

box.innerHTML=""

myOrders.reverse().forEach(o=>{

let earn = o.amount - (o.amount * 0.10)

box.innerHTML+=`

<div class="item">

<div>₹ ${earn}</div>

<div>${o.type==="printed" ? "Printed Book Sale" : "Ebook Sale"}</div>

</div>

`

})

}

loadWallet()

/* UPI VALIDATION */

function validUPI(vpa){

return /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(vpa)

}

/* WITHDRAW */

async function withdraw(){

let amount = Number(document.getElementById("amount").value)

if(!amount){
alert("Enter amount")
return
}

if(amount < 100){
alert("Minimum withdraw ₹100")
return
}

if(amount > currentBalance){
alert("Insufficient balance")
return
}

if(!confirm("Confirm withdraw request?")) return

try{

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"withdraw",
email:user.email,
amount:amount
})
})

let data = await res.json()

if(data.success){
alert("Withdraw successful")
location.reload()
}else{
alert(data.message || "Withdraw failed")
}

}catch{
alert("Server error")
}

}

</script></body>
</html>
