<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Login</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:30px;
border-radius:18px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px black;
position:relative;
}

.back{
position:absolute;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
}

h2{
text-align:center;
color:#22c55e;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.link{
margin-top:12px;
text-align:center;
opacity:.7;
cursor:pointer;
}

.google{
margin-top:15px;
display:flex;
justify-content:center;
}

</style>

</head>

<body>

<div class="card">

<div class="back" onclick="location.href='index.html'">⬅</div>

<h2>CreatorHub Login</h2>

<input id="username" placeholder="Username">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">Login</button>

<div class="google">

<div id="g_id_onload"
data-client_id="895144937824-rm42b4uhad99duno8mhhm0guculvvma3.apps.googleusercontent.com"
data-callback="handleGoogleLogin">
</div>

<div class="g_id_signin"
data-type="standard"
data-size="large">
</div>

</div>

<div class="link" onclick="location.href='register.html'">
Create Account
</div>

<div class="link" onclick="location.href='forgot.html'">
Forgot Password
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* LOGIN */

async function login(){

let username=document.getElementById("username").value.trim();
let email=document.getElementById("email").value.trim().toLowerCase();
let password=document.getElementById("password").value.trim();

let btn=document.getElementById("loginBtn");

if(!username || !email || !password){

alert("Fill all fields");
return;

}

btn.disabled=true;
btn.innerText="Logging in...";

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"login",
username:username,
email:email,
password:password

})

});

let data=await res.json();

if(!data.success){

alert(data.message || "Login failed");

btn.disabled=false;
btn.innerText="Login";

return;

}

/* SAVE USER */

localStorage.setItem("user",JSON.stringify(data.user));

alert("Login Success ✅");

location.href="dashboard.html";

}catch(e){

alert("Server Error");

btn.disabled=false;
btn.innerText="Login";

}

}

/* GOOGLE LOGIN */

async function handleGoogleLogin(response){

let data=parseJwt(response.credential);

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"google_login",
email:data.email,
name:data.name

})

});

let result=await res.json();

if(result.success){

localStorage.setItem("user",JSON.stringify({
email:data.email,
name:data.name
}));

location.href="dashboard.html";

}else{

alert("Google login failed");

}

}catch{

alert("Google login error");

}

}

/* PARSE JWT */

function parseJwt(token){

var base64Url = token.split('.')[1];
var base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');
var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c){
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}

</script>

</body>
</html>
