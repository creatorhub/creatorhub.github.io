<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Reset Password</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:30px;
border-radius:18px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px black;
position:relative;
}

.back{
position:absolute;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
}

h2{
text-align:center;
color:#22c55e;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:16px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.note{
margin-top:10px;
text-align:center;
opacity:.7;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<div class="back" onclick="location.href='login.html'">⬅</div>

<h2>Reset Password</h2>

<input id="email" placeholder="Enter your email">

<button id="sendBtn" onclick="sendOTP()">
Send Reset OTP
</button>

<input id="otp" placeholder="Enter OTP">

<input id="password" type="password" placeholder="New Password">

<button id="resetBtn" onclick="resetPassword()">
Reset Password
</button>

<div class="note">
OTP will be sent to your email
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* SEND OTP */

async function sendOTP(){

let email=document.getElementById("email").value.trim().toLowerCase();
let btn=document.getElementById("sendBtn");

if(!email){
alert("Enter email");
return;
}

btn.disabled=true;
btn.innerText="Sending OTP...";

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"send_reset_otp",
email:email

})

});

let data=await res.json();

if(data.success){

alert("OTP sent to your email");

}else{

alert(data.message || "Failed to send OTP");

}

}catch(e){

alert("Server error");

}

btn.disabled=false;
btn.innerText="Send Reset OTP";

}


/* RESET PASSWORD */

async function resetPassword(){

let email=document.getElementById("email").value.trim().toLowerCase();
let otp=document.getElementById("otp").value.trim();
let password=document.getElementById("password").value.trim();
let btn=document.getElementById("resetBtn");

if(!email || !otp || !password){

alert("Fill all fields");
return;

}

if(password.length<4){

alert("Password must be at least 4 characters");
return;

}

btn.disabled=true;
btn.innerText="Resetting...";

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"reset_password",
email:email,
otp:otp,
password:password

})

});

let data=await res.json();

if(data.success){

alert("Password reset successful ✅");

location.href="login.html";

}else{

alert(data.message || "Reset failed");

}

}catch{

alert("Server error");

}

btn.disabled=false;
btn.innerText="Reset Password";

}

</script>

</body>
</html>
