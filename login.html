<!DOCTYPE html><html><head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Login</title><script src="https://accounts.google.com/gsi/client" async defer></script><style>

body{

</style></head><body><div class="card"><div class="back" onclick="location.href='index.html'">⬅</div><h2>CreatorHub Login</h2><input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button>

<div class="google"><div id="g_id_onload"
data-client_id="895144937824-rm42b4uhad99duno8mhhm0guculvvma3.apps.googleusercontent.com"
data-callback="handleGoogleLogin">
</div><div class="g_id_signin"></div></div><div class="link" onclick="guestLogin()">Continue as Guest</div><div class="link" onclick="location.href='register.html'">
Create Account
</div><div class="link" onclick="location.href='forgot.html'">
Forgot Password
</div></div><script>

const const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* EMAIL LOGIN */

async function login(){

let email=document.getElementById("email").value.trim().toLowerCase();
let password=document.getElementById("password").value.trim();

if(!email || !password){
alert("Fill all fields");
return;
}

try{

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"login",
email:email,
password:password
})
});

let data=await res.json();

if(!data.success){
alert(data.message || "Wrong Login");
return;
}

localStorage.setItem("user",JSON.stringify(data.user));

alert("Login Success ✅");

location.href="dashboard.html";

}catch(e){

alert("Server Error");

}

}


/* GOOGLE LOGIN */

function handleGoogleLogin(response){

let data=parseJwt(response.credential);

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"google_login",
email:data.email,
name:data.name
})
})
.then(r=>r.json())
.then(d=>{

localStorage.setItem("user",JSON.stringify({
email:data.email,
name:data.name
}));

location.href="dashboard.html";

});

  }

localStorage.setItem("user",JSON.stringify({
email:data.email,
name:data.name
}));

location.href="dashboard.html";

}


/* JWT PARSE */

function parseJwt (token) {

var base64Url = token.split('.')[1];
var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
}).join(''));

return JSON.parse(jsonPayload);

}


/* GUEST LOGIN */

function guestLogin(){

let guestUser={
name:"Guest User",
email:"guest@creatorhub.com",
guest:true
};

localStorage.setItem("user",JSON.stringify(guestUser));

location.href="dashboard.html";

}

</script></body>
</html>
