<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Become a Seller</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
background: linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:350px;
padding:30px;
border-radius:20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
box-shadow: 0 10px 40px rgba(0,0,0,0.2);
color:#fff;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h2{
text-align:center;
margin-bottom:20px;
}

.input{
width:100%;
margin-bottom:15px;
}

.input input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
background: rgba(255,255,255,0.2);
color:#fff;
font-size:14px;
transition:0.3s;
}

.input input:focus{
background: rgba(255,255,255,0.3);
transform:scale(1.02);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00ffcc;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#00e6b8;
}

.status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.success{ color:#00ffcc; }
.pending{ color:yellow; }
.rejected{ color:#ff4d4d; }

.loader{
display:none;
margin:auto;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #fff;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
<h2>Become a Seller</h2>

<div class="input">
<input type="text" id="name" placeholder="Full Name">
</div>

<div class="input">
<input type="text" id="phone" placeholder="Phone Number">
</div>

<div class="input">
<input type="text" id="upi" placeholder="UPI ID">
</div>

<button onclick="applySeller()">Apply Now</button>

<div class="loader" id="loader"></div>
<div class="status" id="status"></div>

</div>

<script>

/* ================= CONFIG ================= */

const API = "https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

/* ================= APPLY ================= */

async function applySeller(){

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const upi = document.getElementById("upi").value.trim();

/* 🔥 email from login */
const email = localStorage.getItem("user_email");

const statusDiv = document.getElementById("status");
const loader = document.getElementById("loader");

/* VALIDATION */
if(!name || !phone || !upi){
statusDiv.innerHTML = "⚠️ Please fill all fields";
statusDiv.className = "status rejected";
return;
}

if(!email){
statusDiv.innerHTML = "⚠️ Please login first";
statusDiv.className = "status rejected";
return;
}

/* LOADING */
loader.style.display = "block";
statusDiv.innerHTML = "";

try{

const res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
action:"apply_seller",
name:name,
email:email,
phone:phone,
upi:upi
})
});

const data = await res.json();

loader.style.display = "none";

/* RESPONSE */
if(data.success){

if(data.status === "approved"){
statusDiv.innerHTML = "✅ Approved! You can start selling";
statusDiv.className = "status success";
}
else if(data.status === "pending"){
statusDiv.innerHTML = "⏳ Pending review";
statusDiv.className = "status pending";
}
else{
statusDiv.innerHTML = "❌ Rejected. Try again later";
statusDiv.className = "status rejected";
}

}else{
statusDiv.innerHTML = "❌ Server error";
statusDiv.className = "status rejected";
}

}catch(err){

loader.style.display = "none";
statusDiv.innerHTML = "⚠️ Network error";
statusDiv.className = "status rejected";

}

}

/* ================= OPTIONAL AUTO-FILL ================= */

window.onload = () => {

const savedName = localStorage.getItem("user_name");
if(savedName){
document.getElementById("name").value = savedName;
}

}

</script>

</body>
</html>
