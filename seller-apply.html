<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Become Seller - CreatorHub</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:white;
}

/* HEADER */
.topbar{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
background:#020617;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
flex:1;
text-align:center;
color:var(--accent);
font-weight:bold;
}

/* CARD */
.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:16px;
border:1px solid #1f2937;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
}

.status{
margin-top:15px;
padding:12px;
border-radius:10px;
text-align:center;
}

.approved{background:#065f46}
.pending{background:#78350f}
.rejected{background:#7f1d1d}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Become Seller</div>
</div>

<div class="container">

<div class="card" id="card">

<h2>Apply For Seller Account</h2>

<p>Earn money by selling ebooks 🚀</p>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="upi" placeholder="UPI ID">

<button id="applyBtn" onclick="applySeller()">Apply Now</button>

<div id="statusBox"></div>

</div>

</div>

<script>

/* API */
const API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

/* USER */
let user = JSON.parse(localStorage.getItem("user") || "{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* CHECK SELLER STATUS */
async function checkSeller(){

try{

let res = await fetch(API+"?db=sellers")
let sellers = await res.json()

let s = sellers.find(x => x.email === user.email)

if(!s) return

let box = document.getElementById("statusBox")

if(s.status==="approved"){
box.innerHTML = `<div class="status approved">✅ Approved Seller</div>`
document.getElementById("applyBtn").style.display="none"
}

else if(s.status==="pending"){
box.innerHTML = `<div class="status pending">⏳ Pending Approval</div>`
document.getElementById("applyBtn").style.display="none"
}

else{
box.innerHTML = `<div class="status rejected">❌ Rejected</div>`
}

}catch(e){
console.log(e)
}

}

checkSeller()

/* VALIDATE UPI */
function validUPI(vpa){
return /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(vpa)
}

/* APPLY */
async function applySeller(){

let btn = document.getElementById("applyBtn")

let name = nameInput.value.trim()
let phone = phoneInput.value.trim()
let upi = upiInput.value.trim()

if(!name || !phone || !upi){
alert("Fill all fields")
return
}

if(!/^[0-9]{10}$/.test(phone)){
alert("Invalid phone")
return
}

if(!validUPI(upi)){
alert("Invalid UPI")
return
}

btn.disabled = true
btn.innerText = "Submitting..."

try{

let res = await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"apply_seller",
email:user.email,
name:name,
phone:phone,
upi:upi
})
})

let data = await res.json()

if(data.success){
alert("✅ Applied successfully")
location.reload()
}else{
alert(data.message || "Failed")
}

}catch(e){
alert("Server error")
console.log(e)
}

btn.disabled=false
btn.innerText="Apply Now"

}

/* FIX INPUT IDS */
const nameInput=document.getElementById("name")
const phoneInput=document.getElementById("phone")
const upiInput=document.getElementById("upi")

</script>

</body>
</html>
