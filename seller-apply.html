<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Become Seller</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */
.header{
display:flex;
align-items:center;
padding:15px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:20px;
cursor:pointer;
margin-right:10px;
}

.title{
color:#22c55e;
font-weight:bold;
}

/* CARD */
.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
border:1px solid #1f2937;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

/* STATUS */
.status{
margin-top:15px;
padding:10px;
border-radius:8px;
text-align:center;
}

.approved{background:#065f46}
.pending{background:#78350f}
.rejected{background:#7f1d1d}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Become Seller</div>
</div>

<div class="container">

<div class="card" id="card">

<h3>Apply Seller</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="upi" placeholder="UPI ID">

<button id="btn" onclick="apply()">Apply</button>

<div id="status"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

/* USER */
let user = JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login first")
location.href="login.html"
}

/* CHECK SELLER */
async function check(){

try{

let res = await fetch(API+"?db=sellers")
let data = await res.json()

let s = data.find(x=>x.email===user.email)

if(!s) return

let box=document.getElementById("status")

if(s.status==="approved"){
box.innerHTML='<div class="status approved">Approved</div>'
btn.style.display="none"
}

else if(s.status==="pending"){
box.innerHTML='<div class="status pending">Pending</div>'
btn.style.display="none"
}

else{
box.innerHTML='<div class="status rejected">Rejected</div>'
}

}catch(e){
console.log(e)
}

}

check()

/* APPLY */
async function apply(){

let name=document.getElementById("name").value.trim()
let phone=document.getElementById("phone").value.trim()
let upi=document.getElementById("upi").value.trim()

if(!name || !phone || !upi){
alert("Fill all fields")
return
}

let btn=document.getElementById("btn")
btn.disabled=true
btn.innerText="Submitting..."

try{

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"apply_seller",
email:user.email,
name:name,
phone:phone,
upi:upi
})
})

/* DEBUG */
let text = await res.text()
console.log("RAW:",text)

let data = JSON.parse(text)

if(data.success){
alert("Applied successfully")
location.reload()
}else{
alert(data.message || "Failed")
}

}catch(e){
alert("Server error")
console.log(e)
}

btn.disabled=false
btn.innerText="Apply"

}

</script>

</body>
</html>
