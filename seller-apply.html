<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Become Seller | CreatorHub</title>

<style>

/* BACKGROUND */
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* CARD */
.container{
width:380px;
background:rgba(17,24,39,0.9);
border-radius:20px;
padding:30px;
border:1px solid #1f2937;
backdrop-filter:blur(12px);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
animation:fadeUp .7s ease;
}

/* HEADER */
.header{
display:flex;
align-items:center;
margin-bottom:20px;
}

.back{
cursor:pointer;
font-size:22px;
margin-right:10px;
transition:.3s;
}
.back:hover{
transform:translateX(-5px);
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:1px solid #1f2937;
background:#020617;
color:white;
transition:.3s;
}

input:focus{
outline:none;
border-color:#22c55e;
box-shadow:0 0 8px #22c55e;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #22c55e;
}

/* LOADER */
.loader{
display:none;
text-align:center;
margin-top:12px;
}

/* STATUS */
.status{
margin-top:15px;
padding:12px;
border-radius:10px;
text-align:center;
display:none;
}

.approved{background:#065f46;}
.pending{background:#78350f;}
.rejected{background:#7f1d1d;}

/* ANIMATION */
@keyframes fadeUp{
0%{opacity:0;transform:translateY(40px);}
100%{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Become Seller</div>
</div>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="upi" placeholder="UPI ID">

<button id="btn" onclick="applySeller()">Apply Now 🚀</button>

<div class="loader" id="loader">⏳ Processing...</div>

<div id="statusBox" class="status"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

/* USER CHECK */
let user = JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* CHECK STATUS */
async function checkStatus(){

try{

let res = await fetch(API+"?db=sellers")
let data = await res.json()

let s = data.find(x=>x.email===user.email)

if(!s) return

let box = document.getElementById("statusBox")
box.style.display="block"

if(s.status==="approved"){
box.className="status approved"
box.innerText="✅ Approved Seller"
btn.style.display="none"
}

else if(s.status==="pending"){
box.className="status pending"
box.innerText="⏳ Pending Approval"
btn.style.display="none"
}

else{
box.className="status rejected"
box.innerText="❌ Rejected (Apply again)"
}

}catch(e){
console.log(e)
}

}

checkStatus()

/* APPLY SELLER */
async function applySeller(){

let name=document.getElementById("name").value.trim()
let phone=document.getElementById("phone").value.trim()
let upi=document.getElementById("upi").value.trim()

if(!name || !phone || !upi){
alert("Fill all fields")
return
}

/* PHONE VALIDATION */
if(!/^[0-9]{10}$/.test(phone)){
alert("Invalid phone number")
return
}

/* UPI VALIDATION */
if(!/^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(upi)){
alert("Invalid UPI ID")
return
}

let btn=document.getElementById("btn")
let loader=document.getElementById("loader")

btn.disabled=true
btn.innerText="Submitting..."
loader.style.display="block"

try{

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"apply_seller",
email:user.email,
name:name,
phone:phone,
upi:upi
})
})

let text = await res.text()
console.log("RAW:",text)

let data = JSON.parse(text)

loader.style.display="none"

if(data.success){
alert("✅ Applied Successfully")
location.reload()
}else{
alert(data.message || "Failed")
}

}catch(e){
loader.style.display="none"
alert("Server error")
console.log(e)
}

btn.disabled=false
btn.innerText="Apply Now 🚀"

}

</script>

</body>
</html>
