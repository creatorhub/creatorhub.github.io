<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply as Seller</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#3a3a6a);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* CARD */
.container{
    background:#2a2a4a;
    padding:30px;
    border-radius:20px;
    width:350px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation:fadeIn 0.8s ease;
}

/* BACK BUTTON */
.back{
    cursor:pointer;
    font-size:20px;
    margin-bottom:10px;
    display:inline-block;
    transition:0.3s;
}
.back:hover{
    transform:translateX(-5px);
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    background:#1c1c35;
    color:white;
    transition:0.3s;
}
input:focus{
    background:#292952;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ff7a18,#ffb347);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
}

/* LOADER */
.loader{
    display:none;
    text-align:center;
    margin-top:10px;
}

/* SUCCESS */
.success{
    display:none;
    text-align:center;
    margin-top:10px;
    color:#4caf50;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style></head><body><div class="container"><div class="back" onclick="goBack()">⬅ Back</div>

<h2>Apply as Seller</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="upi" placeholder="UPI ID">

<button onclick="applySeller()">Apply Now</button>

<div class="loader" id="loader">⏳ Processing...</div>
<div class="success" id="success">✅ Application Submitted!</div>

</div><script>

const API ="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

function goBack(){
    window.history.back();
}

async function applySeller(){

    const data = {
        action:"apply_seller",
        name:document.getElementById("name").value,
        email:document.getElementById("email").value,
        phone:document.getElementById("phone").value,
        upi:document.getElementById("upi").value
    }

    if(!data.name || !data.email){
        alert("Please fill all required fields");
        return;
    }

    document.getElementById("loader").style.display="block";
    document.getElementById("success").style.display="none";

    try{

        const res = await fetch(API,{
            method:"POST",
            body:JSON.stringify(data)
        })

        const result = await res.json();

        document.getElementById("loader").style.display="none";

        if(result.success){
            document.getElementById("success").style.display="block";
        }else{
            alert(result.message || "Error");
        }

    }catch(err){
        document.getElementById("loader").style.display="none";
        alert("Network Error");
    }

}
</script></body>
</html>
