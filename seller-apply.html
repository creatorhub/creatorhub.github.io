<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Become Seller - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.note{
opacity:.8;
font-size:14px;
margin-top:8px;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='dashboard.html'">⬅</div>
<div class="title">Become Seller</div>
</div>

<div class="container">

<div class="card">

<h2>Apply For Seller Account</h2>

<p class="note">
Upload ebooks and earn 80% profit.<br>
Admin approval required.
</p>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="upi" placeholder="UPI ID (for payment receive)">

<button id="applyBtn" onclick="applySeller()">
Apply Now 🚀
</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec";

let user=JSON.parse(localStorage.getItem("user")||"null");

if(!user || !user.email){

location.href="login.html";

}

/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let d=await r.json();

return Array.isArray(d)?d:[];

}catch{

return[];

}

}

/* APPLY SELLER */

async function applySeller(){

let btn=document.getElementById("applyBtn");

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let upi=document.getElementById("upi").value.trim();

/* VALIDATION */

if(!name || !phone || !upi){

alert("Fill all fields");
return;

}

/* PHONE */

if(!/^[0-9]{10}$/.test(phone)){

alert("Enter valid phone number");
return;

}

/* UPI */

if(!upi.includes("@")){

alert("Enter valid UPI ID");
return;

}

btn.disabled=true;
btn.innerText="Submitting...";

/* CHECK USERS DB */

let users=await getDB("users");

let index=users.findIndex(u=>u.email===user.email);

if(index>-1){

if(users[index].seller){

alert("You are already a seller");

btn.disabled=false;
btn.innerText="Apply Now 🚀";
return;

}

if(users[index].sellerRequest){

alert("Seller request already submitted");

btn.disabled=false;
btn.innerText="Apply Now 🚀";
return;

}

}

/* UPDATE USER */

if(index>-1){

users[index].sellerRequest=true;

}

await fetch(API,{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

db:"users",
data:users

})

});

/* SAVE SELLER REQUEST */

await fetch(API,{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

action:"apply_seller",
email:user.email,
name:name,
phone:phone,
upi:upi

})

});

alert("Application submitted successfully");

location.href="dashboard.html";

}

</script>

</body>
</html>
