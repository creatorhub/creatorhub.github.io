<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Become Seller - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */
.header{
display:flex;
align-items:center;
padding:15px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:20px;
cursor:pointer;
margin-right:10px;
}

.title{
color:#22c55e;
font-weight:bold;
}

/* CARD */
.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
border:1px solid #1f2937;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

/* STATUS */
.status{
margin-top:15px;
padding:12px;
border-radius:8px;
text-align:center;
font-weight:bold;
}

.approved{background:#065f46}
.pending{background:#78350f}
.rejected{background:#7f1d1d}

</style>

</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Become Seller</div>
</div>

<div class="container">

<div class="card">

<h3>Apply Seller</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="upi" placeholder="UPI ID">

<button id="btn" onclick="applySeller()">Apply Now</button>

<div id="status"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

/* USER CHECK */
let user = JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){
alert("Login required")
location.href="login.html"
}

/* ================= CHECK SELLER ================= */

async function checkSeller(){

try{

let res = await fetch(API + "?db=sellers")
let text = await res.text()

let sellers = JSON.parse(text)

let s = sellers.find(x=>x.email===user.email)

let statusBox = document.getElementById("status")
let btn = document.getElementById("btn")

if(!s){
statusBox.innerHTML=""
return
}

/* APPROVED */
if(s.status==="approved"){
statusBox.innerHTML = '<div class="status approved">✅ You are an approved seller</div>'
btn.style.display="none"
}

/* PENDING */
else if(s.status==="pending"){
statusBox.innerHTML = '<div class="status pending">⏳ Your request is under review</div>'
btn.style.display="none"
}

/* REJECTED */
else{
statusBox.innerHTML = '<div class="status rejected">❌ Rejected (You can reapply)</div>'
btn.style.display="block"
}

}catch(e){
console.log("Check error:",e)
}

}

checkSeller()

/* ================= VALIDATION ================= */

function validUPI(vpa){
return /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(vpa)
}

/* ================= APPLY SELLER ================= */

async function applySeller(){

let name=document.getElementById("name").value.trim()
let phone=document.getElementById("phone").value.trim()
let upi=document.getElementById("upi").value.trim()

if(!name || !phone || !upi){
alert("Please fill all fields")
return
}

if(!/^[0-9]{10}$/.test(phone)){
alert("Enter valid phone number")
return
}

if(!validUPI(upi)){
alert("Enter valid UPI ID")
return
}

let btn=document.getElementById("btn")

btn.disabled=true
btn.innerText="Submitting..."

try{

let res = await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"apply_seller",
email:user.email,
name:name,
phone:phone,
upi:upi
})
})

let text = await res.text()
console.log("RAW:",text)

let data = JSON.parse(text)

if(data.success){
alert("✅ आवेदन सफल हुआ")
location.reload()
}else{
alert(data.message || "Failed")
}

}catch(e){
alert("❌ Server error")
console.log(e)
}

btn.disabled=false
btn.innerText="Apply Now"

}

</script>

</body>
</html>
