<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Become Seller - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.note{
opacity:.8;
font-size:14px;
margin-top:8px;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="location.href='dashboard.html'">⬅</div>
<div class="title">Become Seller</div>
</div>

<div class="container">

<div class="card">

<h2>Apply For Seller Account</h2>

<p class="note">
Upload ebooks and earn 80% profit.<br>
Admin approval required.
</p>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="upi" placeholder="UPI ID (for payment receive)">

<button id="applyBtn" onclick="applySeller()">Apply Now 🚀</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec";

let user=JSON.parse(localStorage.getItem("user")||"{}");

if(!user || !user.email){
location.href="login.html";
}

/* LOAD SELLERS */

async function getSellers(){

try{

let res=await fetch(API+"?db=sellers&t="+Date.now());

let data=await res.json();

return Array.isArray(data)?data:[];

}catch(e){

console.log(e);
return [];

}

}

/* APPLY SELLER */

async function applySeller(){

let btn=document.getElementById("applyBtn");

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let upi=document.getElementById("upi").value.trim();

if(!name || !phone || !upi){
alert("Fill all fields");
return;
}

/* PHONE VALIDATION */

if(!/^[0-9]{10}$/.test(phone)){
alert("Enter valid 10 digit phone number");
return;
}

/* UPI VALIDATION */

if(!upi.includes("@")){
alert("Enter valid UPI ID");
return;
}

btn.disabled=true;

let sellers=await getSellers();

/* CHECK EXIST */

let exist=sellers.find(s=>s.email===user.email);

if(exist){

alert("Seller request already submitted");

btn.disabled=false;
return;

}

/* SEND REQUEST */

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"apply_seller",

email:user.email,
name:name,
phone:phone,
upi:upi

})

});

let result=await res.json();

if(result.success){

alert("Application Sent ✅ Waiting Admin Approval");

location.href="dashboard.html";

}else{

alert(result.message || "Application Failed");

btn.disabled=false;

}

}catch(e){

console.log(e);

alert("Server Error");

btn.disabled=false;

}

}

</script>

</body>
</html>
