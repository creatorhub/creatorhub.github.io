<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Become Seller - CreatorHub</title><style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
animation:fadePage .6s ease;
}

/* HEADER */

.topbar{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
background:#020617;
position:sticky;
top:0;
z-index:10;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
transition:.2s;
}

.back:hover{
transform:scale(1.1);
}

.title{
flex:1;
text-align:center;
color:var(--accent);
font-weight:bold;
font-size:18px;
}

/* CONTAINER */

.container{
max-width:520px;
margin:auto;
padding:30px 20px;
}

/* CARD */

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:28px;

border-radius:18px;

border:1px solid #1f2937;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

transition:.3s;

}

.card:hover{
box-shadow:0 0 15px rgba(34,197,94,.4);
}

/* TEXT */

h2{
margin-top:0;
}

.note{
opacity:.8;
font-size:14px;
margin-top:8px;
line-height:22px;
}

/* INPUT */

input{

width:100%;

padding:14px;

margin-top:14px;

border:none;

border-radius:12px;

background:#020617;

color:white;

border:1px solid #1f2937;

transition:.2s;

}

input:focus{
outline:none;
border:1px solid #22c55e;
box-shadow:0 0 6px rgba(34,197,94,.4);
}

/* BUTTON */

button{

width:100%;

padding:14px;

margin-top:20px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#22c55e,#4ade80);

color:black;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 10px rgba(34,197,94,.5);
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

/* ANIMATION */

@keyframes fadePage{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style></head><body><div class="topbar"><div class="back" onclick="location.href='dashboard.html'">⬅</div><div class="title">Become Seller</div></div><div class="container"><div class="card"><h2>Apply For Seller Account</h2><p class="note">
Upload ebooks and earn <b>90% profit</b>.<br>
Admin approval required.
</p><input id="name" placeholder="Full Name"><input id="phone" placeholder="Phone Number"><input id="upi" placeholder="UPI ID (for payment receive)"><button id="applyBtn" onclick="applySeller()">Apply Now 🚀

</button></div></div><script>

/* SELLER API */

const API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"
  
/* USER */

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user || !user.email){

location.href="login.html"

}

/* VALIDATE UPI */

function validUPI(vpa){

return /^[a-zA-Z0-9.\-_]{2,}@[a-zA-Z]{2,}$/.test(vpa)

}

/* APPLY SELLER */

async function applySeller(){

let btn=document.getElementById("applyBtn")

let name=document.getElementById("name").value.trim()

let phone=document.getElementById("phone").value.trim()

let upi=document.getElementById("upi").value.trim()

if(!name || !phone || !upi){

alert("Fill all fields")

return

}

if(!/^[0-9]{10}$/.test(phone)){

alert("Enter valid phone number")

return

}

if(!validUPI(upi)){

alert("Invalid UPI ID")

return

}

btn.disabled=true

btn.innerText="Submitting..."

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"apply_seller",

email:user.email,

name:name,

phone:phone,

upi:upi

})

})

let data=await res.json()

if(data.success){

alert("Application submitted successfully ✅")

location.href="dashboard.html"

}else{

alert(data.message || "Application failed")

btn.disabled=false

btn.innerText="Apply Now"

}

}catch(e){

alert("Server error")

btn.disabled=false

btn.innerText="Apply Now"

}

}

</script></body>
</html>
