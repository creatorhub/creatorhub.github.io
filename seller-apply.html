<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Become a Seller</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
background: linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* BACK BUTTON */
.back-btn{
position:absolute;
top:20px;
left:20px;
font-size:22px;
cursor:pointer;
color:#fff;
background: rgba(255,255,255,0.2);
padding:8px 12px;
border-radius:50%;
}

/* CARD */
.container{
width:350px;
padding:30px;
border-radius:20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
color:#fff;
}

h2{
text-align:center;
margin-bottom:20px;
}

.input{
margin-bottom:15px;
}

.input input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background: rgba(255,255,255,0.2);
color:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00ffcc;
color:#000;
font-weight:bold;
cursor:pointer;
}

.status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.success{ color:#00ffcc; }
.pending{ color:yellow; }
.rejected{ color:#ff4d4d; }

.loader{
display:none;
margin:auto;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #fff;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- BACK BUTTON -->
<div class="back-btn" onclick="goHome()">←</div>

<div class="container">
<h2>Become a Seller</h2>

<div class="input">
<input type="text" id="name" placeholder="Full Name">
</div>

<div class="input">
<input type="text" id="phone" placeholder="Phone Number">
</div>

<div class="input">
<input type="text" id="upi" placeholder="UPI ID">
</div>

<button onclick="applySeller()">Apply Now</button>

<div class="loader" id="loader"></div>
<div class="status" id="status"></div>

</div>

<script>

/* ================= CONFIG ================= */

const API = "https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"

/* ================= BACK ================= */

function goHome(){
window.location.href = "index.html";
}

/* ================= APPLY ================= */

async function applySeller(){

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const upi = document.getElementById("upi").value.trim();

/* 🔥 GET USER DATA */
const user = JSON.parse(localStorage.getItem("user") || "{}");
const email = user.email;

const statusDiv = document.getElementById("status");
const loader = document.getElementById("loader");

/* VALIDATION */
if(!name || !phone || !upi){
statusDiv.innerHTML = "⚠️ Fill all fields";
statusDiv.className = "status rejected";
return;
}

if(!email){
statusDiv.innerHTML = "⚠️ Login first";
statusDiv.className = "status rejected";
return;
}

/* LOADING */
loader.style.display = "block";
statusDiv.innerHTML = "";

try{

/* 🔥 GET REQUEST (NO NETWORK ERROR) */
const url = `${API}?action=apply_seller&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&phone=${encodeURIComponent(phone)}&upi=${encodeURIComponent(upi)}`;

const res = await fetch(url);
const data = await res.json();

loader.style.display = "none";

/* RESPONSE */
if(data.success){

if(data.status === "approved"){
statusDiv.innerHTML = "✅ Approved!";
statusDiv.className = "status success";
}
else if(data.status === "pending"){
statusDiv.innerHTML = "⏳ Pending";
statusDiv.className = "status pending";
}
else{
statusDiv.innerHTML = "❌ Rejected";
statusDiv.className = "status rejected";
}

}else{
statusDiv.innerHTML = "❌ Error";
statusDiv.className = "status rejected";
}

}catch(err){

loader.style.display = "none";
statusDiv.innerHTML = "⚠️ Network error";
statusDiv.className = "status rejected";

}

}

/* ================= AUTO FILL ================= */

window.onload = () => {

const user = JSON.parse(localStorage.getItem("user") || "{}");

if(user.name){
document.getElementById("name").value = user.name;
}

}

</script>

</body>
</html>
