<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending Books & Analytics Marketplace | CreatorHub</title>
<style>
/* =========================================================
   CREATORHUB ADVANCED DESIGN SYSTEM VARIABLE TOKENS
   ========================================================= */
:root {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent-blue: #2563eb;
    --accent-blue-hover: #1d4ed8;
    --accent-blue-light: #eff6ff;
    --accent-gold: #f59e0b;
    --accent-red: #ef4444;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
    --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* =========================================================
   NAVIGATION MODULE LAYER
   ========================================================= */
.navbar-viewport {
    height: 75px;
    background-color: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: var(--shadow-sm);
}

.brand-navigation {
    display: flex;
    align-items: center;
    gap: 20px;
}

.action-back-trigger {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    transition: var(--transition-smooth);
    user-select: none;
    border: 1px solid var(--border-color);
    padding: 8px 14px;
    border-radius: 10px;
    background-color: var(--bg-secondary);
}

.action-back-trigger:hover {
    color: var(--accent-blue);
    border-color: var(--accent-blue);
    background-color: var(--accent-blue-light);
    transform: translateX(-2px);
}

.marketplace-brand-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
}

/* =========================================================
   MARKETPLACE ANALYTICS COUNTER MODULE
   ========================================================= */
.analytics-shelf-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 35px;
}

.analytic-data-card {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow-sm);
}

.analytic-icon-wrapper {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background-color: var(--accent-blue-light);
    color: var(--accent-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

.analytic-metrics-body h4 {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.analytic-metrics-body p {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    margin-top: 2px;
}

/* =========================================================
   DYNAMIC CONTROL SUB-SYSTEM (SEARCH & FILTER TABS)
   ========================================================= */
.control-hub-deck {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 35px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.search-input-wrapper {
    position: relative;
    width: 100%;
}

.search-input-wrapper input {
    width: 100%;
    padding: 14px 16px 14px 44px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    background-color: var(--bg-primary);
    font-size: 15px;
    color: var(--text-primary);
    transition: var(--transition-smooth);
}

.search-input-wrapper input:focus {
    outline: none;
    border-color: var(--accent-blue);
    background-color: var(--bg-secondary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.search-input-wrapper::before {
    content: "🔍";
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text-muted);
}

.filter-tab-scroller {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
}

.filter-tab-scroller::-webkit-scrollbar {
    height: 4px;
}

.filter-tab-scroller::-webkit-scrollbar-thumb {
    background-color: var(--border-color);
    border-radius: 10px;
}

.filter-pill-trigger {
    padding: 8px 16px;
    background-color: var(--bg-primary);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: var(--transition-smooth);
}

.filter-pill-trigger.active-state, .filter-pill-trigger:hover {
    background-color: var(--text-primary);
    color: var(--bg-secondary);
    border-color: var(--text-primary);
}

/* =========================================================
   CORE GRID ENGINE MATRIX
   ========================================================= */
.main-content-wrapper {
    padding: 0 40px 40px 40px;
    max-width: 1440px;
    margin: auto;
}

.catalog-grid-matrix {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 30px;
}

/* HIGH FIDELITY PRODUCT COMPONENT CARDS */
.product-showcase-card {
    background-color: var(--bg-secondary);
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: var(--transition-smooth);
}

.product-showcase-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
}

.media-asset-container {
    width: 100%;
    aspect-ratio: 2/3;
    position: relative;
    background-color: var(--bg-primary);
    overflow: hidden;
    border-bottom: 1px solid var(--border-color);
}

.media-asset-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
}

.product-showcase-card:hover .media-asset-container img {
    transform: scale(1.04);
}

.floating-index-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 50px;
    background-color: rgba(255, 255, 255, 0.95);
    color: var(--accent-red);
    box-shadow: var(--shadow-sm);
    border: 1px solid #fee2e2;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    z-index: 5;
}

.card-details-sheet {
    padding: 18px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.product-title-string {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
    height: 44px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
}

.product-metadata-row {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.card-footer-interaction-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--bg-primary);
}

.pricing-tag {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent-blue);
}

.action-buy-trigger {
    padding: 9px 18px;
    border: none;
    border-radius: 10px;
    background-color: var(--accent-blue);
    color: var(--bg-secondary);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition-smooth);
}

.action-buy-trigger:hover {
    background-color: var(--accent-blue-hover);
    transform: translateY(-1px);
}

/* =========================================================
   STATUS LAYOUT ENGINE RENDERERS
   ========================================================= */
.status-container-box {
    grid-column: 1 / -1;
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 80px 20px;
    text-align: center;
    box-shadow: var(--shadow-sm);
}

.spinner-element {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border-color);
    border-top: 3px solid var(--accent-blue);
    border-radius: 50%;
    animation: pipelineRotation 0.8s linear infinite;
    margin: 0 auto 20px auto;
}

.status-headline {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
}

.status-sub-details {
    color: var(--text-secondary);
    font-size: 14px;
    max-width: 450px;
    margin: 0 auto;
    line-height: 1.5;
}

@keyframes pipelineRotation {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* =========================================================
   RESPONSIVE LAYOUT CONTEXT MEDIA QUERY BREAKPOINTS
   ========================================================= */
@media(max-width: 1024px) {
    .analytics-shelf-strip { grid-template-columns: repeat(2, 1fr); }
}

@media(max-width: 768px) {
    .navbar-viewport { padding: 0 20px; }
    .main-content-wrapper { padding: 0 20px 30px 20px; }
    .analytics-shelf-strip { grid-template-columns: 1fr; gap: 15px; }
    .catalog-grid-matrix { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .product-title-string { font-size: 14px; height: 38px; }
    .pricing-tag { font-size: 16px; }
}
</style>
</head>
<body>

<!-- NAVBAR DASHBOARD TOP SHEET -->
<div class="navbar-viewport">
    <div class="brand-navigation">
        <div class="action-back-trigger" onclick="history.back()">
            <span>←</span> Back
        </div>
        <div class="marketplace-brand-title">Trending Catalog</div>
    </div>
</div>

<!-- CONTAINER LAYOUT CORE FRAME -->
<div class="main-content-wrapper">
    
    <!-- SYSTEM STATS ANALYTICS BAR -->
    <div class="analytics-shelf-strip">
        <div class="analytic-data-card">
            <div class="analytic-icon-wrapper">🔥</div>
            <div class="analytic-metrics-body">
                <h4>Hot Inclusions</h4>
                <p id="statTrending">00</p>
            </div>
        </div>
        <div class="analytic-data-card">
            <div class="analytic-icon-wrapper">📈</div>
            <div class="analytic-metrics-body">
                <h4>Total Sales Count</h4>
                <p id="statSales">00</p>
            </div>
        </div>
        <div class="analytic-data-card">
            <div class="analytic-icon-wrapper">📦</div>
            <div class="analytic-metrics-body">
                <h4>Approved Shelf</h4>
                <p id="statApproved">00</p>
            </div>
        </div>
        <div class="analytic-data-card">
            <div class="analytic-icon-wrapper">💎</div>
            <div class="analytic-metrics-body">
                <h4>Top Category</h4>
                <p id="statCategory">None</p>
            </div>
        </div>
    </div>

    <!-- CONTROL HUB CONTROLLER DECK -->
    <div class="control-hub-deck">
        <div class="search-input-wrapper">
            <input type="text" id="catalogSearch" placeholder="Search trending books by title, author or keywords..." oninput="filterCatalogPool()">
        </div>
        <div class="filter-tab-scroller" id="categoryFilterContainer">
            <span class="filter-pill-trigger active-state" onclick="switchCategoryFilter(this, 'ALL')">All Library Collections</span>
        </div>
    </div>

    <!-- DYNAMIC CATALOG TARGET MATRIX -->
    <div id="catalogGridMesh" class="catalog-grid-matrix">
        <div class="status-container-box">
            <div class="spinner-element"></div>
            <div class="status-headline">Connecting Core System Layers</div>
            <div class="status-sub-details">Synchronizing transaction tunnels and structural data array nodes safely...</div>
        </div>
    </div>
</div>

<script>
/* =========================================================
   CORE CONTROL STORAGE ARRAYS & CONFIG CHANNELS
   ========================================================= */
const TARGET_GATEWAY_URL = "https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec";

let GLOBAL_CATALOG_POOL = [];
let CURRENT_ACTIVE_CATEGORY = "ALL";

/* Direct High Res Google Drive Thumbnail Parser */
function resolveAssetCoverThumbnail(linkSource){
    if(!linkSource) return "https://picsum.photos/400/600";
    try {
        let extractedId = "";
        if(linkSource.includes("id=")){ extractedId = linkSource.split("id=")[1].split("&")[0]; }
        if(linkSource.includes("/file/d/")){ extractedId = linkSource.split("/file/d/")[1].split("/")[0]; }
        if(extractedId){ return "https://drive.google.com/thumbnail?id=" + extractedId + "&sz=w1000"; }
    } catch(err) { console.error("Asset matrix recovery parsing error:", err); }
    return linkSource;
}

/* SYNCHRONOUS INGESTION STREAM SYSTEM PARSER EXECUTION ENGINE */
async function triggerCoreMarketplaceIngestion(){
    const visualMeshContainer = document.getElementById("catalogGridMesh");
    
    try {
        const [streamProductsResponse, streamSellersResponse] = await Promise.all([
            fetch(TARGET_GATEWAY_URL + "?action=products&timestamp=" + Date.now()),
            fetch(TARGET_GATEWAY_URL + "?action=sellers&timestamp=" + Date.now())
        ]);

        let productBulkPayload = await streamProductsResponse.json();
        let formattedProductData = productBulkPayload.products || productBulkPayload;
        let trackingOrdersLogArray = [];

        try {
            let orderBulkPayload = await streamSellersResponse.json();
            trackingOrdersLogArray = orderBulkPayload.orders || orderBulkPayload || [];
        } catch(err) { console.warn("Dynamic transactional orders empty array matrix deployment mapping active."); }

        if(!Array.isArray(formattedProductData)) formattedProductData = [];
        if(!Array.isArray(trackingOrdersLogArray)) trackingOrdersLogArray = [];

        // Structural Filter parameters matches approved database properties
        GLOBAL_CATALOG_POOL = formattedProductData.filter(itemNode => (itemNode.status || itemNode.ai_status) === "approved");

        if(GLOBAL_CATALOG_POOL.length === 0) {
            visualMeshContainer.innerHTML = `
                <div class="status-container-box">
                    <div class="status-headline">No Active Catalog Inclusions</div>
                    <div class="status-sub-details">Platform inventory structures are unindexed at this execution node interface interval.</div>
                </div>`;
            return;
        }

        let totalPlatformSalesVolumeCount = 0;
        let uniqueCategoryMapDistribution = {};

        // Metrics engine vector mappings execution logic
        GLOBAL_CATALOG_POOL.forEach(bookItem => {
            let verifiedSalesMatchesCount = trackingOrdersLogArray.filter(orderNode => 
                String(orderNode.productId || orderNode.product_id) === String(bookItem.id) && 
                (orderNode.payment === "paid" || orderNode.status === "paid")
            ).length;
            
            bookItem.sales = bookItem.sales || verifiedSalesMatchesCount || 0;
            bookItem.trendingScore = (bookItem.sales * 5) + (Number(bookItem.reads || 0) * 2);
            
            totalPlatformSalesVolumeCount += bookItem.sales;
            
            if(bookItem.category) {
                uniqueCategoryMapDistribution[bookItem.category] = (uniqueCategoryMapDistribution[bookItem.category] || 0) + 1;
            }
        });

        // Compute high score performance indexes descending vectors
        GLOBAL_CATALOG_POOL.sort((vectorA, vectorB) => vectorB.trendingScore - vectorA.trendingScore);

        // Update top analytic statistic metric indicators
        document.getElementById("statApproved").innerText = GLOBAL_CATALOG_POOL.length;
        document.getElementById("statSales").innerText = totalPlatformSalesVolumeCount;
        document.getElementById("statTrending").innerText = GLOBAL_CATALOG_POOL.filter(b => b.trendingScore > 0).length;
        
        let targetTopCategoryString = "General";
        let comparativeHighestValueCount = 0;
        for(let keyCategoryName in uniqueCategoryMapDistribution) {
            if(uniqueCategoryMapDistribution[keyCategoryName] > comparativeHighestValueCount) {
                comparativeHighestValueCount = uniqueCategoryMapDistribution[keyCategoryName];
                targetTopCategoryString = keyCategoryName;
            }
        }
        document.getElementById("statCategory").innerText = targetTopCategoryString;

        // Formulate filter slider interface dynamic mapping nodes loops
        const filterNavigationContainer = document.getElementById("categoryFilterContainer");
        for(let uniqueCategoryKeyName in uniqueCategoryMapDistribution) {
            let creationElementTabNode = document.createElement("span");
            creationElementTabNode.className = "filter-pill-trigger";
            creationElementTabNode.innerText = uniqueCategoryKeyName;
            creationElementTabNode.setAttribute("onclick", `switchCategoryFilter(this, '${uniqueCategoryKeyName}')`);
            filterNavigationContainer.appendChild(creationElementTabNode);
        }

        renderCatalogMeshGrid(GLOBAL_CATALOG_POOL);

    } catch(fatalExceptionError) {
        console.error("System structural data ingestion path breakdown crash fault:", fatalExceptionError);
        visualMeshContainer.innerHTML = `
            <div class="status-container-box" style="border-color: #fee2e2; background-color: #fff5f5;">
                <div class="status-headline" style="color: #b91c1c;">Structural Sync Fail Exception</div>
                <div class="status-sub-details" style="color: #991b1b;">Data pipelines verification handshake timeout exceeded limits. Ensure authorization link paths match.</div>
                <button class="btn-retry" style="margin-top: 20px; background-color: #ef4444; color: white; border: none; padding: 10px 22px; border-radius: 8px; font-weight: 700; cursor: pointer;" onclick="location.reload()">Re-initialize Pipeline Stream</button>
            </div>`;
    }
}

/* COMPONENT GRID LAYER RENDER ENGINE MAPPING PARAMETERS */
function renderCatalogMeshGrid(dataSetCollectionSource){
    const gridViewportContainer = document.getElementById("catalogGridMesh");
    let dynamicHTMLCompilationString = "";

    if(dataSetCollectionSource.length === 0) {
        gridViewportContainer.innerHTML = `
            <div class="status-container-box">
                <div class="status-headline">Query Filter Stack Unmatched</div>
                <div class="status-sub-details">No matching indexed items match your system filter specifications parameters.</div>
            </div>`;
        return;
    }

    dataSetCollectionSource.forEach((itemObject, indexRankingOffset) => {
        let referenceCoverImageSource = itemObject.front_cover || itemObject.image || "";
        let definedCategoryContextTag = itemObject.category || "General";
        
        dynamicHTMLCompilationString += `
            <div class="product-showcase-card" onclick="routeToTargetBookProfile('${itemObject.id}')">
                <div class="media-asset-container">
                    ${indexRankingOffset < 3 ? '<span class="floating-index-badge">🔥 Hot Trend</span>' : ''}
                    <img src="${resolveAssetCoverThumbnail(referenceCoverImageSource)}" onerror="this.src='https://picsum.photos/400/600'" alt="Book Cover Medium Matrice">
                </div>
                <div class="card-details-sheet">
                    <div class="product-title-string">${itemObject.title || "Untitled Creation"}</div>
                    <div class="product-metadata-row">📈 ${itemObject.sales || 0} Sold • ${definedCategoryContextTag}</div>
                    <div class="card-footer-interaction-bar">
                        <div class="pricing-tag">₹${itemObject.price || 0}</div>
                        <button class="action-buy-trigger" onclick="routeToPaymentTunnel(event, '${itemObject.id}')">Buy Now</button>
                    </div>
                </div>
            </div>
        `;
    });

    gridViewportContainer.innerHTML = dynamicHTMLCompilationString;
}

/* HUB DECK STREAM FILTER HANDLERS CONTROLLERS LOOP MATRIX */
function filterCatalogPool() {
    const stringSearchQueryFilterToken = document.getElementById("catalogSearch").value.toLowerCase().trim();
    
    let processFilteredResultSet = GLOBAL_CATALOG_POOL.filter(itemDataNode => {
        let booleanSearchStringMatchFlag = 
            (itemDataNode.title && itemDataNode.title.toLowerCase().includes(stringSearchQueryFilterToken)) ||
            (itemDataNode.author_name && itemDataNode.author_name.toLowerCase().includes(stringSearchQueryFilterToken)) ||
            (itemDataNode.category && itemDataNode.category.toLowerCase().includes(stringSearchQueryFilterToken));
            
        let booleanCategoryMatchFlag = (CURRENT_ACTIVE_CATEGORY === "ALL" || itemDataNode.category === CURRENT_ACTIVE_CATEGORY);
        
        return booleanSearchStringMatchFlag && booleanCategoryMatchFlag;
    });
    
    renderCatalogMeshGrid(processFilteredResultSet);
}

function switchCategoryFilter(clickedElementContextNode, targetCategoryPillTokenName) {
    const parentTabElementsArray = document.querySelectorAll(".filter-pill-trigger");
    parentTabElementsArray.forEach(activeNodeElement => activeNodeElement.classList.remove("active-state"));
    
    clickedElementContextNode.classList.add("active-state");
    CURRENT_ACTIVE_CATEGORY = targetCategoryPillTokenName;
    filterCatalogPool();
}

/* SYSTEM TRANSIT INTERFACE NAVIGATION ROUTING CHANNELS */
function routeToTargetBookProfile(targetBookIdToken){
    location.href = "book.html?id=" + targetBookIdToken;
}

function routeToPaymentTunnel(clickEventPropagationStopToken, targetBookIdToken){
    clickEventPropagationStopToken.stopPropagation();
    localStorage.setItem("buyProduct", targetBookIdToken);
    location.href = "payment.html";
}

// Fire runtime ingestion system process stream on initialization loops
window.addEventListener("DOMContentLoaded", triggerCoreMarketplaceIngestion);
</script>
</body>
</html>
