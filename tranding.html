<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending Books | CreatorHub</title>
<style>
/* =========================================================
   HOMEPAGE MATCHING GRID CORE LAYOUT (Based on image_b18945.png)
   ========================================================= */
:root {
    --bg: #f8fafc;       /* Modern subtle ash white canvas */
    --card: #ffffff;     /* Pure high-fidelity white cards */
    --accent: #2563eb;   /* Platform Royal Blue */
    --text: #0f172a;     /* Deep charcoal text font */
    --text-muted: #64748b;
    --border: #e2e8f0;
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

/* NAVBAR HEADER */
.header{
    height: 75px;
    display: flex;
    align-items: center;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    background: #ffffff;
    position: sticky;
    top: 0;
    z-index: 999;
}

.back-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 15px;
    transition: color 0.2s, transform 0.2s;
    user-select: none;
    margin-right: 15px;
}

.back-wrapper:hover {
    color: var(--accent);
    transform: translateX(-3px);
}

.title{
    font-size: 22px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.02em;
}

/* MAIN CONTAINER GRID PORT */
.container{
    padding: 40px 40px;
    max-width: 1400px;
    margin: auto;
}

/* HOMEPAGE EBOOK GRID MATRIX */
.list{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 30px;
}

/* GRID BOOK CARDS - Matching homepage item frames precisely */
.card{
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

.card:hover{
    transform: translateY(-6px);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.06), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
}

/* IMAGE CONTAINER WITH BADGE OVERLAY */
.image-container {
    width: 100%;
    aspect-ratio: 2/3;
    position: relative;
    background: #f1f5f9;
    border-bottom: 1px solid var(--border);
}

.card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.card:hover img {
    transform: scale(1.03);
}

/* HOT BADGE FLOATING OVER IMAGE */
.badge{
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    background: rgba(255, 255, 255, 0.95);
    color: #ef4444;
    padding: 4px 10px;
    border-radius: 50px;
    font-weight: 700;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    border: 1px solid #fee2e2;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    z-index: 2;
}

/* DETAILS COMPONENT SHEET */
.info{
    padding: 16px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

/* BOOK TITLE WITH COMPACT LINE CLIPPING */
.name{
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    height: 42px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
}

/* METADATA PLATFORM PARAMETERS */
.meta{
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ROYAL BLUE PRICE & BUTTON AREA */
.footer-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 10px;
}

.price{
    color: var(--accent);
    font-size: 16px;
    font-weight: 800;
}

/* COMPACT BLUE FLAT DASHBOARD ACTION BUTTON */
.buy{
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: var(--accent);
    color: white;
    font-weight: 700;
    font-size: 12px;
    transition: background 0.2s;
}

.buy:hover{
    background: #1d4ed8;
}

/* BOX CONTAINERS FOR RENDER PROCESSING STATUSES */
.status-box {
    grid-column: 1 / -1;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 60px 20px;
    text-align: center;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
}

.status-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
}

.status-msg {
    color: var(--text-muted);
    font-size: 14px;
}

.spinner {
    width: 26px;
    height: 24px;
    border: 3px solid #cbd5e1;
    border-top: 3px solid var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@media(max-width:600px){
    .header { padding: 0 20px; }
    .container { padding: 25px 15px; }
    .list { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .name { font-size: 14px; height: 38px; }
    .price { font-size: 15px; }
    .buy { padding: 6px 12px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- TOP NAVIGATION PORT -->
<div class="header">
    <div class="back-wrapper" onclick="history.back()">
        <span>←</span> Back
    </div>
    <div class="title">Trending Books</div>
</div>

<!-- CENTRAL INTERFACE GRID PORTAL -->
<div class="container">
    <div id="books" class="list">
        <!-- Initial Skeleton Loading Frame State -->
        <div class="status-box">
            <div class="spinner"></div>
            <div class="status-title">Loading Catalog Shelves</div>
            <div class="status-msg">Fetching top performing analytical item metrics across datastores...</div>
        </div>
    </div>
</div>

<script>
/* CORE DATA PIPELINE API ENDPOINT */
const API = "https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec";

/* Dynamic Ingestion Link Converter to Vector High Res Assets thumbnails */
function driveImage(link){
    if(!link) return "https://picsum.photos/400/600";
    try {
        let id = "";
        if(link.includes("id=")){ id = link.split("id=")[1].split("&")[0]; }
        if(link.includes("/file/d/")){ id = link.split("/file/d/")[1].split("/")[0]; }
        if(id){ return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000"; }
    } catch(e) { console.error("Image asset link mapping error catch exception:", e); }
    return link;
}

/* HIGH-SPEED GRID RENDER PARSING PIPELINE FLOW */
async function loadTrendingBooks(){
    const box = document.getElementById("books");
    
    try {
        // Parallel requests resolve structural delays
        const [productsRes, ordersRes] = await Promise.all([
            fetch(API + "?action=products&t=" + Date.now()),
            fetch(API + "?action=sellers&t=" + Date.now()) // Safe fallback token stream parameters
        ]);

        let productsData = await productsRes.json();
        let products = productsData.products || productsData;
        let orders = [];

        try {
            let ordersData = await ordersRes.json();
            orders = ordersData.orders || ordersData || [];
        } catch(e){ console.warn("Analytical order array records inject default context"); }

        if(!Array.isArray(products)) products = [];
        if(!Array.isArray(orders)) orders = [];

        // Filter out catalog structures based on status metrics
        products = products.filter(p => (p.status || p.ai_status) === "approved");

        if(products.length === 0) {
            box.innerHTML = `
                <div class="status-box">
                    <div class="status-title">No Books Found</div>
                    <div class="status-msg">There are no approved publications indexed on the grid architecture right now.</div>
                </div>`;
            return;
        }

        // Loop score allocations
        products.forEach(p => {
            let sales = orders.filter(o => 
                String(o.productId || o.product_id) === String(p.id) && (o.payment === "paid" || o.status === "paid")
            ).length;
            
            p.sales = p.sales || sales || 0;
            p.trendingScore = (p.sales * 5) + (Number(p.reads || 0) * 2);
        });

        // Sorting algorithm descending execution block
        products.sort((a, b) => b.trendingScore - a.trendingScore);

        let html = "";

        // Build top hot grid view items stream map
        products.slice(0, 20).forEach((p, i) => {
            let coverImg = p.front_cover || p.image || "";
            let categoryName = p.category || "General Content";
            
            html += `
                <div class="card" onclick="openBook('${p.id}')">
                    <div class="image-container">
                        ${i < 3 ? '<span class="badge">🔥 Hot</span>' : ''}
                        <img src="${driveImage(coverImg)}" onerror="this.src='https://picsum.photos/400/600'" alt="Cover Matrix Frame">
                    </div>
                    <div class="info">
                        <div class="name">${p.title || "Untitled Masterpiece"}</div>
                        <div class="meta">📊 ${p.sales || 0} distributed • ${categoryName}</div>
                        <div class="footer-action">
                            <div class="price">₹${p.price || 0}</div>
                            <button class="buy" onclick="buyNow(event, '${p.id}')">Buy Now</button>
                        </div>
                    </div>
                </div>
            `;
        });

        box.innerHTML = html;

    } catch(err) {
        console.error("System Fatal Exception processing index array loops:", err);
        box.innerHTML = `
            <div class="status-box" style="border-color: #fee2e2; background: #fff5f5;">
                <div class="status-title" style="color: #b91c1c;">Data Stream Synchronization Error</div>
                <div class="status-msg" style="color: #991b1b;">Connection tunnel mapping failed or execution script limit exceeded. Check your web deployment paths.</div>
                <button style="margin-top:15px; background:#ef4444; color:white; border:none; padding:8px 20px; border-radius:8px; font-weight:700; cursor:pointer;" onclick="location.reload()">Re-establish Sync</button>
            </div>`;
    }
}

/* ENGINE TRANSIT ROUTING MAPPING SCHEMAS */
function openBook(id){
    location.href = "ebook.html?id=" + id;
}

function buyNow(e, id){
    e.stopPropagation();
    localStorage.setItem("buyProduct", id);
    location.href = "payment.html";
}

// Ingest execution threads smoothly on document load
window.addEventListener("DOMContentLoaded", loadTrendingBooks);
</script>
</body>
</html>
