<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:35px;
border-radius:18px;
width:90%;
max-width:420px;
}

h2{
text-align:center;
color:#22c55e;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Reset Password</h2>

<input id="email" placeholder="Email">

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

<input id="newpass" type="password" placeholder="New Password">

<button onclick="resetPass()">Reset Password</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

/* SEND OTP */

async function sendOTP(){

let email=document.getElementById("email").value

let form=new FormData()

form.append("action","send_otp")
form.append("email",email)

let res=await fetch(API,{method:"POST",body:form})

let data=await res.json()

if(data.success){
alert("OTP sent to email")
}else{
alert("Failed")
}

}

/* VERIFY OTP */

async function verifyOTP(){

let email=document.getElementById("email").value
let otp=document.getElementById("otp").value

let form=new FormData()

form.append("action","verify_otp")
form.append("email",email)
form.append("otp",otp)

let res=await fetch(API,{method:"POST",body:form})

let data=await res.json()

if(data.success){

alert("OTP verified")

}else{

alert("Invalid OTP")

}

}

/* RESET PASSWORD */

async function resetPass(){

let email=document.getElementById("email").value
let pass=document.getElementById("newpass").value

let form=new FormData()

form.append("action","reset_password")
form.append("email",email)
form.append("password",pass)

let res=await fetch(API,{method:"POST",body:form})

let data=await res.json()

if(data.success){

alert("Password updated")

location.href="login.html"

}else{

alert("Failed")

}

}

</script>

</body>
</html>
