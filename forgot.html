<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:35px;
border-radius:18px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,.8);
}

h2{
text-align:center;
color:#22c55e;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.link{
margin-top:15px;
text-align:center;
opacity:.8;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Reset Password</h2>

<input id="email" placeholder="Enter your email">

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

<input id="newpass" type="password" placeholder="New Password">

<button onclick="resetPass()">Reset Password</button>

<div class="link" onclick="location.href='login.html'">
Back to Login
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyCsmLkWYQKj9zy8ji64BIq_neqrVfhNaUsvwU-sNAStAEfuLAqpmo6t7mnmtRghHU9/exec"

let verified=false

/* SEND OTP */

async function sendOTP(){

let email=document.getElementById("email").value.trim()

if(!email){

alert("Enter your email")

return

}

let form=new FormData()

form.append("action","send_otp")
form.append("email",email)

let res=await fetch(API,{
method:"POST",
body:form
})

let data=await res.json()

if(data.success){

alert("OTP sent to your email")

}else{

alert(data.message || "Account not found")

}

}

/* VERIFY OTP */

async function verifyOTP(){

let email=document.getElementById("email").value.trim()
let otp=document.getElementById("otp").value.trim()

if(!otp){

alert("Enter OTP")

return

}

let form=new FormData()

form.append("action","verify_otp")
form.append("email",email)
form.append("otp",otp)

let res=await fetch(API,{
method:"POST",
body:form
})

let data=await res.json()

if(data.success){

verified=true

alert("OTP verified")

}else{

alert("Invalid OTP")

}

}

/* RESET PASSWORD */

async function resetPass(){

if(!verified){

alert("Verify OTP first")

return

}

let email=document.getElementById("email").value.trim()
let pass=document.getElementById("newpass").value.trim()

if(pass.length<6){

alert("Password must be at least 6 characters")

return

}

let form=new FormData()

form.append("action","reset_password")
form.append("email",email)
form.append("password",pass)

let res=await fetch(API,{
method:"POST",
body:form
})

let data=await res.json()

if(data.success){

alert("Password updated successfully")

location.href="login.html"

}else{

alert(data.message || "Reset failed")

}

}

</script>

</body>
</html>
