<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>CreatorHub Reset Password</title><style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

/* PAGE */

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
animation:fadePage .6s ease;
}

/* CARD */

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:30px;

border-radius:18px;

width:90%;

max-width:420px;

border:1px solid #1f2937;

box-shadow:0 20px 40px rgba(0,0,0,.7);

position:relative;

animation:fadeUp .6s ease;

}

/* BACK BUTTON */

.back{
position:absolute;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
color:var(--accent);
transition:.2s;
}

.back:hover{
transform:translateX(-4px);
}

/* TITLE */

h2{
text-align:center;
color:var(--accent);
margin-top:0;
}

/* INPUT */

input{

width:100%;

padding:14px;

margin-top:14px;

border:none;

border-radius:12px;

background:#020617;

color:white;

outline:none;

border:1px solid #1f2937;

transition:.2s;

}

input:focus{
border-color:var(--accent);
}

/* BUTTON */

button{

width:100%;

padding:14px;

margin-top:18px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#22c55e,#4ade80);

color:black;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{
transform:scale(1.03);
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

/* LINK */

.link{
margin-top:12px;
text-align:center;
opacity:.7;
cursor:pointer;
}

/* ANIMATIONS */

@keyframes fadePage{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style></head><body><div class="card"><div class="back" onclick="location.href='login.html'">⬅</div><h2>🔑 Reset Password</h2><input id="email" placeholder="Enter Registered Email"><button id="otpBtn" onclick="sendOTP()">
Send OTP
</button><input id="otp" placeholder="Enter OTP"><input id="newPassword" type="password" placeholder="Enter New Password"><button id="resetBtn" onclick="resetPassword()">
Update Password 🚀
</button><div class="link" onclick="location.href='login.html'">
Back to Login
</div></div><script>

const API="https://script.google.com/macros/s/AKfycbzMCnhAdxOSnSl7tO6u3yZZEARctzq9kQIenT-PoO8Y68gN5kXWViEFD01BiRObxOY1/exec";

/* SEND OTP */

async function sendOTP(){

let email=document.getElementById("email").value.trim().toLowerCase();
let btn=document.getElementById("otpBtn");

if(!email){
alert("Enter email");
return;
}

btn.disabled=true;
btn.innerText="Sending OTP...";

try{

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"send_reset_otp",
email:email
})
});

let data=await res.json();

if(data.success){
alert("OTP sent to your email 📩");
}else{
alert(data.message || "Failed to send OTP");
}

}catch(e){

alert("Server Error ❌");

}

btn.disabled=false;
btn.innerText="Send OTP";

}


/* RESET PASSWORD */

async function resetPassword(){

let email=document.getElementById("email").value.trim().toLowerCase();
let otp=document.getElementById("otp").value.trim();
let password=document.getElementById("newPassword").value.trim();

let btn=document.getElementById("resetBtn");

if(!email || !otp || !password){
alert("Fill all fields");
return;
}

if(password.length<4){
alert("Password must be at least 4 characters");
return;
}

btn.disabled=true;
btn.innerText="Updating...";

try{

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"reset_password",
email:email,
otp:otp,
password:password
})
});

let data=await res.json();

if(data.success){

alert("Password updated successfully ✅");

location.href="login.html";

}else{

alert(data.message || "Reset Failed");

}

}catch(e){

alert("Server Error ❌");

}

btn.disabled=false;
btn.innerText="Update Password 🚀";

}

</script></body>
</html>
