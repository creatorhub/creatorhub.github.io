<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CreatorHub • Book Details</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* =========================================================
   PLATFORM MATCHING LIGHT DESIGN SYSTEM
   ========================================================= */
:root {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent-blue: #2563eb;
    --accent-blue-hover: #1d4ed8;
    --accent-blue-light: #eff6ff;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.02);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

html,
body{
    overflow-x:hidden;
    width:100%;
}

body{
    background: var(--bg-primary);
    color: var(--text-primary);
}
   
a{
    text-decoration:none;
}

img{
    display:block;
    max-width:100%;
}

.main{
    max-width:1450px;
    margin:auto;
    padding:40px 24px 100px;
}

/* TOPBAR */
.topbar{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-bottom: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
}

.logo{
    font-size:28px;
    font-weight:900;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}

.logo span{
    color: var(--accent-blue);
}

.top-actions{
    display:flex;
    gap:12px;
}

.top-btn{
    height:44px;
    padding:0 20px;
    border: 1px solid var(--border-color);
    border-radius:12px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: 14px;
    font-weight:600;
    cursor:pointer;
    transition: all 0.2s ease;
}

.top-btn:hover {
    color: var(--accent-blue);
    border-color: var(--accent-blue);
    background: var(--accent-blue-light);
}

/* LOADING MODULE */
.loading-book{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:140px 0;
    gap:20px;
}

.loader{
    width:50px;
    height:50px;
    border-radius:50%;
    border:4px solid var(--border-color);
    border-top:4px solid var(--accent-blue);
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    100%{ transform:rotate(360deg); }
}

.loading-text{
    font-size:15px;
    font-weight:600;
    color: var(--text-secondary);
}

/* HERO LAYOUT */
.book-layout{
    display:grid;
    grid-template-columns:440px 1fr;
    gap:40px;
    margin-top:15px;
    align-items:start;
}

@media(max-width:960px){
    .book-layout{
        grid-template-columns:1fr;
        gap: 30px;
    }
}

/* GALLERY (LEFT PANEL) */
.gallery{
    position:sticky;
    top:110px;
}

@media(max-width:960px){
    .gallery{
        position:static;
        top:auto;
    }
}

.main-image{
    background: var(--bg-secondary);
    border-radius:24px;
    padding:20px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
}

.main-image img{
    width:100%;
    height:540px;
    object-fit:contain;
    border-radius:16px;
    background: var(--bg-primary);
}

@media(max-width:960px){
    .main-image img{
        height:auto;
        max-height:420px;
    }
}

.thumbs{
    display:flex;
    gap:12px;
    margin-top:16px;
    overflow:auto;
    padding-bottom:4px;
}

.thumb{
    min-width:85px;
    height:115px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    border: 2px solid transparent;
    background: var(--bg-secondary);
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
}

.thumb.active{
    border-color: var(--accent-blue);
    transform: scale(0.96);
}

.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* DETAILS SHEET (RIGHT PANEL) */
.details{
    background: var(--bg-secondary);
    border-radius:24px;
    padding:40px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
}

.badges{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.badge{
    padding:6px 14px;
    border-radius:999px;
    background: var(--accent-blue-light);
    color: var(--accent-blue);
    font-size:12px;
    font-weight:700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
}

.title{
    font-size:42px;
    font-weight:800;
    line-height:1.2;
    margin-top:20px;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}

.author{
    margin-top:12px;
    font-size:16px;
    color: var(--text-secondary);
    font-weight: 500;
}

.stats{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    margin-top:28px;
}

.stat{
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    padding: 16px 24px;
    border-radius:16px;
    flex: 1;
    min-width:120px;
}

.stat-number{
    font-size:24px;
    font-weight:800;
    color: var(--text-primary);
}

.stat-label{
    margin-top:4px;
    font-size:12px;
    color: var(--text-secondary);
    font-weight: 500;
}

.price-wrap{
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
    margin-top:34px;
    background: var(--accent-blue-light);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid rgba(37, 99, 235, 0.1);
}

.price{
    font-size:48px;
    font-weight:800;
    color: var(--accent-blue);
}

.old-price{
    font-size:24px;
    color: var(--text-muted);
    text-decoration:line-through;
}

.discount{
    padding:6px 12px;
    border-radius:8px;
    background: #dcfce7;
    font-weight:700;
    color: #15803d;
    font-size: 14px;
}

.description{
    margin-top:34px;
    line-height:1.7;
    font-size:16px;
    color: var(--text-secondary);
}

.action-row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-top:38px;
}

.action-btn{
    height:54px;
    padding:0 28px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition: all 0.2s ease;
}

.buy-btn{
    background: var(--accent-blue);
    color:white;
    flex: 2;
    min-width: 160px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

.buy-btn:hover{
    background: var(--accent-blue-hover);
    transform: translateY(-1px);
}

.cart-btn{
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
}

.cart-btn:hover{
    background: #e2e8f0;
}

.share-btn{
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    padding: 0 20px;
}

/* METADATA INFORMATIONS GRID */
.meta-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
    margin-top:38px;
}

.meta{
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    padding:20px;
    border-radius:14px;
}

.meta-label{
    font-size:12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.02em;
}

.meta-value{
    margin-top:6px;
    font-size:22px;
    font-weight:800;
    color: var(--text-primary);
}

@media(max-width:700px){
    .title{ font-size:32px; }
    .price{ font-size:38px; }
    .meta-grid{ grid-template-columns:1fr; }
    .action-btn { width: 100%; }
}

/* REVIEWS MATRIX LAYER */
.section{
    margin-top:60px;
}

.section-title{
    font-size:28px;
    font-weight:800;
    margin-bottom:24px;
    letter-spacing: -0.02em;
}

.reviews-grid{
    display:grid;
    gap:16px;
}

.review{
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    padding:24px;
    border-radius:18px;
    box-shadow: var(--shadow-sm);
}

.review-top{
    display:flex;
    align-items:center;
    gap:14px;
}

.review-avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    object-fit:cover;
}

.review-name{
    font-size:16px;
    font-weight:700;
    color: var(--text-primary);
}

.review-rating{
    margin-top:2px;
    color:#eab308;
    font-weight:700;
    font-size: 14px;
}

.review-text{
    margin-top:14px;
    line-height:1.6;
    color: var(--text-secondary);
    font-size: 15px;
}

/* RELATED ITEMS SLIDER MATRIX */
.related-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.related-book{
    background: var(--bg-secondary);
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
}

.related-book:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
}

.related-book img{
    width:100%;
    height:300px;
    object-fit:contain;
    background:#f8fafc;
    padding:12px;
    border-bottom:1px solid var(--border-color);
}

@media(max-width:700px){

    .related-grid{
        grid-template-columns:repeat(2,1fr);
        gap:14px;
    }

    .related-book img{
        height:220px;
        padding:8px;
    }

}

.related-content{
    padding:16px;
}

.related-title{
    font-size:14px;
    font-weight:700;
    line-height:1.4;
    color: var(--text-primary);
    height: 38px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.related-price{
    margin-top:12px;
    font-size:20px;
    font-weight:800;
    color: var(--accent-blue);
}
</style>
</head>

<body>

<!-- NAVBAR SHEET -->
<div class="topbar">
    <div class="logo">Creator<span>Hub</span></div>
    <div class="top-actions">
        <button class="top-btn" onclick="location.href='index.html'">Back Home</button>
    </div>
</div>

<!-- CONTAINER WRAPPER -->
<div class="main">
    <div id="bookContainer">
        <div class="loading-book">
            <div class="loader"></div>
            <div class="loading-text">Loading Book Specifications...</div>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxrwzYN0t_4yY7qfcUT3JyDA69vlD4SbVzND-Y_9n5sqwEauTj4j4J-9qxoY3RQ6QWTvw/exec";

/* Direct Thumbnail Ingestion Loader */
function driveImage(url){
    if(!url) return "";
    if(url.includes("uc?id=")){
        let id = url.split("id=")[1].split("&")[0];
        return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200";
    }
    if(url.includes("/d/")){
        let id = url.split("/d/")[1].split("/")[0];
        return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200";
    }
    return url;
}

const params = new URLSearchParams(location.search);
const BOOK_ID = params.get("id");

/* CORE INGESTION HANDLER METHOD */
async function loadBook(){
    try{
        let res = await fetch(API+"?action=products");
        let data = await res.json();

        if(!data.success){
            document.getElementById("bookContainer").innerHTML = `<div class="loading-text" style="color:red; text-align:center;">Failed to compile book parameters.</div>`;
            return;
        }

        let books = data.products || [];
        let book = books.find(b=>b.id==BOOK_ID);

        if(!book){
            document.getElementById("bookContainer").innerHTML = `<div class="loading-text" style="text-align:center;">Asset identity parameters not found inside datastore.</div>`;
            return;
        }

        renderBook(book,books);
    }catch(err){
        console.error("handshake validation connection failure execution:", err);
        document.getElementById("bookContainer").innerHTML = `<div class="loading-text" style="color:red; text-align:center;">Server communication loop disrupted.</div>`;
    }
}

/* RENDERING INTERFACE INGEST PIPELINE LOOP */
function renderBook(book,books){
    let front = driveImage(book.front_cover);
    let back = driveImage(book.back_cover);
    let rating = book.rating || "0.0";
    let readers = book.reads || 0;
    let reviews = book.review_count || 0;
    let price = Number(book.price || 0);
    let oldPrice = price + 399;
    let discount = Math.round(((oldPrice-price)/oldPrice)*100);

    let reviewsHTML = "";

    if(book.reviews){
        let all = String(book.reviews).split("||");
        all.forEach(r=>{
            let text = r.trim();
            if(!text) return;
            let rate = text.match(/⭐\s*(\d+)/);
            let stars = rate ? rate[1] : "5";
            let clean = text.replace(/⭐\s*\d+\s*-\s*/,"");

            reviewsHTML += `
                <div class="review">
                    <div class="review-top">
                        <img class="review-avatar" src="https://ui-avatars.com/api/?name=Reader&background=2563eb&color=fff">
                        <div>
                            <div class="review-name">Verified Reader</div>
                            <div class="review-rating">⭐ ${stars}.0</div>
                        </div>
                    </div>
                    <div class="review-text">${clean}</div>
                </div>`;
        });
    }else{
        reviewsHTML = `<div class="review" style="color:var(--text-secondary); text-align:center;">No verification logs recorded for this asset yet.</div>`;
    }

    let relatedHTML = "";
    let relatedBooks = books.filter(b => b.id != book.id && b.status == "approved" && b.category == book.category);

    if(relatedBooks.length < 4){
        relatedBooks = books.filter(b => b.id != book.id && b.status == "approved");
    }

    relatedBooks.slice(0, 4).forEach(r=>{
        relatedHTML += `
            <div class="related-book" onclick="location.href='book.html?id=${r.id}'">
                <img src="${driveImage(r.front_cover)}" onerror="this.src='https://picsum.photos/400/600'">
                <div class="related-content">
                    <div class="related-title">${r.title || "Untitled Masterpiece"}</div>
                    <div style="margin-top:6px; color:var(--text-secondary); font-size:12px; font-weight:500;">by ${r.author || "Unknown Creator"}</div>
                    <div class="related-price">₹${r.price || 0}</div>
                </div>
            </div>`;
    });

    document.getElementById("bookContainer").innerHTML = `
        <div class="book-layout">
            <div class="gallery">
                <div class="main-image">
                    <img id="mainBookImage" src="${front}" onerror="this.src='https://picsum.photos/400/600'">
                </div>
                <div class="thumbs">
                    <div class="thumb active" onclick="changeImage('${front}',this)">
                        <img src="${front}" onerror="this.src='https://picsum.photos/400/600'">
                    </div>
                    <div class="thumb" onclick="changeImage('${back}',this)">
                        <img src="${back}" onerror="this.src='https://picsum.photos/400/600'">
                    </div>
                </div>
            </div>

            <div class="details">
                <div class="badges">
                    <div class="badge">🔥 Bestseller</div>
                    <div class="badge">⚡ Instant Access</div>
                    <div class="badge">📚 Premium Ebook</div>
                </div>
                <div class="title">${book.title}</div>
                <div class="author">by ${book.author || "Unknown"}</div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-number">⭐ ${rating}</div>
                        <div class="stat-label">Rating</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${readers}</div>
                        <div class="stat-label">Readers</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${reviews}</div>
                        <div class="stat-label">Reviews</div>
                    </div>
                </div>

                <div class="price-wrap">
                    <div class="price">₹${price}</div>
                    <div class="old-price">₹${oldPrice}</div>
                    <div class="discount">${discount}% OFF</div>
                </div>

                <div class="description">${book.description || "No specification analysis details recorded for this catalog block."}</div>

                <div class="action-row">
                    <button class="action-btn buy-btn" onclick="buyNow()">Buy Now</button>
                    <button class="action-btn cart-btn" onclick="addToCart('${book.id}')">Add To Cart</button>
                    <button class="action-btn share-btn" onclick="shareBook()">🔗 Share</button>
                </div>

                <div class="meta-grid">
                    <div class="meta">
                        <div class="meta-label">Category</div>
                        <div class="meta-value">${book.category || "General"}</div>
                    </div>
                    <div class="meta">
                        <div class="meta-label">Pages</div>
                        <div class="meta-value">${book.pages || "0"}</div>
                    </div>
                    <div class="meta">
                        <div class="meta-label">Language</div>
                        <div class="meta-value">${book.language || "English"}</div>
                    </div>
                    <div class="meta">
                        <div class="meta-label">Format</div>
                        <div class="meta-value">PDF</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Reader Reviews</div>
            <div class="reviews-grid">${reviewsHTML}</div>
        </div>

        <div class="section">
            <div class="section-title">Related Books</div>
            <div class="related-grid">${relatedHTML}</div>
        </div>`;
}

function changeImage(src,el){
    document.getElementById("mainBookImage").src = src;
    document.querySelectorAll(".thumb").forEach(t=>{ t.classList.remove("active"); });
    el.classList.add("active");
}

function addToCart(id){
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    if(!cart.includes(id)){
        cart.push(id);
        localStorage.setItem("cart",JSON.stringify(cart));
        alert("Added To Cart ✅");
    }else{
        alert("Already In Cart");
    }
}

function shareBook(){
    navigator.share({ title:document.title, url:location.href });
}

function buyNow(){
    location.href = "checkout.html?id=" + BOOK_ID;
}

loadBook();
</script>
</body>
</html>
