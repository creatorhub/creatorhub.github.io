<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
CreatorHub • Book Details
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="
https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
linear-gradient(
180deg,
#020617,
#071120
);

color:white;

overflow-x:hidden;

min-height:100vh;

}

/* =========================================
GLOBAL
========================================= */

a{
text-decoration:none;
color:white;
}

img{
display:block;
max-width:100%;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

/* =========================================
BACKGROUND
========================================= */

.bg1{

position:fixed;

top:-250px;
right:-250px;

width:700px;
height:700px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(34,197,94,.16),
transparent
);

z-index:0;

}

.bg2{

position:fixed;

bottom:-250px;
left:-250px;

width:650px;
height:650px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(59,130,246,.12),
transparent
);

z-index:0;

}

/* =========================================
TOPBAR
========================================= */

.topbar{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 26px;

background:
rgba(2,6,23,.9);

backdrop-filter:blur(16px);

border-bottom:
1px solid rgba(255,255,255,.06);

}

.logo{

font-size:38px;
font-weight:900;

}

.logo span{
color:#4ade80;
}

.nav{

display:flex;
align-items:center;
gap:26px;

}

.nav a{

font-size:14px;
font-weight:700;

opacity:.8;

transition:.25s;

}

.nav a:hover{

opacity:1;
color:#4ade80;

}

.back-btn{

height:52px;

padding:0 24px;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

font-weight:800;

}

/* =========================================
MAIN
========================================= */

.main{

position:relative;
z-index:2;

max-width:1500px;

margin:auto;

padding:
40px 20px 120px;

}

/* =========================================
BOOK GRID
========================================= */

.book-layout{

display:grid;

grid-template-columns:
420px 1fr;

gap:55px;

align-items:start;

}

/* =========================================
BOOK COVER
========================================= */

.book-side{

position:sticky;
top:110px;

}

.book-cover-wrap{

background:
rgba(15,23,42,.92);

border:
1px solid rgba(255,255,255,.06);

padding:22px;

border-radius:34px;

box-shadow:
0 25px 80px rgba(0,0,0,.35);

}

.book-cover{

width:100%;

border-radius:24px;

aspect-ratio:3/4;

object-fit:cover;

background:#081225;

}

/* =========================================
SMALL INFO
========================================= */

.small-stats{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:12px;

margin-top:20px;

}

.stat{

background:#081225;

padding:16px;

border-radius:20px;

text-align:center;

border:
1px solid rgba(255,255,255,.05);

}

.stat-number{

font-size:20px;
font-weight:900;

color:#4ade80;

}

.stat-label{

margin-top:6px;

font-size:12px;

opacity:.7;

}

/* =========================================
DETAILS
========================================= */

.book-details{

background:
rgba(15,23,42,.82);

border:
1px solid rgba(255,255,255,.06);

padding:42px;

border-radius:36px;

backdrop-filter:blur(14px);

}

/* =========================================
BADGES
========================================= */

.badges{

display:flex;
gap:12px;
flex-wrap:wrap;

margin-bottom:22px;

}

.badge{

padding:10px 16px;

border-radius:999px;

font-size:13px;
font-weight:800;

background:#081225;

border:
1px solid rgba(255,255,255,.06);

}

.green{
background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);
}

/* =========================================
TITLE
========================================= */

.book-title{

font-size:72px;
font-weight:900;

line-height:1.05;

max-width:900px;

}

.book-author{

margin-top:18px;

font-size:18px;

opacity:.72;

}

/* =========================================
PRICE
========================================= */

.price-box{

margin-top:30px;

display:flex;
align-items:center;
gap:18px;
flex-wrap:wrap;

}

.book-price{

font-size:62px;
font-weight:900;

color:#4ade80;

}

.old-price{

font-size:28px;

opacity:.45;

text-decoration:line-through;

}

/* =========================================
BUTTONS
========================================= */

.action-buttons{

display:flex;
gap:18px;
flex-wrap:wrap;

margin-top:34px;

}

.buy-btn{

height:70px;

padding:0 34px;

border:none;

border-radius:22px;

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

font-size:16px;
font-weight:900;

cursor:pointer;

transition:.3s;

}

.buy-btn:hover{

transform:translateY(-4px);

box-shadow:
0 15px 35px rgba(34,197,94,.22);

}

.preview-btn{

height:70px;

padding:0 34px;

border:none;

border-radius:22px;

background:#081225;

border:
1px solid rgba(255,255,255,.08);

color:white;

font-size:16px;
font-weight:900;

cursor:pointer;

}

/* =========================================
DESCRIPTION
========================================= */

.section{

margin-top:55px;

}

.section-title{

font-size:36px;
font-weight:900;

margin-bottom:18px;

}

.section-text{

line-height:2;

font-size:16px;

opacity:.78;

}

/* =========================================
FEATURES
========================================= */

.features{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:18px;

margin-top:26px;

}

.feature{

background:#081225;

padding:24px;

border-radius:26px;

border:
1px solid rgba(255,255,255,.05);

}

.feature h3{

font-size:20px;
font-weight:900;

margin-top:16px;

}

.feature p{

margin-top:12px;

line-height:1.8;

font-size:14px;

opacity:.72;

}

.feature-icon{

width:58px;
height:58px;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;

background:
linear-gradient(
135deg,
#16a34a,
#4ade80
);

}

/* =========================================
AUTHOR BOX
========================================= */

.author-box{

margin-top:30px;

display:flex;
align-items:center;

gap:20px;

padding:26px;

border-radius:28px;

background:#081225;

border:
1px solid rgba(255,255,255,.06);

}

.author-image{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(34,197,94,.25);

}

.author-name{

font-size:26px;
font-weight:900;

}

.author-bio{

margin-top:10px;

line-height:1.8;

font-size:14px;

opacity:.72;

}

/* =========================================
REVIEWS
========================================= */

.reviews{

display:grid;

gap:18px;

margin-top:24px;

}

.review{

background:#081225;

padding:24px;

border-radius:24px;

border:
1px solid rgba(255,255,255,.05);

}

.review-head{

display:flex;
justify-content:space-between;
align-items:center;

}

.review-name{

font-size:18px;
font-weight:800;

}

.review-stars{

color:#facc15;

font-size:18px;

}

.review-text{

margin-top:16px;

line-height:1.9;

font-size:14px;

opacity:.75;

}

/* =========================================
RELATED
========================================= */

.related-grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:18px;

margin-top:28px;

}

.related-book{

background:#081225;

border:
1px solid rgba(255,255,255,.05);

border-radius:24px;

overflow:hidden;

transition:.25s;

cursor:pointer;

}

.related-book:hover{

transform:translateY(-4px);

border-color:
rgba(74,222,128,.18);

}

.related-cover{

width:100%;

aspect-ratio:3/4;

object-fit:cover;

}

.related-content{

padding:14px;

}

.related-title{

font-size:14px;
font-weight:800;

line-height:1.5;

}

.related-price{

margin-top:10px;

font-size:24px;
font-weight:900;

color:#4ade80;

}

/* =========================================
LOADER
========================================= */

.loader{

padding:120px 20px;

text-align:center;

font-size:18px;

opacity:.7;

}

/* =========================================
MOBILE
========================================= */

@media(max-width:1100px){

.book-layout{

grid-template-columns:1fr;

}

.book-side{

position:relative;
top:0;

}

.related-grid{

grid-template-columns:
repeat(2,1fr);

}

.book-title{

font-size:52px;

}

}

@media(max-width:700px){

.topbar{

padding:18px 14px;

}

.logo{

font-size:30px;

}

.nav a{
display:none;
}

.book-details{

padding:28px 22px;

border-radius:28px;

}

.book-title{

font-size:42px;

}

.book-price{

font-size:44px;

}

.features{

grid-template-columns:1fr;

}

.related-grid{

grid-template-columns:1fr;

}

.author-box{

flex-direction:column;
align-items:flex-start;

}

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<!-- =========================================
TOPBAR
========================================= -->

<div class="topbar">

<div class="logo">
Creator<span>Hub</span>
</div>

<div class="nav">

<a href="index.html">
Home
</a>

<a href="#">
Marketplace
</a>

<a href="#">
Subscriptions
</a>

<a href="#">
Support
</a>

<a
href="index.html"
class="back-btn">
Back Home
</a>

</div>

</div>

<!-- =========================================
MAIN
========================================= -->

<div class="main">

<div
id="bookContainer"
class="loader">

Loading Book...

</div>

</div>

<script>

/* =========================================
API
========================================= */

const API =
"https://script.google.com/macros/s/AKfycbxrwzYN0t_4yY7qfcUT3JyDA69vlD4SbVzND-Y_9n5sqwEauTj4j4J-9qxoY3RQ6QWTvw/exec"

/* =========================================
GET BOOK ID
========================================= */

const params =
new URLSearchParams(
window.location.search
)

const BOOK_ID =
params.get("id")

/* =========================================
DRIVE IMAGE
========================================= */

function driveImage(url){

if(!url){
return ""
}

if(url.includes("uc?id=")){

let id =
url.split("id=")[1]
.split("&")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

if(url.includes("/d/")){

let id =
url.split("/d/")[1]
.split("/")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

return url

}

/* =========================================
LOAD BOOK
========================================= */

async function loadBook(){

try{

let res =
await fetch(
API + "?action=products"
)

let data =
await res.json()

if(
!data.success ||
!data.products
){

document.getElementById(
"bookContainer"
).innerHTML =
"Book not found"

return

}

let book =
data.products.find(
x => String(x.id) === String(BOOK_ID)
)

if(!book){

document.getElementById(
"bookContainer"
).innerHTML =
"Book not found"

return

}

renderBook(book,data.products)

}catch(err){

console.log(err)

document.getElementById(
"bookContainer"
).innerHTML =
"Failed to load book"

}

}

/* =========================================
RENDER BOOK
========================================= */

function renderBook(book,allBooks){

let related =
allBooks
.filter(x=>x.id!=book.id)
.slice(0,4)

document.getElementById(
"bookContainer"
).innerHTML = `

<div class="book-layout">

<!-- LEFT -->

<div class="book-side">

<div class="book-cover-wrap">

<img
class="book-cover"
src="${driveImage(book.front_cover)}"
>

<div class="small-stats">

<div class="stat">

<div class="stat-number">
₹${Number(book.price || 0)}
</div>

<div class="stat-label">
Price
</div>

</div>

<div class="stat">

<div class="stat-number">
${book.category || "Ebook"}
</div>

<div class="stat-label">
Category
</div>

</div>

<div class="stat">

<div class="stat-number">
${book.language || "PDF"}
</div>

<div class="stat-label">
Format
</div>

</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="book-details">

<div class="badges">

<div class="badge green">
Trending Ebook
</div>

<div class="badge">
Instant Access
</div>

<div class="badge">
Premium Content
</div>

</div>

<div class="book-title">
${book.title || "Untitled"}
</div>

<div class="book-author">
by ${book.author || "Unknown Author"}
</div>

<div class="price-box">

<div class="book-price">
₹${Number(book.price||0)}
</div>

<div class="old-price">
₹${Number(book.price||0)+399}
</div>

</div>

<div class="action-buttons">

<button
class="buy-btn"
onclick="buyBook('${book.id}')"
>
Buy Now
</button>

<button
class="preview-btn"
onclick="previewBook()"
>
Preview Book
</button>

</div>

<!-- DESCRIPTION -->

<div class="section">

<div class="section-title">
About This Ebook
</div>

<div class="section-text">

${book.description || "No description available for this ebook yet. Explore premium knowledge, actionable strategies, and high-value content created for readers, entrepreneurs and creators."}

</div>

</div>

<!-- FEATURES -->

<div class="section">

<div class="section-title">
What You'll Learn
</div>

<div class="features">

<div class="feature">

<div class="feature-icon">
📘
</div>

<h3>
Premium Knowledge
</h3>

<p>
Learn practical concepts, strategies and insights from this ebook.
</p>

</div>

<div class="feature">

<div class="feature-icon">
🚀
</div>

<h3>
Actionable Strategies
</h3>

<p>
Apply real-world methods and improve your skills effectively.
</p>

</div>

<div class="feature">

<div class="feature-icon">
🎯
</div>

<h3>
Easy To Understand
</h3>

<p>
Simple explanations and structured chapters for every reader.
</p>

</div>

<div class="feature">

<div class="feature-icon">
📚
</div>

<h3>
Lifetime Access
</h3>

<p>
Access your purchased ebook anytime from your library dashboard.
</p>

</div>

</div>

</div>

<!-- AUTHOR -->

<div class="section">

<div class="section-title">
About The Author
</div>

<div class="author-box">

<img
class="author-image"
src="https://ui-avatars.com/api/?name=${encodeURIComponent(book.author || 'Author')}&background=22c55e&color=fff"
>

<div>

<div class="author-name">
${book.author || "Unknown Author"}
</div>

<div class="author-bio">

Digital creator, educator and ebook publisher on CreatorHub. Passionate about sharing high-value knowledge through premium content and practical learning experiences.

</div>

</div>

</div>

</div>

<!-- REVIEWS -->

<div class="section">

<div class="section-title">
Reader Reviews
</div>

<div class="reviews">

<div class="review">

<div class="review-head">

<div class="review-name">
Ayush Kumar
</div>

<div class="review-stars">
★★★★★
</div>

</div>

<div class="review-text">

Amazing ebook with premium quality content and easy explanations. Highly recommended for serious learners.

</div>

</div>

<div class="review">

<div class="review-head">

<div class="review-name">
Priyanka Sharma
</div>

<div class="review-stars">
★★★★★
</div>

</div>

<div class="review-text">

Very useful and practical. The design, structure and knowledge quality are excellent.

</div>

</div>

</div>

</div>

<!-- RELATED -->

<div class="section">

<div class="section-title">
Related Ebooks
</div>

<div class="related-grid">

${related.map(r=>`

<div
class="related-book"
onclick="
window.location.href='book.html?id=${r.id}'
"
>

<img
class="related-cover"
src="${driveImage(r.front_cover)}"
>

<div class="related-content">

<div class="related-title">
${r.title || "Untitled"}
</div>

<div class="related-price">
₹${Number(r.price||0)}
</div>

</div>

</div>

`).join("")}

</div>

</div>

</div>

</div>

`

}

/* =========================================
BUY
========================================= */

function buyBook(id){

let email =
localStorage.getItem(
"user_email"
)

if(!email){

alert(
"Please login first"
)

window.location.href =
"login.html"

return

}

window.location.href =
"checkout.html?id="+id

}

/* =========================================
PREVIEW
========================================= */

function previewBook(){

alert(
"Preview feature coming soon"
)

}

/* =========================================
START
========================================= */

loadBook()

</script>

</body>
  </html>
