<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
CreatorHub • Ebook Details
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="
https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:
linear-gradient(
180deg,
#020617,
#071120
);

color:white;

overflow-x:hidden;

}

/* =====================================================
GLOBAL
===================================================== */

a{
text-decoration:none;
color:white;
}

img{
display:block;
max-width:100%;
}

::-webkit-scrollbar{
width:6px;
height:4px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

/* =====================================================
TOPBAR
===================================================== */

.topbar{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 22px;

background:
rgba(2,6,23,.92);

backdrop-filter:blur(18px);

border-bottom:
1px solid rgba(255,255,255,.06);

}

.logo{

font-size:34px;
font-weight:900;

}

.logo span{
color:#4ade80;
}

.nav{

display:flex;
align-items:center;
gap:24px;

}

.nav a{

font-size:14px;
font-weight:700;

opacity:.82;

transition:.3s;

}

.nav a:hover{

opacity:1;
color:#4ade80;

}

.back-btn{

height:50px;

padding:0 24px;

border:none;

border-radius:18px;

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

font-weight:900;

cursor:pointer;

}

/* =====================================================
MAIN
===================================================== */

.main{

max-width:1450px;

margin:auto;

padding:
40px 16px 100px;

}

/* =====================================================
LOADER
===================================================== */

.loading-book{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

padding:150px 0;

gap:18px;

}

.loader{

width:62px;
height:62px;

border-radius:50%;

border:5px solid
rgba(255,255,255,.08);

border-top:5px solid #4ade80;

animation:spin 1s linear infinite;

box-shadow:
0 0 40px rgba(74,222,128,.2);

}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.loading-text{

font-size:16px;
font-weight:700;

opacity:.8;

}

/* =====================================================
SHOWCASE
===================================================== */

.book-showcase{

display:grid;

grid-template-columns:
340px 1fr;

gap:40px;

align-items:start;

}

/* =====================================================
LEFT
===================================================== */

.book-gallery{

position:sticky;

top:90px;

display:flex;
flex-direction:column;
align-items:center;

}

.main-book-image{

width:100%;

max-width:300px;

height:420px;

object-fit:cover;

border-radius:26px;

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 25px 70px rgba(0,0,0,.45);

}

.thumb-row{

display:flex;

gap:12px;

margin-top:18px;

overflow-x:auto;

padding-bottom:4px;

max-width:320px;

}

.thumb{

width:70px;
height:90px;

min-width:70px;

object-fit:cover;

border-radius:16px;

cursor:pointer;

border:
2px solid transparent;

transition:.3s;

background:#081225;

}

.thumb:hover{

transform:translateY(-3px);

}

.active-thumb{

border-color:#4ade80;

}

/* =====================================================
RIGHT
===================================================== */

.book-info{

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

border-radius:34px;

padding:40px;

}

/* TAGS */

.tags{

display:flex;
gap:12px;
flex-wrap:wrap;

}

.tag{

padding:10px 16px;

border-radius:999px;

background:#081225;

font-size:13px;
font-weight:800;

}

.green{
background:#14532d;
color:#86efac;
}

/* TITLE */

.book-title{

margin-top:24px;

font-size:58px;
font-weight:900;

line-height:1.05;

}

.book-author{

margin-top:14px;

font-size:18px;

opacity:.72;

}

/* STATS */

.stats{

display:flex;
gap:14px;
flex-wrap:wrap;

margin-top:30px;

}

.stat{

background:#081225;

padding:18px 22px;

border-radius:20px;

min-width:130px;

}

.stat-number{

font-size:22px;
font-weight:900;

color:#4ade80;

}

.stat-label{

margin-top:6px;

font-size:13px;

opacity:.7;

}

/* PRICE */

.price-row{

display:flex;
align-items:center;
gap:16px;
flex-wrap:wrap;

margin-top:34px;

}

.price{

font-size:62px;
font-weight:900;

color:#4ade80;

}

.old-price{

font-size:32px;

opacity:.35;

text-decoration:line-through;

}

.discount{

padding:10px 14px;

border-radius:12px;

background:#14532d;

font-size:14px;
font-weight:900;

color:#86efac;

}

/* DESCRIPTION */

.desc{

margin-top:34px;

line-height:2;

font-size:16px;

opacity:.82;

}

/* BUTTONS */

.actions{

display:flex;
gap:16px;
flex-wrap:wrap;

margin-top:36px;

}

.action-btn{

height:60px;

padding:0 28px;

border:none;

border-radius:18px;

font-size:15px;
font-weight:900;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{
transform:translateY(-3px);
}

.buy{

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

}

.cart{

background:#081225;
color:white;
}

.share{

background:#081225;
color:white;
}

/* INFO */

.info-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:18px;

margin-top:42px;

}

.info-box{

background:#081225;

padding:24px;

border-radius:22px;

}

.info-label{

font-size:13px;

opacity:.65;

}

.info-value{

margin-top:10px;

font-size:30px;
font-weight:900;

}

/* =====================================================
REVIEWS
===================================================== */

.review-section{

margin-top:80px;

}

.section-title{

font-size:46px;
font-weight:900;

}

.review-grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:22px;

margin-top:30px;

}

.review{

background:#0f172a;

padding:28px;

border-radius:26px;

border:
1px solid rgba(255,255,255,.06);

}

.review-top{

display:flex;
align-items:center;
gap:14px;

}

.review-avatar{

width:54px;
height:54px;

border-radius:50%;

object-fit:cover;

}

.review-name{

font-size:18px;
font-weight:800;

}

.review-rating{

margin-top:3px;

font-size:14px;

color:#4ade80;

}

.review-text{

margin-top:20px;

line-height:1.9;

opacity:.82;

}

/* =====================================================
RELATED
===================================================== */

.related-section{

margin-top:90px;

}

.related-grid{

display:grid;

grid-template-columns:
repeat(5,1fr);

gap:18px;

margin-top:28px;

}

.related-book{

background:#0f172a;

border-radius:22px;

overflow:hidden;

cursor:pointer;

transition:.3s;

border:
1px solid rgba(255,255,255,.05);

}

.related-book:hover{

transform:translateY(-5px);

}

.related-cover{

width:100%;

aspect-ratio:3/4;

object-fit:cover;

}

.related-content{
padding:14px;
}

.related-title{

font-size:14px;
font-weight:800;

line-height:1.5;

}

.related-price{

margin-top:10px;

font-size:24px;
font-weight:900;

color:#4ade80;

}

/* =====================================================
MOBILE
===================================================== */

@media(max-width:1000px){

.book-showcase{
grid-template-columns:1fr;
}

.book-gallery{
position:relative;
top:0;
}

.review-grid{
grid-template-columns:1fr;
}

.related-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:700px){

.topbar{
padding:16px 14px;
}

.logo{
font-size:28px;
}

.nav a{
display:none;
}

.book-title{
font-size:42px;
}

.price{
font-size:52px;
}

.main-book-image{

max-width:220px;

height:300px;

}

.thumb{

width:58px;
height:78px;

min-width:58px;

}

.info-grid{
grid-template-columns:1fr;
}

.section-title{
font-size:34px;
}

.book-info{
padding:28px;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
Creator<span>Hub</span>
</div>

<div class="nav">

<a href="index.html">
Home
</a>

<a href="subscription.html">
Subscriptions
</a>

<a href="support.html">
Support
</a>

<button
class="back-btn"
onclick="
window.location.href='index.html'
">
Back Home
</button>

</div>

</div>

<div class="main">

<div
id="bookContainer"
class="loading-book"
>

<div class="loader"></div>

<div class="loading-text">
Loading Book...
</div>

</div>

</div>

<script>

/* =====================================================
API
===================================================== */

const API =
"https://script.google.com/macros/s/AKfycbwVRER7JHaZkSAvVS_etfLYI7FxL4atwB_FYqIxZeYmz5ICoo42FMFzd9B5lyFEsCMC8g/exec"

/* =====================================================
BOOK ID
===================================================== */

const params =
new URLSearchParams(
window.location.search
)

const BOOK_ID =
params.get("id")

/* =====================================================
DRIVE IMAGE
===================================================== */

function driveImage(url){

if(!url) return ""

if(url.includes("uc?id=")){

let id =
url.split("id=")[1]
.split("&")[0]

return `
https://drive.google.com/thumbnail?id=${id}&sz=w1200
`

}

if(url.includes("/d/")){

let id =
url.split("/d/")[1]
.split("/")[0]

return `
https://drive.google.com/thumbnail?id=${id}&sz=w1200
`

}

return url

}

/* =====================================================
CHANGE IMAGE
===================================================== */

function changePreview(el){

document.getElementById(
"mainBookImage"
).src = el.src

document
.querySelectorAll(".thumb")
.forEach(t=>{

t.classList.remove(
"active-thumb"
)

})

el.classList.add(
"active-thumb"
)

}

/* =====================================================
LOAD BOOK
===================================================== */

async function loadBook(){

try{

let res =
await fetch(

API + "?action=book&id=" + BOOK_ID

)

let data =
await res.json()

if(
!data.success ||
!data.book
){

showError()
return

}

let book = data.book

let reviews =
data.reviews || []

let related =
data.related || []

let rating =
data.rating || "0"

let totalReviews =
data.total_reviews || 0

let title =
book.title || "Untitled"

let author =
book.author || "Unknown"

let price =
Number(book.price || 0)

let oldPrice =
price + 399

let discount =
Math.round(
((oldPrice-price)/oldPrice)*100
)

let language =
book.language || "English"

let pages =
book.pages || "120"

let category =
book.category || "Ebook"

let description =
book.description ||
"No description available."

let readers =
book.views || 0

/* ADD VIEW */

fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"add_view",

book_id:book.id

})

})

document.getElementById(
"bookContainer"
).innerHTML = `

<div class="book-showcase">

<div class="book-gallery">

<img
id="mainBookImage"
class="main-book-image"
src="${driveImage(book.front_cover)}"
>

<div class="thumb-row">

<img
class="thumb active-thumb"
src="${driveImage(book.front_cover)}"
onclick="changePreview(this)"
>

${book.back_cover ? `

<img
class="thumb"
src="${driveImage(book.back_cover)}"
onclick="changePreview(this)"
>

` : ""}

</div>

</div>

<div class="book-info">

<div class="tags">

<div class="tag green">
🔥 Bestseller
</div>

<div class="tag">
⚡ Instant Access
</div>

<div class="tag">
📚 Premium Ebook
</div>

</div>

<div class="book-title">
${title}
</div>

<div class="book-author">
by ${author}
</div>

<div class="stats">

<div class="stat">

<div class="stat-number">
⭐ ${rating}
</div>

<div class="stat-label">
${totalReviews} Reviews
</div>

</div>

<div class="stat">

<div class="stat-number">
${readers}
</div>

<div class="stat-label">
Readers
</div>

</div>

<div class="stat">

<div class="stat-number">
${language}
</div>

<div class="stat-label">
Language
</div>

</div>

</div>

<div class="price-row">

<div class="price">
₹${price}
</div>

<div class="old-price">
₹${oldPrice}
</div>

<div class="discount">
${discount}% OFF
</div>

</div>

<div class="desc">
${description}
</div>

<div class="actions">

<button
class="action-btn buy"
onclick="buyBook()"
>
Buy Now
</button>

<button
class="action-btn cart"
onclick="addToCart('${book.id}')"
>
Add To Cart
</button>

<button
class="action-btn share"
onclick="shareBook()"
>
Share
</button>

</div>

<div class="info-grid">

<div class="info-box">

<div class="info-label">
Category
</div>

<div class="info-value">
${category}
</div>

</div>

<div class="info-box">

<div class="info-label">
Pages
</div>

<div class="info-value">
${pages}
</div>

</div>

<div class="info-box">

<div class="info-label">
Language
</div>

<div class="info-value">
${language}
</div>

</div>

<div class="info-box">

<div class="info-label">
Access
</div>

<div class="info-value">
Lifetime
</div>

</div>

</div>

</div>

</div>

<!-- REVIEWS -->

<div class="review-section">

<div class="section-title">
Reader Reviews
</div>

<div class="review-grid">

${
reviews.length > 0

?

reviews.map(r=>`

<div class="review">

<div class="review-top">

<img
class="review-avatar"
src="
https://ui-avatars.com/api/?name=${encodeURIComponent(r.name)}&background=22c55e&color=fff
"
>

<div>

<div class="review-name">
${r.name}
</div>

<div class="review-rating">
⭐ ${r.rating}
</div>

</div>

</div>

<div class="review-text">
${r.review}
</div>

</div>

`).join("")

:

`

<div
style="
opacity:.7;
padding:20px;
"
>

No reviews yet.

</div>

`

}

</div>

</div>

<!-- RELATED -->

<div class="related-section">

<div class="section-title">
Related Books
</div>

<div class="related-grid">

${related.map(r=>`

<div
class="related-book"
onclick="
window.location.href=
'book.html?id=${r.id}'
"
>

<img
class="related-cover"
src="${driveImage(r.front_cover)}"
>

<div class="related-content">

<div class="related-title">
${r.title || "Untitled"}
</div>

<div class="related-price">
₹${Number(r.price||0)}
</div>

</div>

</div>

`).join("")}

</div>

</div>

`

}catch(e){

console.log(e)

showError()

}

}

/* =====================================================
ERROR
===================================================== */

function showError(){

document.getElementById(
"bookContainer"
).innerHTML = `

<div
style="
padding:120px 20px;
text-align:center;
"
>

<h1>
Book Not Found
</h1>

<p
style="
margin-top:14px;
opacity:.7;
"
>
This ebook may have been removed.
</p>

</div>

`

}

/* =====================================================
BUY
===================================================== */

function buyBook(){

alert(
"Secure checkout coming soon."
)

}

/* =====================================================
CART
===================================================== */

async function addToCart(bookId){

let user =
JSON.parse(
localStorage.getItem("user")
|| "{}"
)

if(!user.email){

alert("Please login first")
return

}

let res =
await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"add_cart",

email:user.email,

book_id:bookId

})

})

let data =
await res.json()

alert(
data.message ||
"Added to cart"
)

}

/* =====================================================
SHARE
===================================================== */

async function shareBook(){

let url =
window.location.href

if(navigator.share){

navigator.share({
title:"CreatorHub Ebook",
url:url
})

}else{

navigator.clipboard.writeText(url)

alert("Book link copied")

}

}

/* =====================================================
START
===================================================== */

loadBook()

</script>

</body>
  </html>
