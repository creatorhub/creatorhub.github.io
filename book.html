<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
CreatorHub • Book Details
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="
https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
linear-gradient(
180deg,
#020617,
#071120
);

color:white;

overflow-x:hidden;

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

/* =========================
TOPBAR
========================= */

.topbar{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 22px;

background:
rgba(2,6,23,.92);

backdrop-filter:blur(18px);

border-bottom:
1px solid rgba(255,255,255,.06);

}

.logo{

font-size:34px;
font-weight:900;

}

.logo span{
color:#4ade80;
}

.nav{

display:flex;
align-items:center;
gap:20px;

}

.nav a{

color:white;
text-decoration:none;

font-size:14px;
font-weight:700;

opacity:.8;

transition:.3s;

}

.nav a:hover{
opacity:1;
color:#4ade80;
}

.back-btn{

height:50px;

padding:0 24px;

border:none;

border-radius:18px;

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

font-weight:900;

cursor:pointer;

}

/* =========================
MAIN
========================= */

.main{

max-width:1450px;

margin:auto;

padding:40px 16px 100px;

}

/* =========================
LOADING
========================= */

.loading-book{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

padding:140px 0;

gap:18px;

}

.loader{

width:70px;
height:70px;

border-radius:50%;

border:6px solid
rgba(255,255,255,.08);

border-top:6px solid #4ade80;

animation:spin 1s linear infinite;

}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.loading-text{

font-size:18px;
font-weight:800;

opacity:.8;

}

/* =========================
BOOK SHOWCASE
========================= */

.book-showcase{

display:grid;

grid-template-columns:
420px 1fr;

gap:36px;

align-items:start;

}

@media(max-width:1000px){

.book-showcase{
grid-template-columns:1fr;
}

}

/* =========================
LEFT
========================= */

.book-gallery{

position:sticky;
top:100px;

}

.main-book-image{

width:100%;

max-height:650px;

object-fit:cover;

border-radius:30px;

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 25px 70px rgba(0,0,0,.45);

}

.thumb-row{

display:flex;
gap:14px;

margin-top:18px;

}

.thumb{

width:90px;
height:120px;

object-fit:cover;

border-radius:18px;

cursor:pointer;

border:
2px solid transparent;

transition:.3s;

background:#0f172a;

}

.thumb:hover{
transform:translateY(-3px);
}

.active-thumb{
border-color:#4ade80;
}

/* =========================
RIGHT
========================= */

.book-info{

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

border-radius:36px;

padding:38px;

}

.top-tags{

display:flex;
gap:12px;
flex-wrap:wrap;

}

.tag{

padding:10px 16px;

border-radius:999px;

background:#081225;

font-size:13px;
font-weight:800;

}

.book-title{

margin-top:24px;

font-size:58px;
font-weight:900;

line-height:1.05;

}

.book-author{

margin-top:16px;

font-size:18px;

opacity:.7;

}

.rating-row{

display:flex;
gap:14px;
flex-wrap:wrap;

margin-top:24px;

}

.rating-box{

padding:14px 18px;

border-radius:18px;

background:#081225;

font-weight:800;

}

.price-row{

display:flex;
align-items:center;
gap:16px;
flex-wrap:wrap;

margin-top:30px;

}

.main-price{

font-size:64px;
font-weight:900;

color:#4ade80;

}

.old-price{

font-size:34px;

opacity:.35;

text-decoration:line-through;

}

.discount{

padding:10px 14px;

border-radius:14px;

background:
rgba(34,197,94,.15);

color:#4ade80;

font-weight:900;

}

.book-description{

margin-top:34px;

line-height:2;

opacity:.82;

font-size:16px;

}

/* =========================
BUTTONS
========================= */

.action-grid{

display:flex;
gap:16px;
flex-wrap:wrap;

margin-top:38px;

}

.buy-btn,
.cart-btn,
.share-btn{

height:64px;

padding:0 30px;

border:none;

border-radius:20px;

font-size:16px;
font-weight:900;

cursor:pointer;

transition:.3s;

}

.buy-btn{

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

}

.cart-btn{

background:#081225;

color:white;

border:
1px solid rgba(255,255,255,.06);

}

.share-btn{

background:#0b1220;

color:white;

border:
1px solid rgba(255,255,255,.06);

}

.buy-btn:hover,
.cart-btn:hover,
.share-btn:hover{

transform:translateY(-4px);

}

/* =========================
DETAILS
========================= */

.extra-details{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:18px;

margin-top:40px;

}

.detail-card{

background:#081225;

padding:22px;

border-radius:22px;

}

.detail-title{

font-size:13px;

opacity:.65;

}

.detail-value{

margin-top:8px;

font-size:22px;
font-weight:900;

}

/* =========================
REVIEWS
========================= */

.review-section{

margin-top:80px;

}

.section-title{

font-size:44px;
font-weight:900;

}

.review-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:22px;

margin-top:35px;

}

.review{

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

border-radius:28px;

padding:24px;

}

.review-top{

display:flex;
justify-content:space-between;
align-items:center;

}

.review-user{

font-size:18px;
font-weight:800;

}

.review-rating{

font-weight:900;

color:#4ade80;

}

.review-text{

margin-top:18px;

line-height:1.9;

opacity:.82;

}

.read-more{

margin-top:16px;

color:#4ade80;

font-weight:800;

cursor:pointer;

}

/* =========================
RELATED
========================= */

.related-section{

margin-top:90px;

}

.related-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:35px;

}

.related-book{

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

border-radius:24px;

overflow:hidden;

cursor:pointer;

transition:.3s;

}

.related-book:hover{

transform:translateY(-5px);

}

.related-book img{

width:100%;

height:300px;

object-fit:cover;

}

.related-content{
padding:14px;
}

.related-title{

font-size:15px;
font-weight:800;

line-height:1.5;

}

.related-price{

margin-top:10px;

font-size:24px;
font-weight:900;

color:#4ade80;

}

/* =========================
FOOTER
========================= */

.footer{

margin-top:100px;

padding:60px 20px;

border-top:
1px solid rgba(255,255,255,.06);

text-align:center;

opacity:.65;

}

/* =========================
MOBILE
========================= */

@media(max-width:700px){

.logo{
font-size:28px;
}

.nav a{
display:none;
}

.book-title{
font-size:42px;
}

.main-price{
font-size:52px;
}

.extra-details{
grid-template-columns:1fr;
}

.book-info{
padding:28px;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
Creator<span>Hub</span>
</div>

<div class="nav">

<a href="index.html">
Home
</a>

<a href="subscription.html">
Subscriptions
</a>

<a href="support.html">
Support
</a>

<button
class="back-btn"
onclick="
window.location.href='index.html'
"
>
Back Home
</button>

</div>

</div>

<div class="main">

<div id="bookContainer">

<div class="loading-book">

<div class="loader"></div>

<div class="loading-text">
Loading Book...
</div>

</div>

</div>

</div>

<div class="footer">

© 2025 CreatorHub Marketplace

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxrwzYN0t_4yY7qfcUT3JyDA69vlD4SbVzND-Y_9n5sqwEauTj4j4J-9qxoY3RQ6QWTvw/exec"

const params =
new URLSearchParams(
window.location.search
)

const BOOK_ID =
params.get("id")

/* =========================
DRIVE IMAGE
========================= */

function driveImage(url){

if(!url) return ""

if(url.includes("uc?id=")){

let id =
url.split("id=")[1]
.split("&")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

if(url.includes("/d/")){

let id =
url.split("/d/")[1]
.split("/")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

return url

}

/* =========================
LOAD BOOK
========================= */

async function loadBook(){

try{

let res =
await fetch(
API + "?action=products"
)

let data =
await res.json()

if(
!data.success ||
!data.products
){

showError()
return

}

let books =
data.products

let book =
books.find(
b => String(b.id) === String(BOOK_ID)
)

if(!book){

showError()
return

}

renderBook(book,books)

}catch(err){

console.log(err)

showError()

}

}

/* =========================
RENDER
========================= */

function renderBook(book,allBooks){

let related =
allBooks
.filter(x=>x.id != book.id)
.slice(0,4)

let reviews = [

{
name:"Rahul Sharma",
rating:"5.0 ★",
text:"Amazing ebook. Very practical and easy to understand. Helped me improve productivity and focus."
},

{
name:"Priya Kumari",
rating:"4.8 ★",
text:"Premium quality content with real examples. One of the best ebooks I purchased online."
},

{
name:"Aman Verma",
rating:"4.9 ★",
text:"Loved the explanations and presentation. Worth every rupee for creators and students."
}

]

document.getElementById(
"bookContainer"
).innerHTML = `

<div class="book-showcase">

<div class="book-gallery">

<img
id="mainBookImage"
class="main-book-image"
src="${driveImage(book.front_cover)}"
>

<div class="thumb-row">

<img
class="thumb active-thumb"
src="${driveImage(book.front_cover)}"
onclick="changePreview(this)"
>

${book.back_cover ? `

<img
class="thumb"
src="${driveImage(book.back_cover)}"
onclick="changePreview(this)"
>

` : ""}

</div>

</div>

<div class="book-info">

<div class="top-tags">

<div class="tag">
🔥 Bestseller
</div>

<div class="tag">
⚡ Instant Access
</div>

<div class="tag">
📚 Premium Ebook
</div>

</div>

<div class="book-title">
${book.title || "Untitled"}
</div>

<div class="book-author">
by ${book.author || "Unknown"}
</div>

<div class="rating-row">

<div class="rating-box">
⭐ 4.9 Rating
</div>

<div class="rating-box">
12K+ Readers
</div>

<div class="rating-box">
${book.language || "PDF"}
</div>

</div>

<div class="price-row">

<div class="main-price">
₹${Number(book.price || 0)}
</div>

<div class="old-price">
₹${Number(book.price || 0)*2}
</div>

<div class="discount">
50% OFF
</div>

</div>

<div class="book-description">

${book.description || "No description available."}

</div>

<div class="action-grid">

<button class="buy-btn">
Buy Now
</button>

<button class="cart-btn"
onclick="addToCart('${book.id}')"
>
Add To Cart
</button>

<button
class="share-btn"
onclick="shareBook()"
>
Share
</button>

</div>

<div class="extra-details">

<div class="detail-card">

<div class="detail-title">
Category
</div>

<div class="detail-value">
${book.category || "Ebook"}
</div>

</div>

<div class="detail-card">

<div class="detail-title">
Pages
</div>

<div class="detail-value">
${book.pages || "120+"}
</div>

</div>

<div class="detail-card">

<div class="detail-title">
Language
</div>

<div class="detail-value">
${book.language || "English"}
</div>

</div>

<div class="detail-card">

<div class="detail-title">
Access
</div>

<div class="detail-value">
Lifetime
</div>

</div>

</div>

</div>

</div>

<div class="review-section">

<div class="section-title">
Ratings & Reviews
</div>

<div class="review-grid">

${reviews.map(r=>`

<div class="review">

<div class="review-top">

<div class="review-user">
${r.name}
</div>

<div class="review-rating">
${r.rating}
</div>

</div>

<div class="review-text">

${r.text}

</div>

<div
class="read-more"
onclick="alert('${r.text}')"
>

Read Full Review

</div>

</div>

`).join("")}

</div>

</div>

<div class="related-section">

<div class="section-title">
Related Books
</div>

<div class="related-grid">

${related.map(b=>`

<div
class="related-book"
onclick="
window.location.href=
'book.html?id=${b.id}'
"
>

<img
src="${driveImage(b.front_cover)}"
>

<div class="related-content">

<div class="related-title">
${b.title || "Untitled"}
</div>

<div class="related-price">
₹${Number(b.price||0)}
</div>

</div>

</div>

`).join("")}

</div>

</div>

`

}

/* =========================
PREVIEW
========================= */

function changePreview(el){

document
.getElementById("mainBookImage")
.src = el.src

document
.querySelectorAll(".thumb")
.forEach(x=>{

x.classList.remove(
"active-thumb"
)

})

el.classList.add(
"active-thumb"
)

}

/* =========================
CART
========================= */

function addToCart(id){

let cart =
JSON.parse(
localStorage.getItem("cart")
|| "[]"
)

if(!cart.includes(id)){
cart.push(id)
}

localStorage.setItem(
"cart",
JSON.stringify(cart)
)

alert("Added to cart ✅")

}

/* =========================
SHARE
========================= */

function shareBook(){

navigator.share({

title:"CreatorHub Ebook",

text:"Check out this premium ebook",

url:window.location.href

})

}

/* =========================
ERROR
========================= */

function showError(){

document.getElementById(
"bookContainer"
).innerHTML = `

<div class="loading-book">

<div class="loading-text">
Book not found
</div>

</div>

`

}

loadBook()

</script>

</body>
  </html>
