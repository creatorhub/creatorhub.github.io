<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
CreatorHub • Book Details
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="
https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
linear-gradient(
180deg,
#020617,
#071120
);

color:white;

overflow-x:hidden;

}

/* =========================
TOPBAR
========================= */

.topbar{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 22px;

background:
rgba(2,6,23,.92);

backdrop-filter:blur(18px);

border-bottom:
1px solid rgba(255,255,255,.06);

}

.logo{

font-size:34px;
font-weight:900;

}

.logo span{
color:#4ade80;
}

.nav{

display:flex;
align-items:center;
gap:20px;

}

.nav a{

color:white;
text-decoration:none;

font-size:14px;
font-weight:700;

opacity:.8;

transition:.3s;

}

.nav a:hover{
opacity:1;
color:#4ade80;
}

.back-btn{

height:48px;

padding:0 22px;

border:none;

border-radius:16px;

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

font-weight:800;

cursor:pointer;

}

/* =========================
MAIN
========================= */

.main{

max-width:1450px;

margin:auto;

padding:40px 16px 100px;

}

/* =========================
LOADER
========================= */

.loading-book{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

padding:140px 0;

gap:18px;

}

.loader{

width:70px;
height:70px;

border-radius:50%;

border:6px solid
rgba(255,255,255,.08);

border-top:6px solid #4ade80;

animation:spin 1s linear infinite;

}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.loading-text{

font-size:18px;
font-weight:700;

opacity:.8;

}

/* =========================
BOOK HERO
========================= */

.book-layout{

display:grid;

grid-template-columns:
520px 1fr;

gap:36px;

align-items:start;

}

@media(max-width:1000px){

.book-layout{
grid-template-columns:1fr;
}

}

.book-left{

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

border-radius:36px;

padding:24px;

position:sticky;
top:100px;

}

.book-cover{

width:100%;

border-radius:28px;

object-fit:cover;

box-shadow:
0 20px 60px rgba(0,0,0,.45);

}

.book-stats{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:14px;

margin-top:18px;

}

.stat{

background:#081225;

padding:18px;

border-radius:18px;

text-align:center;

}

.stat-number{

font-size:24px;
font-weight:900;

color:#4ade80;

}

.stat-label{

margin-top:6px;

font-size:13px;

opacity:.7;

}

/* =========================
RIGHT
========================= */

.book-right{

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

border-radius:36px;

padding:38px;

}

.badges{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.badge{

padding:10px 16px;

border-radius:999px;

background:#081225;

font-size:13px;
font-weight:700;

}

.book-title{

margin-top:26px;

font-size:58px;
font-weight:900;

line-height:1.05;

}

.book-author{

margin-top:16px;

font-size:18px;

opacity:.7;

}

.price-wrap{

margin-top:30px;

display:flex;
align-items:center;
gap:14px;

}

.price{

font-size:64px;
font-weight:900;

color:#4ade80;

}

.old-price{

font-size:34px;

opacity:.35;

text-decoration:line-through;

}

.book-desc{

margin-top:30px;

line-height:2;

opacity:.82;

font-size:16px;

}

/* =========================
BUTTONS
========================= */

.actions{

display:flex;
gap:16px;
flex-wrap:wrap;

margin-top:38px;

}

.action-btn{

height:66px;

padding:0 34px;

border:none;

border-radius:20px;

font-size:16px;
font-weight:900;

cursor:pointer;

transition:.3s;

}

.buy-btn{

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

}

.preview-btn{

background:#081225;

color:white;

border:
1px solid rgba(255,255,255,.06);

}

.action-btn:hover{
transform:translateY(-4px);
}

/* =========================
REVIEW
========================= */

.review-section{

margin-top:80px;

}

.section-title{

font-size:42px;
font-weight:900;

}

.review-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:20px;

margin-top:35px;

}

.review{

background:#0f172a;

border:
1px solid rgba(255,255,255,.06);

border-radius:26px;

padding:24px;

}

.review-top{

display:flex;
justify-content:space-between;
align-items:center;

}

.review-user{

font-size:18px;
font-weight:800;

}

.review-rating{

color:#4ade80;

font-weight:900;

}

.review-text{

margin-top:18px;

line-height:1.8;

opacity:.82;

}

.read-more{

margin-top:16px;

color:#4ade80;

font-weight:700;

cursor:pointer;

}

/* =========================
FOOTER
========================= */

.footer{

margin-top:100px;

padding:60px 20px;

border-top:
1px solid rgba(255,255,255,.06);

text-align:center;

opacity:.6;

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
Creator<span>Hub</span>
</div>

<div class="nav">

<a href="index.html">
Home
</a>

<a href="subscription.html">
Subscriptions
</a>

<a href="support.html">
Support
</a>

<button
class="back-btn"
onclick="
window.location.href='index.html'
">
Back Home
</button>

</div>

</div>

<div class="main">

<div id="bookContainer">

<div class="loading-book">

<div class="loader"></div>

<div class="loading-text">
Loading Book...
</div>

</div>

</div>

</div>

<div class="footer">

© 2025 CreatorHub Marketplace

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxrwzYN0t_4yY7qfcUT3JyDA69vlD4SbVzND-Y_9n5sqwEauTj4j4J-9qxoY3RQ6QWTvw/exec"

/* =========================
GET ID
========================= */

const params =
new URLSearchParams(
window.location.search
)

const BOOK_ID =
params.get("id")

/* =========================
DRIVE IMAGE
========================= */

function driveImage(url){

if(!url) return ""

if(url.includes("uc?id=")){

let id =
url.split("id=")[1]
.split("&")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

if(url.includes("/d/")){

let id =
url.split("/d/")[1]
.split("/")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

return url

}

/* =========================
LOAD BOOK
========================= */

async function loadBook(){

try{

let res =
await fetch(
API + "?action=products"
)

let data =
await res.json()

if(
!data.success ||
!data.products
){

showError()
return

}

let books =
data.products

let book =
books.find(
b => String(b.id) === String(BOOK_ID)
)

if(!book){

showError()
return

}

renderBook(book)

}catch(err){

console.log(err)

showError()

}

}

/* =========================
RENDER BOOK
========================= */

function renderBook(book){

let reviews = [

{
name:"Rahul Sharma",
rating:"5.0 ★",
text:"Amazing ebook. Very practical and easy to understand. Helped me improve my productivity and focus massively."
},

{
name:"Priya Kumari",
rating:"4.8 ★",
text:"Premium quality content with real strategies. Worth every rupee for students and creators."
},

{
name:"Aman Verma",
rating:"4.9 ★",
text:"Loved the design and explanations. One of the best ebooks I purchased online recently."
}

]

document.getElementById(
"bookContainer"
).innerHTML = `

<div class="book-layout">

<div class="book-left">

<img
class="book-cover"
src="${driveImage(book.front_cover)}"
>

<div class="book-stats">

<div class="stat">

<div class="stat-number">
₹${Number(book.price||0)}
</div>

<div class="stat-label">
Price
</div>

</div>

<div class="stat">

<div class="stat-number">
${book.category || "Ebook"}
</div>

<div class="stat-label">
Category
</div>

</div>

<div class="stat">

<div class="stat-number">
${book.language || "PDF"}
</div>

<div class="stat-label">
Format
</div>

</div>

</div>

</div>

<div class="book-right">

<div class="badges">

<div class="badge">
Trending Ebook
</div>

<div class="badge">
Instant Access
</div>

<div class="badge">
Premium Content
</div>

</div>

<div class="book-title">
${book.title || "Untitled"}
</div>

<div class="book-author">
by ${book.author || "Unknown Author"}
</div>

<div class="price-wrap">

<div class="price">
₹${Number(book.price||0)}
</div>

<div class="old-price">
₹${Number(book.price||0)*2}
</div>

</div>

<div class="book-desc">

${book.description || "No description available."}

</div>

<div class="actions">

<button class="action-btn buy-btn">
Buy Now
</button>

<button class="action-btn preview-btn">
Read Preview
</button>

</div>

</div>

</div>

<div class="review-section">

<div class="section-title">
Ratings & Reviews
</div>

<div class="review-grid">

${reviews.map(r=>`

<div class="review">

<div class="review-top">

<div class="review-user">
${r.name}
</div>

<div class="review-rating">
${r.rating}
</div>

</div>

<div class="review-text" id="reviewText">

${r.text}

</div>

<div
class="read-more"
onclick="alert('${r.text}')"
>

Read Full Review

</div>

</div>

`).join("")}

</div>

</div>

`

}

/* =========================
ERROR
========================= */

function showError(){

document.getElementById(
"bookContainer"
).innerHTML = `

<div class="loading-book">

<div class="loading-text">
Book not found
</div>

</div>

`

}

loadBook()

</script>

</body>
</html>
