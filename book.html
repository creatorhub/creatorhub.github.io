<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CreatorHub • Book Details</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:
linear-gradient(180deg,#020617,#071120);
color:white;
overflow-x:hidden;
}

a{
text-decoration:none;
}

img{
display:block;
max-width:100%;
}

.main{
max-width:1450px;
margin:auto;
padding:20px 14px 100px;
}

/* TOPBAR */

.topbar{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 20px;

background:
rgba(2,6,23,.92);

backdrop-filter:blur(20px);

border-bottom:
1px solid rgba(255,255,255,.06);

}

.logo{
font-size:38px;
font-weight:900;
color:white;
}

.logo span{
color:#4ade80;
}

.top-actions{
display:flex;
gap:12px;
}

.top-btn{

height:48px;
padding:0 22px;

border:none;
border-radius:16px;

background:
linear-gradient(90deg,#16a34a,#4ade80);

color:white;
font-weight:800;
cursor:pointer;

}

/* LOADER */

.loading-book{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

padding:140px 0;

gap:20px;

}

.loader{

width:65px;
height:65px;

border-radius:50%;

border:5px solid
rgba(255,255,255,.08);

border-top:5px solid #4ade80;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

.loading-text{

font-size:16px;
font-weight:700;
opacity:.8;

}

/* HERO */

.book-layout{

display:grid;
grid-template-columns:420px 1fr;
gap:28px;

margin-top:25px;

align-items:start;

}

@media(max-width:900px){

.book-layout{
grid-template-columns:1fr;
}

}

/* LEFT */

.gallery{

position:sticky;
top:100px;

}

.main-image{

background:#0f172a;

border-radius:30px;

padding:16px;

border:
1px solid rgba(255,255,255,.06);

}

.main-image img{

width:100%;
height:560px;

object-fit:contain;

border-radius:20px;

background:#081225;

}

.thumbs{

display:flex;
gap:14px;

margin-top:16px;

overflow:auto;

}

.thumb{

min-width:90px;
height:120px;

border-radius:18px;

overflow:hidden;

cursor:pointer;

border:
2px solid transparent;

background:#081225;

}

.thumb.active{
border-color:#4ade80;
}

.thumb img{

width:100%;
height:100%;

object-fit:cover;

}

/* RIGHT */

.details{

background:#0f172a;

border-radius:34px;

padding:34px;

border:
1px solid rgba(255,255,255,.06);

}

.badges{

display:flex;
gap:12px;
flex-wrap:wrap;

}

.badge{

padding:10px 16px;

border-radius:999px;

background:#081225;

font-size:13px;
font-weight:800;

}

.title{

font-size:58px;
font-weight:900;

line-height:1.08;

margin-top:22px;

}

.author{

margin-top:16px;

font-size:18px;

opacity:.7;

}

.stats{

display:flex;
gap:14px;
flex-wrap:wrap;

margin-top:28px;

}

.stat{

background:#081225;

padding:18px 22px;

border-radius:20px;

min-width:120px;

}

.stat-number{

font-size:28px;
font-weight:900;

color:#4ade80;

}

.stat-label{

margin-top:4px;

font-size:13px;
opacity:.7;

}

.price-wrap{

display:flex;
align-items:center;
gap:14px;
flex-wrap:wrap;

margin-top:34px;

}

.price{

font-size:70px;
font-weight:900;

color:#4ade80;

}

.old-price{

font-size:34px;

opacity:.4;

text-decoration:line-through;

}

.discount{

padding:10px 16px;

border-radius:14px;

background:#14532d;

font-weight:900;

color:#86efac;

}

.description{

margin-top:34px;

line-height:2;

font-size:17px;

opacity:.82;

}

.action-row{

display:flex;
gap:16px;
flex-wrap:wrap;

margin-top:38px;

}

.action-btn{

height:62px;

padding:0 28px;

border:none;

border-radius:18px;

font-size:15px;
font-weight:900;

cursor:pointer;

}

.buy-btn{

background:
linear-gradient(90deg,#16a34a,#4ade80);

color:white;

}

.cart-btn{

background:#081225;
color:white;

}

.share-btn{

background:#081225;
color:white;

}

.meta-grid{

display:grid;
grid-template-columns:repeat(2,1fr);

gap:18px;

margin-top:38px;

}

.meta{

background:#081225;

padding:24px;

border-radius:22px;

}

.meta-label{

font-size:13px;

opacity:.6;

}

.meta-value{

margin-top:8px;

font-size:30px;
font-weight:900;

}

@media(max-width:700px){

.title{
font-size:44px;
}

.price{
font-size:56px;
}

.meta-grid{
grid-template-columns:1fr;
}

}

/* REVIEWS */

.section{
margin-top:70px;
}

.section-title{

font-size:48px;
font-weight:900;

margin-bottom:24px;

}

.reviews-grid{

display:grid;
gap:18px;

}

.review{

background:#0f172a;

padding:24px;

border-radius:26px;

border:
1px solid rgba(255,255,255,.05);

}

.review-top{

display:flex;
align-items:center;
gap:14px;

}

.review-avatar{

width:58px;
height:58px;

border-radius:50%;

object-fit:cover;

}

.review-name{

font-size:18px;
font-weight:800;

}

.review-rating{

margin-top:4px;

color:#facc15;
font-weight:700;

}

.review-text{

margin-top:18px;

line-height:1.9;

opacity:.82;

}

/* RELATED */

.related-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

}

.related-book{

background:#0f172a;

border-radius:24px;

overflow:hidden;

cursor:pointer;

border:
1px solid rgba(255,255,255,.05);

}

.related-book img{

width:100%;
height:280px;

object-fit:cover;

}

.related-content{
padding:16px;
}

.related-title{

font-size:15px;
font-weight:800;

line-height:1.5;

}

.related-price{

margin-top:10px;

font-size:28px;
font-weight:900;

color:#4ade80;

}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
Creator<span>Hub</span>
</div>

<div class="top-actions">

<button
class="top-btn"
onclick="location.href='index.html'"
>
Back Home
</button>

</div>

</div>

<div class="main">

<div id="bookContainer">

<div class="loading-book">

<div class="loader"></div>

<div class="loading-text">
Loading Book...
</div>

</div>

</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxrwzYN0t_4yY7qfcUT3JyDA69vlD4SbVzND-Y_9n5sqwEauTj4j4J-9qxoY3RQ6QWTvw/exec"

function driveImage(url){

if(!url) return ""

if(url.includes("uc?id=")){

let id =
url.split("id=")[1]
.split("&")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

if(url.includes("/d/")){

let id =
url.split("/d/")[1]
.split("/")[0]

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1200"

}

return url

}

const params =
new URLSearchParams(location.search)

const BOOK_ID =
params.get("id")

async function loadBook(){

try{

let res =
await fetch(API+"?action=products")

let data =
await res.json()

if(!data.success){

document.getElementById(
"bookContainer"
).innerHTML =
"Failed to load"

return

}

let books =
data.products || []

let book =
books.find(b=>b.id==BOOK_ID)

if(!book){

document.getElementById(
"bookContainer"
).innerHTML =
"Book not found"

return

}

renderBook(book,books)

}catch(err){

console.log(err)

}

}

function renderBook(book,books){

let front =
driveImage(book.front_cover)

let back =
driveImage(book.back_cover)

let rating =
book.rating || "0"

let readers =
book.reads || 0

let reviews =
book.review_count || 0

let price =
Number(book.price || 0)

let oldPrice =
price + 399

let discount =
Math.round(
((oldPrice-price)/oldPrice)*100
)

let reviewsHTML = ""

if(book.reviews){

let all =
String(book.reviews)
.split("||")

all.forEach(r=>{

let text = r.trim()

if(!text) return

let rate =
text.match(/⭐\s*(\d+)/)

let stars =
rate ? rate[1] : "5"

let clean =
text.replace(/⭐\s*\d+\s*-\s*/,"")

reviewsHTML += `

<div class="review">

<div class="review-top">

<img
class="review-avatar"
src="https://ui-avatars.com/api/?name=Reader&background=22c55e&color=fff"
>

<div>

<div class="review-name">
Verified Reader
</div>

<div class="review-rating">
⭐ ${stars}
</div>

</div>

</div>

<div class="review-text">
${clean}
</div>

</div>

`

})

}else{

reviewsHTML = `

<div class="review">
No reviews yet
</div>

`

}

let relatedHTML = ""

let relatedBooks = books.filter(b=>{

return (

b.id != book.id &&

b.status == "approved" &&

b.category == book.category

)

})

if(relatedBooks.length < 4){

relatedBooks = books.filter(b=>{

return (
b.id != book.id &&
b.status == "approved"
)

})

}

relatedBooks
.slice(0,8)
.forEach(r=>{

relatedHTML += `

<div
class="related-book"
onclick="
location.href='book.html?id=${r.id}'
"
>

<img
src="${driveImage(r.front_cover)}"
>

<div class="related-content">

<div class="related-title">
${r.title || "Untitled"}
</div>

<div
style="
margin-top:6px;
opacity:.7;
font-size:13px;
"
>
${r.author || "Unknown"}
</div>

<div class="related-price">
₹${r.price || 0}
</div>

</div>

</div>

`

})

document.getElementById(
"bookContainer"
).innerHTML = `

<div class="book-layout">

<div class="gallery">

<div class="main-image">

<img
id="mainBookImage"
src="${front}"
>

</div>

<div class="thumbs">

<div
class="thumb active"
onclick="
changeImage('${front}',this)
"
>

<img src="${front}">

</div>

<div
class="thumb"
onclick="
changeImage('${back}',this)
"
>

<img src="${back}">

</div>

</div>

</div>

<div class="details">

<div class="badges">

<div class="badge">
🔥 Bestseller
</div>

<div class="badge">
⚡ Instant Access
</div>

<div class="badge">
📚 Premium Ebook
</div>

</div>

<div class="title">
${book.title}
</div>

<div class="author">
by ${book.author || "Unknown"}
</div>

<div class="stats">

<div class="stat">

<div class="stat-number">
⭐ ${rating}
</div>

<div class="stat-label">
Rating
</div>

</div>

<div class="stat">

<div class="stat-number">
${readers}
</div>

<div class="stat-label">
Readers
</div>

</div>

<div class="stat">

<div class="stat-number">
${reviews}
</div>

<div class="stat-label">
Reviews
</div>

</div>

</div>

<div class="price-wrap">

<div class="price">
₹${price}
</div>

<div class="old-price">
₹${oldPrice}
</div>

<div class="discount">
${discount}% OFF
</div>

</div>

<div class="description">
${book.description || "No description"}
</div>

<div class="action-row">

<button
class="action-btn buy-btn"
onclick="buyNow()"
>
Buy Now
</button>

<button
class="action-btn cart-btn"
onclick="addToCart('${book.id}')"
>
Add To Cart
</button>

<button
class="action-btn share-btn"
onclick="shareBook()"
>
Share
</button>

</div>

<div class="meta-grid">

<div class="meta">

<div class="meta-label">
Category
</div>

<div class="meta-value">
${book.category || "General"}
</div>

</div>

<div class="meta">

<div class="meta-label">
Pages
</div>

<div class="meta-value">
${book.pages || "0"}
</div>

</div>

<div class="meta">

<div class="meta-label">
Language
</div>

<div class="meta-value">
${book.language || "English"}
</div>

</div>

<div class="meta">

<div class="meta-label">
Format
</div>

<div class="meta-value">
PDF
</div>

</div>

</div>

</div>

</div>

<div class="section">

<div class="section-title">
Reader Reviews
</div>

<div class="reviews-grid">

${reviewsHTML}

</div>

</div>

<div class="section">

<div class="section-title">
Related Books
</div>

<div class="related-grid">

${relatedHTML}

</div>

</div>

`

}

function changeImage(src,el){

document.getElementById(
"mainBookImage"
).src = src

document
.querySelectorAll(".thumb")
.forEach(t=>{

t.classList.remove("active")

})

el.classList.add("active")

}

function addToCart(id){

let cart =
JSON.parse(
localStorage.getItem("cart") || "[]"
)

if(!cart.includes(id)){

cart.push(id)

localStorage.setItem(
"cart",
JSON.stringify(cart)
)

alert("Added To Cart ✅")

}else{

alert("Already In Cart")

}

}

function shareBook(){

navigator.share({
title:document.title,
url:location.href
})

}

function buyNow(){

alert("Connect checkout page")

}

loadBook()

</script>

</body>
</html>
