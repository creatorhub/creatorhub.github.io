<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Edit Ebook - CreatorHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

:root{
--card:#0f172a;
--green:#22c55e;
--border:#1e293b;
}

/* TOPBAR */

.topbar{
position:sticky;
top:0;
z-index:100;
background:#07111f;
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:
1px solid rgba(255,255,255,.05);
}

.back{
font-size:24px;
cursor:pointer;
}

.title{
font-size:26px;
font-weight:bold;
}

.title span{
color:#22c55e;
}

/* MAIN */

.container{
padding:20px;
max-width:700px;
margin:auto;
padding-bottom:120px;
}

/* CARD */

.card{
background:#0f172a;
border:
1px solid rgba(255,255,255,.06);
border-radius:28px;
padding:22px;
box-shadow:
0 15px 40px rgba(0,0,0,.4);
}

/* COVER */

.cover-box{
display:flex;
justify-content:center;
margin-bottom:25px;
}

.cover{
width:220px;
height:320px;
object-fit:cover;
border-radius:22px;
background:#111827;
box-shadow:
0 10px 30px rgba(0,0,0,.45);
}

/* INPUT */

.group{
margin-top:20px;
}

.label{
margin-bottom:10px;
font-size:15px;
font-weight:bold;
opacity:.9;
}

.input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:#111827;
color:white;
font-size:15px;
border:
1px solid rgba(255,255,255,.06);
}

textarea.input{
height:120px;
resize:none;
}

/* FILE */

.file{
width:100%;
padding:16px;
border-radius:16px;
background:#111827;
border:
1px dashed rgba(255,255,255,.12);
color:white;
}

/* BUTTONS */

.actions{
display:flex;
gap:14px;
margin-top:30px;
}

.btn{
flex:1;
padding:16px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.save{
background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);
color:white;
}

.delete{
background:#ef4444;
color:white;
}

.btn:hover{
transform:translateY(-2px);
}

/* LOADER */

.loader{
width:70px;
height:70px;
border:
5px solid rgba(255,255,255,.1);
border-top:
5px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-top:120px;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

/* MOBILE */

@media(max-width:700px){

.cover{
width:180px;
height:260px;
}

.title{
font-size:22px;
}

.actions{
flex-direction:column;
}

}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="back"
onclick="history.back()">
⬅
</div>

<div class="title">
Edit <span>Ebook</span>
</div>

<div></div>

</div>

<!-- MAIN -->

<div class="container">

<div id="app">

<div class="loader"></div>

</div>

</div>

<script>

/* =========================================================
CONFIG
========================================================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

/* =========================================================
USER
========================================================= */

let user =
JSON.parse(
localStorage.getItem("user") || "null"
)

if(!user){

location.href =
"login.html"

}

/* =========================================================
BOOK ID
========================================================= */

let bookId =
localStorage.getItem("editBookId")

if(!bookId){

document.getElementById("app")
.innerHTML = `

<h2 style="
text-align:center;
margin-top:120px;
opacity:.7;
">
Book Not Found
</h2>

`

}

/* =========================================================
GLOBAL
========================================================= */

let BOOK = null

/* =========================================================
DRIVE IMAGE
========================================================= */

function driveImage(link){

if(!link){

return "https://picsum.photos/500"

}

let id = ""

if(link.includes("id=")){

id =
link.split("id=")[1]
.split("&")[0]

}

else if(link.includes("/d/")){

id =
link.split("/d/")[1]
.split("/")[0]

}

else{

id = link

}

return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`

}

/* =========================================================
LOAD BOOK
========================================================= */

async function loadBook(){

try{

let res =
await fetch(
PRODUCT_API +
"?action=products&t=" +
Date.now()
)

let raw =
await res.text()

let data = []

try{

data =
JSON.parse(raw)

}catch(e){

data = []

}

let products = []

if(Array.isArray(data)){

products = data

}

else if(data.products){

products = data.products

}

BOOK =
products.find(p =>

String(p.id)
===

String(bookId)

)

if(!BOOK){

document.getElementById("app")
.innerHTML = `

<h2 style="
text-align:center;
margin-top:120px;
opacity:.7;
">
Ebook Not Found
</h2>

`

return

}

renderBook()

}catch(err){

console.log(err)

document.getElementById("app")
.innerHTML = `

<h2 style="
text-align:center;
margin-top:120px;
opacity:.7;
">
Failed To Load
</h2>

`

}

}

loadBook()

/* =========================================================
RENDER
========================================================= */

function renderBook(){

let image =
driveImage(

BOOK.front_cover ||
BOOK.frontCover ||
BOOK.image

)

document.getElementById("app")
.innerHTML = `

<div class="card">

<div class="cover-box">

<img
class="cover"
src="${image}"
id="preview"
>

</div>

<div class="group">

<div class="label">
Book Title
</div>

<input
class="input"
id="title"
value="${BOOK.title || ""}"
>

</div>

<div class="group">

<div class="label">
Author Name
</div>

<input
class="input"
id="author"
value="${BOOK.author || ""}"
>

</div>

<div class="group">

<div class="label">
Description
</div>

<textarea
class="input"
id="description"
>${BOOK.description || ""}</textarea>

</div>

<div class="group">

<div class="label">
Change Cover
</div>

<input
type="file"
class="file"
id="coverFile"
accept="image/*"
>

</div>

<div class="actions">

<button
class="btn save"
onclick="saveBook()">
💾 Save Changes
</button>

<button
class="btn delete"
onclick="deleteBook()">
🗑 Delete
</button>

</div>

</div>

`

}

/* =========================================================
SAVE
========================================================= */

async function saveBook(){

let btn =
event.target

btn.innerHTML =
"Saving..."

btn.disabled = true

try{

let title =
document.getElementById("title")
.value.trim()

let author =
document.getElementById("author")
.value.trim()

let description =
document.getElementById("description")
.value.trim()

let body = {

action:"editBook",

id:BOOK.id,

title:title,

author:author,

description:description,

email:user.email

}

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify(body)

})

let data =
await res.json()

alert(
data.message ||
"Updated Successfully"
)

btn.innerHTML =
"✅ Saved"

setTimeout(()=>{

btn.innerHTML =
"💾 Save Changes"

btn.disabled = false

},1500)

}catch(err){

console.log(err)

alert("Update Failed")

btn.disabled = false

btn.innerHTML =
"💾 Save Changes"

}

}

/* =========================================================
DELETE
========================================================= */

async function deleteBook(){

let ok =
confirm(
"Delete this ebook?"
)

if(!ok) return

try{

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"deleteBook",

id:BOOK.id,

email:user.email

})

})

let data =
await res.json()

alert(
data.message ||
"Deleted"
)

location.href =
"library.html"

}catch(err){

console.log(err)

alert("Delete Failed")

}

}

</script>

</body>
</html>
