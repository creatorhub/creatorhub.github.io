<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorHub Store | Edit Ebook Asset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================================================
   CREATORHUB ADVANCED PRODUCTION VARIABLES MATRIX
   ========================================================= */
:root {
    --bg-primary: #f8fafc;       
    --bg-secondary: #ffffff;     
    --sidebar-dark: #0f172a;     
    --sidebar-hover: #1e293b;    
    --text-primary: #0f172a;     
    --text-secondary: #475569;   
    --text-muted: #64748b;
    --accent-blue: #2f62e9;      
    --accent-blue-hover: #1d4ed8;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.05);
    --shadow-md: 0 12px 30px -4px rgba(15,23,42,0.06), 0 4px 12px -2px rgba(15,23,42,0.03);
    --red-alert: #ef4444;
    --green-success: #10b981;
    --amber-warning: #f59e0b;
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body{
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
}

/* =========================================================
   LEFT FIXED GLOBAL NAVIGATION SIDEBAR 
   ========================================================= */
.sidebar {
    width: 260px;
    background-color: var(--sidebar-dark);
    min-height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar-brand {
    padding: 28px 24px;
    font-size: 22px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.02em;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sidebar-brand span { color: var(--accent-blue); }

.sidebar-menu {
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
}

.menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: #94a3b8;
    font-size: 14px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.menu-item:hover {
    background-color: var(--sidebar-hover);
    color: #ffffff;
}

.menu-item.active {
    background-color: var(--accent-blue);
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(47, 98, 233, 0.25);
}

.menu-item i { width: 20px; text-align: center; }

/* =========================================================
   RIGHT SIDE WORKSPACE MAIN LAYOUT FRAME
   ========================================================= */
.main-wrapper {
    margin-left: 260px; 
    width: calc(100% - 260px);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.topbar{
    height: 75px;
    background-color: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 90;
}

.page-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }

.topbar-actions {
    display: flex;
    align-items: center;
    position: relative;
}
.profile-image {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border-color);
    cursor: pointer;
}
.profile-menu {
    position: absolute; top: 55px; right: 0; width: 280px; background: #0d1628; border: 1px solid #182a64; border-radius: 12px; padding: 20px; display: none; box-shadow: var(--shadow-md); z-index: 1000;
}
.profile-menu.show { display: block; animation: subFade 0.2s ease-out; }
.profile-header {
    display: flex; align-items: center; gap: 12px; padding-bottom: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); margin-bottom: 12px;
}
.menu-profile-image { width: 44px; height: 44px; border-radius: 50%; }
#menuName { color: #fff; font-size: 15px; font-weight: 800; }
#menuEmail { margin-top: 2px; font-size: 12px; color: #63728a; word-break: break-all; }
.profile-menu a {
    display: flex; align-items: center; height: 42px; padding: 0 12px; border-radius: 6px; color: #e7edf8; font-size: 14px; font-weight: 700; text-decoration: none;
}
.profile-menu a:hover { background: #182a64; }
.logout-btn {
    margin-top: 12px; height: 44px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: var(--red-alert); color: #fff; font-weight: 800; font-size: 14px; cursor: pointer;
}

.content-area {
    padding: 40px;
    flex: 1;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
}

.header-block { margin-bottom: 32px; }
.title { font-size: 36px; font-weight: 900; letter-spacing: -0.02em; color: var(--text-primary); }
.desc { font-size: 15px; color: var(--text-secondary); margin-top: 8px; max-width: 800px; }

/* =========================================================
   METRICS INFRASTRUCTURE PANELS
   ========================================================= */
.metrics-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}
@media(max-width: 768px) { .metrics-panel { grid-template-columns: 1fr; } }

.metric-node {
    padding: 16px;
    border-radius: 10px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
}
.metric-node h3 { font-size: 11px; color: var(--text-secondary); font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; }
.metric-node h2 { font-size: 22px; font-weight: 900; color: var(--text-primary); margin-top: 6px; }

/* =========================================================
   PREVIEW AND CANVAS SECTIONS
   ========================================================= */
.editor-layout-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 32px;
}
@media(max-width: 950px) { .editor-layout-grid { grid-template-columns: 1fr; } }

.preview-sidebar-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 24px;
    height: fit-content;
}
.cover-wrapper-box {
    text-align: center;
}
.preview-label-text { font-size: 12px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; text-align: left; }
.preview-element-canvas {
    width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 8px; background: #eef3f9; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);
}

.main-fields-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 32px;
    box-shadow: var(--shadow-sm);
}

.input-row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}
@media(max-width: 500px) { .input-row-grid { grid-template-columns: 1fr; } }

.field-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.field-group label { font-size: 12px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.02em; }

.form-input-element {
    width: 100%; min-height: 48px; padding: 0 16px; border: 1px solid #cbd5e1; border-radius: 8px; background: #ffffff; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; font-weight: 600;
}
.form-input-element:focus { border-color: var(--accent-blue); }

.form-textarea-element {
    width: 100%; min-height: 120px; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; background: #ffffff; color: var(--text-primary); font-size: 14px; outline: none; resize: vertical; line-height: 1.6; font-weight: 500;
}
.form-textarea-element:focus { border-color: var(--accent-blue); }

.file-input-wrapper {
    border: 1px dashed #cbd5e1; padding: 14px; border-radius: 8px; background: var(--bg-primary); display: flex; align-items: center;
}
.file-input-wrapper input { font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; width: 100%; }

/* ACTIONS SYSTEM CONTROLLERS */
.action-trigger-row {
    display: flex; gap: 16px; margin-top: 32px; border-top: 1px solid var(--border-color); padding-top: 24px;
}
.btn-control {
    min-height: 46px; padding: 0 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s;
}
.btn-control:hover { opacity: 0.9; }
.btn-control.save-action { background: var(--accent-blue); color: white; flex: 2; }
.btn-control.delete-action { background: var(--red-alert); color: white; flex: 1; }

.status-alert-overlay {
    margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 700; text-align: center; display: none;
}
.status-alert-overlay.success-state { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
.status-alert-overlay.error-state { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

/* =========================================================
   ANALYTICS ENGINE METRICS GRID SYSTEM 
   ========================================================= */
.analytics-section-card {
    background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 14px; padding: 32px; box-shadow: var(--shadow-sm); margin-top: 32px;
}
.section-headline-text { font-size: 20px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.01em; }
.section-subdesc-text { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

.growth-metrics-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px;
}
@media(max-width: 650px) { .growth-metrics-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width: 400px) { .growth-metrics-grid { grid-template-columns: 1fr; } }

.growth-node-card {
    background: var(--bg-primary); border: 1px solid var(--border-color); padding: 18px; border-radius: 10px; display: flex; align-items: center; gap: 14px;
}
.growth-node-icon {
    width: 44px; height: 44px; border-radius: 50%; background: #ffffff; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--shadow-sm);
}
.growth-node-card h4 { font-size: 20px; font-weight: 800; color: var(--text-primary); }
.growth-node-card p { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

.seo-optimization-gauge {
    background: #0f172a; border-radius: 12px; padding: 24px; color: #ffffff; margin-bottom: 24px;
}
.gauge-title-label { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.gauge-track-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
.gauge-fill-bar { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); border-radius: 99px; transition: width 0.4s ease; }
.gauge-desc-text { font-size: 13px; color: #94a3b8; line-height: 1.5; }

.grid-utilities-buttons {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
@media(max-width: 700px) { .grid-utilities-buttons { grid-template-columns: 1fr 1fr; } }
.btn-utility-trigger {
    min-height: 44px; border: 1px solid var(--border-color); border-radius: 6px; background: #ffffff; color: var(--text-secondary); font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s;
}
.btn-utility-trigger:hover { background: var(--bg-primary); color: var(--text-primary); }

@keyframes subFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body>

<aside class="sidebar">
    <div class="sidebar-brand">Creator<span>Hub</span></div>
    <div class="sidebar-menu">
        <div class="menu-item" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i> <span>Home</span></div>
        <div class="menu-item" onclick="location.href='dashboard.html'"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></div>
        <div class="menu-item" onclick="location.href='products.html'"><i class="fa-solid fa-bag-shopping"></i> <span>Product Store</span></div>
        <div class="menu-item active" onclick="location.href='library1.html'"><i class="fa-solid fa-book-open"></i> <span>Library</span></div>
        <div class="menu-item" onclick="location.href='wallet1.html'"><i class="fa-solid fa-wallet"></i> <span>Wallet</span></div>
        <div class="menu-item" onclick="location.href='settings.html'"><i class="fa-solid fa-gear"></i> <span>Settings</span></div>
    </div>
</aside>

<div class="main-wrapper">
    <header class="topbar">
        <div class="page-title"><i class="fa-solid fa-pen-to-square" style="color: var(--accent-blue);"></i> Ebook Management Workspace</div>
        <div class="topbar-actions">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-avatar" onclick="toggleDropdownMenuMenu()">
            <div id="profileMenu" class="profile-menu">
                <div class="profile-header">
                    <img id="menuProfileImage" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="menu-profile-image" alt="User">
                    <div>
                        <div id="menuName">CreatorHub User</div>
                        <div id="menuEmail">user@email.com</div>
                    </div>
                </div>
                <a href="profile.html">My Profile</a>
                <a href="seller-apply.html">Become Seller</a>
                <a href="tranding.html">Trending Books</a>
                <a class="active" href="library1.html">Library</a>
                <a href="topselling.html">Top Selling</a>
                <div class="logout-btn" onclick="logoutSequenceTrigger()">Logout</div>
            </div>
        </div>
    </header>

    <main class="content-area">
        <div id="app">
            <div class="no-data"><i class="fa-solid fa-circle-notch fa-spin" style="font-size:32px; color:var(--accent-blue)"></i><p style="margin-top:10px;">Interfacing storage cache streams...</p></div>
        </div>
    </main>
</div>

<script>
const PRODUCT_API = "https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

let user = JSON.parse(localStorage.getItem("user") || "null");
if(!user){ location.href = "login.html"; }

let BOOK = JSON.parse(localStorage.getItem("viewerBook") || "null");

function toggleDropdownMenuMenu(){
    document.getElementById("profileMenu").classList.toggle("show");
}

window.addEventListener("click", function(e){
    let wrap = document.querySelector(".topbar-actions");
    if(wrap && !wrap.contains(e.target)){
        document.getElementById("profileMenu").classList.remove("show");
    }
});

function logoutSequenceTrigger(){ localStorage.clear(); window.location.href = "login.html"; }

function updateSessionProfileUI() {
    let cachedUser = localStorage.getItem("creatorhub_profile_cache_v6");
    let email = localStorage.getItem("creatorhub_profile_email");
    if(cachedUser && email){
        try {
            let data = JSON.parse(cachedUser)[email];
            if(data && data.profile_image){
                let link = driveImage(data.profile_image);
                document.getElementById("headerAvatar").src = link;
                document.getElementById("menuProfileImage").src = link;
                document.getElementById("menuName").innerText = data.name || "CreatorHub User";
                document.getElementById("menuEmail").innerText = data.email || email;
            }
        } catch(e) { console.log("Header image parsing warning."); }
    }
}

function driveImage(link){
    if(!link) return "https://picsum.photos/500";
    let id = "";
    if(link.includes("id=")){ id = link.split("id=")[1].split("&")[0]; }
    else if(link.includes("/d/")){ id = link.split("/d/")[1].split("/")[0]; }
    else if(link.includes("/file/d/")){ id = link.split("/file/d/")[1].split("/")[0]; }
    else { id = link; }
    return "https://drive.google.com/thumbnail?id=" + id + "&sz=w500";
}

async function refreshBook(){
    try{
        let res = await fetch(PRODUCT_API + "?db=products&t=" + Date.now());
        let data = await res.json();
        let products = Array.isArray(data) ? data : (data.products || []);
        
        let targetId = localStorage.getItem("editBookId") || (BOOK ? BOOK.id : "");
        let latest = products.find(p => String(p.id) === String(targetId));
        
        if(latest){
            BOOK = latest;
            localStorage.setItem("viewerBook", JSON.stringify(BOOK));
        }
        render();
    }catch(err){
        console.error(err);
        render();
    }
}

function render(){
    if(!BOOK){
        document.getElementById("app").innerHTML = "<div class='main-fields-card'><h3 style='text-align:center; color:var(--red-alert)'>Operational Warning: No active ebook reference selected under the session cache.</h3></div>";
        return;
    }

    let trendingValue = Number(BOOK.trending || 0);
    let frontImage = driveImage(BOOK.front_cover || BOOK.cover || BOOK.image);
    let backImage = driveImage(BOOK.back_cover || "");

    document.getElementById("app").innerHTML = `
        <div class="header-block">
            <h1 class="title">Modify <span>Product Metadata</span></h1>
            <p class="desc">Tweak structural database configurations properties strings parameters to update catalog information mappings.</p>
        </div>

        <section class="metrics-panel">
            <div class="metric-node"><h3>PRODUCT ID</h3><h2>#${BOOK.id}</h2></div>
            <div class="metric-node"><h3>CATALOG STATUS</h3><h2 style="color:var(--green-success)">${BOOK.status || BOOK.ai_status || "Approved"}</h2></div>
            <div class="metric-node"><h3>OWNER ACCOUNT</h3><h2>${BOOK.author || "Premium Creator"}</h2></div>
        </section>

        <div class="editor-layout-grid">
            
            <div class="preview-sidebar-card">
                <div class="cover-wrapper-box">
                    <div class="preview-label-text"><i class="fa-solid fa-file-image"></i> Front Cover Art</div>
                    <img id="frontPreview" class="preview-element-canvas" src="${frontImage}" onerror="this.src='https://picsum.photos/500'">
                </div>
                <div class="cover-wrapper-box">
                    <div class="preview-label-text"><i class="fa-solid fa-file-image"></i> Back Cover Art</div>
                    <img id="backPreview" class="preview-element-canvas" src="${backImage}" onerror="this.src='https://picsum.photos/500'">
                </div>
            </div>

            <div class="main-fields-card">
                <div class="input-row-grid">
                    <div class="field-group">
                        <label>Book / solution Title</label>
                        <input id="title" class="form-input-element" value="${escapeHTML(BOOK.title || "")}">
                    </div>
                    <div class="field-group">
                        <label>Author / Publisher Metadata</label>
                        <input id="author" class="form-input-element" value="${escapeHTML(BOOK.author || "")}">
                    </div>
                </div>

                <div class="field-group">
                    <label>Product Long Copy Description</label>
                    <textarea id="description" class="form-textarea-element">${escapeHTML(BOOK.description || "")}</textarea>
                </div>

                <div class="input-row-grid">
                    <div class="field-group">
                        <label>Catalog Category Filter Tag</label>
                        <input id="category" class="form-input-element" value="${escapeHTML(BOOK.category || BOOK.type || "Paperback")}">
                    </div>
                    <div class="field-group">
                        <label>Listing Rate Pricing (INR)</label>
                        <input id="price" class="form-input-element" type="number" value="${BOOK.price || 0}">
                    </div>
                </div>

                <div class="input-row-grid">
                    <div class="field-group">
                        <label>Upload New Front Cover Image</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="frontFile" accept="image/*" onchange="previewFrontImage(event)">
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Upload New Back Cover Image</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="backFile" accept="image/*" onchange="previewBackImage(event)">
                        </div>
                    </div>
                </div>

                <div id="statusNotificationBlock" class="status-alert-overlay"></div>

                <div class="action-trigger-row">
                    <button class="btn-control save-action" id="saveChangesBtn" onclick="processMetadataSave()"><i class="fa-solid fa-floppy-disk"></i> Save Core Changes</button>
                    <button class="btn-control delete-action" onclick="processCatalogItemDeletion()"><i class="fa-solid fa-trash-can"></i> Remove Product</button>
                </div>
            </div>
        </div>

        <section class="analytics-section-card">
            <h2 class="section-headline-text">Live Warehouse Performance Metrics</h2>
            <p class="section-subdesc-text">Dynamic reporting parsed from platform transactional records caches strings parameters loops.</p>
            
            <div class="growth-metrics-grid">
                <div class="growth-node-card"><div class="growth-node-icon">📚</div><div><h4>${Number(BOOK.reads || 0).toLocaleString()}</h4><p>Total Conversions</p></div></div>
                <div class="growth-node-card"><div class="growth-node-icon">⭐</div><div><h4>${BOOK.rating || "5.0"}</h4><p>Quality Score</p></div></div>
                <div class="growth-node-card"><div class="growth-node-icon">₹</div><div><h4>${Number(BOOK.revenue || 0).toLocaleString()}</h4><p>Gross Earnings</p></div></div>
                <div class="growth-node-card"><div class="growth-node-icon">🔥</div><div><h4>${trendingValue}%</h4><p>Hub Velocity</p></div></div>
            </div>

            <div class="seo-optimization-gauge">
                <div class="gauge-title-label"><i class="fa-solid fa-bullseye" style="color:var(--green-success)"></i> Global Marketplace Distribution Visibility</div>
                <div class="gauge-track-bar">
                    <div class="gauge-fill-bar" style="width:${trendingValue || 50}%"></div>
                </div>
                <p class="gauge-desc-text">Your product listing is currently holding a ${trendingValue || 50}% logistics route dispatch speed visibility index score tag inside regional hub pipelines clusters models.</p>
            </div>

            <div class="grid-utilities-buttons">
                <button class="btn-utility-trigger" onclick="alert('Parsing advanced log files...')">View Dispatch Logs</button>
                <button class="btn-utility-trigger" onclick="alert('Accessing review feedback grids...')">Reviews Matrix</button>
                <button class="btn-utility-trigger" onclick="alert('Generating cargo inventory tags...')">Print barcodes</button>
                <button class="btn-utility-trigger" onclick="alert('Initializing hub optimization algorithm...')">Optimize Visibility</button>
            </div>
        </section>
    `;
}

function previewFrontImage(e){
    let file = e.target.files[0];
    if(file){ document.getElementById("frontPreview").src = URL.createObjectURL(file); }
}

function previewBackImage(e){
    let file = e.target.files[0];
    if(file){ document.getElementById("backPreview").src = URL.createObjectURL(file); }
}

function escapeHTML(str){
    return String(str).replace(/[&<>"']/g, function(m){
        return({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' })[m]
    });
}

function toggleNotificationState(msg, type){
    let box = document.getElementById("statusNotificationBlock");
    box.style.display = "block";
    box.className = "status-alert-overlay " + (type === "success" ? "success-state" : "error-state");
    box.innerHTML = msg;
}

/* 🚀 DISPATCH BLOCK SAVE CONTEXT TO MAIN MACRO ENDPOINT */
async function processMetadataSave(){
    let btn = document.getElementById("saveChangesBtn");
    btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Syncing Cloud Matrix...";
    btn.disabled = true;

    try{
        let titleVal = document.getElementById("title").value.trim();
        let authorVal = document.getElementById("author").value.trim();
        let descVal = document.getElementById("description").value.trim();
        let catVal = document.getElementById("category").value.trim();
        let priceVal = document.getElementById("price").value;

        let bodyPayload = {
            action: "updateBook",
            id: BOOK.id,
            title: titleVal,
            author: authorVal,
            description: descVal,
            category: catVal,
            price: priceVal,
            front_cover: BOOK.front_cover || "",
            back_cover: BOOK.back_cover || "",
            email: user.email
        };

        let res = await fetch(PRODUCT_API, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(bodyPayload)
        });
        
        let data = await res.json();

        // Overwrite local memory caches
        BOOK.title = titleVal;
        BOOK.author = authorVal;
        BOOK.description = descVal;
        BOOK.category = catVal;
        BOOK.price = priceVal;
        localStorage.setItem("viewerBook", JSON.stringify(BOOK));

        toggleNotificationState("🎉 Core Listing Metadata Synchronized Successfully inside Database.", "success");
        btn.innerHTML = "✅ Database Synced";
        setTimeout(() => { location.reload(); }, 1200);

    }catch(err){
        toggleNotificationState("System Warning Trace: " + err.message, "error");
        btn.innerHTML = "<i class='fa-solid fa-floppy-disk'></i> Save Core Changes";
        btn.disabled = false;
    }
}

    let ok = confirm("Are you completely sure you want to remove this digital entry reference item listing from the active hub storage matrices layout?");
    if(!ok) return;

    try{
        await fetch(PRODUCT_API, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action: "deleteBook", id: BOOK.id, email: user.email })
        });
        alert("Product instance deleted completely from dataset.");
        location.href = "library1.html";
    }catch(err){ alert("Operational Anomaly: " + err.message); }
}
