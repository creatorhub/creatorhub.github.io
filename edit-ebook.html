<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Ebook • CreatorHub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', Arial, sans-serif;
}

body{
background: #f8fafc;
color: #0f172a;
min-height:100vh;
overflow-x:hidden;
}

:root{
--green:#10b981;
--card:#ffffff;
--border:#e2e8f0;
--text-muted:#64748b;
--accent-blue:#2f62e9;
}

/* =========================================================
TOPBAR
========================================================= */
.topbar{
height:70px;
display:flex;
align-items:center;
gap:18px;
padding:0 24px;
position:sticky;
top:0;
z-index:999;
background: #ffffff;
border-bottom:1px solid var(--border);
}

.back{
font-size:24px;
cursor:pointer;
color: var(--text-muted);
transition: color 0.2s;
}
.back:hover { color: var(--accent-blue); }

.title{
font-size:24px;
font-weight:800;
letter-spacing: -0.02em;
color: #0f172a;
}

.title span{
color: var(--accent-blue);
}

/* =========================================================
CONTAINER
========================================================= */
.container{
max-width:1100px;
margin:auto;
padding:32px 24px 120px;
}

/* =========================================================
CARD
========================================================= */
.card{
background: var(--card);
border:1px solid var(--border);
border-radius:24px;
padding:36px;
position:relative;
overflow:hidden;
box-shadow:0 4px 20px rgba(15,23,42,0.04);
animation:fade .4s ease;
}

@keyframes fade{
from{ opacity:0; transform:translateY(15px); }
to{ opacity:1; transform:translateY(0); }
}

/* =========================================================
HEADER
========================================================= */
.editor-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:32px;
border-bottom: 1px solid var(--border);
padding-bottom: 24px;
}

.editor-title h1{
font-size:32px;
font-weight:900;
letter-spacing: -0.02em;
color: #0f172a;
}

.editor-title span{
color: var(--accent-blue);
}

.editor-title p{
margin-top:10px;
color: var(--text-muted);
line-height:1.6;
max-width:600px;
font-size: 14px;
}

.live-badge{
padding:10px 16px;
border-radius:12px;
background:rgba(16, 185, 129, 0.1);
border:1px solid rgba(16, 185, 129, 0.2);
color:#059669;
font-size: 13px;
font-weight:bold;
text-transform: uppercase;
letter-spacing: 0.05em;
}

/* =========================================================
INFO GRID
========================================================= */
.info-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:32px;
}

.info-box{
background:#f8fafc;
padding:20px;
border-radius:14px;
border:1px solid var(--border);
}

.info-box h3{
font-size:11px;
color: var(--text-muted);
margin-bottom:8px;
text-transform: uppercase;
letter-spacing: 0.05em;
font-weight: 800;
}

.info-box p{
font-size:18px;
font-weight:800;
color: #0f172a;
}

/* =========================================================
PREVIEW
========================================================= */
.preview-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
margin-bottom:32px;
}

.preview-box{
background:#f8fafc;
padding:24px;
border-radius:16px;
border:1px solid var(--border);
text-align:center;
}

.preview-label{
margin-bottom:14px;
color: #475569;
font-weight:800;
font-size: 13px;
text-transform: uppercase;
letter-spacing: 0.02em;
text-align: left;
}

.preview{
width:100%;
max-width:220px;
height:300px;
object-fit:cover;
border-radius:12px;
box-shadow:0 10px 25px rgba(15,23,42,0.08);
border: 1px solid var(--border);
}

/* =========================================================
GRID
========================================================= */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* =========================================================
GROUP
========================================================= */
.group{
margin-top:20px;
}

.label{
margin-bottom:10px;
font-size:13px;
font-weight:800;
color: #475569;
text-transform: uppercase;
letter-spacing: 0.02em;
}

/* =========================================================
INPUT
========================================================= */
.input,
.textarea,
.select{
width:100%;
padding:14px 16px;
background:#ffffff;
border:1px solid #cbd5e1;
border-radius:10px;
color:#0f172a;
font-size:15px;
outline:none;
transition:.2s;
font-weight: 600;
}

.input:focus,
.textarea:focus,
.select:focus{
border-color:var(--accent-blue);
box-shadow:0 0 0 4px rgba(47, 98, 233, 0.08);
}

.textarea{
min-height:150px;
resize:none;
line-height:1.6;
font-weight: 500;
}

/* =========================================================
FILE
========================================================= */
.file-wrap{
background:#ffffff;
padding:16px;
border-radius:10px;
border:1px dashed #cbd5e1;
}

.file{
width:100%;
font-weight: 600;
color: var(--text-muted);
}

/* =========================================================
BUTTONS
========================================================= */
.actions{
display:flex;
gap:18px;
margin-top:36px;
border-top: 1px solid var(--border);
padding-top: 28px;
}

.btn{
flex:1;
padding:16px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:.2s;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.btn:hover{
transform:translateY(-2px);
opacity: 0.9;
}

.save{
background: var(--accent-blue);
color:white;
}

.delete{
background: #ef4444;
color:white;
}

/* =========================================================
STATUS
========================================================= */
.status{
margin-top:20px;
padding:16px;
border-radius:10px;
display:none;
font-weight:bold;
text-align: center;
font-size: 14px;
}

.success{
background:#ecfdf5;
color:#047857;
border: 1px solid #a7f3d0;
}

.error{
background:#fef2f2;
color:#b91c1c;
border: 1px solid #fecaca;
}

/* =========================================================
EXTRA SECTION
========================================================= */
.extra-section{
margin-top:32px;
background: var(--card);
padding:36px;
border-radius:24px;
border:1px solid var(--border);
box-shadow:0 4px 20px rgba(15,23,42,0.04);
}

.section-title{
font-size:24px;
font-weight:800;
margin-bottom:8px;
letter-spacing: -0.01em;
color: #0f172a;
}

.section-desc{
color: var(--text-muted);
line-height:1.6;
margin-bottom:32px;
font-size: 14px;
}

.growth-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:32px;
}

.growth-card{
background:#f8fafc;
padding:20px;
border-radius:14px;
display:flex;
align-items:center;
gap:16px;
border:1px solid var(--border);
}

.growth-icon{
width:48px;
height:48px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
background:#ffffff;
border: 1px solid var(--border);
box-shadow: 0 2px 6px rgba(15,23,42,0.02);
}

.growth-card h3{
font-size:22px;
font-weight:800;
color: #0f172a;
}

.growth-card p{
color: var(--text-muted);
margin-top:2px;
font-size: 12px;
font-weight: 600;
}

.insight-box,
.pro-note{
background:#f8fafc;
padding:24px;
border-radius:14px;
line-height:1.6;
margin-bottom:24px;
border: 1px solid var(--border);
font-size: 14px;
color: #334155;
}

.insight-title,
.pro-title{
font-size:16px;
font-weight:800;
margin-bottom:10px;
color: #0f172a;
}

.seo-box{
background: #0f172a;
padding:24px;
border-radius:14px;
margin-bottom:24px;
color: #ffffff;
}

.seo-title{
font-size:16px;
font-weight:800;
margin-bottom:14px;
}

.seo-bar{
width:100%;
height:12px;
background:rgba(255,255,255,.1);
border-radius:50px;
overflow:hidden;
margin-bottom:14px;
}

.seo-fill{
height:100%;
background: linear-gradient(90deg, #10b981, #34d399);
border-radius:50px;
}

.seo-box p{
    font-size: 13px;
    color: #cbd5e1;
    line-height: 1.5;
}

.action-grid{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:14px;
margin-bottom:24px;
}

.action-btn{
padding:14px;
border:1px solid var(--border);
border-radius:8px;
background: #ffffff;
color:#475569;
font-size:13px;
font-weight:700;
cursor:pointer;
transition: .2s;
}
.action-btn:hover {
    background: #f8fafc;
    color: #0f172a;
    border-color: #cbd5e1;
}

/* =========================================================
MOBILE
========================================================= */
@media(max-width:850px){
.preview-wrap, .grid, .info-grid, .growth-grid, .action-grid{ grid-template-columns:1fr; }
.actions{ flex-direction:column; }
.editor-title h1{ font-size:26px; }
.card{ padding:24px; }
}
</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">←</div>
<div class="title">Edit <span>Ebook</span></div>
</div>

<div class="container">
<div id="app">
    <div style="padding:40px; text-align:center; color: var(--text-muted); font-weight: 600;">Connecting runtime datastore streams...</div>
</div>
</div>

<script>
const PRODUCT_API = "https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

let user = JSON.parse(localStorage.getItem("user") || "null");
if(!user){ location.href = "login.html"; }

let BOOK = JSON.parse(localStorage.getItem("viewerBook") || "null");

function driveImage(link){
    if(!link) return "https://picsum.photos/400";
    let id = "";
    if(link.includes("id=")){ id = link.split("id=")[1].split("&")[0]; }
    else if(link.includes("/d/")){ id = link.split("/d/")[1].split("/")[0]; }
    else { id = link; }
    return `https://drive.google.com/thumbnail?id=${id}&sz=w1000&t=${Date.now()}`;
}

async function refreshBook(){
    try{
        let res = await fetch(PRODUCT_API + "?db=products&t=" + Date.now());
        let data = await res.json();
        let products = data.products || data.data || (Array.isArray(data) ? data : []);
        
        let targetId = localStorage.getItem("editBookId") || (BOOK ? BOOK.id : "");
        let latest = products.find(p => String(p.id) === String(targetId));
        
        if(latest){
            BOOK = latest;
            localStorage.setItem("viewerBook", JSON.stringify(BOOK));
        }
        render();
    }catch(err){
        console.error(err);
        render();
    }
}

function render(){
    if(!BOOK){
        document.getElementById("app").innerHTML = "<h1 style='padding:40px; text-align:center; color: #ef4444;'>Book Parameters Reference Mismatch</h1>";
        return;
    }

    let trendingValue = Number(BOOK.trending || 0);

    document.getElementById("app").innerHTML = `
        <div class="card">
            <div class="editor-header">
                <div class="editor-title">
                    <h1>Edit <span>Your Ebook</span></h1>
                    <p>Update ebook details, optimize metadata and manage your digital publishing professionally.</p>
                </div>
                <div class="live-badge">🟢 Live Product</div>
            </div>

            <div class="info-grid">
                <div class="info-box"><h3>BOOK ID</h3><p>#${BOOK.id}</p></div>
                <div class="info-box"><h3>STATUS</h3><p>${BOOK.status || BOOK.ai_status || "Approved"}</p></div>
                <div class="info-box"><h3>AUTHOR</h3><p>${BOOK.author || "Premium Creator"}</p></div>
            </div>

            <div class="preview-wrap">
                <div class="preview-box">
                    <div class="preview-label">📕 Front Cover</div>
                    <img id="frontPreview" class="preview" src="${driveImage(BOOK.front_cover || BOOK.cover || BOOK.image)}">
                </div>
                <div class="preview-box">
                    <div class="preview-label">📘 Back Cover</div>
                    <img id="backPreview" class="preview" src="${driveImage(BOOK.back_cover || "")}">
                </div>
            </div>

            <div class="grid">
                <div class="group">
                    <div class="label">📖 Book Title</div>
                    <input id="title" class="input" value="${escapeHTML(BOOK.title || '')}">
                </div>
                <div class="group">
                    <div class="label">✍️ Author Name</div>
                    <input id="author" class="input" value="${escapeHTML(BOOK.author || '')}">
                </div>
            </div>

            <div class="group">
                <div class="label">📝 Description</div>
                <textarea id="description" class="textarea">${escapeHTML(BOOK.description || '')}</textarea>
            </div>

            <div class="grid">
                <div class="group">
                    <div class="label">📂 Category</div>
                    <input id="category" class="input" value="${escapeHTML(BOOK.category || BOOK.type || 'Paperback')}">
                </div>
                <div class="group">
                    <div class="label">💰 Price</div>
                    <input id="price" class="input" type="number" value="${BOOK.price || 0}">
                </div>
            </div>

            <div class="grid">
                <div class="group">
                    <div class="label">🖼 Front Cover</div>
                    <div class="file-wrap">
                        <input type="file" class="file" id="frontFile" accept="image/*" onchange="previewFront(event)">
                    </div>
                </div>
                <div class="group">
                    <div class="label">🖼 Back Cover</div>
                    <div class="file-wrap">
                        <input type="file" class="file" id="backFile" accept="image/*" onchange="previewBack(event)">
                    </div>
                </div>
            </div>

            <div id="status" class="status"></div>

            <div class="actions">
                <button class="btn save" id="saveBtn" onclick="saveBook()">💾 Save Changes</button>
                <button class="btn delete" onclick="deleteBook()">🗑 Delete Ebook</button>
            </div>
        </div>

        <div class="extra-section">
            <div class="section-title">Ebook Growth Dashboard</div>
            <p class="section-desc">Real CreatorHub analytics powered by your live ebook performance data.</p>
            
            <div class="growth-grid">
                <div class="growth-card"><div class="growth-icon">📚</div><div><h3>${Number(BOOK.reads || 0).toLocaleString()}</h3><p>Total Reads</p></div></div>
                <div class="growth-card"><div class="growth-icon">⭐</div><div><h3>${BOOK.rating || "5.0"}</h3><p>Average Rating</p></div></div>
                <div class="growth-card"><div class="growth-icon">💰</div><div><h3>₹${Number(BOOK.revenue || 0).toLocaleString()}</h3><p>Revenue</p></div></div>
                <div class="growth-card"><div class="growth-icon">🔥</div><div><h3>${trendingValue}%</h3><p>Trending</p></div></div>
            </div>

            <div class="insight-box">
                <div class="insight-title">📈 Author Insights</div>
                <p>"${escapeHTML(BOOK.title)}" currently has ${BOOK.reads || 0} total reads. This ebook belongs to "${escapeHTML(BOOK.category || 'Paperback')}" category and is building reader engagement through consistent visibility and professional branding.</p>
            </div>

            <div class="seo-box">
                <div class="seo-title">🎯 SEO Optimization Score</div>
                <div class="seo-bar"><div class="seo-fill" style="width:${trendingValue || 50}%"></div></div>
                <p>Your ebook currently has ${trendingValue || 50}% marketplace visibility. Optimizing title keywords, description quality and category targeting improves organic discoverability.</p>
            </div>

            <div class="action-grid">
                <button class="action-btn" onclick="alert('Compiling analytical datasets logs...')">📊 View Analytics</button>
                <button class="action-btn" onclick="alert('Parsing reviews metadata framework...')">💬 Reader Reviews</button>
                <button class="action-btn" onclick="alert('Initializing marketing channels push...')">📢 Promote Ebook</button>
                <button class="action-btn" onclick="alert('Executing visibility index booster...')">🚀 Boost Visibility</button>
            </div>

            <div class="pro-note">
                <div class="pro-title">👑 Professional Publishing Tips</div>
                <p>Consistent branding, optimized descriptions and quality cover design improve conversion and reader trust across marketplaces.</p>
            </div>
        </div>
    `;
}

function previewFront(e){
    let file = e.target.files[0];
    if(file){ document.getElementById("frontPreview").src = URL.createObjectURL(file); }
}

function previewBack(e){
    let file = e.target.files[0];
    if(file){ document.getElementById("backPreview").src = URL.createObjectURL(file); }
}

function escapeHTML(str){
    return String(str).replace(/[&<>"']/g, function(m){
        return({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' })[m]
    });
}

function showStatus(msg, type){
    let box = document.getElementById("status");
    box.style.display = "block";
    box.className = "status " + type;
    box.innerHTML = msg;
}

async function saveBook(){
    let btn = document.getElementById("saveBtn");
    btn.innerHTML = "Saving...";
    btn.disabled = true;

    try{
        let titleVal = document.getElementById("title").value.trim();
        let authorVal = document.getElementById("author").value.trim();
        let descVal = document.getElementById("description").value.trim();
        let catVal = document.getElementById("category").value.trim();
        let priceVal = document.getElementById("price").value;

        let body = {
            action: "updateBook",
            id: BOOK.id,
            title: titleVal,
            author: authorVal,
            description: descVal,
            category: catVal,
            price: priceVal,
            front_cover: BOOK.front_cover || "",
            back_cover: BOOK.back_cover || "",
            email: user.email
        };

        let res = await fetch(PRODUCT_API, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(body)
        });
        let data = await res.json();

        BOOK.title = titleVal;
        BOOK.author = authorVal;
        BOOK.description = descVal;
        BOOK.category = catVal;
        BOOK.price = priceVal;
        localStorage.setItem("viewerBook", JSON.stringify(BOOK));

        showStatus("✅ Ebook Updated Successfully", "success");
        btn.innerHTML = "✅ Saved";
        setTimeout(() => { location.reload(); }, 1000);

    }catch(err){
        showStatus(err.message, "error");
        btn.innerHTML = "💾 Save Changes";
        btn.disabled = false;
    }
}

async function deleteBook(){
    let ok = confirm("Delete this ebook item reference completely from database streams?");
    if(!ok) return;

    try{
        await fetch(PRODUCT_API, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action: "deleteBook", id: BOOK.id, email: user.email })
        });
        alert("Ebook Deleted");
        location.href = "library1.html";
    }catch(err){ alert(err.message); }
}

refreshBook();
</script>

</body>
</html>
