<title>
Edit Ebook • CreatorHub
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
180deg,
#020617 0%,
#031127 100%
);

color:white;
overflow-x:hidden;
min-height:100vh;

}

:root{

--green:#22c55e;
--card:#0f172a;
--border:#1e293b;

}

/* =========================================================
TOPBAR
========================================================= */

.topbar{

position:sticky;
top:0;
z-index:999;

height:70px;

padding:0 18px;

display:flex;
align-items:center;
gap:16px;

background:
rgba(2,6,23,.92);

backdrop-filter:blur(20px);

border-bottom:
1px solid rgba(255,255,255,.05);

}

.back{

font-size:24px;
cursor:pointer;

}

.title{

font-size:26px;
font-weight:800;

}

.title span{
color:#4ade80;
}

/* =========================================================
CONTAINER
========================================================= */

.container{

width:100%;
max-width:1000px;

margin:auto;

padding:
30px
18px
140px;

}

/* =========================================================
CARD
========================================================= */

.card{

width:100%;

background:
linear-gradient(
180deg,
rgba(15,23,42,.95),
rgba(8,18,37,.98)
);

border:
1px solid rgba(255,255,255,.05);

border-radius:32px;

padding:28px;

position:relative;
overflow:hidden;

box-shadow:
0 30px 80px rgba(0,0,0,.45);

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.card::before{

content:"";

position:absolute;

top:-120px;
right:-120px;

width:250px;
height:250px;

background:
rgba(34,197,94,.12);

filter:blur(80px);

border-radius:50%;

}

/* =========================================================
HEADER
========================================================= */

.editor-header{

display:flex;
justify-content:space-between;
align-items:center;

gap:20px;
flex-wrap:wrap;

margin-bottom:30px;

}

.editor-title h1{

font-weight:800;

}

.editor-title span{
color:#4ade80;
}

.editor-title p{

margin-top:10px;

opacity:.7;

font-size:15px;
line-height:1.6;

max-width:550px;

}

.live-badge{

border-radius:18px;

rgba(34,197,94,.15);

1px solid rgba(34,197,94,.25);

/* =========================================================
INFO BOX
========================================================= */

.info-grid{

grid-template-columns:
repeat(3,1fr);

gap:18px;

margin-bottom:30px;

}

.info-box{

padding:18px;

border:
1px solid rgba(255,255,255,.05);

}

.info-box h3{

margin-bottom:10px;

}

.info-box p{

font-weight:bold;

}

/* =========================================================
PREVIEW
========================================================= */

.preview-wrap{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:24px;

margin-bottom:35px;

}

.preview-box{

border:
1px solid rgba(255,255,255,.05);

border-radius:24px;

}

.preview-label{

.input,

1px solid rgba(255,255,255,.06);

.growth-icon{

.action-grid{

.action-btn{

border-radius:20px;

linear-gradient(
90deg,
#16a34a,

.action-btn:hover{

.pro-note{

line-height:2;

}

.pro-title{
font-size:24px;
font-weight:800;
margin-bottom:15px;

@media(max-width:900px){

.growth-grid{

grid-template-columns:1fr;

@media(max-width:600px){

.growth-grid{

}

  }

</style>

</head>

<script>

/* =========================================================
API
========================================================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

/* =========================================================
USER
========================================================= */

let user =
JSON.parse(
localStorage.getItem("user") || "null"
)

if(!user){

location.href =
"login.html"

}

/* =========================================================
BOOK
========================================================= */

let BOOK =
JSON.parse(
localStorage.getItem("viewerBook") || "null"
)

if(!BOOK){

document.getElementById("app")
.innerHTML =
"Book Not Found"

}

/* =========================================================
DRIVE IMAGE
========================================================= */

function driveImage(link){

if(!link){

return "https://picsum.photos/400"

}

let id = ""

if(link.includes("id=")){

id =
link.split("id=")[1]
.split("&")[0]

}

else if(link.includes("/d/")){

id =
link.split("/d/")[1]
.split("/")[0]

}

else{

id = link

}

return `https://drive.google.com/thumbnail?id=${id}&sz=w1000&t=${Date.now()}`

}

/* =========================================================
RENDER
========================================================= */

function render(){

document.getElementById("app")
.innerHTML = `

Edit <span>Your Ebook</span>
</h1>

<p>

</div>

🟢 Live Product
</div>

</div>

<div class="info-grid">

BOOK ID
</h3>

<p>
#${BOOK.id}
</p>

STATUS
</h3>

Published
</p>

>

</div>

id="backPreview"

</div>

id="title"
class="input"

>

<div class="group">

</div>

<input
id="author"
class="input"
value="${BOOK.author || ""}"
>

</div>

</div>

<div class="group">

<div class="label">
📝 Description
</div>

<textarea
id="description"
class="textarea"
>${BOOK.description || ""}</textarea>

</div>

<div class="grid">

<div class="group">

<div class="label">
📂 Category
</div>

<select
id="category"
class="select"
>

<option>Business</option>
<option>Technology</option>
<option>Finance</option>
<option>Marketing</option>
<option>Education</option>

</select>

</div>

<div class="group">

<div class="label">
💰 Price
</div>

<input
id="price"
class="input"
type="number"
value="${BOOK.price || 0}"
>

</div>

</div>

<div class="grid">

<div class="group">

<div class="label">
🖼 Front Cover
</div>

<div class="file-wrap">

<input
type="file"
class="file"
id="frontFile"
accept="image/*"
onchange="previewFront(event)"
>

<div class="insight-box">

<!-- SEO SECTION -->

<div class="seo-box">

<div class="seo-title">
🎯 SEO Optimization Score
</div>

<div class="seo-bar">

<div class="seo-fill">

</div>

</div>

<p>

search ranking inside CreatorHub marketplace.

</p>

</div>

<!-- ACTION BUTTONS -->

<div class="action-grid">

</button>

<!-- PROFESSIONAL NOTE -->

<div class="pro-note">

</div>

}

render()

/* =========================================================
PREVIEW
========================================================= */

function previewFront(e){

let file =
e.target.files[0]

if(file){

document.getElementById(
"frontPreview"
).src =

URL.createObjectURL(file)

}

}

function previewBack(e){

let file =
e.target.files[0]

if(file){

document.getElementById(
"backPreview"
).src =

URL.createObjectURL(file)

}

}

/* =========================================================
UPLOAD DRIVE
========================================================= */

async function uploadToDrive(file){

return new Promise(resolve=>{

setTimeout(()=>{

resolve(
"https://drive.google.com/file/d/demo"
)

},1000)

})

}

/* =========================================================
STATUS
========================================================= */

function showStatus(msg,type){

let box =
document.getElementById("status")

box.style.display =
"block"

box.className =
"status " + type

box.innerHTML = msg

}

/* =========================================================
SAVE
========================================================= */

async function saveBook(){

let btn =
document.getElementById("saveBtn")

btn.innerHTML =
"Saving..."

btn.disabled = true

try{

let title =
document.getElementById("title")
.value.trim()

let author =
document.getElementById("author")
.value.trim()

let description =
document.getElementById("description")
.value.trim()

let category =
document.getElementById("category")
.value

let price =
document.getElementById("price")
.value

/* FILES */

let frontFile =
document.getElementById("frontFile")
.files[0]

let backFile =
document.getElementById("backFile")
.files[0]

/* OLD */

let frontCover =
BOOK.front_cover || ""

let backCover =
BOOK.back_cover || ""

/* NEW */

if(frontFile){

frontCover =
await uploadToDrive(frontFile)

}

if(backFile){

backCover =
await uploadToDrive(backFile)

}

/* BODY */

let body = {

action:"updateBook",

id:BOOK.id,

title,
author,
description,
category,
price,

front_cover:frontCover,
back_cover:backCover,

email:user.email

}

/* API */

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify(body)

})

let data =
await res.json()

console.log(data)

/* UPDATE LOCAL */

BOOK.title = title
BOOK.author = author
BOOK.description = description
BOOK.category = category
BOOK.price = price

BOOK.front_cover = frontCover
BOOK.back_cover = backCover

localStorage.setItem(
"viewerBook",
JSON.stringify(BOOK)
)

showStatus(
"✅ Ebook Updated Successfully",
"success"
)

btn.innerHTML =
"✅ Saved"

setTimeout(()=>{

render()

},800)

}catch(err){

console.log(err)

showStatus(
err.message,
"error"
)

btn.innerHTML =
"💾 Save Changes"

btn.disabled = false

}

}

/* =========================================================
DELETE
========================================================= */

async function deleteBook(){

let ok =
confirm(
"Delete this ebook?"
)

if(!ok) return

try{

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"deleteBook",

id:BOOK.id,

email:user.email

})

})

let data =
await res.json()

alert(
data.message ||
"Deleted"
)

location.href =
"library.html"

}catch(err){

alert(err.message)

}

}

</script>
