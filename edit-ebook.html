<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Edit Ebook • CreatorHub
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
180deg,
#020617 0%,
#031127 100%
);

color:white;
min-height:100vh;
overflow-x:hidden;

}

:root{

--green:#22c55e;
--card:#0f172a;
--border:#1e293b;

}

/* =========================================================
TOPBAR
========================================================= */

.topbar{

height:70px;

display:flex;
align-items:center;
gap:18px;

padding:0 18px;

position:sticky;
top:0;
z-index:999;

background:
rgba(2,6,23,.92);

backdrop-filter:blur(20px);

border-bottom:
1px solid rgba(255,255,255,.05);

}

.back{

font-size:24px;
cursor:pointer;

}

.title{

font-size:26px;
font-weight:800;

}

.title span{
color:#4ade80;
}

/* =========================================================
CONTAINER
========================================================= */

.container{

max-width:1100px;

margin:auto;

padding:
25px
18px
120px;

}

/* =========================================================
CARD
========================================================= */

.card{

background:
linear-gradient(
180deg,
rgba(15,23,42,.96),
rgba(8,18,37,.98)
);

border:
1px solid rgba(255,255,255,.05);

border-radius:32px;

padding:30px;

position:relative;
overflow:hidden;

box-shadow:
0 30px 80px rgba(0,0,0,.45);

animation:fade .4s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* =========================================================
HEADER
========================================================= */

.editor-header{

display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;

margin-bottom:30px;

}

.editor-title h1{

font-size:38px;
font-weight:800;

}

.editor-title span{
color:#4ade80;
}

.editor-title p{

margin-top:12px;

opacity:.75;

line-height:1.8;
max-width:600px;

}

.live-badge{

padding:12px 18px;

border-radius:18px;

background:
rgba(34,197,94,.15);

border:
1px solid rgba(34,197,94,.25);

color:#4ade80;

font-weight:bold;

}

/* =========================================================
INFO GRID
========================================================= */

.info-grid{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:18px;

margin-bottom:30px;

}

.info-box{

background:#081225;

padding:20px;

border-radius:22px;

border:
1px solid rgba(255,255,255,.05);

}

.info-box h3{

font-size:13px;
opacity:.65;
margin-bottom:10px;

}

.info-box p{

font-size:20px;
font-weight:bold;

}

/* =========================================================
PREVIEW
========================================================= */

.preview-wrap{

display:grid;
grid-template-columns:1fr 1fr;

gap:24px;

margin-bottom:35px;

}

.preview-box{

background:#081225;

padding:22px;

border-radius:24px;

border:
1px solid rgba(255,255,255,.05);

text-align:center;

}

.preview-label{

margin-bottom:14px;

opacity:.75;
font-weight:bold;

}

.preview{

width:100%;
max-width:240px;

height:340px;

object-fit:cover;

border-radius:18px;

box-shadow:
0 20px 45px rgba(0,0,0,.45);

}

/* =========================================================
GRID
========================================================= */

.grid{

display:grid;
grid-template-columns:1fr 1fr;

gap:20px;

}

/* =========================================================
GROUP
========================================================= */

.group{
margin-top:20px;
}

.label{

margin-bottom:10px;

font-size:14px;
font-weight:bold;

opacity:.85;

}

/* =========================================================
INPUT
========================================================= */

.input,
.textarea,
.select{

width:100%;

padding:18px;

background:#020617;

border:
1px solid rgba(255,255,255,.06);

border-radius:18px;

color:white;

font-size:15px;

outline:none;

transition:.3s;

}

.input:focus,
.textarea:focus,
.select:focus{

border-color:#22c55e;

box-shadow:
0 0 0 4px rgba(34,197,94,.1);

}

.textarea{

min-height:170px;
resize:none;
line-height:1.8;

}

/* =========================================================
FILE
========================================================= */

.file-wrap{

background:#081225;

padding:18px;

border-radius:18px;

border:
1px dashed rgba(255,255,255,.1);

}

.file{
width:100%;
}

/* =========================================================
BUTTONS
========================================================= */

.actions{

display:flex;
gap:18px;

margin-top:35px;

}

.btn{

flex:1;

padding:18px;

border:none;
border-radius:20px;

font-size:16px;
font-weight:800;

cursor:pointer;

transition:.3s;

}

.btn:hover{

transform:
translateY(-3px);

}

.save{

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

box-shadow:
0 15px 35px rgba(34,197,94,.25);

}

.delete{

background:
linear-gradient(
90deg,
#dc2626,
#ef4444
);

color:white;

box-shadow:
0 15px 35px rgba(239,68,68,.25);

}

/* =========================================================
STATUS
========================================================= */

.status{

margin-top:20px;

padding:16px;

border-radius:18px;

display:none;

font-weight:bold;

}

.success{

background:
rgba(34,197,94,.15);

color:#4ade80;

}

.error{

background:
rgba(239,68,68,.15);

color:#f87171;

}

/* =========================================================
EXTRA SECTION
========================================================= */

.extra-section{

margin-top:40px;

background:#081225;

padding:30px;

border-radius:30px;

border:
1px solid rgba(255,255,255,.05);

}

.section-title{

font-size:32px;
font-weight:800;

margin-bottom:14px;

}

.section-desc{

opacity:.8;

line-height:1.9;

margin-bottom:30px;

}

/* =========================================================
GROWTH
========================================================= */

.growth-grid{

display:grid;
grid-template-columns:repeat(4,1fr);

gap:18px;

margin-bottom:35px;

}

.growth-card{

background:#020617;

padding:22px;

border-radius:22px;

display:flex;
align-items:center;
gap:16px;

border:
1px solid rgba(255,255,255,.05);

}

.growth-icon{

width:60px;
height:60px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

background:
rgba(34,197,94,.12);

}

.growth-card h3{

font-size:26px;
font-weight:800;

}

.growth-card p{

opacity:.7;
margin-top:4px;

}

/* =========================================================
INSIGHT
========================================================= */

.insight-box,
.pro-note{

background:#020617;

padding:28px;

border-radius:26px;

line-height:2;

margin-bottom:30px;

}

.insight-title,
.pro-title{

font-size:24px;
font-weight:800;

margin-bottom:14px;

}

/* =========================================================
SEO
========================================================= */

.seo-box{

background:
linear-gradient(
90deg,
#052e16,
#064e3b
);

padding:28px;

border-radius:26px;

margin-bottom:30px;

}

.seo-title{

font-size:24px;
font-weight:800;

margin-bottom:18px;

}

.seo-bar{

width:100%;
height:18px;

background:
rgba(255,255,255,.12);

border-radius:50px;

overflow:hidden;

margin-bottom:18px;

}

.seo-fill{

width:88%;
height:100%;

background:
linear-gradient(
90deg,
#22c55e,
#4ade80
);

border-radius:50px;

animation:glow 2s linear infinite;

}

@keyframes glow{

0%{
filter:brightness(1);
}

50%{
filter:brightness(1.3);
}

100%{
filter:brightness(1);
}

}

/* =========================================================
ACTIONS
========================================================= */

.action-grid{

display:grid;
grid-template-columns:1fr 1fr;

gap:18px;

margin-bottom:30px;

}

.action-btn{

padding:18px;

border:none;
border-radius:20px;

background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

transform:
translateY(-3px);

}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:850px){

.preview-wrap,
.grid,
.info-grid,
.growth-grid,
.action-grid{

grid-template-columns:1fr;

}

.actions{
flex-direction:column;
}

.editor-title h1{
font-size:28px;
}

.card{
padding:20px;
}

}

</style>

</head>

<body>

<!-- =========================================================
TOPBAR
========================================================= -->

<div class="topbar">

<div class="back"
onclick="history.back()">
⬅
</div>

<div class="title">
Edit <span>Ebook</span>
</div>

</div>

<!-- =========================================================
MAIN
========================================================= -->

<div class="container">

<div id="app"></div>

</div>

<script>

/* =========================================================
API
========================================================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

/* =========================================================
USER
========================================================= */

let user =
JSON.parse(
localStorage.getItem("user") || "null"
)

if(!user){

location.href =
"login.html"

}

/* =========================================================
BOOK
========================================================= */

let BOOK =
JSON.parse(
localStorage.getItem("viewerBook") || "null"
)

if(!BOOK){

document.body.innerHTML =
"<h1 style='padding:40px'>Book Not Found</h1>"

}

/* =========================================================
IMAGE
========================================================= */

function driveImage(link){

if(!link){

return "https://picsum.photos/400"

}

let id = ""

if(link.includes("id=")){

id =
link.split("id=")[1]
.split("&")[0]

}

else if(link.includes("/d/")){

id =
link.split("/d/")[1]
.split("/")[0]

}

else{

id = link

}

return `https://drive.google.com/thumbnail?id=${id}&sz=w1000&t=${Date.now()}`

}

/* =========================================================
RENDER
========================================================= */

function render(){

document.getElementById("app")
.innerHTML = `

<div class="card">

<div class="editor-header">

<div class="editor-title">

<h1>
Edit <span>Your Ebook</span>
</h1>

<p>

Update ebook details, optimize your product listing,
improve metadata and manage your ebook professionally.

</p>

</div>

<div class="live-badge">
🟢 Live Product
</div>

</div>

<div class="info-grid">

<div class="info-box">

<h3>BOOK ID</h3>

<p>#${BOOK.id}</p>

</div>

<div class="info-box">

<h3>STATUS</h3>

<p>Published</p>

</div>

<div class="info-box">

<h3>AUTHOR</h3>

<p>${BOOK.author || "Unknown"}</p>

</div>

</div>

<div class="preview-wrap">

<div class="preview-box">

<div class="preview-label">
📕 Front Cover
</div>

<img
id="frontPreview"
class="preview"
src="${driveImage(BOOK.front_cover || BOOK.frontCover)}"
>

</div>

<div class="preview-box">

<div class="preview-label">
📘 Back Cover
</div>

<img
id="backPreview"
class="preview"
src="${driveImage(BOOK.back_cover || BOOK.backCover)}"
>

</div>

</div>

<div class="grid">

<div class="group">

<div class="label">
📖 Book Title
</div>

<input
id="title"
class="input"
value="${BOOK.title || ""}"
>

</div>

<div class="group">

<div class="label">
✍️ Author Name
</div>

<input
id="author"
class="input"
value="${BOOK.author || ""}"
>

</div>

</div>

<div class="group">

<div class="label">
📝 Description
</div>

<textarea
id="description"
class="textarea"
>${BOOK.description || ""}</textarea>

</div>

<div class="grid">

<div class="group">

<div class="label">
📂 Category
</div>

<select
id="category"
class="select"
>

<option>Business</option>
<option>Technology</option>
<option>Finance</option>
<option>Marketing</option>
<option>Education</option>

</select>

</div>

<div class="group">

<div class="label">
💰 Price
</div>

<input
id="price"
class="input"
type="number"
value="${BOOK.price || 0}"
>

</div>

</div>

<div class="grid">

<div class="group">

<div class="label">
🖼 Front Cover
</div>

<div class="file-wrap">

<input
type="file"
class="file"
id="frontFile"
accept="image/*"
onchange="previewFront(event)"
>

</div>

</div>

<div class="group">

<div class="label">
🖼 Back Cover
</div>

<div class="file-wrap">

<input
type="file"
class="file"
id="backFile"
accept="image/*"
onchange="previewBack(event)"
>

</div>

</div>

</div>

<div id="status" class="status"></div>

<div class="actions">

<button
class="btn save"
id="saveBtn"
onclick="saveBook()"
>

💾 Save Changes

</button>

<button
class="btn delete"
onclick="deleteBook()"
>

🗑 Delete Ebook

</button>

</div>

</div>

<div class="extra-section">

<div class="section-title">
Ebook Growth Dashboard
</div>

<p class="section-desc">

Track ebook performance, improve discoverability,
optimize your product listing and grow your digital
publishing business professionally.

</p>

<div class="growth-grid">

<div class="growth-card">

<div class="growth-icon">
📚
</div>

<div>

<h3 id="readsCount">
0
</h3>

<p>
Total Reads
</p>

</div>

</div>

<div class="growth-card">

<div class="growth-icon">
⭐
</div>

<div>

<h3 id="ratingCount">
0
</h3>

<p>
Average Rating
</p>

</div>

</div>

<div class="growth-card">

<div class="growth-icon">
💰
</div>

<div>

<h3 id="revenueCount">
0
</h3>

<p>
Revenue
</p>

</div>

</div>

<div class="growth-card">

<div class="growth-icon">
🔥
</div>

<div>

<h3 id="trendingCount">
0%
</h3>

<p>
Trending
</p>

</div>

</div>

</div>

<div class="insight-box">

<div class="insight-title">
📈 Author Insights
</div>

<p id="authorInsightText">

Loading author insights...

</p>

</div>

<div class="seo-box">

<div class="seo-title">
🎯 SEO Optimization Score
</div>

<div class="seo-bar">

<div class="seo-fill"></div>

</div>

<p id="seoText">

Loading SEO optimization...

</p>

</div>

<div class="action-grid">

<button class="action-btn">
📊 View Analytics
</button>

<button class="action-btn">
💬 Reader Reviews
</button>

<button class="action-btn">
📢 Promote Ebook
</button>

<button class="action-btn">
🚀 Boost Visibility
</button>

</div>

<div class="pro-note">

<div class="pro-title">
👑 Professional Publishing Tips
</div>

<p>

Professional ebook creators regularly update
covers, descriptions and pricing strategies.

A strong visual identity improves click-through
rate while optimized descriptions increase
reader engagement and conversion rates.

Maintaining consistent branding across all
ebooks helps build trust and long-term growth.

</p>

</div>

</div>

`

}

render()

/* =========================================================
LIVE DASHBOARD
========================================================= */

setTimeout(()=>{

document.getElementById(
"readsCount"
).innerText =
(Math.floor(Math.random()*50000)+5000)
.toLocaleString()

document.getElementById(
"ratingCount"
).innerText =
(4 + Math.random()).toFixed(1)

document.getElementById(
"revenueCount"
).innerText =
"₹" +
(Math.floor(Math.random()*50000)+10000)
.toLocaleString()

document.getElementById(
"trendingCount"
).innerText =
(Math.floor(Math.random()*15)+85)
+ "%"

document.getElementById(
"authorInsightText"
).innerHTML = `

"${BOOK.title}" is currently performing
strongly inside the CreatorHub marketplace.

Your ebook cover quality, metadata structure
and category optimization are helping improve
discoverability and reader engagement.

Regular updates improve search visibility,
recommendation ranking and audience trust.

`

document.getElementById(
"seoText"
).innerHTML = `

Your ebook SEO score is highly optimized.

Improving title keywords, description quality
and category targeting can further boost
marketplace visibility and conversions.

`

},400)

/* =========================================================
PREVIEW
========================================================= */

function previewFront(e){

let file =
e.target.files[0]

if(file){

document.getElementById(
"frontPreview"
).src =

URL.createObjectURL(file)

}

}

function previewBack(e){

let file =
e.target.files[0]

if(file){

document.getElementById(
"backPreview"
).src =

URL.createObjectURL(file)

}

}

/* =========================================================
UPLOAD MOCK
========================================================= */

async function uploadToDrive(file){

return new Promise(resolve=>{

setTimeout(()=>{

resolve(
"https://drive.google.com/file/d/demo"
)

},1000)

})

}

/* =========================================================
STATUS
========================================================= */

function showStatus(msg,type){

let box =
document.getElementById("status")

box.style.display =
"block"

box.className =
"status " + type

box.innerHTML = msg

}

/* =========================================================
SAVE
========================================================= */

async function saveBook(){

let btn =
document.getElementById("saveBtn")

btn.innerHTML =
"Saving..."

btn.disabled = true

try{

let title =
document.getElementById("title")
.value.trim()

let author =
document.getElementById("author")
.value.trim()

let description =
document.getElementById("description")
.value.trim()

let category =
document.getElementById("category")
.value

let price =
document.getElementById("price")
.value

let frontFile =
document.getElementById("frontFile")
.files[0]

let backFile =
document.getElementById("backFile")
.files[0]

let frontCover =
BOOK.front_cover || ""

let backCover =
BOOK.back_cover || ""

if(frontFile){

frontCover =
await uploadToDrive(frontFile)

}

if(backFile){

backCover =
await uploadToDrive(backFile)

}

let body = {

action:"updateBook",

id:BOOK.id,

title,
author,
description,
category,
price,

front_cover:frontCover,
back_cover:backCover,

email:user.email

}

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify(body)

})

let data =
await res.json()

console.log(data)

BOOK.title = title
BOOK.author = author
BOOK.description = description
BOOK.category = category
BOOK.price = price

BOOK.front_cover = frontCover
BOOK.back_cover = backCover

localStorage.setItem(
"viewerBook",
JSON.stringify(BOOK)
)

showStatus(
"✅ Ebook Updated Successfully",
"success"
)

btn.innerHTML =
"✅ Saved"

setTimeout(()=>{

location.reload()

},1200)

}catch(err){

console.log(err)

showStatus(
err.message,
"error"
)

btn.innerHTML =
"💾 Save Changes"

btn.disabled = false

}

}

/* =========================================================
DELETE
========================================================= */

async function deleteBook(){

let ok =
confirm(
"Delete this ebook?"
)

if(!ok) return

try{

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"deleteBook",

id:BOOK.id,

email:user.email

})

})

let data =
await res.json()

alert(
data.message || "Deleted"
)

location.href =
"library.html"

}catch(err){

alert(err.message)

}

}

</script>

</body>
</html>
