<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Ebook | CreatorHub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#06142c;
  --muted:#64748b;
  --line:#dbe4f0;
  --blue:#2f62e9;
  --blue2:#1d4ed8;
  --green:#10b981;
  --red:#ef4444;
  --soft:#eef4ff;
  --shadow:0 22px 55px rgba(16,24,40,.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}

.topbar{
  height:82px;
  background:#fff;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 42px;
  position:sticky;
  top:0;
  z-index:99;
}

.back{
  height:46px;
  padding:0 18px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  color:#334155;
  font-weight:800;
  cursor:pointer;
}

.back:hover{border-color:var(--blue);color:var(--blue);background:var(--soft)}

.brand{font-size:26px;font-weight:900;letter-spacing:-.03em}
.brand span{color:var(--blue)}

.container{
  max-width:1360px;
  margin:auto;
  padding:42px 34px 90px;
}

.hero{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:22px;
}

.hero h1{
  font-size:38px;
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1.15;
}

.hero h1 span{color:var(--blue)}

.hero p{
  margin-top:10px;
  color:var(--muted);
  font-size:15px;
  line-height:1.7;
  font-weight:600;
  max-width:760px;
}

.live-badge{
  min-height:46px;
  padding:0 18px;
  border-radius:999px;
  background:#e7f8ef;
  color:#0f9f57;
  border:1px solid rgba(16,185,129,.18);
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:900;
  white-space:nowrap;
}

.layout{
  display:grid;
  grid-template-columns:.88fr 1.12fr;
  gap:28px;
  align-items:start;
}

.panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 16px 42px rgba(16,24,40,.06);
  overflow:hidden;
}

.panel-pad{padding:28px}

.preview-top{
  height:180px;
  background:linear-gradient(120deg,#2f62e9,#27a7a1);
}

.cover-row{
  margin-top:-86px;
  padding:0 28px 28px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.preview-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  box-shadow:0 18px 36px rgba(16,24,40,.12);
}

.preview-label{
  font-size:12px;
  font-weight:900;
  color:#475569;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;
  gap:8px;
  align-items:center;
}

.preview{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  border-radius:10px;
  background:#e2e8f0;
  border:1px solid var(--line);
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  padding:0 28px 28px;
}

.stat{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:13px;
  padding:16px;
}

.stat span{
  display:block;
  color:#64748b;
  font-size:11px;
  text-transform:uppercase;
  font-weight:900;
  margin-bottom:8px;
}

.stat strong{
  display:block;
  color:#06142c;
  font-size:18px;
  font-weight:900;
  word-break:break-word;
}

.card-title{
  font-size:23px;
  font-weight:900;
  letter-spacing:-.03em;
  margin-bottom:8px;
}

.card-desc{
  color:var(--muted);
  font-size:14px;
  line-height:1.7;
  font-weight:600;
  margin-bottom:22px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.group{margin-bottom:18px}

.label{
  font-size:12px;
  font-weight:900;
  color:#26364f;
  text-transform:uppercase;
  margin-bottom:8px;
}

.input,.textarea{
  width:100%;
  border:1px solid #d9e3f0;
  border-radius:10px;
  background:#fff;
  color:#101828;
  outline:none;
  padding:14px 15px;
  font-size:15px;
  font-weight:700;
}

.input:focus,.textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(47,98,233,.1);
}

.textarea{
  min-height:140px;
  resize:vertical;
  line-height:1.6;
  font-weight:600;
}

.long-textarea{min-height:220px}

.file-box{
  border:1px dashed #cbd5e1;
  border-radius:12px;
  background:#f8fafc;
  padding:16px;
}

.file-box input{width:100%;font-weight:700;color:#475569}

.inline-actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.small-btn{
  min-height:42px;
  border:1px solid var(--line);
  background:#fff;
  color:#334155;
  border-radius:10px;
  padding:0 16px;
  font-weight:900;
  cursor:pointer;
}

.small-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--soft)}

.actions{
  display:flex;
  gap:14px;
  margin-top:20px;
  padding-top:22px;
  border-top:1px solid #edf2f7;
}

.btn{
  flex:1;
  min-height:54px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}

.save{background:var(--blue);box-shadow:0 14px 28px rgba(47,98,233,.18)}
.save:hover{background:var(--blue2)}

.delete{background:#fff1f2;color:var(--red);border:1px solid #fecdd3}
.delete:hover{background:#fee2e2}

.status{
  display:none;
  margin-top:16px;
  padding:14px 16px;
  border-radius:10px;
  font-weight:900;
  line-height:1.5;
}

.success{display:block;background:#e7f8ef;color:#0f9f57;border:1px solid rgba(15,159,87,.15)}
.error{display:block;background:#fef2f2;color:#ef4444;border:1px solid rgba(239,68,68,.15)}
.pending{display:block;background:#fff7df;color:#b7791f;border:1px solid rgba(183,121,31,.15)}

.not-found{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:46px;
  text-align:center;
}

.not-found h2{font-size:28px;margin-bottom:10px}
.not-found p{color:var(--muted);font-weight:700}

@media(max-width:1050px){
  .layout{grid-template-columns:1fr}
}

@media(max-width:680px){
  .topbar{padding:0 18px}
  .brand{font-size:22px}
  .container{padding:24px 18px 70px}
  .hero{display:block;padding:26px}
  .hero h1{font-size:30px}
  .live-badge{margin-top:18px;width:max-content}
  .grid,.cover-row,.stats-grid{grid-template-columns:1fr}
  .actions{flex-direction:column}
}
</style>
</head>

<body>

<header class="topbar">
  <button class="back" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Back
  </button>
  <a class="brand" href="index.html">Creator<span>Hub</span></a>
</header>

<main class="container">
  <div id="app"></div>
</main>

<script>
const PRODUCT_API = "https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec";

let user = JSON.parse(localStorage.getItem("user") || "null");
if(!user){
  location.href = "login.html";
}

let BOOK = JSON.parse(localStorage.getItem("viewerBook") || "null");

if(!BOOK){
  document.getElementById("app").innerHTML = `
    <div class="not-found">
      <h2>Book Not Found</h2>
      <p>Please open this page from your ebook library.</p>
    </div>
  `;
}

function safeText(value){
  return String(value || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  })[m]);
}

function driveImage(link){
  if(!link){
    return "https://via.placeholder.com/500x750/e2e8f0/64748b?text=CreatorHub";
  }

  if(link.startsWith("data:image")) return link;

  try{
    if(link.includes("thumbnail?id=")) return link;

    let id = "";

    if(link.includes("id=")){
      id = link.split("id=")[1].split("&")[0];
    }else if(link.includes("/d/")){
      id = link.split("/d/")[1].split("/")[0];
    }else{
      return link;
    }

    return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000&t=" + Date.now();
  }catch(err){
    return link;
  }
}

async function refreshBook(){
  if(!BOOK) return;

  try{
    let res = await fetch(PRODUCT_API + "?action=products&t=" + Date.now());
    let data = await res.json();
    let products = data.products || data.data || [];

    if(!Array.isArray(products)) products = [];

    let latest = products.find(p => String(p.id) === String(BOOK.id));

    if(latest){
      BOOK = latest;
      localStorage.setItem("viewerBook", JSON.stringify(BOOK));
    }

    render();
  }catch(err){
    console.log(err);
    render();
  }
}

function render(){
  if(!BOOK) return;

  document.getElementById("app").innerHTML = `
    <section class="hero">
      <div>
        <h1>Edit <span>Your Ebook</span></h1>
        <p>Update ebook details, upload real Drive cover images and generate a professional AI long description.</p>
      </div>
      <div class="live-badge">
        <i class="fa-solid fa-circle-check"></i> ${safeText(BOOK.status || "Published")}
      </div>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="preview-top"></div>

        <div class="cover-row">
          <div class="preview-card">
            <div class="preview-label"><i class="fa-solid fa-book-open"></i> Front Cover</div>
            <img id="frontPreview" class="preview" src="${driveImage(BOOK.front_cover)}" alt="Front Cover">
          </div>

          <div class="preview-card">
            <div class="preview-label"><i class="fa-solid fa-book"></i> Back Cover</div>
            <img id="backPreview" class="preview" src="${driveImage(BOOK.back_cover)}" alt="Back Cover">
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <span>Book ID</span>
            <strong>#${safeText(BOOK.id)}</strong>
          </div>

          <div class="stat">
            <span>Author</span>
            <strong>${safeText(BOOK.author || "Unknown")}</strong>
          </div>

          <div class="stat">
            <span>Price</span>
            <strong>₹${Number(BOOK.price || 0).toLocaleString("en-IN")}</strong>
          </div>
        </div>
      </aside>

      <section class="panel panel-pad">
        <h2 class="card-title">Ebook Information</h2>
        <p class="card-desc">Cover images upload to Google Drive, then URLs are saved in products.json.</p>

        <div class="grid">
          <div class="group">
            <div class="label">Book Title</div>
            <input id="title" class="input" value="${safeText(BOOK.title || "")}">
          </div>

          <div class="group">
            <div class="label">Author Name</div>
            <input id="author" class="input" value="${safeText(BOOK.author || "")}">
          </div>
        </div>

        <div class="group">
          <div class="label">Short Description</div>
          <textarea id="description" class="textarea">${safeText(BOOK.description || "")}</textarea>
        </div>

        <div class="group">
          <div class="label">AI Long Description</div>
          <div class="inline-actions">
            <button type="button" class="small-btn" onclick="generateLongDescription()">
              <i class="fa-solid fa-wand-magic-sparkles"></i> Generate AI Description
            </button>
          </div>
          <textarea id="longDescription" class="textarea long-textarea">${safeText(BOOK.long_description || "")}</textarea>
        </div>

        <div class="grid">
          <div class="group">
            <div class="label">Category</div>
            <input id="category" class="input" value="${safeText(BOOK.category || "")}">
          </div>

          <div class="group">
            <div class="label">Price</div>
            <input id="price" class="input" type="number" min="0" value="${Number(BOOK.price || 0)}">
          </div>
        </div>

        <div class="grid">
          <div class="group">
            <div class="label">Front Cover</div>
            <div class="file-box">
              <input type="file" id="frontFile" accept="image/*" onchange="previewFront(event)">
            </div>
          </div>

          <div class="group">
            <div class="label">Back Cover</div>
            <div class="file-box">
              <input type="file" id="backFile" accept="image/*" onchange="previewBack(event)">
            </div>
          </div>
        </div>

        <div id="status" class="status"></div>

        <div class="actions">
          <button class="btn save" id="saveBtn" onclick="saveBook()">
            <i class="fa-solid fa-floppy-disk"></i> Save Changes
          </button>

          <button class="btn delete" onclick="deleteBook()">
            <i class="fa-solid fa-trash"></i> Delete Ebook
          </button>
        </div>
      </section>
    </section>
  `;
}

refreshBook();

function previewFront(e){
  let file = e.target.files[0];
  if(file){
    document.getElementById("frontPreview").src = URL.createObjectURL(file);
  }
}

function previewBack(e){
  let file = e.target.files[0];
  if(file){
    document.getElementById("backPreview").src = URL.createObjectURL(file);
  }
}

function fileToCompressedBase64(file){
  return new Promise((resolve,reject)=>{
    if(!file){
      reject(new Error("File missing"));
      return;
    }

    if(file.size > 8 * 1024 * 1024){
      reject(new Error("Image must be less than 8MB"));
      return;
    }

    let reader = new FileReader();

    reader.onload = () => {
      let img = new Image();

      img.onload = () => {
        let maxSize = 1200;
        let width = img.width;
        let height = img.height;

        if(width > height && width > maxSize){
          height = Math.round(height * maxSize / width);
          width = maxSize;
        }else if(height > maxSize){
          width = Math.round(width * maxSize / height);
          height = maxSize;
        }

        let canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;

        let ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,width,height);

        let base64 = canvas.toDataURL("image/jpeg",0.82);

        resolve({
          base64: base64,
          mimeType: "image/jpeg",
          fileName: file.name.replace(/\.[^/.]+$/,"") + ".jpg"
        });
      };

      img.onerror = () => reject(new Error("Image read failed"));
      img.src = reader.result;
    };

    reader.onerror = () => reject(new Error("File read failed"));
    reader.readAsDataURL(file);
  });
}

async function uploadToDrive(file,type){
  let imageData = await fileToCompressedBase64(file);

  let res = await fetch(PRODUCT_API,{
    method:"POST",
    headers:{
      "Content-Type":"text/plain"
    },
    body:JSON.stringify({
      action:"uploadBookImage",
      bookId:BOOK.id,
      type:type,
      fileName:imageData.fileName,
      mimeType:imageData.mimeType,
      base64:imageData.base64,
      email:user.email
    })
  });

  let data = await res.json();

  if(!data.success){
    throw new Error(data.message || "Drive image upload failed");
  }

  return data.url;
}

function showStatus(msg,type){
  let box = document.getElementById("status");
  box.style.display = "block";
  box.className = "status " + type;
  box.innerHTML = msg;
}

async function generateLongDescription(){
  try{
    showStatus("Generating AI long description...", "pending");

    let title = document.getElementById("title").value.trim();
    let author = document.getElementById("author").value.trim();
    let description = document.getElementById("description").value.trim();
    let category = document.getElementById("category").value.trim();
    let price = document.getElementById("price").value;

    let res = await fetch(PRODUCT_API,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain"
      },
      body:JSON.stringify({
        action:"suggestEbookDetails",
        title:title,
        author:author,
        description:description,
        category:category,
        price:price
      })
    });

    let data = await res.json();

    if(!data.success){
      throw new Error(data.message || "AI generation failed");
    }

    let details = data.details || {};
    document.getElementById("longDescription").value =
      details.long_description ||
      details.longDescription ||
      details.short_description ||
      description;

    if(details.category && !category){
      document.getElementById("category").value = details.category;
    }

    if(details.price && Number(price || 0) === 0){
      document.getElementById("price").value = details.price;
    }

    showStatus("AI long description generated.", "success");

  }catch(err){
    showStatus(err.message || "AI description failed.", "error");
  }
}

async function saveBook(){
  let btn = document.getElementById("saveBtn");

  btn.innerHTML = "Saving...";
  btn.disabled = true;

  try{
    let title = document.getElementById("title").value.trim();
    let author = document.getElementById("author").value.trim();
    let description = document.getElementById("description").value.trim();
    let longDescription = document.getElementById("longDescription").value.trim();
    let category = document.getElementById("category").value.trim();
    let price = document.getElementById("price").value;

    if(!title || !author || !description || !category){
      throw new Error("Please fill all required ebook details.");
    }

    let frontCover = BOOK.front_cover || "";
    let backCover = BOOK.back_cover || "";

    let frontFile = document.getElementById("frontFile").files[0];
    let backFile = document.getElementById("backFile").files[0];

    if(frontFile){
      showStatus("Uploading front cover to Drive...", "pending");
      frontCover = await uploadToDrive(frontFile,"front_cover");
    }

    if(backFile){
      showStatus("Uploading back cover to Drive...", "pending");
      backCover = await uploadToDrive(backFile,"back_cover");
    }

    showStatus("Saving ebook details...", "pending");

    let body = {
      action:"updateBook",
      id:BOOK.id,
      title:title,
      author:author,
      description:description,
      long_description:longDescription,
      category:category,
      price:price,
      front_cover:frontCover,
      back_cover:backCover,
      email:user.email
    };

    let res = await fetch(PRODUCT_API,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain"
      },
      body:JSON.stringify(body)
    });

    let data = await res.json();

    if(data.success === false){
      throw new Error(data.message || "Update failed.");
    }

    BOOK.title = title;
    BOOK.author = author;
    BOOK.description = description;
    BOOK.long_description = longDescription;
    BOOK.category = category;
    BOOK.price = price;
    BOOK.front_cover = frontCover;
    BOOK.back_cover = backCover;

    localStorage.setItem("viewerBook", JSON.stringify(BOOK));

    showStatus("Ebook updated successfully.", "success");

    btn.innerHTML = "Saved";

    setTimeout(() => {
      location.reload();
    }, 1000);

  }catch(err){
    showStatus(err.message || "Save failed.", "error");
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
    btn.disabled = false;
  }
}

async function deleteBook(){
  let ok = confirm("Delete this ebook?");
  if(!ok) return;

  try{
    let res = await fetch(PRODUCT_API,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain"
      },
      body:JSON.stringify({
        action:"deleteBook",
        id:BOOK.id,
        email:user.email
      })
    });

    let data = await res.json();

    if(data.success === false){
      throw new Error(data.message || "Delete failed.");
    }

    alert("Ebook Deleted");
    location.href = "library.html";

  }catch(err){
    alert(err.message || "Delete failed.");
  }
}
</script>

</body>
</html>
