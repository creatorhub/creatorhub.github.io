<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Ebook | CreatorHub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#06142c;
  --muted:#64748b;
  --line:#dbe4f0;
  --blue:#2f62e9;
  --blue2:#1d4ed8;
  --green:#10b981;
  --red:#ef4444;
  --soft:#eef4ff;
  --shadow:0 22px 55px rgba(16,24,40,.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}

.topbar{
  height:82px;
  background:#fff;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 42px;
  position:sticky;
  top:0;
  z-index:99;
}

.back{
  height:46px;
  padding:0 18px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  color:#334155;
  font-weight:800;
  cursor:pointer;
}

.back:hover{border-color:var(--blue);color:var(--blue);background:var(--soft)}
.brand{font-size:26px;font-weight:900;letter-spacing:-.03em}
.brand span{color:var(--blue)}

.container{
  max-width:1360px;
  margin:auto;
  padding:42px 34px 90px;
}

.hero{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:22px;
}

.hero h1{
  font-size:38px;
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1.15;
}

.hero h1 span{color:var(--blue)}
.hero p{
  margin-top:10px;
  color:var(--muted);
  font-size:15px;
  line-height:1.7;
  font-weight:600;
  max-width:760px;
}

.live-badge{
  min-height:46px;
  padding:0 18px;
  border-radius:999px;
  background:#e7f8ef;
  color:#0f9f57;
  border:1px solid rgba(16,185,129,.18);
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:900;
  white-space:nowrap;
}

.layout{
  display:grid;
  grid-template-columns:.88fr 1.12fr;
  gap:28px;
  align-items:start;
}

.panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 16px 42px rgba(16,24,40,.06);
  overflow:hidden;
}

.panel-pad{padding:28px}

.preview-top{
  height:180px;
  background:linear-gradient(120deg,#2f62e9,#27a7a1);
}

.cover-row{
  margin-top:-86px;
  padding:0 28px 28px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.preview-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  box-shadow:0 18px 36px rgba(16,24,40,.12);
}

.preview-label{
  font-size:12px;
  font-weight:900;
  color:#475569;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;
  gap:8px;
  align-items:center;
}

.preview{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  border-radius:10px;
  background:#e2e8f0;
  border:1px solid var(--line);
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  padding:0 28px 28px;
}

.stat{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:13px;
  padding:16px;
}

.stat span{
  display:block;
  color:#64748b;
  font-size:11px;
  text-transform:uppercase;
  font-weight:900;
  margin-bottom:8px;
}

.stat strong{
  display:block;
  color:#06142c;
  font-size:18px;
  font-weight:900;
  word-break:break-word;
}

.card-title{
  font-size:23px;
  font-weight:900;
  letter-spacing:-.03em;
  margin-bottom:8px;
}

.card-desc{
  color:var(--muted);
  font-size:14px;
  line-height:1.7;
  font-weight:600;
  margin-bottom:22px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.group{margin-bottom:18px}
.label{
  font-size:12px;
  font-weight:900;
  color:#26364f;
  text-transform:uppercase;
  margin-bottom:8px;
}

.input,.textarea{
  width:100%;
  border:1px solid #d9e3f0;
  border-radius:10px;
  background:#fff;
  color:#101828;
  outline:none;
  padding:14px 15px;
  font-size:15px;
  font-weight:700;
}

.input:focus,.textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(47,98,233,.1);
}

.textarea{
  min-height:150px;
  resize:vertical;
  line-height:1.6;
  font-weight:600;
}

.file-box{
  border:1px dashed #cbd5e1;
  border-radius:12px;
  background:#f8fafc;
  padding:16px;
}

.file-box input{width:100%;font-weight:700;color:#475569}

.actions{
  display:flex;
  gap:14px;
  margin-top:20px;
  padding-top:22px;
  border-top:1px solid #edf2f7;
}

.btn{
  flex:1;
  min-height:54px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}

.save{background:var(--blue);box-shadow:0 14px 28px rgba(47,98,233,.18)}
.save:hover{background:var(--blue2)}
.delete{background:#fff1f2;color:var(--red);border:1px solid #fecdd3}
.delete:hover{background:#fee2e2}

.status{
  display:none;
  margin-top:16px;
  padding:14px 16px;
  border-radius:10px;
  font-weight:900;
  line-height:1.5;
}

.success{display:block;background:#e7f8ef;color:#0f9f57;border:1px solid rgba(15,159,87,.15)}
.error{display:block;background:#fef2f2;color:#ef4444;border:1px solid rgba(239,68,68,.15)}

.growth{
  margin-top:28px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 16px 42px rgba(16,24,40,.06);
  padding:28px;
}

.growth-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-top:22px;
}

.growth-card{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
}

.growth-icon{
  width:42px;
  height:42px;
  border-radius:10px;
  background:var(--soft);
  color:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  margin-bottom:14px;
}

.growth-card h3{
  font-size:25px;
  font-weight:900;
  margin-bottom:4px;
}

.growth-card p{
  color:#64748b;
  font-size:13px;
  font-weight:800;
}

.insight-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:18px;
}

.insight-box{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:14px;
  padding:22px;
  line-height:1.8;
  color:#475569;
  font-weight:600;
}

.insight-title{
  color:#06142c;
  font-size:18px;
  font-weight:900;
  margin-bottom:10px;
}

.seo-bar{
  height:14px;
  background:#dbe4f0;
  border-radius:999px;
  overflow:hidden;
  margin:14px 0;
}

.seo-fill{
  height:100%;
  background:linear-gradient(90deg,#2f62e9,#10b981);
  border-radius:999px;
}

.action-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-top:18px;
}

.action-btn{
  min-height:48px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:#334155;
  font-weight:900;
  cursor:pointer;
}

.action-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--soft)}

.not-found{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:46px;
  text-align:center;
}

.not-found h2{font-size:28px;margin-bottom:10px}
.not-found p{color:var(--muted);font-weight:700}

@media(max-width:1050px){
  .layout{grid-template-columns:1fr}
  .growth-grid,.action-grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:680px){
  .topbar{padding:0 18px}
  .brand{font-size:22px}
  .container{padding:24px 18px 70px}
  .hero{display:block;padding:26px}
  .hero h1{font-size:30px}
  .live-badge{margin-top:18px;width:max-content}
  .grid,.cover-row,.stats-grid,.insight-grid,.growth-grid,.action-grid{grid-template-columns:1fr}
  .actions{flex-direction:column}
}
</style>
</head>

<body>

<header class="topbar">
  <button class="back" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Back
  </button>
  <a class="brand" href="index.html">Creator<span>Hub</span></a>
</header>

<main class="container">
  <div id="app"></div>
</main>

<script>
const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec";

let user = JSON.parse(localStorage.getItem("user") || "null");

if(!user){
  location.href = "login.html";
}

let BOOK = JSON.parse(localStorage.getItem("viewerBook") || "null");

if(!BOOK){
  document.getElementById("app").innerHTML = `
    <div class="not-found">
      <h2>Book Not Found</h2>
      <p>Please open this page from your ebook library.</p>
    </div>
  `;
}

function safeText(value){
  return String(value || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  })[m]);
}

function driveImage(link){
  if(!link){
    return "https://via.placeholder.com/500x750/e2e8f0/64748b?text=CreatorHub";
  }

  if(link.startsWith("data:image")) return link;

  try{
    let id = "";

    if(link.includes("thumbnail?id=")){
      return link;
    }

    if(link.includes("id=")){
      id = link.split("id=")[1].split("&")[0];
    }else if(link.includes("/d/")){
      id = link.split("/d/")[1].split("/")[0];
    }else{
      return link;
    }

    return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000&t=" + Date.now();
  }catch(err){
    return link;
  }
}

async function refreshBook(){
  if(!BOOK) return;

  try{
    let res = await fetch(PRODUCT_API + "?action=products&t=" + Date.now());
    let data = await res.json();
    let products = data.products || data.data || [];

    if(!Array.isArray(products)) products = [];

    let latest = products.find(p => String(p.id) === String(BOOK.id));

    if(latest){
      BOOK = latest;
      localStorage.setItem("viewerBook", JSON.stringify(BOOK));
    }

    render();
  }catch(err){
    console.log(err);
    render();
  }
}

function render(){
  if(!BOOK) return;

  let trending = Math.min(100, Math.max(0, Number(BOOK.trending || 0)));

  document.getElementById("app").innerHTML = `
    <section class="hero">
      <div>
        <h1>Edit <span>Your Ebook</span></h1>
        <p>Update ebook details, manage cover assets, improve metadata and keep your CreatorHub listing ready for buyers.</p>
      </div>
      <div class="live-badge">
        <i class="fa-solid fa-circle-check"></i> ${safeText(BOOK.status || "Published")}
      </div>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="preview-top"></div>

        <div class="cover-row">
          <div class="preview-card">
            <div class="preview-label"><i class="fa-solid fa-book-open"></i> Front Cover</div>
            <img id="frontPreview" class="preview" src="${driveImage(BOOK.front_cover)}" alt="Front Cover">
          </div>

          <div class="preview-card">
            <div class="preview-label"><i class="fa-solid fa-book"></i> Back Cover</div>
            <img id="backPreview" class="preview" src="${driveImage(BOOK.back_cover)}" alt="Back Cover">
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <span>Book ID</span>
            <strong>#${safeText(BOOK.id)}</strong>
          </div>

          <div class="stat">
            <span>Author</span>
            <strong>${safeText(BOOK.author || "Unknown")}</strong>
          </div>

          <div class="stat">
            <span>Price</span>
            <strong>₹${Number(BOOK.price || 0).toLocaleString("en-IN")}</strong>
          </div>
        </div>
      </aside>

      <section class="panel panel-pad">
        <h2 class="card-title">Ebook Information</h2>
        <p class="card-desc">These details are saved to your CreatorHub product database.</p>

        <div class="grid">
          <div class="group">
            <div class="label">Book Title</div>
            <input id="title" class="input" value="${safeText(BOOK.title || "")}">
          </div>

          <div class="group">
            <div class="label">Author Name</div>
            <input id="author" class="input" value="${safeText(BOOK.author || "")}">
          </div>
        </div>

        <div class="group">
          <div class="label">Description</div>
          <textarea id="description" class="textarea">${safeText(BOOK.description || "")}</textarea>
        </div>

        <div class="grid">
          <div class="group">
            <div class="label">Category</div>
            <input id="category" class="input" value="${safeText(BOOK.category || "")}">
          </div>

          <div class="group">
            <div class="label">Price</div>
            <input id="price" class="input" type="number" min="0" value="${Number(BOOK.price || 0)}">
          </div>
        </div>

        <div class="grid">
          <div class="group">
            <div class="label">Front Cover</div>
            <div class="file-box">
              <input type="file" id="frontFile" accept="image/*" onchange="previewFront(event)">
            </div>
          </div>

          <div class="group">
            <div class="label">Back Cover</div>
            <div class="file-box">
              <input type="file" id="backFile" accept="image/*" onchange="previewBack(event)">
            </div>
          </div>
        </div>

        <div id="status" class="status"></div>

        <div class="actions">
          <button class="btn save" id="saveBtn" onclick="saveBook()">
            <i class="fa-solid fa-floppy-disk"></i> Save Changes
          </button>

          <button class="btn delete" onclick="deleteBook()">
            <i class="fa-solid fa-trash"></i> Delete Ebook
          </button>
        </div>
      </section>
    </section>

    <section class="growth">
      <h2 class="card-title">Ebook Growth Dashboard</h2>
      <p class="card-desc">Real CreatorHub analytics powered by your live ebook performance data.</p>

      <div class="growth-grid">
        <div class="growth-card">
          <div class="growth-icon"><i class="fa-solid fa-book-open-reader"></i></div>
          <h3>${Number(BOOK.reads || 0).toLocaleString("en-IN")}</h3>
          <p>Total Reads</p>
        </div>

        <div class="growth-card">
          <div class="growth-icon"><i class="fa-solid fa-star"></i></div>
          <h3>${safeText(BOOK.rating || "0.0")}</h3>
          <p>Average Rating</p>
        </div>

        <div class="growth-card">
          <div class="growth-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>
          <h3>₹${Number(BOOK.revenue || 0).toLocaleString("en-IN")}</h3>
          <p>Revenue</p>
        </div>

        <div class="growth-card">
          <div class="growth-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
          <h3>${trending}%</h3>
          <p>Visibility</p>
        </div>
      </div>

      <div class="insight-grid">
        <div class="insight-box">
          <div class="insight-title">Author Insights</div>
          <p>
            "${safeText(BOOK.title)}" currently has ${Number(BOOK.reads || 0).toLocaleString("en-IN")} total reads.
            This ebook belongs to "${safeText(BOOK.category || "General")}" category and is building visibility through its listing quality.
          </p>
        </div>

        <div class="insight-box">
          <div class="insight-title">SEO Optimization Score</div>
          <div class="seo-bar">
            <div class="seo-fill" style="width:${trending}%"></div>
          </div>
          <p>
            Your ebook currently has ${trending}% marketplace visibility. Better title keywords, category accuracy and description quality can improve discovery.
          </p>
        </div>
      </div>

      <div class="action-grid">
        <button class="action-btn"><i class="fa-solid fa-chart-line"></i> Analytics</button>
        <button class="action-btn"><i class="fa-solid fa-comments"></i> Reviews</button>
        <button class="action-btn"><i class="fa-solid fa-bullhorn"></i> Promote</button>
        <button class="action-btn"><i class="fa-solid fa-rocket"></i> Boost</button>
      </div>
    </section>
  `;
}

refreshBook();

function previewFront(e){
  let file = e.target.files[0];
  if(file){
    document.getElementById("frontPreview").src = URL.createObjectURL(file);
  }
}

function previewBack(e){
  let file = e.target.files[0];
  if(file){
    document.getElementById("backPreview").src = URL.createObjectURL(file);
  }
}

async function uploadToDrive(file){
  return new Promise(resolve => {
    setTimeout(() => {
      resolve("https://drive.google.com/file/d/demo");
    }, 1000);
  });
}

function showStatus(msg,type){
  let box = document.getElementById("status");
  box.style.display = "block";
  box.className = "status " + type;
  box.innerHTML = msg;
}

async function saveBook(){
  let btn = document.getElementById("saveBtn");

  btn.innerHTML = "Saving...";
  btn.disabled = true;

  try{
    let title = document.getElementById("title").value.trim();
    let author = document.getElementById("author").value.trim();
    let description = document.getElementById("description").value.trim();
    let category = document.getElementById("category").value.trim();
    let price = document.getElementById("price").value;

    if(!title || !author || !description || !category){
      throw new Error("Please fill all required ebook details.");
    }

    let frontCover = BOOK.front_cover || "";
    let backCover = BOOK.back_cover || "";

    let frontFile = document.getElementById("frontFile").files[0];
    let backFile = document.getElementById("backFile").files[0];

    if(frontFile){
      frontCover = await uploadToDrive(frontFile);
    }

    if(backFile){
      backCover = await uploadToDrive(backFile);
    }

    let body = {
      action:"updateBook",
      id:BOOK.id,
      title:title,
      author:author,
      description:description,
      category:category,
      price:price,
      front_cover:frontCover,
      back_cover:backCover,
      email:user.email
    };

    let res = await fetch(PRODUCT_API,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain"
      },
      body:JSON.stringify(body)
    });

    let data = await res.json();

    if(data.success === false){
      throw new Error(data.message || "Update failed.");
    }

    BOOK.title = title;
    BOOK.author = author;
    BOOK.description = description;
    BOOK.category = category;
    BOOK.price = price;
    BOOK.front_cover = frontCover;
    BOOK.back_cover = backCover;

    localStorage.setItem("viewerBook", JSON.stringify(BOOK));

    showStatus("Ebook updated successfully.", "success");

    btn.innerHTML = "Saved";

    setTimeout(() => {
      location.reload();
    }, 1000);

  }catch(err){
    showStatus(err.message || "Save failed.", "error");
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
    btn.disabled = false;
  }
}

async function deleteBook(){
  let ok = confirm("Delete this ebook?");
  if(!ok) return;

  try{
    await fetch(PRODUCT_API,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain"
      },
      body:JSON.stringify({
        action:"deleteBook",
        id:BOOK.id,
        email:user.email
      })
    });

    alert("Ebook Deleted");
    location.href = "library.html";

  }catch(err){
    alert(err.message || "Delete failed.");
  }
}
</script>

</body>
</html>
