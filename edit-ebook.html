<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Edit Ebook • CreatorHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

:root{
--card:#0f172a;
--green:#22c55e;
--border:#1e293b;
}

/* TOPBAR */

.topbar{
position:sticky;
top:0;
z-index:100;
background:#07111f;
padding:18px;
display:flex;
align-items:center;
gap:15px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.back{
font-size:24px;
cursor:pointer;
}

.title{
font-size:26px;
font-weight:bold;
}

.title span{
color:#4ade80;
}

/* CONTAINER */

.container{
padding:20px;
max-width:900px;
margin:auto;
padding-bottom:120px;
}

/* CARD */

.card{
background:#081225;
border:1px solid var(--border);
border-radius:28px;
padding:22px;
box-shadow:
0 20px 60px rgba(0,0,0,.4);
animation:fade .5s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* COVER */

.preview-wrap{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
}

.preview{
width:170px;
height:240px;
border-radius:20px;
object-fit:cover;
background:#0f172a;
border:1px solid rgba(255,255,255,.05);
box-shadow:
0 15px 35px rgba(0,0,0,.45);
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

}

/* GROUP */

.group{
margin-top:18px;
}

.label{
font-size:14px;
margin-bottom:10px;
opacity:.8;
font-weight:bold;
}

.input,
.textarea,
.select{

width:100%;
background:#0b1220;
border:1px solid #162033;
border-radius:16px;
padding:16px;
color:white;
font-size:15px;
outline:none;
transition:.3s;
}

.input:focus,
.textarea:focus,
.select:focus{

border-color:#22c55e;
box-shadow:
0 0 0 3px rgba(34,197,94,.15);

}

.textarea{
min-height:140px;
resize:none;
}

/* FILE */

.file{
width:100%;
padding:14px;
border-radius:16px;
background:#0b1220;
border:1px dashed #334155;
color:white;
}

/* BUTTONS */

.actions{
display:flex;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:16px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.save{
background:
linear-gradient(90deg,#16a34a,#4ade80);
color:white;
}

.save:hover{
transform:translateY(-2px);
}

.delete{
background:#ef4444;
color:white;
}

.delete:hover{
transform:translateY(-2px);
}

.loader{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
font-size:20px;
opacity:.7;
}

/* STATUS */

.status{
margin-top:18px;
padding:14px;
border-radius:14px;
display:none;
font-size:14px;
}

.success{
background:rgba(34,197,94,.15);
color:#4ade80;
}

.error{
background:rgba(239,68,68,.15);
color:#f87171;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="back"
onclick="history.back()">
⬅
</div>

<div class="title">
Edit <span>Ebook</span>
</div>

</div>

<!-- MAIN -->

<div class="container">

<div id="app"
class="loader">

Loading Ebook...

</div>

</div>

<script>

/* =========================================================
CONFIG
========================================================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

let user =
JSON.parse(
localStorage.getItem("user") || "null"
)

if(!user){

location.href =
"login.html"

}

/* =========================================================
BOOK
========================================================= */

let BOOK =
JSON.parse(
localStorage.getItem("viewerBook") || "null"
)

if(!BOOK){

document.getElementById("app")
.innerHTML =

"Book Not Found"

}

/* =========================================================
DRIVE IMAGE
========================================================= */

function driveImage(link){

if(!link){

return "https://picsum.photos/400"

}

let id = ""

if(link.includes("id=")){

id =
link.split("id=")[1]
.split("&")[0]

}

else if(link.includes("/d/")){

id =
link.split("/d/")[1]
.split("/")[0]

}

else{

id = link

}

return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`

}

/* =========================================================
RENDER
========================================================= */

function render(){

document.getElementById("app")
.innerHTML = `

<div class="card">

<div class="preview-wrap">

<img
id="frontPreview"
class="preview"
src="${driveImage(
BOOK.front_cover ||
BOOK.frontCover
)}"
>

<img
id="backPreview"
class="preview"
src="${driveImage(
BOOK.back_cover ||
BOOK.backCover
)}"
>

</div>

<div class="grid">

<div class="group">

<div class="label">
Book Title
</div>

<input
id="title"
class="input"
value="${BOOK.title || ""}"
>

</div>

<div class="group">

<div class="label">
Author Name
</div>

<input
id="author"
class="input"
value="${BOOK.author || ""}"
>

</div>

</div>

<div class="group">

<div class="label">
Description
</div>

<textarea
id="description"
class="textarea"
>${BOOK.description || ""}</textarea>

</div>

<div class="grid">

<div class="group">

<div class="label">
Category
</div>

<select
id="category"
class="select"
>

<option>Business</option>
<option>Marketing</option>
<option>Technology</option>
<option>Education</option>
<option>Finance</option>

</select>

</div>

<div class="group">

<div class="label">
Price
</div>

<input
id="price"
class="input"
type="number"
value="${BOOK.price || 0}"
>

</div>

</div>

<div class="grid">

<div class="group">

<div class="label">
Front Cover
</div>

<input
type="file"
class="file"
id="frontFile"
accept="image/*"
onchange="previewFront(event)"
>

</div>

<div class="group">

<div class="label">
Back Cover
</div>

<input
type="file"
class="file"
id="backFile"
accept="image/*"
onchange="previewBack(event)"
>

</div>

</div>

<div class="group">

<div class="label">
Replace PDF
</div>

<input
type="file"
class="file"
id="pdfFile"
accept=".pdf"
>

</div>

<div
id="status"
class="status">
</div>

<div class="actions">

<button
class="btn save"
onclick="saveBook()"
id="saveBtn"
>

💾 Save Changes

</button>

<button
class="btn delete"
onclick="deleteBook()"
>

🗑 Delete Ebook

</button>

</div>

</div>

`

}

render()

/* =========================================================
PREVIEW
========================================================= */

function previewFront(e){

let file =
e.target.files[0]

if(file){

document.getElementById(
"frontPreview"
).src =

URL.createObjectURL(file)

}

}

function previewBack(e){

let file =
e.target.files[0]

if(file){

document.getElementById(
"backPreview"
).src =

URL.createObjectURL(file)

}

}

/* =========================================================
UPLOAD DRIVE
========================================================= */

async function uploadToDrive(file){

return new Promise(resolve=>{

setTimeout(()=>{

resolve(
"https://drive.google.com/file/d/demo"
)

},1000)

})

}

/* =========================================================
STATUS
========================================================= */

function showStatus(msg,type){

let box =
document.getElementById("status")

box.style.display =
"block"

box.className =
"status " + type

box.innerHTML = msg

}

/* =========================================================
SAVE
========================================================= */

async function saveBook(){

let btn =
document.getElementById("saveBtn")

btn.innerHTML =
"Saving..."

btn.disabled = true

try{

let title =
document.getElementById("title")
.value.trim()

let author =
document.getElementById("author")
.value.trim()

let description =
document.getElementById("description")
.value.trim()

let category =
document.getElementById("category")
.value

let price =
document.getElementById("price")
.value

/* FILES */

let frontFile =
document.getElementById("frontFile")
.files[0]

let backFile =
document.getElementById("backFile")
.files[0]

let pdfFile =
document.getElementById("pdfFile")
.files[0]

/* OLD */

let frontCover =
BOOK.front_cover || ""

let backCover =
BOOK.back_cover || ""

let pdf =
BOOK.pdf || ""

/* NEW UPLOAD */

if(frontFile){

frontCover =
await uploadToDrive(frontFile)

}

if(backFile){

backCover =
await uploadToDrive(backFile)

}

if(pdfFile){

pdf =
await uploadToDrive(pdfFile)

}

/* BODY */

let body = {

action:"updateBook",

id:BOOK.id,

title,
author,
description,
category,
price,

front_cover:frontCover,
back_cover:backCover,
pdf:pdf,

email:user.email

}

/* API */

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify(body)

})

let data =
await res.json()

console.log(data)

showStatus(
"✅ Ebook Updated Successfully",
"success"
)

btn.innerHTML =
"✅ Saved"

setTimeout(()=>{

location.reload()

},1200)

}catch(err){

console.log(err)

showStatus(
err.message,
"error"
)

btn.innerHTML =
"💾 Save Changes"

btn.disabled = false

}

}

/* =========================================================
DELETE
========================================================= */

async function deleteBook(){

let ok =
confirm(
"Delete this ebook?"
)

if(!ok) return

try{

let res =
await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"deleteBook",

id:BOOK.id,

email:user.email

})

})

let data =
await res.json()

alert(
data.message ||
"Deleted"
)

location.href =
"library.html"

}catch(err){

alert(err.message)

}

}

</script>

</body>
</html>
