<!DOCTYPE html>
<html>

<head>

<title>Cart - CreatorHub</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
}

/* NAV */

nav{
background:black;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 5px 20px rgba(0,0,0,.6);
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.back{
font-size:22px;
cursor:pointer;
}

nav a{
color:#22c55e;
text-decoration:none;
}

/* CONTAINER */

.container{
padding:20px;
animation:fadeUp .6s ease;
}

/* CARD */

.card{
background:#111827;
display:flex;
gap:15px;
margin-bottom:15px;
padding:15px;
border-radius:12px;
align-items:center;
box-shadow:0 10px 25px rgba(0,0,0,.6);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 15px 35px rgba(0,0,0,.8);
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
}

.info{
flex:1;
}

/* BUTTON */

button{
background:#f97316;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
color:white;
}

.buy{
background:linear-gradient(90deg,#22c55e,#4ade80);
width:100%;
padding:12px;
margin-top:10px;
font-weight:bold;
}

/* TOTAL */

.total{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:20px;
}

/* EMPTY */

.empty{
text-align:center;
padding:50px;
opacity:.7;
}

/* LOADER */

.loader{
text-align:center;
padding:40px;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* ANIMATION */

@keyframes fadeUp{
0%{
opacity:0;
transform:translateY(40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:600px){

.card{
flex-direction:column;
align-items:flex-start;
}

.card img{
width:100%;
height:200px;
}

}

</style>

</head>

<body>

<nav>

<div class="left">

<div class="back" onclick="history.back()">⬅</div>

🛒 CreatorHub Cart

</div>

<a href="dashboard.html">Dashboard</a>

</nav>

<div class="container">

<h2>Your Cart</h2>

<div id="cart" class="loader">
Loading cart...
</div>

<div id="totalBox" class="total" style="display:none">

Total ₹ :
<span id="total">0</span>

<button class="buy" onclick="placeOrder()">
🔥 Buy Now
</button>

</div>

</div>

<script>

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

let cart = JSON.parse(localStorage.getItem("cart")||"[]")

cart=[...new Set(cart)]

localStorage.setItem("cart",JSON.stringify(cart))

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

function driveImage(link){

if(!link) return "https://picsum.photos/200"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

else if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w500"
}

}catch{}

return link

}

async function getProducts(){

let r = await fetch(PRODUCT_API+"?db=products&t="+Date.now())
let data = await r.json()

return Array.isArray(data)?data:[]

}

async function loadCart(){

let products = await getProducts()

let html=""
let total=0

if(cart.length===0){

html="<div class='empty'>🛒 Your cart is empty</div>"
document.getElementById("totalBox").style.display="none"

}else{

cart.forEach((id,i)=>{

let p = products.find(x=>String(x.id)===String(id))

if(!p) return

/* APPROVED CHECK */

if(p.ai_status && p.ai_status!=="approved") return

total+=Number(p.price)

html+=`

<div class="card">

<img src="${driveImage(p.image)}">

<div class="info">

<h3>${escapeHTML(p.title)}</h3>

₹${p.price}

<br><br>

<button onclick="removeItem(${i})">Remove</button>

</div>

</div>

`

})

document.getElementById("total").innerText=total
document.getElementById("totalBox").style.display="block"

}

document.getElementById("cart").innerHTML=html

}

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

loadCart()

}

async function placeOrder(){

if(cart.length===0){

alert("Cart Empty")
return

}

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){

alert("Login required")
location.href="login.html"
return

}

let res=await fetch(PAYMENT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"create_cart_order",
products:cart,
buyer:user.email

})

})

let data=await res.json()

if(data.payment_session_id){

let url="https://sandbox.cashfree.com/pg/view/payment-session-id?payment_session_id="+data.payment_session_id

window.location.href=url

}else{

alert(data.message||"Payment error")

}

}

loadCart()

</script>

</body>

</html>
