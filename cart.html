<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | CreatorHub</title>

<meta name="description" content="Review and manage products in your shopping cart on CreatorHub before completing your purchase.">
<meta name="keywords" content="shopping cart, creatorhub cart, checkout, products, books, digital products, physical products">
<meta name="robots" content="noindex,nofollow">

<link rel="canonical" href="https://creatorhub.github.io/cart.html">

<meta property="og:site_name" content="CreatorHub">
<meta property="og:type" content="website">
<meta property="og:title" content="Shopping Cart | CreatorHub">
<meta property="og:description" content="Review products in your cart and proceed to checkout on OneCreatorHub.">
<meta property="og:url" content="https://creatorhub.github.io/cart.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Shopping Cart | CreatorHub">
<meta name="twitter:description" content="Review products in your cart and proceed to checkout on CreatorHub.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#06142c;
  --muted:#64748b;
  --line:#dbe4f0;
  --blue:#2f62e9;
  --blue2:#1d4ed8;
  --green:#10b981;
  --red:#ef4444;
  --soft:#eef4ff;
  --shadow:0 22px 55px rgba(16,24,40,.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}

.header{
  height:82px;
  background:#fff;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 42px;
  position:sticky;
  top:0;
  z-index:20;
}

.back-btn{
  height:46px;
  padding:0 18px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  color:#334155;
  font-weight:800;
  cursor:pointer;
}

.back-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--soft)}
.brand{font-size:26px;font-weight:900;letter-spacing:-.03em}
.brand span{color:var(--blue)}

/* CONTAINER: Flexbox configuration for center alignment */
.container{
  max-width: 1240px;
  margin: 0 auto;
  padding:46px 34px 90px;
  display: flex;
  flex-direction: column;
  gap: 34px;
}

.page-title{
  font-size:34px;
  font-weight:900;
  letter-spacing:-.04em;
  margin-bottom:8px;
}

.page-subtitle{
  color:var(--muted);
  font-size:15px;
  font-weight:600;
  margin-bottom:24px;
}

.cart-list{
  display:grid;
  gap:18px;
}

.cart-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px;
  display:grid;
  grid-template-columns:96px 1fr auto;
  gap:18px;
  align-items:center;
  box-shadow:0 10px 28px rgba(16,24,40,.04);
  cursor:pointer;
  transition:.2s ease;
}

.cart-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow);
  border-color:#c9d6ec;
}

.cover{
  width:96px;
  aspect-ratio:2/3;
  object-fit:cover;
  border-radius:10px;
  border:1px solid var(--line);
  background:#e2e8f0;
}

.item-title{
  font-size:18px;
  font-weight:900;
  line-height:1.35;
  color:#07152f;
  margin-bottom:8px;
}

.item-meta{
  color:var(--muted);
  font-size:13px;
  font-weight:700;
  margin-bottom:12px;
}

.remove-btn{
  border:none;
  background:#fff1f2;
  color:var(--red);
  height:38px;
  padding:0 14px;
  border-radius:9px;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
}

.remove-btn:hover{background:#fee2e2}

.price-box{
  min-width:110px;
  text-align:right;
}

.price{
  font-size:24px;
  font-weight:900;
  color:var(--blue);
}

.instant{
  margin-top:8px;
  color:var(--green);
  font-size:12px;
  font-weight:900;
}

/* FIXED SIZE & PADDING: Order overview box fixed to wrap fit content */
.summary{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:24px;
  box-shadow:var(--shadow);
  position:sticky;
  top:110px;
  display:none;
  height: max-content;
}

.summary h3{
  font-size:22px;
  font-weight:900;
  margin-bottom:18px;
  letter-spacing:-.03em;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  gap:20px;
  padding:12px 0;
  color:#334155;
  font-size:15px;
  font-weight:700;
  border-bottom:1px solid #edf2f7;
}

.total-row{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
  padding-top:20px;
  border-top:2px solid #dbe4f0;
  color:var(--blue);
  font-size:25px;
  font-weight:900;
}

.checkout-btn{
  margin-top:24px;
  width:100%;
  height:54px;
  border:none;
  border-radius:13px;
  background:var(--blue);
  color:#fff;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 16px 30px rgba(47,98,233,.22);
}

.checkout-btn:hover{background:var(--blue2)}

.trust{
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  color:#94a3b8;
  font-size:11px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}

.empty{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  min-height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  color:var(--muted);
  box-shadow:0 10px 28px rgba(16,24,40,.04);
  width: 100%;
}

.empty i{
  font-size:42px;
  color:var(--blue);
  margin-bottom:18px;
}

.empty h3{
  color:var(--text);
  font-size:22px;
  font-weight:900;
  margin-bottom:8px;
}

.empty p{
  font-size:15px;
  line-height:1.6;
  font-weight:600;
}

.shop-btn{
  margin-top:20px;
  height:46px;
  padding:0 22px;
  border:none;
  border-radius:10px;
  background:var(--blue);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

.loader{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  min-height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-weight:800;
}

.spin{
  width:28px;
  height:28px;
  border:3px solid #dbe4f0;
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-right:12px;
}

@keyframes spin{to{transform:rotate(360deg)}}

/* DESKTOP VIEW SETTINGS */
/* इसे बदलकर यह पेस्ट कर दें: */
@media(min-width: 951px) {
  .container {
    flex-direction: row;
    align-items: stretch; /* यह दोनों साइड्स की हाइट बिल्कुल बराबर कर देगा */
  }
  .container > section {
    flex: 1.35;
  }
  .summary {
    flex: 0.75;
    min-width: 360px;
    height: 100%; /* यह समरी बॉक्स को पैरेंट की पूरी हाइट लेने में मदद करेगा */
  }
}

/* MOBILE DESIGN: आपके शेयर किए गए मोबाइल यूआई स्क्रीनशॉट जैसा सटीक लेआउट */
@media(max-width:950px){
  .header{
    height: 64px;
    padding:0 16px;
  }
  .back-btn {
    height: 38px;
    padding: 0 12px;
    font-size: 13px;
    border-radius: 8px;
  }
  .brand {
    font-size: 20px;
  }
  .container{
    padding: 20px 16px 40px;
    gap: 24px;
  }
  .page-title {
    font-size: 26px;
  }
  .page-subtitle {
    font-size: 14px;
    margin-bottom: 16px;
  }
  .cart-card{
    grid-template-columns: 80px 1fr;
    gap: 14px;
    padding: 14px;
    align-items: start;
  }
  .cover{
    width: 80px;
    grid-row: span 2;
  }
  .item-title {
    font-size: 15px;
    margin-bottom: 4px;
  }
  .item-meta {
    font-size: 12px;
    margin-bottom: 8px;
  }
  .price-box{
    text-align: left;
    min-width: auto;
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-top: 4px;
  }
  .price {
    font-size: 18px;
  }
  .instant {
    margin-top: 0;
    font-size: 11px;
  }
  .remove-btn {
    height: 32px;
    padding: 0 10px;
    font-size: 12px;
    margin-top: 8px;
  }
  .summary{
    position: static;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(16,24,40,.05);
  }
  .summary h3 {
    font-size: 18px;
    margin-bottom: 12px;
  }
  .summary-row {
    padding: 10px 0;
    font-size: 14px;
  }
  .total-row {
    font-size: 20px;
    margin-top: 14px;
    padding-top: 14px;
  }
  .checkout-btn {
    height: 50px;
    font-size: 15px;
    margin-top: 18px;
  }
}
</style>
</head>

<body>

<header class="header">
  <button class="back-btn" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Back
  </button>
  <a class="brand" href="index.html">Creator<span>Hub</span></a>
</header>

<main class="container">
  <section id="cartSection">
    <h1 class="page-title">Your Shopping Cart</h1>
    <p class="page-subtitle">Review your selected CreatorHub products before checkout.</p>

    <div id="cartList" class="cart-list">
      <div class="loader"><div class="spin"></div> Loading cart items...</div>
    </div>
  </section>

  <aside id="summaryBox" class="summary">
    <h3>Order Overview</h3>

    <div class="summary-row">
      <span>Items Subtotal</span>
      <strong id="subtotalText">₹0</strong>
    </div>

    <div class="summary-row">
      <span>Platform Processing Fee</span>
      <strong id="platformFeeText">₹29</strong>
    </div>

    <div class="summary-row">
      <span>Instant Physical Delivery</span>
      <strong id="deliveryFeeText">₹70</strong>
    </div>

    <div class="total-row">
      <span>Total Amount</span>
      <span id="totalText">₹0</span>
    </div>

    <button class="checkout-btn" onclick="redirectToCheckout()">
      <i class="fa-solid fa-lock"></i> Secure Checkout
    </button>

    <div class="trust">
      <i class="fa-solid fa-shield-halved"></i> Secure Digital Checkout
    </div>
  </aside>
</main>

<script>
const PRODUCT_API = "https://script.google.com/macros/s/AKfycbxrwzYN0t_4yY7qfcUT3JyDA69vlD4SbVzND-Y_9n5sqwEauTj4j4J-9qxoY3RQ6QWTvw/exec";

let cartIds = normalizeCart();

function normalizeCart(){
  let raw = JSON.parse(localStorage.getItem("cart") || "[]");

  if(!Array.isArray(raw)) raw = [];

  raw = raw.map(item => {
    if(typeof item === "object" && item !== null){
      return item.id || item.product_id || item.productId || item.book_id || "";
    }
    return item;
  }).filter(Boolean);

  raw = [...new Set(raw.map(String))];
  localStorage.setItem("cart", JSON.stringify(raw));
  return raw;
}

function money(value){
  return "₹" + Number(value || 0).toLocaleString("en-IN");
}

function escapeHTML(value){
  return String(value || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  })[m]);
}

function coverUrl(url){
  if(!url) return "https://via.placeholder.com/400x600/e2e8f0/64748b?text=CreatorHub";

  try{
    if(url.includes("thumbnail?id=")) return url;
    if(url.includes("uc?id=")){
      const id = url.split("id=")[1].split("&")[0];
      return "https://drive.google.com/thumbnail?id=" + id + "&sz=w600";
    }
    if(url.includes("/file/d/")){
      const id = url.split("/file/d/")[1].split("/")[0];
      return "https://drive.google.com/thumbnail?id=" + id + "&sz=w600";
    }
    if(url.includes("/d/")){
      const id = url.split("/d/")[1].split("/")[0];
      return "https://drive.google.com/thumbnail?id=" + id + "&sz=w600";
    }
  }catch(e){}

  return url;
}

function isApproved(product){
  const status = String(product.status || "").toLowerCase();
  const aiStatus = String(product.ai_status || product.aiStatus || "").toLowerCase();

  if(status && status !== "approved") return false;
  if(aiStatus && aiStatus !== "approved") return false;

  return true;
}

async function loadCart(){
  const cartList = document.getElementById("cartList");
  const summaryBox = document.getElementById("summaryBox");
  const cartSection = document.getElementById("cartSection");

  if(cartIds.length === 0){
    showEmptyCart();
    return;
  }

  try{
    if(cartSection) cartSection.style.width = ""; 
    const response = await fetch(PRODUCT_API + "?action=products&t=" + Date.now());
    const data = await response.json();

    let products = data.products || data.data || data || [];
    if(!Array.isArray(products)) products = [];

    const validProducts = cartIds
      .map(id => products.find(p => String(p.id || p.product_id || p.productId) === String(id)))
      .filter(p => p && isApproved(p));

    if(validProducts.length === 0){
      cartIds = [];
      localStorage.setItem("cart", JSON.stringify([]));
      showEmptyCart();
      return;
    }

    let subtotal = 0;

    cartList.innerHTML = validProducts.map(product => {
      const id = String(product.id || product.product_id || product.productId);
      const title = product.title || product.name || "Untitled Product";
      const author = product.author || product.creator || product.seller || "CreatorHub Seller";
      const price = Number(product.price || product.sale_price || 0);
      const image = product.front_cover || product.cover || product.image || product.thumbnail || "";

      subtotal += price;

      return `
        <div class="cart-card" onclick="openBook('${escapeHTML(id)}')">
          <img class="cover" src="${coverUrl(image)}" onerror="this.src='https://via.placeholder.com/400x600/e2e8f0/64748b?text=CreatorHub'" alt="Book Cover">

          <div>
            <div class="item-title">${escapeHTML(title)}</div>
            <div class="item-meta">By ${escapeHTML(author)}</div>
            <button class="remove-btn" onclick="removeItem(event,'${escapeHTML(id)}')">
              <i class="fa-solid fa-trash"></i> Remove
            </button>
          </div>

          <div class="price-box">
            <div class="price">${money(price)}</div>
            <div class="instant">Instant access</div>
          </div>
        </div>
      `;
    }).join("");

    const platformFee = 29;
    const deliveryFee = 70;
    const total = subtotal + platformFee + deliveryFee;

    document.getElementById("subtotalText").innerText = money(subtotal);
    document.getElementById("platformFeeText").innerText = money(platformFee);
    document.getElementById("deliveryFeeText").innerText = money(deliveryFee);
    document.getElementById("totalText").innerText = money(total);

    summaryBox.style.display = "block";

  }catch(error){
    cartList.innerHTML = `
      <div class="empty">
        <div>
          <i class="fa-solid fa-circle-exclamation"></i>
          <h3>Cart loading failed</h3>
          <p>Please reload the page or check your product API deployment.</p>
        </div>
      </div>
    `;
    summaryBox.style.display = "none";
  }
}

function showEmptyCart(){
  document.getElementById("summaryBox").style.display = "none";
  
  const cartSection = document.getElementById("cartSection");
  if(cartSection) cartSection.style.width = "100%";

  document.getElementById("cartList").innerHTML = `
    <div class="empty">
      <div>
        <i class="fa-solid fa-cart-shopping"></i>
        <h3>Your cart is empty</h3>
        <p>Add ebooks or digital products to your cart before checkout.</p>
        <button class="shop-btn" onclick="location.href='index.html'">Continue Shopping</button>
      </div>
    </div>
  `;
}

function removeItem(event,id){
  event.stopPropagation();
  cartIds = cartIds.filter(itemId => String(itemId) !== String(id));
  localStorage.setItem("cart", JSON.stringify(cartIds));
  loadCart();
}

function openBook(id){
  location.href = "book.html?id=" + encodeURIComponent(id);
}

function redirectToCheckout(){
  if(cartIds.length === 0){
    alert("Your cart is empty.");
    return;
  }

  const user = JSON.parse(localStorage.getItem("user") || "{}");
  const email =
    user.email ||
    (user.user && user.user.email) ||
    localStorage.getItem("user_email") ||
    localStorage.getItem("creatorhub_profile_email");

  if(!email){
    alert("Please login first.");
    location.href = "login.html";
    return;
  }

  location.href = "checkout.html?id=" + encodeURIComponent(cartIds[0]);
}

window.addEventListener("DOMContentLoaded", loadCart);
</script>

</body>
</html>
