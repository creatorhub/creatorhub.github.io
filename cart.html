<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | CreatorHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* =========================================================
   CREATORHUB STANDARD LIGHT UI INTERFACE VARIABLES
   ========================================================= */
:root {
    --bg-primary: #f8fafc;       /* Subtle canvas slate white */
    --bg-secondary: #ffffff;     /* Pure high-fidelity white panels */
    --text-primary: #0f172a;     /* Deep slate font weights */
    --text-secondary: #475569;   /* Muted text layout labels */
    --text-muted: #94a3b8;
    --accent-blue: #2563eb;     /* Platform Royal Blue */
    --accent-blue-hover: #1d4ed8;
    --accent-blue-light: #eff6ff;
    --accent-red: #ef4444;       /* Remove action text color red */
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.02);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body{
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
}

/* NAVBAR HEADER STYLES */
.header{
    height: 75px;
    background-color: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 999;
    box-shadow: var(--shadow-sm);
}

.back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s ease;
    user-select: none;
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 10px;
    background: var(--bg-secondary);
}

.back-btn:hover {
    color: var(--accent-blue);
    border-color: var(--accent-blue);
    background-color: var(--accent-blue-light);
    transform: translateX(-3px);
}

.title{
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}

/* MAIN STRUCTURE SPLIT GRID LAYOUT */
.container{
    padding: 40px;
    max-width: 1300px;
    margin: auto;
    display: grid;
    grid-template-columns: 1.4fr 0.8fr;
    gap: 30px;
    align-items: start;
}

@media(max-width: 950px) {
    .container { grid-template-columns: 1fr; padding: 25px 15px; }
}

.left-panel-stack h2 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
}

/* ROW CARDS CONTAINER HOOKS */
.cart-items-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.card{
    background-color: var(--bg-secondary);
    display: flex;
    gap: 20px;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    align-items: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.card img{
    width: 80px;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
}

.info{
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.item-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
}

.item-price {
    font-size: 17px;
    font-weight: 800;
    color: var(--accent-blue);
    margin-top: 2px;
}

/* OPTIMIZED ACTION REMOVE TRIGGER */
.btn-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    align-self: flex-start;
    margin-top: 8px;
    transition: color 0.2s;
    padding: 0;
}

.btn-remove:hover {
    color: var(--accent-red);
    text-decoration: underline;
}

/* RIGHT PANEL DETAILS SUMMARY BREAKDOWN */
.total-summary-card {
    background-color: var(--bg-secondary);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
}

.summary-headline {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 12px;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 14px;
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
}

.grand-total-row {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-color);
    font-size: 20px;
    font-weight: 800;
    color: var(--accent-blue);
}

/* FLAT PLATFORM SECURE SUBMIT TRIGGER BUTTON */
.buy-btn-trigger{
    background: var(--accent-blue);
    color: white;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    margin-top: 25px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.buy-btn-trigger:hover {
    background-color: var(--accent-blue-hover);
    transform: translateY(-1px);
}

/* SECURE TRUST BADGES PLATFORM METRICS */
.secure-trust-shield {
    margin-top: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

/* SYSTEM INTERFACE LOGS STATUS BLOCKS */
.empty-cart-state {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 60px 20px;
    text-align: center;
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 15px;
}

.loader-element {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 50px;
    text-align: center;
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 15px;
}

.spinner {
    width: 26px;
    height: 26px;
    border: 3px solid var(--border-color);
    border-top: 3px solid var(--accent-blue);
    border-radius: 50%;
    animation: pipelineRotation 0.8s linear infinite;
    margin: 0 auto 15px auto;
}

@keyframes pipelineRotation {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@media(max-width: 600px) {
    .card { padding: 16px; gap: 16px; }
    .card img { width: 65px; }
    .item-title { font-size: 15px; }
    .item-price { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="history.back()">
        <span>←</span> Back
    </div>
    <div class="title">CreatorHub Marketplace</div>
</div>

<div class="container">
    
    <div class="left-panel-stack">
        <h2>Your Shopping Cart</h2>
        <div id="cartViewportMesh" class="cart-items-list">
            <div class="loader-element">
                <div class="spinner"></div>
                Retrieving cart asset references...
            </div>
        </div>
    </div>

    <div id="totalSummaryBox" class="total-summary-card" style="display:none">
        <div class="summary-headline">Order Overview</div>
        <div class="summary-row">
            <div>Items Subtotal</div>
            <div id="subTotalContainer">₹0</div>
        </div>
        <div class="summary-row">
            <div>Platform Processing Fee</div>
            <div>₹29</div>
        </div>
        <div class="summary-row">
            <div>Instant Delivery</div>
            <div style="color: #16a34a; font-weight: 600;">FREE</div>
        </div>
        <div class="grand-total-row">
            <div>Total Amount</div>
            <div id="totalPriceContainer">₹0</div>
        </div>

        <button class="buy-btn-trigger" onclick="placeCartOrderTunnel()">
            🔒 Secure Checkout
        </button>
        
        <div class="secure-trust-shield">
            <span>🛡️</span> 256-Bit SSL Secured Encryption
        </div>
    </div>

</div>

<script>
/* CORE DATA CHANNEL API CONFIG HOOKS */
const RETRIEVE_PRODUCT_API = "https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec";
const DISPATCH_PAYMENT_API = "https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec";

let SYSTEM_LOCAL_CART_POOL = JSON.parse(localStorage.getItem("cart") || "[]");
SYSTEM_LOCAL_CART_POOL = [...new Set(SYSTEM_LOCAL_CART_POOL)];
localStorage.setItem("cart", JSON.stringify(SYSTEM_LOCAL_CART_POOL));

/* Clean DOM Escaping Security String Module */
function escapeHTMLString(contentString){
    return String(contentString).replace(/[&<>"']/g, function(matchCharacter){
        return({
            '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
        })[matchCharacter]
    });
}

/* Direct High Res Google Drive Link Thumbnail Converter */
function resolveAssetCoverThumbnail(urlLink){
    if(!urlLink) return "https://picsum.photos/400/600";
    try {
        let extractedId = "";
        if(urlLink.includes("id=")){ extractedId = urlLink.split("id=")[1].split("&")[0]; }
        else if(urlLink.includes("/file/d/")){ extractedId = urlLink.split("/file/d/")[1].split("/")[0]; }
        if(extractedId){ return "https://drive.google.com/thumbnail?id=" + extractedId + "&sz=w500"; }
    } catch(err) { console.error("Asset matrix thumbnail conversion fault catch trace:", err); }
    return urlLink;
}

/* PARALLEL FETCH CORE SYSTEM INGEST Engine */
async function loadTargetCartMetadata(){
    const viewportMeshContainer = document.getElementById("cartViewportMesh");
    const summaryCardBoxWrapper = document.getElementById("totalSummaryBox");
    
    try {
        let streamResponse = await fetch(RETRIEVE_PRODUCT_API + "?action=products&t=" + Date.now());
        let bulkPayloadData = await streamResponse.json();
        let productsDatabaseArray = bulkPayloadData.products || bulkPayloadData || [];

        if(!Array.isArray(productsDatabaseArray)) productsDatabaseArray = [];

        let htmlCompilationStringStream = "";
        let compiledSubtotalPriceCount = 0;

        if(SYSTEM_LOCAL_CART_POOL.length === 0){
            htmlCompilationStringStream = "<div class='empty-cart-state'>🛒 Your shopping cart is empty.</div>";
            summaryCardBoxWrapper.style.display = "none";
        } else {
            SYSTEM_LOCAL_CART_POOL.forEach((cachedItemId, indexRankingOffset) => {
                let verifiedProductNode = productsDatabaseArray.find(itemObj => String(itemObj.id) === String(cachedItemId));

                if(!verifiedProductNode) return;

                // STRICT BACKEND CHECK: Matches 'status === "approved"' from backend upload structures
                if(verifiedProductNode.status && verifiedProductNode.status !== "approved") return;
                if(verifiedProductNode.ai_status && verifiedProductNode.ai_status !== "approved") return;

                compiledSubtotalPriceCount += Number(verifiedProductNode.price || 0);
                let targetAssetImage = verifiedProductNode.front_cover || verifiedProductNode.image || "";

                htmlCompilationStringStream += `
                    <div class="card">
                        <img src="${resolveAssetCoverThumbnail(targetAssetImage)}" onerror="this.src='https://picsum.photos/400/600'" alt="Cover Matrice">
                        <div class="info">
                            <div class="item-title">${escapeHTMLString(verifiedProductNode.title || "Untitled Creation")}</div>
                            <div class="item-price">₹${verifiedProductNode.price || 0}</div>
                            <button class="btn-remove" onclick="executeRemoveCartItem(${indexRankingOffset})">Remove Item</button>
                        </div>
                    </div>`;
            });

            let configurationPlatformFee = 29;
            let finalCalculatedGrandTotal = compiledSubtotalPriceCount + configurationPlatformFee;

            document.getElementById("subTotalContainer").innerText = "₹" + compiledSubtotalPriceCount;
            document.getElementById("totalPriceContainer").innerText = "₹" + finalCalculatedGrandTotal;
            summaryCardBoxWrapper.style.display = "block";
        }

        viewportMeshContainer.innerHTML = htmlCompilationStringStream || "<div class='empty-cart-state'>🛒 Your shopping cart is empty.</div>";

    } catch(err) {
        console.error("System fatal connection stream interruption exception:", err);
        viewportMeshContainer.innerHTML = "<div class='empty-cart-state' style='color:#ef4444; border-color:#fca5a5; background:#fff5f5;'>Failed to synchronize cart layout buffers. Please reload.</div>";
    }
}

/* REMOVE ARRAY VARIABLE FRAME HANDLERS */
function executeRemoveCartItem(indexOffsetPosition){
    SYSTEM_LOCAL_CART_POOL.splice(indexOffsetPosition, 1);
    localStorage.setItem("cart", JSON.stringify(SYSTEM_LOCAL_CART_POOL));
    loadTargetCartMetadata();
}

/* DISPATCH CHECKOUT TUNNEL ROUTING CHANNELS */
async function placeCartOrderTunnel(){
    if(SYSTEM_LOCAL_CART_POOL.length === 0){ alert("Cart Empty"); return; }

    let cachedUserPayload = JSON.parse(localStorage.getItem("user") || "{}");
    let targetBuyerEmailString = cachedUserPayload.email || (cachedUserPayload.user && cachedUserPayload.user.email);

    if(!targetBuyerEmailString){
        alert("Login required to proceed further.");
        location.href = "login.html";
        return;
    }

    try {
        let dispatchResponse = await fetch(PAYMENT_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "create_cart_order",
                products: SYSTEM_LOCAL_CART_POOL,
                buyer: targetBuyerEmailString
            })
        });

        let allocationPaymentData = await dispatchResponse.json();

        if(allocationPaymentData.payment_session_id){
            // Cashfree Sandbox production endpoint token routing direction flows
            let secureSessionGatewayURL = "https://sandbox.cashfree.com/pg/view/payment-session-id?payment_session_id=" + allocationPaymentData.payment_session_id;
            window.location.href = secureSessionGatewayURL;
        } else {
            alert(allocationPaymentData.message || "Gateway authentication tunnel mapping rejected transaction.");
        }
    } catch(e) {
        console.error("Payment pipeline handshake crash fault trace exception:", e);
        alert("Transaction processing timeout exceeded limits.");
    }
}

// Fire system runtime synchronization initialization thread loops smoothly on load
window.addEventListener("DOMContentLoaded", loadTargetCartMetadata);
</script>
</body>
</html>
