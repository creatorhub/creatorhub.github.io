<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Control Panel</title><style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

.topbar{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h2{
margin-bottom:20px;
}

/* CARD */

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:20px;

border-radius:16px;

border:1px solid #1f2937;

margin-bottom:15px;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

}

/* BUTTON */

button{

border:none;

padding:10px 14px;

border-radius:8px;

cursor:pointer;

color:white;

margin-right:6px;

margin-top:10px;

font-weight:bold;

}

.approve{
background:#22c55e;
}

.reject{
background:#ef4444;
}

/* STATUS */

.status-pending{
color:#f59e0b;
font-weight:bold;
}

.status-approved{
color:#22c55e;
font-weight:bold;
}

.status-rejected{
color:#ef4444;
font-weight:bold;
}

</style></head><body><div class="topbar"><div class="back" onclick="history.back()">⬅</div><div class="title">Seller Control Panel</div></div><div class="container"><h2>Seller Requests</h2><div id="sellers">
Loading...
</div></div><script>

const ADMIN="ayushprajpati6@gmail.com"

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){

alert("Admin Only")

location.href="index.html"

}

/* SAFE TEXT */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({

'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'

})[m]

})

}

/* GET DB */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())

let d=await r.json()

return Array.isArray(d)?d:[]

}catch{

return[]

}

}

/* LOAD SELLERS */

async function loadSellers(){

let box=document.getElementById("sellers")

let sellers=await getDB("sellers")

if(!sellers.length){

box.innerHTML="No Seller Requests"

return

}

box.innerHTML=""

sellers.reverse().forEach(s=>{

let status=""

if(s.status==="approved"){
status="<span class='status-approved'>Approved</span>"
}
else if(s.status==="rejected"){
status="<span class='status-rejected'>Rejected</span>"
}
else{
status="<span class='status-pending'>Pending</span>"
}

let buttons=""

if(s.status==="pending"){

buttons=`

<button class="approve"
onclick="approveSeller('${s.email}')">

Approve

</button>

<button class="reject"
onclick="rejectSeller('${s.email}')">

Reject

</button>

`

}

box.innerHTML+=`

<div class="card">

<b>Email:</b> ${escapeHTML(s.email)}

<br><br>

<b>Name:</b> ${escapeHTML(s.name || "-")}

<br>

<b>Phone:</b> ${escapeHTML(s.phone || "-")}

<br>

<b>UPI:</b> ${escapeHTML(s.upi || "-")}

<br><br>

<b>Status:</b> ${status}

<br>

${buttons}

</div>

`

})

}

/* APPROVE */

async function approveSeller(email){

if(!confirm("Approve this seller?")) return

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"approve_seller",
email:email
})
})

alert("Seller Approved ✅")

loadSellers()

}

/* REJECT */

async function rejectSeller(email){

if(!confirm("Reject this seller?")) return

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"reject_seller",
email:email,
admin:ADMIN
})
})

alert("Seller Rejected")

loadSellers()

}

/* INIT */

loadSellers()

</script></body></html>
