<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Seller Control</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-bottom:15px;
}

button{
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
margin-right:6px;
margin-top:6px;
}

.approve{background:#22c55e;}
.reject{background:#ef4444;}

.status-pending{
color:#f59e0b;
font-weight:bold;
}

.status-approved{
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Seller Control Panel</div>
</div>

<div class="container">

<h2>Seller Requests</h2>

<div id="sellers">Loading...</div>

</div>

<script>

const ADMIN="ayushprajpati6@gmail.com";

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

let user=JSON.parse(localStorage.getItem("user"));

if(!user || user.email!==ADMIN){

alert("Admin Only");
location.href="index.html";

}

/* GET DB */

async function getDB(db){

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let data=await r.json();

return Array.isArray(data)?data:[];

}

/* SAVE DB */

async function saveDB(db,data){

await fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({db:db,data:data})
});

}

/* LOAD SELLERS */

async function loadSellers(){

let sellers=await getDB("sellers");

let box=document.getElementById("sellers");

box.innerHTML="";

if(!sellers.length){

box.innerHTML="No Seller Requests";
return;

}

sellers.reverse().forEach(s=>{

let status="";

if(s.status==="approved"){
status="<span class='status-approved'>Approved</span>";
}else{
status="<span class='status-pending'>Pending</span>";
}

let buttons="";

if(s.status!=="approved"){

buttons+=`
<button class="approve"
onclick="approveSeller('${s.email}')">
Approve
</button>

<button class="reject"
onclick="rejectSeller('${s.email}')">
Reject
</button>
`;

}

box.innerHTML+=`

<div class="card">

<b>${s.email}</b>

<br><br>

Name : ${s.name || "-"}

<br>

Phone : ${s.phone || "-"}

<br>

UPI : ${s.upi || "-"}

<br><br>

Status : ${status}

<br><br>

${buttons}

</div>

`;

});

}

/* APPROVE SELLER */

async function approveSeller(email){

if(!confirm("Approve this seller?")) return;

let sellers=await getDB("sellers");

sellers=sellers.map(s=>{

if(s.email===email){

s.status="approved";

}

return s;

});

await saveDB("sellers",sellers);

alert("Seller Approved");

loadSellers();

}

/* REJECT SELLER */

async function rejectSeller(email){

if(!confirm("Reject this seller?")) return;

let sellers=await getDB("sellers");

sellers=sellers.filter(s=>s.email!==email);

await saveDB("sellers",sellers);

alert("Seller Rejected");

loadSellers();

}

/* INIT */

loadSellers();

</script>

</body>
</html>
