<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorHub Chat Pro</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; height: 100vh; display: flex; overflow: hidden; }
        .app-container { display: flex; width: 100vw; height: 100vh; background: #ffffff; }
        
        /* Sidebar */
        .sidebar-panel { width: 30%; min-width: 340px; background: #f8fafc; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px 20px; background: #1e1b4b; color: #ffffff; }
        .users-list-box { flex: 1; overflow-y: auto; padding: 10px 0; }
        
        .user-item-card { display: flex; align-items: center; gap: 12px; padding: 14px 20px; margin: 4px 12px; border-radius: 12px; cursor: pointer; border: 1px solid #e2e8f0; background: #fff; }
        .user-item-card.active-chat { background: #e0e7ff; border-color: #4f46e5; }
        .u-name { font-weight: 600; color: #0f172a; font-size: 0.95rem; }
        .u-email { font-size: 0.8rem; color: #64748b; }

        /* Chat Panel */
        .chat-view-panel { width: 70%; background: #f1f5f9; display: flex; flex-direction: column; position: relative; }
        
        /* Chat Header with 3-Dots Menu */
        .chat-view-header { background: #ffffff; padding: 20px 28px; border-bottom: 1px solid #e2e8f0; font-weight: 700; color: #0f172a; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .three-dots-btn { font-size: 1.4rem; cursor: pointer; padding: 4px 10px; border-radius: 50%; transition: background 0.2s; }
        .three-dots-btn:hover { background: #f1f5f9; }
        
        /* Dropdown Menu Dynamic Style */
        .dropdown-menu { display: none; position: absolute; top: 60px; right: 28px; background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-radius: 12px; z-index: 100; min-width: 160px; overflow: hidden; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 12px 16px; font-size: 0.9rem; color: #1e293b; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .dropdown-item:hover { background: #f1f5f9; }
        .dropdown-item.danger { color: #dc2626; }

        .chat-scroller-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f8fafc; }
        
        /* Bubbles Layout */
        .chat-line { display: flex; width: 100%; margin-bottom: 4px; }
        .chat-line.outward { justify-content: flex-end; }
        .chat-line.inward { justify-content: flex-start; }
        
        .bubble-container { display: flex; flex-direction: column; max-width: 60%; }
        .chat-bubble { padding: 10px 16px; border-radius: 16px; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); position: relative; word-break: break-word; }
        
        .outward .chat-bubble { background: #4f46e5; color: #ffffff; border-bottom-right-radius: 4px; }
        .inward .chat-bubble { background: #ffffff; color: #1e293b; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        
        /* Edit/Delete Labels */
        .msg-actions { font-size: 0.75rem; margin-top: 4px; display: flex; gap: 8px; justify-content: flex-end; opacity: 0.8; }
        .msg-actions span { cursor: pointer; color: #4f46e5; font-weight: 600; }
        .msg-actions span.del { color: #dc2626; }
        .msg-actions span:hover { text-decoration: underline; }

        .render-media-file { max-width: 100%; max-height: 250px; border-radius: 12px; display: block; margin-top: 5px; background: #cbd5e1; }

        /* Inputs */
        .chat-input-dashboard { background: #ffffff; padding: 15px 25px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #e2e8f0; }
        .input-bar-element { flex: 1; padding: 12px 20px; border: 1px solid #cbd5e1; border-radius: 9999px; outline: none; }
        .btn-media-trigger { background: #f1f5f9; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; color: #475569; }
        .btn-dispatch { background: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 9999px; font-weight: 600; cursor: pointer; }
        .splash-blank-state { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; color: #64748b; background: #f8fafc; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar-panel">
        <div class="sidebar-header"><h3 id="profileName">CreatorHub Chat</h3></div>
        <div class="users-list-box" id="userDirectoryView">Loading Users...</div>
    </div>

    <div class="chat-view-panel">
        <div class="splash-blank-state" id="blankStatePrompt"><p>💬 Select a contact to chat</p></div>
        
        <div id="activeChatStateLayout" style="display: none; flex-direction: column; flex: 1; height: 100%;">
            <div class="chat-view-header">
                <span id="activeChatterHeaderTitle">Chat</span>
                <div class="three-dots-btn" onclick="toggleDropdown()">⋮</div>
                <div class="dropdown-menu" id="headerDropdown">
                    <div class="dropdown-item" onclick="alert('User details matching secure infrastructure.')">View Profile</div>
                    <div class="dropdown-item" onclick="alert('All media assets stored safely in drive.')">Shared Media</div>
                    <div class="dropdown-item danger" onclick="clearCurrentChat()">Clear Chat</div>
                </div>
            </div>
            
            <div class="chat-scroller-window" id="chatContentScroller"></div>
            
            <div class="chat-input-dashboard">
                <input type="file" id="mediaSelectorHidden" accept="image/*" style="display: none;" onchange="executeImagePush(this)">
                <button class="btn-media-trigger" onclick="document.getElementById('mediaSelectorHidden').click()">📷</button>
                <input type="text" id="messageTextField" class="input-bar-element" placeholder="Type a message..." onkeypress="if(event.key==='Enter') executeTextPush()">
                <button class="btn-dispatch" onclick="executeTextPush()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // यहाँ अपना नया Apps Script Deployment URL डालें
    const CLOUD_GATEWAY_URL = "https://script.google.com/macros/s/AKfycbw9T3_1uvxU7O2ER5GRF5VLZ-8BNmxO5B5ZS_rPTkJk4ol5giC0-l9vM2AIULLbhRildg/exec";
    
    const urlParams = new URLSearchParams(window.location.search);
    const localStorageUser = JSON.parse(localStorage.getItem("user_login_data"));
    const currentUser = {
        name: urlParams.get('name') || (localStorageUser ? localStorageUser.name : "Ayush Prajapati"),
        email: urlParams.get('email') || (localStorageUser ? localStorageUser.email : "ayushprajpati6@gmail.com")
    };
    
    document.getElementById("profileName").innerText = currentUser.name;

    const staticUsersList = [
      {"name": "Ayush Prajapati", "email": "ayushprajpati6@gmail.com", "profile_image": "https://drive.google.com/thumbnail?id=1lhVDcQn_g1hpyjrGtM92asMDsC2Z_JWK&sz=w1200"},
      {"name": "Ayush Prajapati", "email": "carforsalesimulator6@gmail.com", "profile_image": ""},
      {"name": "Umesh Kumar's", "email": "umesh323354@gmail.com", "profile_image": "https://lh3.googleusercontent.com/a/ACg8ocJsPaM_y4BZ6qoEFesKHQUSN45Su1yuikrMqwksTOwGRj0VtueL=s96-c"},
      {"name": "Creatorhub", "email": "supportcreatorhub@gmail.com", "profile_image": "https://lh3.googleusercontent.com/a/ACg8ocK8rPb8p8ugBiilFPqult0VRf9DK3qkAml7eTlfF1rMIBbpyQ=s96-c"},
      {"name": "Ayush", "email": "ggcccchgyu@gmail.com", "profile_image": "https://lh3.googleusercontent.com/a/ACg8ocIBpCKW68BIFiZn7nxJxV3o0NKtbcQk1PJRGXCyjXcapmlM=s96-c"},
      {"name": "Abhishek YADAV", "email": "ay8083827@gmail.com", "profile_image": "https://lh3.googleusercontent.com/a/ACg8ocJr5GnW_Hfp05rtHsZauT_3md8ZOlp7WW0UPSwajXhxqRgH8A=s96-c"}
    ];

    let targetedReceiverEmail = null;
    let chatMessagesCache = [];

    function renderUsers() {
        const view = document.getElementById("userDirectoryView"); view.innerHTML = "";
        staticUsersList.forEach(user => {
            if (user.email.toLowerCase().trim() === currentUser.email.toLowerCase().trim()) return;
            const img = user.profile_image || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random`;
            const card = document.createElement("div");
            card.className = `user-item-card ${targetedReceiverEmail === user.email ? 'active-chat' : ''}`;
            card.onclick = () => startChat(user.email, user.name);
            card.innerHTML = `<img src="${img}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;"><div class="user-details"><span class="u-name">${user.name}</span><span class="u-email">${user.email}</span></div>`;
            view.appendChild(card);
        });
    }

    function startChat(email, name) {
        targetedReceiverEmail = email;
        document.getElementById("blankStatePrompt").style.display = "none";
        document.getElementById("activeChatStateLayout").style.display = "flex";
        document.getElementById("activeChatterHeaderTitle").innerText = name;
        renderUsers(); loadChats();
    }

    async function loadChats() {
        try {
            const res = await fetch(CLOUD_GATEWAY_URL);
            const data = await res.json();
            chatMessagesCache = data.messages || [];
            renderBubbles();
        } catch (e) { console.error("Error loading chat", e); }
    }

    function renderBubbles() {
        const scroller = document.getElementById("chatContentScroller"); scroller.innerHTML = "";
        if (!targetedReceiverEmail) return;

        const activeLogs = chatMessagesCache.filter(msg => 
            (msg.sender === currentUser.email && msg.receiver === targetedReceiverEmail) ||
            (msg.sender === targetedReceiverEmail && msg.receiver === currentUser.email)
        );

        activeLogs.forEach((msg, index) => {
            const isSelf = msg.sender === currentUser.email;
            const line = document.createElement("div");
            line.className = `chat-line ${isSelf ? 'outward' : 'inward'}`;
            
            const container = document.createElement("div");
            container.className = "bubble-container";

            const bubble = document.createElement("div");
            bubble.className = "chat-bubble";
            
            if (msg.type === "image") {
                bubble.innerHTML = `<a href="${msg.content}" target="_blank"><img src="${msg.content}" class="render-media-file" alt="Shared Image"></a>`;
            } else {
                bubble.innerText = msg.content;
            }
            
            container.appendChild(bubble);

            // एडिट/डिलीट केवल खुद के मैसेजेस पर काम करेगा
            if (isSelf && msg.id && msg.id !== "temp") {
                const actions = document.createElement("div");
                actions.className = "msg-actions";
                
                if (msg.type !== "image") {
                    actions.innerHTML = `<span onclick="editMessage('${msg.id}', \`${msg.content.replace(/'/g, "\\'")}\`)">Edit</span>`;
                }
                actions.innerHTML += `<span class="del" onclick="deleteMessage('${msg.id}')">Delete</span>`;
                container.appendChild(actions);
            }
            
            line.appendChild(container);
            scroller.appendChild(line);
        });
        scroller.scrollTop = scroller.scrollHeight;
    }

    async function executeTextPush() {
        const input = document.getElementById("messageTextField");
        const val = input.value.trim();
        if (!val || !targetedReceiverEmail) return;
        input.value = "";

        chatMessagesCache.push({ id: "temp", sender: currentUser.email, receiver: targetedReceiverEmail, content: val, type: "text" });
        renderBubbles();

        await fetch(CLOUD_GATEWAY_URL, {
            method: "POST",
            body: JSON.stringify({ action: "send", sender: currentUser.email, receiver: targetedReceiverEmail, content: val, type: "text" })
        });
        loadChats();
    }

    function executeImagePush(el) {
        const file = el.files[0];
        if (!file || !targetedReceiverEmail) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            chatMessagesCache.push({ id: "temp", sender: currentUser.email, receiver: targetedReceiverEmail, content: "📷 Sending image...", type: "text" });
            renderBubbles();

            await fetch(CLOUD_GATEWAY_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "send", sender: currentUser.email, receiver: targetedReceiverEmail,
                    type: "image", imageRaw: e.target.result, fileName: file.name, mimeType: file.type
                })
            });
            el.value = "";
            loadChats();
        };
        reader.readAsDataURL(file);
    }

    async function editMessage(msgId, oldContent) {
        const newText = prompt("Edit your message:", oldContent);
        if (!newText || newText.trim() === oldContent) return;

        await fetch(CLOUD_GATEWAY_URL, {
            method: "POST",
            body: JSON.stringify({ action: "edit", msgId: msgId, sender: currentUser.email, newContent: newText.trim() })
        });
        loadChats();
    }

    async function deleteMessage(msgId) {
        if (!confirm("Delete this message?")) return;

        await fetch(CLOUD_GATEWAY_URL, {
            method: "POST",
            body: JSON.stringify({ action: "delete", msgId: msgId, sender: currentUser.email })
        });
        loadChats();
    }

    // 3-Dots dropdown menu toggle
    function toggleDropdown() {
        document.getElementById("headerDropdown").classList.toggle("show");
    }

    // क्लियर चैट फ़ंक्शन
    async function clearCurrentChat() {
        if (!targetedReceiverEmail) return;
        if (!confirm("Are you sure you want to clear all messages in this chat?")) return;
        
        document.getElementById("headerDropdown").classList.remove("show");
        chatMessagesCache = [];
        renderBubbles();

        await fetch(CLOUD_GATEWAY_URL, {
            method: "POST",
            body: JSON.stringify({ action: "clear_chat", sender: currentUser.email, receiver: targetedReceiverEmail })
        });
        loadChats();
    }

    // स्क्रीन पर क्लिक करने पर ड्रॉपडाउन बंद करना
    window.onclick = function(event) {
        if (!event.target.matches('.three-dots-btn')) {
            const dropdowns = document.getElementsByClassName("dropdown-menu");
            for (let i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }
    }

    renderUsers();
    setInterval(loadChats, 3500);
</script>
</body>
</html>
