<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CreatorHub Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{height:100vh;background:#eef3f9;color:#07142f;overflow:hidden}
.app{height:100vh;display:grid;grid-template-columns:380px 1fr;background:#fff}
.sidebar{border-right:1px solid #dce6f3;background:#fff;display:flex;flex-direction:column;min-width:0}
.side-head{height:82px;padding:16px 18px;border-bottom:1px solid #dce6f3;display:flex;align-items:center;justify-content:space-between;gap:12px}
.me{display:flex;align-items:center;gap:12px;min-width:0}
.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;background:#315df4;color:#fff;display:grid;place-items:center;font-weight:900;flex:none}
.me-info{min-width:0}
.me-info b{display:block;font-size:17px;font-weight:900;color:#06142c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.me-info span{display:block;font-size:13px;color:#63728a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{width:44px;height:44px;border:0;border-radius:12px;background:#eef4ff;color:#315df4;font-size:18px;cursor:pointer}
.search{padding:14px 18px;border-bottom:1px solid #dce6f3}
.search input{width:100%;height:46px;border:1px solid #d6e1ef;border-radius:14px;background:#f6f9fd;outline:none;padding:0 15px;font-size:15px;font-weight:700}
.users{flex:1;overflow:auto;padding:8px}
.user{height:72px;border-radius:16px;padding:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.user:hover,.user.active{background:#eef4ff}
.user img{width:50px;height:50px;border-radius:50%;object-fit:cover;background:#315df4;flex:none}
.user .uinfo{min-width:0;flex:1}
.user .uinfo b{display:block;color:#06142c;font-size:15px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user .uinfo span{display:block;margin-top:4px;color:#63728a;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:10px;height:10px;border-radius:50%;background:#22c55e;flex:none}

.chat{display:flex;flex-direction:column;height:100vh;background:#f6f8fc;min-width:0}
.chat-head{height:82px;background:#fff;border-bottom:1px solid #dce6f3;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.chat-user{display:flex;align-items:center;gap:12px;min-width:0}
.chat-user img{width:50px;height:50px;border-radius:50%;object-fit:cover;background:#315df4;flex:none}
.chat-user b{display:block;font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-user span{display:block;margin-top:3px;color:#63728a;font-size:13px}
.back-mobile{display:none}

.messages{flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;gap:10px;background:
radial-gradient(circle at top left,rgba(49,93,244,.08),transparent 30%),
#f6f8fc}
.empty{margin:auto;text-align:center;color:#63728a}
.empty i{font-size:46px;color:#315df4;margin-bottom:14px}
.msg{max-width:62%;display:flex;flex-direction:column;gap:5px}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.their{align-self:flex-start;align-items:flex-start}
.bubble{border-radius:18px;padding:11px 13px;font-size:15px;line-height:1.45;box-shadow:0 8px 20px rgba(16,24,40,.06);word-break:break-word}
.mine .bubble{background:#315df4;color:#fff;border-bottom-right-radius:5px}
.their .bubble{background:#fff;color:#07142f;border:1px solid #dce6f3;border-bottom-left-radius:5px}
.time{font-size:11px;color:#7a879c;padding:0 4px}
.msg-img{max-width:280px;max-height:320px;border-radius:16px;object-fit:cover;display:block;cursor:pointer}
.mine .msg-img{border:3px solid #315df4}
.their .msg-img{border:3px solid #fff}

.composer{min-height:82px;background:#fff;border-top:1px solid #dce6f3;padding:14px 18px;display:flex;align-items:flex-end;gap:12px}
.composer textarea{flex:1;min-height:52px;max-height:130px;resize:none;border:1px solid #d6e1ef;border-radius:18px;outline:none;padding:15px 16px;font-size:15px;line-height:1.4;background:#f6f9fd}
.send{width:52px;height:52px;border-radius:50%;border:0;background:#315df4;color:#fff;font-size:18px;cursor:pointer;flex:none}
.attach{width:52px;height:52px;border-radius:50%;border:0;background:#eef4ff;color:#315df4;font-size:18px;cursor:pointer;flex:none}
#imageInput{display:none}
.preview{display:none;position:absolute;left:410px;right:20px;bottom:92px;background:#fff;border:1px solid #dce6f3;border-radius:18px;padding:12px;box-shadow:0 16px 40px rgba(16,24,40,.14);align-items:center;gap:12px;z-index:10}
.preview img{width:72px;height:72px;border-radius:12px;object-fit:cover}
.preview b{font-size:14px}
.preview button{margin-left:auto;width:36px;height:36px;border-radius:10px;border:0;background:#fee2e2;color:#ef4444}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#07142f;color:#fff;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:800;display:none;z-index:99}

/* --- FIXED MOBILE STYLES --- */
@media(max-width:820px){
.app{grid-template-columns:1fr}
.sidebar{display:flex;width:100%}
.chat{position:fixed;inset:0;z-index:20;transform:translateX(100%);transition:.25s ease-in-out;width:100%;height:100vh}
.chat.open{transform:translateX(0)}
.back-mobile{display:grid;place-items:center;margin-right:4px}
.msg{max-width:82%}
.preview{left:12px;right:12px;bottom:86px}
.chat-head{padding:16px 14px}
.composer{padding:12px;min-height:72px}
.composer textarea{padding:12px 14px;min-height:44px}
.send, .attach{width:46px;height:46px;font-size:16px}
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="app">
  <aside class="sidebar">
    <div class="side-head">
      <div class="me">
        <img class="avatar" id="meAvatar" alt="Me">
        <div class="me-info">
          <b id="meName">CreatorHub User</b>
          <span id="meEmail">Loading...</span>
        </div>
      </div>
      <button class="icon-btn" onclick="loadUsers()" title="Refresh"><i class="fa-solid fa-rotate"></i></button>
    </div>

    <div class="search">
      <input id="searchInput" placeholder="Search users..." oninput="renderUsers()">
    </div>

    <div class="users" id="usersList"></div>
  </aside>

  <main class="chat" id="chatPanel">
    <div class="chat-head">
      <div class="chat-user">
        <button class="icon-btn back-mobile" onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></button>
        <img id="chatAvatar" alt="User">
        <div>
          <b id="chatName">Select a user</b>
          <span id="chatEmail">Personal chat</span>
        </div>
      </div>
      <button class="icon-btn" onclick="scrollBottom()"><i class="fa-solid fa-arrow-down"></i></button>
    </div>

    <div class="messages" id="messages">
      <div class="empty">
        <i class="fa-solid fa-comments"></i>
        <h2>Select a user</h2>
        <p>Start a fast personal chat.</p>
      </div>
    </div>

    <div class="preview" id="previewBox">
      <img id="previewImg">
      <div>
        <b>Image ready</b>
        <div style="font-size:13px;color:#63728a">Tap send to share</div>
      </div>
      <button onclick="clearImage()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="composer">
      <button class="attach" onclick="document.getElementById('imageInput').click()"><i class="fa-solid fa-image"></i></button>
      <input id="imageInput" type="file" accept="image/*" onchange="selectImage(event)">
      <textarea id="messageInput" placeholder="Type a message..." onkeydown="handleEnter(event)"></textarea>
      <button class="send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onChildAdded, off, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfYB5sgL770yLShdaJVDaxjpZrQHx5JcU",
  authDomain: "creatorhub-chat.firebaseapp.com",
  databaseURL: "https://creatorhub-chat-default-rtdb.firebaseio.com",
  projectId: "creatorhub-chat",
  storageBucket: "creatorhub-chat.firebasestorage.app",
  messagingSenderId: "744130503143",
  appId: "1:744130503143:web:7603e8f316f16947255d42",
  measurementId: "G-3M6XXVNS24"
};

const USERS_API = "https://script.google.com/macros/s/AKfycbw9T3_1uvxU7O2ER5GRF5VLZ-8BNmxO5B5ZS_rPTkJk4ol5giC0-l9vM2AIULLbhRildg/exec";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let me = getLoggedUser();
let users = [];
let selectedUser = null;
let selectedFile = null;
let currentChatRef = null;
let seenMessages = new Set();

function $(id){return document.getElementById(id)}

function toast(text){
  $("toast").innerText = text;
  $("toast").style.display = "block";
  setTimeout(() => $("toast").style.display = "none", 2200);
}

function safeEmail(email){
  return String(email || "").toLowerCase().replace(/[.#$[\]/]/g,"_");
}

function makeChatId(a,b){
  return [safeEmail(a),safeEmail(b)].sort().join("__");
}

function avatarUrl(user){
  const img = user.profile_image || user.picture || user.image || "";
  if(img) return driveImage(img);
  return "https://ui-avatars.com/api/?name=" + encodeURIComponent(user.name || user.email || "User") + "&background=315df4&color=fff";
}

function driveImage(url){
  if(!url) return "";
  const text = String(url);
  if(text.startsWith("data:image") || text.includes("ui-avatars.com")) return text;
  let id = "";
  if(text.includes("uc?id=")) id = text.split("id=")[1].split("&")[0];
  else if(text.includes("open?id=")) id = text.split("id=")[1].split("&")[0];
  else if(text.includes("/d/")) id = text.split("/d/")[1].split("/")[0];
  else {
    const m = text.match(/[?&]id=([^&]+)/);
    if(m && m[1]) id = m[1];
  }
  return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w500" : text;
}

function readJson(key){
  try{return JSON.parse(localStorage.getItem(key) || "{}") || {}}catch(e){return {}}
}

function getLoggedUser(){
  const user = readJson("user");
  const currentUser = readJson("currentUser");
  const creatorUser = readJson("creatorhub_user");
  const u = Object.keys(user).length ? user : (Object.keys(currentUser).length ? currentUser : creatorUser);

  const email = String(
    u.email ||
    u.user?.email ||
    localStorage.getItem("user_email") ||
    localStorage.getItem("creatorhub_profile_email") ||
    ""
  ).toLowerCase().trim();

  const name =
    u.name ||
    u.user?.name ||
    localStorage.getItem("user_name") ||
    email.split("@")[0] ||
    "CreatorHub User";

  const profile_image =
    u.profile_image ||
    u.profileImage ||
    u.picture ||
    u.user?.profile_image ||
    localStorage.getItem("user_image") ||
    localStorage.getItem("profile_image") ||
    "";

  return {email,name,profile_image};
}

function initMe(){
  if(!me.email){
    toast("Login required");
    setTimeout(() => location.href = "login.html", 800);
    return;
  }

  $("meName").innerText = me.name;
  $("meEmail").innerText = me.email;
  $("meAvatar").src = avatarUrl(me);
}

async function loadUsers(){
  $("usersList").innerHTML = `<div style="padding:18px;color:#63728a;font-weight:800">Loading users...</div>`;

  try{
    const res = await fetch(USERS_API + (USERS_API.includes("?") ? "&" : "?") + "action=getUsers&_=" + Date.now());
    const data = await res.json();

    users = (data.users || data.data || [])
      .map(u => ({
        name:u.name || u.full_name || "CreatorHub User",
        email:String(u.email || "").toLowerCase().trim(),
        profile_image:u.profile_image || u.picture || u.image || ""
      }))
      .filter(u => u.email && u.email !== me.email);

    renderUsers();
  }catch(err){
    console.error(err);
    $("usersList").innerHTML = `<div style="padding:18px;color:#ef4444;font-weight:900">Users load failed. Check USERS_API.</div>`;
  }
}

window.renderUsers = function(){
  const q = $("searchInput").value.toLowerCase().trim();

  const list = users.filter(u =>
    u.name.toLowerCase().includes(q) ||
    u.email.toLowerCase().includes(q)
  );

  if(!list.length){
    $("usersList").innerHTML = `<div style="padding:18px;color:#63728a;font-weight:800">No users found</div>`;
    return;
  }

  $("usersList").innerHTML = list.map(u => `
    <div class="user ${selectedUser?.email === u.email ? "active" : ""}" onclick='selectUser(${JSON.stringify(u).replace(/'/g,"&#039;")})'>
      <img src="${avatarUrl(u)}">
      <div class="uinfo">
        <b>${escapeHtml(u.name)}</b>
        <span>${escapeHtml(u.email)}</span>
      </div>
      <span class="dot"></span>
    </div>
  `).join("");
}

window.selectUser = function(user){
  selectedUser = user;
  seenMessages = new Set();

  $("chatPanel").classList.add("open");
  $("chatName").innerText = user.name;
  $("chatEmail").innerText = user.email;
  $("chatAvatar").src = avatarUrl(user);
  $("messages").innerHTML = "";

  renderUsers();
  listenMessages();
}

window.closeChat = function(){
  $("chatPanel").classList.remove("open");
}

function listenMessages(){
  if(currentChatRef){
    off(currentChatRef);
  }

  const id = makeChatId(me.email, selectedUser.email);
  currentChatRef = query(ref(db, "chats/" + id + "/messages"), limitToLast(80));

  onChildAdded(currentChatRef, snap => {
    const msg = snap.val();
    if(!msg || seenMessages.has(snap.key)) return;
    seenMessages.add(snap.key);
    appendMessage(msg);
    scrollBottom();
  });
}

function appendMessage(msg){
  const mine = msg.from === me.email;
  const wrap = document.createElement("div");
  wrap.className = "msg " + (mine ? "mine" : "their");

  let body = "";

  if(msg.type === "image"){
    body = `<img class="msg-img" src="${msg.image_url}" onclick="window.open('${msg.image_url}','_blank')">`;
    if(msg.text) body += `<div class="bubble">${escapeHtml(msg.text)}</div>`;
  }else{
    body = `<div class="bubble">${escapeHtml(msg.text || "")}</div>`;
  }

  wrap.innerHTML = body + `<div class="time">${formatTime(msg.created_at)}</div>`;
  $("messages").appendChild(wrap);
}

function formatTime(t){
  if(!t || typeof t !== "number") return "now";
  return new Date(t).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
}

window.scrollBottom = function(){
  const box = $("messages");
  box.scrollTop = box.scrollHeight;
}

window.handleEnter = function(e){
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

window.selectImage = function(e){
  const file = e.target.files[0];
  if(!file) return;

  if(!file.type.startsWith("image/")){
    toast("Select image only");
    return;
  }

  if(file.size > 5 * 1024 * 1024){
    toast("Image max 5MB");
    return;
  }

  selectedFile = file;
  $("previewImg").src = URL.createObjectURL(file);
  $("previewBox").style.display = "flex";
}

window.clearImage = function(){
  selectedFile = null;
  $("imageInput").value = "";
  $("previewBox").style.display = "none";
}

window.sendMessage = async function(){
  if(!selectedUser){
    toast("Select user first");
    return;
  }

  const text = $("messageInput").value.trim();

  if(!text && !selectedFile){
    return;
  }

  $("messageInput").value = "";

  try{
    let imageUrl = "";
    let type = "text";

    if(selectedFile){
      type = "image";
      const path = "chat-images/" + makeChatId(me.email, selectedUser.email) + "/" + Date.now() + "_" + selectedFile.name;
      const fileRef = sRef(storage, path);
      await uploadBytes(fileRef, selectedFile);
      imageUrl = await getDownloadURL(fileRef);
      clearImage();
    }

    const id = makeChatId(me.email, selectedUser.email);
    const msgRef = push(ref(db, "chats/" + id + "/messages"));

    await set(msgRef,{
      id:msgRef.key,
      from:me.email,
      from_name:me.name,
      to:selectedUser.email,
      to_name:selectedUser.name,
      type:type,
      text:text,
      image_url:imageUrl,
      created_at:Date.now(),
      server_time:serverTimestamp()
    });

    await set(ref(db, "chatIndex/" + safeEmail(me.email) + "/" + safeEmail(selectedUser.email)),{
      with:selectedUser.email,
      name:selectedUser.name,
      profile_image:selectedUser.profile_image || "",
      last_message:type === "image" ? "Image" : text,
      updated_at:Date.now()
    });

    await set(ref(db, "chatIndex/" + safeEmail(selectedUser.email) + "/" + safeEmail(me.email)),{
      with:me.email,
      name:me.name,
      profile_image:me.profile_image || "",
      last_message:type === "image" ? "Image" : text,
      updated_at:Date.now()
    });

  }catch(err){
    console.error(err);
    toast("Message send failed");
  }
}

function escapeHtml(str){
  return String(str || "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[ch]));
}

initMe();
loadUsers();
</script>

</body>
</html>
