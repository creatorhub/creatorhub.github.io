<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CreatorHub Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{height:100vh;background:#eef3f9;color:#07142f;overflow:hidden}
button,input,textarea{font:inherit}
button{border:0;cursor:pointer}
.app{height:100vh;display:grid;grid-template-columns:380px 1fr;background:#fff}

.sidebar{border-right:1px solid #dce6f3;background:#fff;display:flex;flex-direction:column;min-width:0}
.side-head{height:82px;padding:16px 18px;border-bottom:1px solid #dce6f3;display:flex;align-items:center;justify-content:space-between;gap:12px}
.me{display:flex;align-items:center;gap:12px;min-width:0}
.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;background:#315df4;flex:none}
.me-info{min-width:0}
.me-info b{display:block;font-size:17px;font-weight:900;color:#06142c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.me-info span{display:block;font-size:13px;color:#63728a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{width:44px;height:44px;border-radius:12px;background:#eef4ff;color:#315df4;font-size:18px;display:grid;place-items:center}

.search{padding:14px 18px;border-bottom:1px solid #dce6f3}
.search input{width:100%;height:46px;border:1px solid #d6e1ef;border-radius:14px;background:#f6f9fd;outline:none;padding:0 15px;font-size:15px;font-weight:700}
.users{flex:1;overflow:auto;padding:8px}
.user{height:72px;border-radius:16px;padding:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.user:hover,.user.active{background:#eef4ff}
.user img{width:50px;height:50px;border-radius:50%;object-fit:cover;background:#315df4;flex:none}
.uinfo{min-width:0;flex:1}
.uinfo b{display:block;color:#06142c;font-size:15px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uinfo span{display:block;margin-top:4px;color:#63728a;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:10px;height:10px;border-radius:50%;background:#22c55e;flex:none}

.chat{display:flex;flex-direction:column;height:100vh;background:#f6f8fc;min-width:0;position:relative}
.chat-head{height:82px;background:#fff;border-bottom:1px solid #dce6f3;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.chat-user{display:flex;align-items:center;gap:12px;min-width:0}
.chat-user img{width:50px;height:50px;border-radius:50%;object-fit:cover;background:#315df4;flex:none}
.chat-user b{display:block;font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-user span{display:block;margin-top:3px;color:#63728a;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.head-actions{display:flex;align-items:center;gap:10px}
.back-mobile{display:none}

.messages{flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;gap:10px;background:radial-gradient(circle at top left,rgba(49,93,244,.08),transparent 30%),#f6f8fc}
.empty{margin:auto;text-align:center;color:#63728a}
.empty i{font-size:46px;color:#315df4;margin-bottom:14px}
.empty h2{font-size:24px;color:#06142c;margin-bottom:6px}
.msg{max-width:64%;display:flex;flex-direction:column;gap:5px;position:relative}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.their{align-self:flex-start;align-items:flex-start}
.bubble-wrap{display:flex;align-items:flex-end;gap:6px}
.mine .bubble-wrap{flex-direction:row-reverse}
.bubble{border-radius:18px;padding:11px 13px;font-size:15px;line-height:1.45;box-shadow:0 8px 20px rgba(16,24,40,.06);word-break:break-word;min-width:48px}
.mine .bubble{background:#315df4;color:#fff;border-bottom-right-radius:5px}
.their .bubble{background:#fff;color:#07142f;border:1px solid #dce6f3;border-bottom-left-radius:5px}
.deleted .bubble{font-style:italic;color:#8a94a6;background:#eef3f9;border:1px solid #dce6f3}
.msg-img{max-width:300px;max-height:340px;border-radius:16px;object-fit:cover;display:block;cursor:pointer;box-shadow:0 12px 24px rgba(16,24,40,.12)}
.mine .msg-img{border:3px solid #315df4}
.their .msg-img{border:3px solid #fff}
.time{font-size:11px;color:#7a879c;padding:0 4px}
.edited{font-size:11px;color:#94a3b8;margin-left:4px}
.msg-more{width:28px;height:28px;border-radius:50%;background:#fff;color:#64748b;box-shadow:0 4px 12px rgba(16,24,40,.12);display:none}
.msg:hover .msg-more{display:grid;place-items:center}

.composer{min-height:82px;background:#fff;border-top:1px solid #dce6f3;padding:14px 18px;display:flex;align-items:flex-end;gap:12px}
.composer textarea{flex:1;min-height:52px;max-height:130px;resize:none;border:1px solid #d6e1ef;border-radius:18px;outline:none;padding:15px 16px;font-size:15px;line-height:1.4;background:#f6f9fd}
.send,.attach{width:52px;height:52px;border-radius:50%;font-size:18px;flex:none}
.send{background:#315df4;color:#fff}
.attach{background:#eef4ff;color:#315df4}
#imageInput{display:none}

.preview{display:none;position:absolute;left:18px;right:18px;bottom:92px;background:#fff;border:1px solid #dce6f3;border-radius:18px;padding:12px;box-shadow:0 16px 40px rgba(16,24,40,.14);align-items:center;gap:12px;z-index:20}
.preview img{width:74px;height:74px;border-radius:12px;object-fit:cover}
.preview b{font-size:14px}
.preview button{margin-left:auto;width:38px;height:38px;border-radius:12px;background:#fee2e2;color:#ef4444}

.menu{position:fixed;background:#fff;border:1px solid #dce6f3;border-radius:14px;box-shadow:0 18px 45px rgba(16,24,40,.18);padding:8px;display:none;z-index:100;min-width:190px}
.menu button{width:100%;height:42px;border-radius:10px;background:#fff;color:#07142f;text-align:left;padding:0 12px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:10px}
.menu button:hover{background:#eef4ff;color:#315df4}
.menu button.danger:hover{background:#fee2e2;color:#ef4444}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#07142f;color:#fff;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:800;display:none;z-index:120}

@media(max-width:860px){
.app{grid-template-columns:1fr; height: 100dvh;}
.sidebar{height:100dvh}

.chat{
  position:fixed;
  inset:0;
  z-index:40;
  transform:translateX(100%);
  transition:.25s ease;
  height: 100dvh !important;
  display: flex !important;
  flex-direction: column !important;
}
.chat.open{transform:translateX(0)}

.chat-head {
  height: 76px !important; 
  padding: 10px 14px !important;
  flex: none !important;
}
.back-mobile{
  display: grid !important;
  place-items: center;
  width: 38px;
  height: 38px;
  margin-right: 6px;
}
.chat-user b { font-size: 16px !important; }
.chat-user img { width: 42px !important; height: 42px !important; }

.msg{max-width:84%}

.messages {
  padding: 16px 12px; 
  flex: 1 !important;
  overflow-y: auto !important;
  height: auto !important;
}
.msg-img{max-width:245px;max-height:290px}

.composer {
  padding: 12px !important; 
  height: auto !important; 
  min-height: 72px !important;
  flex: none !important;
  background: #fff !important;
  margin-bottom: env(safe-area-inset-bottom) !important;
}
.attach,.send{width:46px !important; height:46px !important; font-size:16px !important;}
.composer textarea {
  padding: 12px 14px !important;
  min-height: 44px !important;
  font-size: 14px !important;
}

.preview{
  left: 10px !important;
  right: 10px !important;
  bottom: 84px !important;
  z-index: 50 !important;
}
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>
<div class="menu" id="chatMenu"></div>
<div class="menu" id="msgMenu"></div>

<div class="app">
  <aside class="sidebar">
    <div class="side-head">
      <div class="me">
        <img class="avatar" id="meAvatar" alt="Me">
        <div class="me-info">
          <b id="meName">CreatorHub User</b>
          <span id="meEmail">Loading...</span>
        </div>
      </div>
      <button class="icon-btn" onclick="loadUsers()"><i class="fa-solid fa-rotate"></i></button>
    </div>

    <div class="search">
      <input id="searchInput" placeholder="Search users..." oninput="renderUsers()">
    </div>

    <div class="users" id="usersList"></div>
  </aside>

  <main class="chat" id="chatPanel">
    <div class="chat-head">
      <div class="chat-user">
        <button class="icon-btn back-mobile" onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></button>
        <img id="chatAvatar" alt="User">
        <div>
          <b id="chatName">Select a user</b>
          <span id="chatEmail">Personal chat</span>
        </div>
      </div>

      <div class="head-actions">
        <button class="icon-btn" onclick="scrollBottom()"><i class="fa-solid fa-arrow-down"></i></button>
        <button class="icon-btn" onclick="openChatMenu(event)"><i class="fa-solid fa-ellipsis-vertical"></i></button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty">
        <i class="fa-solid fa-comments"></i>
        <h2>Select a user</h2>
        <p>Start a fast personal chat.</p>
      </div>
    </div>

    <div class="preview" id="previewBox">
      <img id="previewImg">
      <div>
        <b>Image ready</b>
        <div style="font-size:13px;color:#63728a">Tap send to share</div>
      </div>
      <button onclick="clearImage()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="composer">
      <button class="attach" onclick="document.getElementById('imageInput').click()"><i class="fa-solid fa-image"></i></button>
      <input id="imageInput" type="file" accept="image/*" onchange="selectImage(event)">
      <textarea id="messageInput" placeholder="Type a message..." onkeydown="handleEnter(event)"></textarea>
      <button class="send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, update, get, onValue, off, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfYB5sgL770yLShdaJVDaxjpZrQHx5JcU",
  authDomain: "creatorhub-chat.firebaseapp.com",
  databaseURL: "https://creatorhub-chat-default-rtdb.firebaseio.com",
  projectId: "creatorhub-chat",
  storageBucket: "creatorhub-chat.firebasestorage.app",
  messagingSenderId: "744130503143",
  appId: "1:744130503143:web:7603e8f316f16947255d42",
  measurementId: "G-3M6XXVNS24"
};

const USERS_API = "https://script.google.com/macros/s/AKfycbw9T3_1uvxU7O2ER5GRF5VLZ-8BNmxO5B5ZS_rPTkJk4ol5giC0-l9vM2AIULLbhRildg/exec";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let me = getLoggedUser();
let users = [];
let selectedUser = null;
let selectedFileBase64 = null;
let currentQuery = null;
let currentChatId = "";
let clearBefore = 0;
let messagesByKey = {};
let unreadCounts = {}; // 🔴 अनरीड मैसेज काउंट्स ट्रैक करने के लिए

function $(id){return document.getElementById(id)}

function toast(text){
  $("toast").innerText = text;
  $("toast").style.display = "block";
  setTimeout(() => $("toast").style.display = "none", 2200);
}

function safeEmail(email){
  return String(email || "").toLowerCase().replace(/[.#$[\]/]/g,"_");
}

function makeChatId(a,b){
  return [safeEmail(a),safeEmail(b)].sort().join("__");
}

function driveImage(url){
  if(!url) return "";
  const text = String(url);
  if(text.startsWith("data:image") || text.includes("ui-avatars.com") || text.includes("firebasestorage")) return text;
  let id = "";
  if(text.includes("uc?id=")) id = text.split("id=")[1].split("&")[0];
  else if(text.includes("open?id=")) id = text.split("id=")[1].split("&")[0];
  else if(text.includes("/d/")) id = text.split("/d/")[1].split("/")[0];
  else{
    const m = text.match(/[?&]id=([^&]+)/);
    if(m && m[1]) id = m[1];
  }
  return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w500" : text;
}

function avatarUrl(user){
  const img = user.profile_image || user.picture || user.image || "";
  if(img) return driveImage(img);
  return "https://ui-avatars.com/api/?name=" + encodeURIComponent(user.name || user.email || "User") + "&background=315df4&color=fff";
}

function readJson(key){
  try{return JSON.parse(localStorage.getItem(key) || "{}") || {}}catch(e){return {}}
}

function getLoggedUser(){
  const a = readJson("user");
  const b = readJson("currentUser");
  const c = readJson("creatorhub_user");
  const u = Object.keys(a).length ? a : (Object.keys(b).length ? b : c);

  const email = String(
    u.email ||
    (u.user && u.user.email) ||
    localStorage.getItem("user_email") ||
    localStorage.getItem("creatorhub_profile_email") ||
    ""
  ).toLowerCase().trim();

  const name =
    u.name ||
    (u.user && u.user.name) ||
    localStorage.getItem("user_name") ||
    email.split("@")[0] ||
    "CreatorHub User";

  const profile_image =
    u.profile_image ||
    u.profileImage ||
    u.picture ||
    (u.user && u.user.profile_image) ||
    localStorage.getItem("user_image") ||
    localStorage.getItem("profile_image") ||
    ""

  return {email,name,profile_image};
}

function initMe(){
  if(!me.email){
    toast("Login required");
    setTimeout(() => location.href = "login.html", 800);
    return;
  }

  $("meName").innerText = me.name;
  $("meEmail").innerText = me.email;
  $("meAvatar").src = avatarUrl(me);
}

window.loadUsers = async function(){
  $("usersList").innerHTML = `<div style="padding:18px;color:#63728a;font-weight:800">Loading users...</div>`;

  try{
    const res = await fetch(USERS_API + "?action=getUsers&_=" + Date.now());
    const data = await res.json();

    users = (data.users || data.data || [])
      .map(u => ({
        name:u.name || u.full_name || "CreatorHub User",
        email:String(u.email || "").toLowerCase().trim(),
        profile_image:u.profile_image || u.picture || u.image || ""
      }))
      .filter(u => u.email && u.email !== me.email);

    renderUsers();
  }catch(err){
    console.error(err);
    $("usersList").innerHTML = `<div style="padding:18px;color:#ef4444;font-weight:900">Users load failed</div>`;
  }
}

// 🔴 अनरीड मैसेज बैज के साथ री-रेंडर करने के लिए अपडेटेड फंक्शन
window.renderUsers = function(){
  const q = $("searchInput").value.toLowerCase().trim();

  const list = users.filter(u =>
    u.name.toLowerCase().includes(q) ||
    u.email.toLowerCase().includes(q)
  );

  if(!list.length){
    $("usersList").innerHTML = `<div style="padding:18px;color:#63728a;font-weight:800">No users found</div>`;
    return;
  }

  $("usersList").innerHTML = list.map(u => {
    const uSafeEmail = safeEmail(u.email);
    const count = unreadCounts[uSafeEmail] || 0;
    
    // अगर मैसेज बिना पढ़े हैं, तो लाल रंग का गोल बैज दिखेगा, वरना ऑनलाइन डॉट
    const badgeHtml = count > 0 
      ? `<span style="background:#ef4444; color:#fff; font-size:11px; font-weight:900; min-width:20px; height:20px; border-radius:50%; display:grid; place-items:center; padding:0 5px; flex:none;">${count}</span>`
      : `<span class="dot"></span>`;

    return `
      <div class="user ${selectedUser && selectedUser.email === u.email ? "active" : ""}" onclick='selectUser(${JSON.stringify(u).replace(/'/g,"&#039;")})'>
        <img src="${avatarUrl(u)}">
        <div class="uinfo">
          <b>${escapeHtml(u.name)}</b>
          <span>${escapeHtml(u.email)}</span>
        </div>
        ${badgeHtml}
      </div>
    `;
  }).join("");
}

// 🔴 अपना अनरीड काउंटर 0 (क्लियर) करने के लिए फंक्शन
async function clearMyUnreadCount(targetEmail) {
  if (!me.email || !targetEmail) return;
  const chatId = makeChatId(me.email, targetEmail);
  const mySafeEmail = safeEmail(me.email);
  await set(ref(db, "chats/" + chatId + "/unread/" + mySafeEmail), 0);
}

window.selectUser = async function(user){
  localStorage.setItem("active_chat_user", JSON.stringify(user));
  selectedUser = user;
  messagesByKey = {};
  currentChatId = makeChatId(me.email, selectedUser.email);

  $("chatPanel").classList.add("open");
  $("chatName").innerText = user.name;
  $("chatEmail").innerText = user.email;
  $("chatAvatar").src = avatarUrl(user);
  $("messages").innerHTML = `<div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><h2>Loading...</h2></div>`;

  renderUsers();
  await loadClearTime();
  listenMessages();
  
  // 🔴 चैट खोलते ही अपना काउंट जीरो करें
  clearMyUnreadCount(user.email);
}

async function loadClearTime(){
  const snap = await get(ref(db, "chats/" + currentChatId + "/cleared/" + safeEmail(me.email)));
  clearBefore = Number(snap.val() || 0);
}

function listenMessages(){
  if(currentQuery){
    off(currentQuery);
  }

  currentQuery = query(ref(db, "chats/" + currentChatId + "/messages"), limitToLast(120));

  onValue(currentQuery, snap => {
    messagesByKey = {};
    const raw = snap.val() || {};
    const rows = Object.keys(raw).map(key => {
      messagesByKey[key] = raw[key];
      return {key,...raw[key]};
    }).filter(msg => {
      if(Number(msg.created_at || 0) <= clearBefore) return false;
      if(msg.deleted_for && msg.deleted_for[safeEmail(me.email)]) return false;
      return true;
    }).sort((a,b) => Number(a.created_at || 0) - Number(b.created_at || 0));

    renderMessages(rows);
  });
}

function renderMessages(rows){
  if(!rows.length){
    $("messages").innerHTML = `<div class="empty"><i class="fa-solid fa-comments"></i><h2>No messages</h2><p>Say hello.</p></div>`;
    return;
  }

  $("messages").innerHTML = rows.map(msg => messageHtml(msg)).join("");
  scrollBottom();
}

function messageHtml(msg){
  const mine = msg.from === me.email;
  const deleted = msg.deleted === true || msg.type === "deleted";
  const cls = `msg ${mine ? "mine" : "their"} ${deleted ? "deleted" : ""}`;

  let content = "";

  if(deleted){
    content = `<div class="bubble">This message was deleted</div>`;
  }else if(msg.type === "image"){
    content = `<img class="msg-img" src="${escapeAttr(msg.image_url)}" onclick="window.open('${escapeAttr(msg.image_url)}','_blank')">`;
    if(msg.text) content += `<div class="bubble">${escapeHtml(msg.text)}</div>`;
  }else{
    content = `<div class="bubble">${escapeHtml(msg.text || "")}</div>`;
  }

  return `
    <div class="${cls}">
      <div class="bubble-wrap">
        ${content}
        <button class="msg-more" onclick="openMsgMenu(event,'${msg.key}')">
          <i class="fa-solid fa-angle-down"></i>
        </button>
      </div>
      <div class="time">
        ${formatTime(msg.created_at)}
        ${msg.edited ? '<span class="edited">edited</span>' : ''}
      </div>
    </div>
  `;
}

function formatTime(t){
  if(!t || typeof t !== "number") return "now";
  return new Date(t).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
}

window.scrollBottom = function(){
  const box = $("messages");
  setTimeout(() => box.scrollTop = box.scrollHeight, 40);
}

window.closeChat = function(){
  $("chatPanel").classList.remove("open");
}

window.handleEnter = function(e){
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

window.selectImage = function(e){
  const file = e.target.files[0];
  if(!file) return;

  if(!file.type.startsWith("image/")){
    toast("Select image only");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(evt) {
    const img = new Image();
    img.src = evt.target.result;
    
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const MAX_WIDTH = 500;
      const MAX_HEIGHT = 500;
      let width = img.width;
      let height = img.height;

      if (width > height) {
        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
      } else {
        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
      }

      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      
      selectedFileBase64 = canvas.toDataURL('image/jpeg', 0.5);
      
      $("previewImg").src = selectedFileBase64;
      $("previewBox").style.display = "flex";
    };
  };
  reader.readAsDataURL(file);
}

window.clearImage = function(){
  selectedFileBase64 = null;
  $("imageInput").value = "";
  $("previewBox").style.display = "none";
}

window.sendMessage = async function(){
  if(!selectedUser){
    toast("Select user first");
    return;
  }

  const text = $("messageInput").value.trim();
  if(!text && !selectedFileBase64) return;

  $("messageInput").value = "";

  try{
    let imageUrl = "";
    let type = "text";

    if(selectedFileBase64){
      type = "image";
      imageUrl = selectedFileBase64;
      clearImage();
    }

    const msgRef = push(ref(db, "chats/" + currentChatId + "/messages"));

    await set(msgRef,{
      id:msgRef.key,
      from:me.email,
      from_name:me.name,
      to:selectedUser.email,
      to_name:selectedUser.name,
      type:type,
      text:text,
      image_url:imageUrl,
      created_at:Date.now(),
      server_time:serverTimestamp(),
      edited:false,
      deleted:false
    });

    await updateChatIndex(type === "image" ? "Image" : text);

    // 🔴 रिसीवर (सामने वाले यूजर) के लिए अनरीड मैसेज काउंटर +1 बढ़ाएं
    try {
      const receiverSafeEmail = safeEmail(selectedUser.email);
      const unreadRef = ref(db, "chats/" + currentChatId + "/unread/" + receiverSafeEmail);
      
      const currentSnap = await get(unreadRef);
      const currentCount = Number(currentSnap.val() || 0);
      await set(unreadRef, currentCount + 1);
    } catch(err) {
      console.error("Error updating unread count:", err);
    }

  }catch(err){
    console.error(err);
    toast("Message send failed");
  }
}

async function updateChatIndex(lastMessage){
  await set(ref(db, "chatIndex/" + safeEmail(me.email) + "/" + safeEmail(selectedUser.email)),{
    with:selectedUser.email,
    name:selectedUser.name,
    profile_image:selectedUser.profile_image || "",
    last_message:lastMessage,
    updated_at:Date.now()
  });

  await set(ref(db, "chatIndex/" + safeEmail(selectedUser.email) + "/" + safeEmail(me.email)),{
    with:me.email,
    name:me.name,
    profile_image:me.profile_image || "",
    last_message:lastMessage,
    updated_at:Date.now()
  });
}

window.openChatMenu = function(e){
  e.stopPropagation();
  const menu = $("chatMenu");
  menu.innerHTML = `
    <button onclick="scrollBottom();closeMenus()"><i class="fa-solid fa-arrow-down"></i>Scroll bottom</button>
    <button onclick="loadUsers();closeMenus()"><i class="fa-solid fa-rotate"></i>Refresh users</button>
    <button onclick="clearChatForMe()" class="danger"><i class="fa-solid fa-broom"></i>Clear chat</button>
  `;
  placeMenu(menu,e.clientX,e.clientY);
}

window.openMsgMenu = function(e,key){
  e.stopPropagation();
  const msg = messagesByKey[key];
  if(!msg) return;

  const mine = msg.from === me.email;
  const deleted = msg.deleted === true || msg.type === "deleted";
  const menu = $("msgMenu");

  let html = "";
  if(mine && !deleted){
    html += `<button onclick="editMessage('${key}')"><i class="fa-solid fa-pen"></i>Edit message</button>`;
    html += `<button onclick="deleteForEveryone('${key}')" class="danger"><i class="fa-solid fa-trash"></i>Delete for everyone</button>`;
  }
  if(!deleted){
    html += `<button onclick="deleteForMe('${key}')" class="danger"><i class="fa-solid fa-eye-slash"></i>Delete for me</button>`;
  }
  if(!html){
    html = `<button onclick="closeMenus()"><i class="fa-solid fa-circle-info"></i>No actions</button>`;
  }

  menu.innerHTML = html;
  placeMenu(menu,e.clientX,e.clientY);
}

function placeMenu(menu,x,y){
  closeMenus();
  menu.style.display = "block";
  const w = 210;
  const h = 150;
  const left = Math.min(x, window.innerWidth - w - 10);
  const top = Math.min(y, window.innerHeight - h - 10);
  menu.style.left = left + "px";
  menu.style.top = top + "px";
}

window.closeMenus = function(){
  $("chatMenu").style.display = "none";
  $("msgMenu").style.display = "none";
}

window.editMessage = async function(key){
  const msg = messagesByKey[key];
  closeMenus();

  if(!msg || msg.from !== me.email || msg.deleted) return;

  const oldText = msg.text || "";
  const newText = prompt("Edit message", oldText);
  if(newText === null) return;

  const clean = newText.trim();
  if(!clean && msg.type !== "image"){
    toast("Message cannot be empty");
    return;
  }

  await update(ref(db, "chats/" + currentChatId + "/messages/" + key),{
    text:clean,
    edited:true,
    edited_at:Date.now()
  });

  await updateChatIndex(clean || "Image");
}

window.deleteForEveryone = async function(key){
  closeMenus();
  if(!confirm("Delete this message for everyone?")) return;

  await update(ref(db, "chats/" + currentChatId + "/messages/" + key),{
    type:"deleted",
    text:"",
    image_url:"",
    deleted:true,
    deleted_at:Date.now()
  });

  await updateChatIndex("Message deleted");
}

window.deleteForMe = async function(key){
  closeMenus();
  await update(ref(db, "chats/" + currentChatId + "/messages/" + key + "/deleted_for"),{
    [safeEmail(me.email)]:true
  });
  toast("Deleted for you");
}

window.clearChatForMe = async function(){
  closeMenus();
  if(!selectedUser){ toast("Select user first"); return; }
  if(!confirm("Clear this chat for you?")) return;

  const now = Date.now();
  await set(ref(db, "chats/" + currentChatId + "/cleared/" + safeEmail(me.email)),now);
  clearBefore = now;
  $("messages").innerHTML = `<div class="empty"><i class="fa-solid fa-comments"></i><h2>Chat cleared</h2><p>Only cleared for you.</p></div>`;
}

window.addEventListener("click",closeMenus);

function escapeHtml(str){
  return String(str || "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;"
  }[ch]));
}

function escapeAttr(str){
  return String(str || "").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

initMe();

// 🟢 यूज़र्स लोड होने के बाद अनरीड काउंट्स को रियल-टाइम लिसन (सुनने) का लॉजिक
loadUsers().then(() => {
  users.forEach(u => {
    const cId = makeChatId(me.email, u.email);
    const mySafeEmail = safeEmail(me.email);
    
    // रियल-टाइम लिसनर डेटाबेस से
    onValue(ref(db, "chats/" + cId + "/unread/" + mySafeEmail), snap => {
      const count = Number(snap.val() || 0);
      unreadCounts[safeEmail(u.email)] = count;
      
      // अगर उसी यूजर की चैट खुली है और उसने नया मैसेज भेजा, तो काउंट तुरंत क्लियर (0) कर दें
      if (selectedUser && selectedUser.email === u.email && count > 0) {
        clearMyUnreadCount(u.email);
      }
      
      renderUsers(); // लिस्ट को री-रेंडर करके लाल नंबर शो करें
    });
  });

  try {
    const lastUser = localStorage.getItem("active_chat_user");
    if (lastUser) {
      const parsedUser = JSON.parse(lastUser);
      const stillExists = users.find(u => u.email === parsedUser.email);
      if (stillExists) {
        selectUser(stillExists);
      }
    }
  } catch(e) {
    console.error("Error auto-selecting last user:", e);
  }
});
</script>
