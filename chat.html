<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorHub Link & Chat Room</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .chat-app-wrapper { display: flex; width: 95vw; max-width: 1200px; height: 90vh; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* Left Panel - Users List */
        .sidebar-users { width: 35%; background: #ffffff; border-right: 1px solid #e3e3e3; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #0056b3; color: white; }
        .user-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .user-card { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: background 0.2s; }
        .user-card:hover { background: #f5f6f7; }
        .user-card.active-chat { background: #e9ecef; }
        .user-info { display: flex; flex-direction: column; gap: 4px; }
        .user-name { font-weight: 600; color: #333; font-size: 1rem; }
        .user-email { font-size: 0.8rem; color: #777; }
        
        /* Status Badges */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .status-dot.offline { background: #6c757d; }

        /* Right Panel - Chat Area */
        .chat-main-window { width: 65%; background: #efeae2; display: flex; flex-direction: column; }
        .chat-window-header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #e0e0e0; font-weight: bold; font-size: 1.1rem; color: #333; }
        .chat-messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Chat Bubbles */
        .msg-row { display: flex; width: 100%; }
        .msg-row.sent { justify-content: flex-end; }
        .msg-row.received { justify-content: flex-start; }
        .bubble { max-width: 65%; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent .bubble { background: #d9fdd3; color: #111b21; border-top-right-radius: 0; }
        .received .bubble { background: #ffffff; color: #111b21; border-top-left-radius: 0; }
        .message-img { max-width: 100%; max-height: 200px; border-radius: 6px; display: block; margin-top: 5px; }

        /* Input Deck */
        .chat-input-bar { background: #f0f0f0; padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #e0e0e0; }
        .main-input { flex: 1; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; outline: none; font-size: 0.95rem; }
        .btn-attach { background: white; border: 1px solid #ccc; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; }
        .btn-send { background: #0056b3; color: white; border: none; padding: 11px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .no-chat-selected { display: flex; justify-content: center; align-items: center; flex: 1; color: #777; font-size: 1.1rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="chat-app-wrapper">
    <div class="sidebar-users">
        <div class="sidebar-header">
            <h3>CreatorHub Active Users</h3>
            <div style="font-size: 0.8rem; opacity: 0.9; margin-top: 5px;" id="myProfileBadge">Syncing Profile...</div>
        </div>
        <div class="user-list-container" id="userListRender">
            </div>
    </div>

    <div class="chat-main-window" id="chatMainWindow">
        <div class="no-chat-selected" id="blankState">👈 Select a user from the list to start a private chat</div>
        
        <div id="activeChatState" style="display: none; flex-direction: column; flex: 1; height: 100%;">
            <div class="chat-window-header" id="chatHeaderName">Chatting with...</div>
            <div class="chat-messages-box" id="messagesRenderBox"></div>
            
            <div class="chat-input-bar">
                <input type="file" id="imageInputHidden" accept="image/*" style="display: none;" onchange="uploadPrivateImage(this)">
                <button class="btn-attach" onclick="document.getElementById('imageInputHidden').click()">🖼️</button>
                <input type="text" id="chatInputField" class="main-input" placeholder="Type a private message..." onkeypress="if(event.key==='Enter') sendPrivateText()">
                <button class="btn-send" onclick="sendPrivateText()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw9T3_1uvxU7O2ER5GRF5VLZ-8BNmxO5B5ZS_rPTkJk4ol5giC0-l9vM2AIULLbhRildg/exec";
    
    // Auto sync system with login localstorage JSON data
    const mySession = JSON.parse(localStorage.getItem("user_login_data")) || {
        name: "Ayush Prajapati", 
        email: "ayush@gmail.com"
    };

    document.getElementById("myProfileBadge").innerText = `Logged in as: ${mySession.name}`;

    let selectedUserEmail = null;
    let serverCacheData = { users: {}, messages: [] };

    // 1. Sync System Data Stream & Track Heartbeat
    async function syncDatabase() {
        try {
            // Send regular heartbeat pulse to mark current user ONLINE
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ name: mySession.name, email: mySession.email, action: "heartbeat" })
            });

            // Get complete logs
            const response = await fetch(API_URL);
            serverCacheData = await response.json();

            renderUsersList();
            if (selectedUserEmail) {
                renderPrivateMessages();
            }
        } catch (e) {
            console.error("Sync Failure:", e);
        }
    }

    // 2. Render Users list with Online/Offline calculation (active if active within last 10 seconds)
    function renderUsersList() {
        const container = document.getElementById("userListRender");
        container.innerHTML = "";
        const currentTime = new Date().getTime();

        Object.keys(serverCacheData.users).forEach(email => {
            if (email === mySession.email) return; // Skip self representation
            
            const user = serverCacheData.users[email];
            const isOnline = (currentTime - user.lastSeen) < 12000; // 12 seconds buffer Window

            const card = document.createElement("div");
            card.className = `user-card ${selectedUserEmail === email ? 'active-chat' : ''}`;
            card.onclick = () => selectActiveTargetChat(email, user.name);

            card.innerHTML = `
                <div class="user-info">
                    <span class="user-name">${user.name}</span>
                    <span class="user-email">${user.email}</span>
                </div>
                <span class="status-dot ${isOnline ? 'online' : 'offline'}" title="${isOnline ? 'Online' : 'Offline'}"></span>
            `;
            container.appendChild(card);
        });
    }

    // 3. Select user chat target
    function selectActiveTargetChat(email, name) {
        selectedUserEmail = email;
        document.getElementById("blankState").style.display = "none";
        document.getElementById("activeChatState").style.display = "flex";
        document.getElementById("chatHeaderName").innerText = `Chat with ${name}`;
        renderUsersList();
        renderPrivateMessages();
    }

    // 4. Render Private Messages filtering Sender & Receiver keys
    function renderPrivateMessages() {
        const box = document.getElementById("messagesRenderBox");
        box.innerHTML = "";

        // Filter messages belonging only to the selected private chat thread
        const currentThread = serverCacheData.messages.filter(msg => 
            (msg.sender === mySession.email && msg.receiver === selectedUserEmail) ||
            (msg.sender === selectedUserEmail && msg.receiver === mySession.email)
        );

        currentThread.forEach(msg => {
            const isMe = msg.sender === mySession.email;
            const row = document.createElement("div");
            row.className = `msg-row ${isMe ? 'sent' : 'received'}`;

            const bubble = document.createElement("div");
            bubble.className = "bubble";

            if (msg.type === "image") {
                bubble.innerHTML = `<a href="${msg.content}" target="_blank"><img src="${msg.content}" class="message-img"></a>`;
            } else {
                bubble.innerHTML = `<span>${msg.content}</span>`;
            }

            row.appendChild(bubble);
            box.appendChild(row);
        });
        box.scrollTop = box.scrollHeight;
    }

    // 5. Send Private Text
    async function sendPrivateText() {
        const input = document.getElementById("chatInputField");
        const val = input.value.trim();
        if (!val || !selectedUserEmail) return;
        input.value = "";

        await pushTransaction({
            action: "send",
            name: mySession.name,
            email: mySession.email,
            receiver: selectedUserEmail,
            content: val,
            type: "text"
        });
    }

    // 6. Send Private Image via Base64 stream
    function uploadPrivateImage(element) {
        const file = element.files[0];
        if (!file || !selectedUserEmail) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            await pushTransaction({
                action: "send",
                name: mySession.name,
                email: mySession.email,
                receiver: selectedUserEmail,
                type: "image",
                imageRaw: e.target.result,
                fileName: file.name,
                mimeType: file.type
            });
            element.value = "";
        };
        reader.readAsDataURL(file);
    }

    async function pushTransaction(payload) {
        await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        syncDatabase();
    }

    // Run interval sync loop for responsive experience
    setInterval(syncDatabase, 4000);
    window.onload = syncDatabase;
</script>
</body>
</html>
