<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Premium Request</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
max-width:600px;
margin:auto;
padding:30px 20px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px black;
}

h2{
text-align:center;
color:#22c55e;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}

.planBox{
background:#020617;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

small{
color:#9ca3af;
}

</style>

</head>

<body>


<div class="topbar">

<div class="back"
onclick="location.href='premium.html'">

⬅

</div>

<div class="title">

Premium Subscription

</div>

</div>



<div class="container">

<div class="card">

<h2>Complete Subscription</h2>


<div class="planBox">

Selected Plan:
<b id="plan"></b>

<br>

Price:
<b id="price"></b>

</div>


<input id="email"
placeholder="Your Email">

<p>Upload Payment Screenshot</p>

<input type="file"
accept="image/*"
onchange="previewImage(event)">

<img id="preview"
class="preview">


<button onclick="submitRequest()">

Submit Request

</button>

<br><br>

<small>

After payment upload screenshot.  
Admin will verify and unlock premium.

</small>

</div>

</div>



<script>

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

let user = JSON.parse(localStorage.getItem("user"));

if(user){

document.getElementById("email").value=user.email;

}

let plan=localStorage.getItem("premiumPlan");
let price=localStorage.getItem("premiumPrice");

document.getElementById("plan").innerText=plan;
document.getElementById("price").innerText="₹ "+price;


let screenshot="";

function previewImage(e){

let file=e.target.files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(event){

screenshot=event.target.result;

preview.src=screenshot;

preview.style.display="block";

};

reader.readAsDataURL(file);

}


async function getDB(db){

let r=await fetch(API+"?db="+db+"&t="+Date.now());

return await r.json();

}


async function saveDB(db,data){

await fetch(API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

db:db,
data:data

})

});

}


async function submitRequest(){

let email=document.getElementById("email").value;

if(!email || !screenshot){

alert("Fill All Fields");

return;

}

let requests=await getDB("premiumRequests")||[];

requests.push({

id:Date.now(),

email:email,

plan:plan,

price:price,

screenshot:screenshot,

status:"pending",

date:new Date().toLocaleString()

});

await saveDB("premiumRequests",requests);

alert("Request Submitted ✅");

location.href="dashboard.html";

}

</script>


</body>
</html>
