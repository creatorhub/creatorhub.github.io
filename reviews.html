<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>CreatorHub Reviews</title><style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
animation:fadePage .6s ease;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #1f2937;
background:#020617;
position:sticky;
top:0;
}

.backBtn{
background:#1f2937;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

.backBtn:hover{
background:#374151;
}

.dashBtn{
background:linear-gradient(90deg,#22c55e,#4ade80);
padding:8px 14px;
border-radius:8px;
color:black;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */

.container{
padding:25px;
max-width:700px;
margin:auto;
}

/* CARD */

.card{

background:linear-gradient(145deg,#111827,#020617);

padding:22px;

border-radius:16px;

border:1px solid #1f2937;

box-shadow:0 10px 25px rgba(0,0,0,0.6);

transition:.2s;

}

.card:hover{

box-shadow:0 0 10px rgba(34,197,94,.4);

}

/* INPUT */

textarea{

width:100%;

height:120px;

border:none;

border-radius:12px;

margin-top:12px;

padding:12px;

background:#020617;

color:white;

border:1px solid #1f2937;

}

select{

width:100%;

padding:12px;

margin-top:12px;

border-radius:10px;

border:none;

background:#020617;

color:white;

border:1px solid #1f2937;

}

/* BUTTON */

.submitBtn{

width:100%;

padding:14px;

margin-top:12px;

border:none;

background:linear-gradient(90deg,#22c55e,#4ade80);

border-radius:12px;

cursor:pointer;

font-weight:bold;

color:black;

transition:.2s;

}

.submitBtn:hover{

transform:translateY(-2px);

box-shadow:0 0 10px rgba(34,197,94,.5);

}

/* REVIEWS */

.review{

background:#020617;

padding:14px;

border-radius:10px;

margin-top:12px;

line-height:22px;

border:1px solid #1f2937;

animation:fadeUp .4s ease;

}

/* ANIMATIONS */

@keyframes fadePage{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style></head><body><div class="header"><button class="backBtn" onclick="history.back()">⬅</button>

<b>⭐ Reviews</b>

<a href="dashboard.html" class="dashBtn">
Dashboard
</a></div><div class="container"><div class="card"><h2>Leave Review ⭐</h2><select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select><textarea id="reviewText"
placeholder="Write your review..."></textarea><button class="submitBtn"
id="submitBtn"
onclick="submitReview()">
Submit Review
</button>

<h3>My Reviews</h3><div id="reviewList">
Loading...
</div></div></div><script>

const API =
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

let user =
JSON.parse(localStorage.getItem("user") || "null");

if(!user){

alert("Login First");
location.href="login.html";

}

/* PRODUCT */

let reviewProduct =
localStorage.getItem("reviewProduct");

if(!reviewProduct){

alert("No Product Selected");
location.href="index.html";

}


/* DATABASE */

async function getDB(db){

try{

let r =
await fetch(API+"?db="+db+"&t="+Date.now());

let data =
await r.json();

return Array.isArray(data)?data:[];

}catch{

return[];

}

}

async function saveDB(db,data){

await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
db:db,
data:data
})

});

}


/* SUBMIT REVIEW */

async function submitReview(){

let btn =
document.getElementById("submitBtn");

let text =
document.getElementById("reviewText").value.trim();

let rating =
Number(document.getElementById("rating").value);

if(!text){

alert("Write Review");
return;

}

btn.disabled=true;
btn.innerText="Submitting...";

/* PURCHASE CHECK */

let orders =
await getDB("orders");

let purchased =
orders.find(o=>

o.buyer===user.email &&
String(o.productId)===String(reviewProduct) &&
o.payment==="paid"

);

if(!purchased){

alert("Only buyers can review");

btn.disabled=false;
btn.innerText="Submit Review";

return;

}

/* GET REVIEWS */

let reviews =
await getDB("reviews");

/* DUPLICATE STOP */

let already =
reviews.find(r=>

r.user===user.email &&
String(r.productId)===String(reviewProduct)

);

if(already){

alert("You already reviewed");

btn.disabled=false;
btn.innerText="Submit Review";

return;

}

/* SAVE REVIEW */

reviews.push({

user:user.email,
productId:reviewProduct,
rating:rating,
text:text,
date:new Date().toLocaleString()

});

await saveDB("reviews",reviews);

alert("Review Submitted ✅");

document.getElementById("reviewText").value="";

btn.disabled=false;
btn.innerText="Submit Review";

loadReviews();

}


/* LOAD REVIEWS */

async function loadReviews(){

let reviews =
await getDB("reviews");

let my =
reviews.filter(r=>

r.user===user.email &&
String(r.productId)===String(reviewProduct)

);

let box =
document.getElementById("reviewList");

if(!my.length){

box.innerHTML="No Reviews Yet";
return;

}

box.innerHTML="";

my.forEach(r=>{

let stars="";

for(let i=1;i<=r.rating;i++){
stars+="⭐";
}

box.innerHTML+=`

<div class="review">

<b>${stars}</b>

<br>

${r.text}

<br>

<small>
${r.date}
</small>

</div>

`;

});

}

loadReviews();

</script></body>
</html>
