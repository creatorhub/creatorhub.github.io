<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Wallet Control</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
animation:fadePage .6s ease;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
background:#020617;
position:sticky;
top:0;
z-index:10;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
transition:.2s;
}

.back:hover{
transform:scale(1.1);
}

.title{
font-size:20px;
font-weight:bold;
color:var(--accent);
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:linear-gradient(145deg,#111827,#020617);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid #1f2937;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
animation:fadeUp .6s ease;
}

/* ROW */

.row{
background:#020617;
padding:16px;
border-radius:10px;
margin-top:12px;
border:1px solid #1f2937;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
transition:.2s;
}

.row:hover{
transform:scale(1.01);
box-shadow:0 0 10px rgba(34,197,94,.3);
}

/* EMAIL */

.email{
font-size:14px;
opacity:.9;
}

/* INPUT */

input{
width:140px;
padding:8px;
border-radius:8px;
border:1px solid #1f2937;
background:#111827;
color:white;
margin-top:6px;
}

/* BUTTON */

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-left:10px;
font-weight:bold;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.save{
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
}

/* LOADING */

.loading{
opacity:.6;
text-align:center;
padding:20px;
}

/* ANIMATION */

@keyframes fadePage{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="header">
<div class="back" onclick="location.href='admin.html'">⬅</div>
<div class="title">💰 Wallet Control Panel</div>
</div>

<div class="container">

<div class="card">

<h2>All User Wallets</h2>

<div id="walletList" class="loading">
Loading wallets...
</div>

</div>

</div>

<script>

/* ADMIN EMAIL */

const ADMIN="ayushprajpati6@gmail.com"

/* API */

const API="https://script.google.com/macros/s/AKfycbw-FgvS0s-j-PmswWt9Ln_ulW3QKIhVWGV_XhlEvF4yhpdktJ1DKQvV9lhUCjmz88_r/exec"
  
/* LOGIN CHECK */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email || user.email!==ADMIN){

alert("Admin Only")

location.href="index.html"

}

/* SAFE HTML */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

/* GET DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* LOAD WALLETS */

async function loadWallets(){

let box=document.getElementById("walletList")

box.innerHTML="Loading..."

let wallets=await getDB("wallets")

if(wallets.length===0){

box.innerHTML="<div class='loading'>No Wallets Found</div>"

return

}

box.innerHTML=""

wallets.reverse().forEach(w=>{

let balance=Number(w.balance||0)

let safeId=w.email.replace(/[^a-zA-Z0-9]/g,"_")

box.innerHTML+=`

<div class="row">

<div>

<div class="email">
${escapeHTML(w.email)}
</div>

Balance ₹

<input
type="number"
value="${balance}"
id="bal_${safeId}"
>

</div>

<div>

<button
class="save"
onclick="updateBalance('${w.email}','${safeId}',this)"
>

Save

</button>

</div>

</div>

`

})

}

/* UPDATE BALANCE */

async function updateBalance(email,id,btn){

let wallets=await getDB("wallets")

let input=document.getElementById("bal_"+id)

let newAmount=Number(input.value)||0

if(newAmount<0){

alert("Balance cannot be negative")

return

}

if(!confirm("Update wallet balance?")) return

btn.disabled=true
btn.innerText="Saving..."

wallets=wallets.map(w=>{

if(w.email===email){

w.balance=newAmount

}

return w

})

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"update_wallet",
wallets:wallets
})
})

btn.innerText="Saved ✅"

setTimeout(()=>{

btn.disabled=false
btn.innerText="Save"

},1500)

}

/* INIT */

loadWallets()

</script>

</body>
</html>
