<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>CreatorHub Wallet Control</title><style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#020617;
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:linear-gradient(145deg,#111827,#020617);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid #1f2937;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* ROW */

.row{
background:#020617;
padding:16px;
border-radius:10px;
margin-top:12px;
border:1px solid #1f2937;
}

/* INPUT */

input{
width:140px;
padding:8px;
border-radius:8px;
border:1px solid #1f2937;
background:#111827;
color:white;
margin-top:6px;
}

/* BUTTON */

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

.save{
background:linear-gradient(90deg,#22c55e,#4ade80);
color:black;
}

</style></head><body><div class="header"><div class="back" onclick="location.href='admin.html'">⬅</div><div class="title">💰 Wallet Control Panel</div></div><div class="container"><div class="card"><h2>All User Wallets</h2><div id="walletList">Loading...</div></div></div><script>

/* ADMIN EMAIL */

const ADMIN="ayushprajpati6@gmail.com"

/* MAIN BACKEND API */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

/* LOGIN CHECK */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email || user.email!==ADMIN){

alert("Admin Only")

location.href="index.html"

}

/* SAFE HTML */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

/* GET DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}

/* LOAD WALLETS */

async function loadWallets(){

let box=document.getElementById("walletList")

box.innerHTML="Loading..."

let wallets=await getDB("wallets")

if(wallets.length===0){

box.innerHTML="No Wallets Found"

return

}

box.innerHTML=""

wallets.reverse().forEach(w=>{

let balance=Number(w.balance||0)

let safeId=w.email.replace(/[^a-zA-Z0-9]/g,"_")

box.innerHTML+=`

<div class="row">

<b>Email:</b> ${escapeHTML(w.email)}

<br><br>

Balance ₹

<input
type="number"
value="${balance}"
id="bal_${safeId}"
>

<button
class="save"
onclick="updateBalance('${w.email}','${safeId}',this)"
>

Save

</button>

</div>

`

})

}

/* UPDATE BALANCE */

async function updateBalance(email,id,btn){

let wallets=await getDB("wallets")

let input=document.getElementById("bal_"+id)

let newAmount=Number(input.value)||0

if(newAmount<0){

alert("Balance cannot be negative")

return

}

if(!confirm("Update wallet balance?")) return

btn.disabled=true
btn.innerText="Saving..."

wallets=wallets.map(w=>{

if(w.email===email){

w.balance=newAmount

}

return w

})

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"update_wallet",
wallets:wallets
})
})

btn.innerText="Saved"

setTimeout(()=>{

btn.disabled=false
btn.innerText="Save"

},1500)

}

/* INIT */

loadWallets()

</script></body>
</html>
