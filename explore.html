<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Explore • CreatorHub
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(
180deg,
#020617,
#07111f
);
color:white;
overflow-x:hidden;
min-height:100vh;
}

:root{
--green:#22c55e;
--card:#0f172a;
--border:#1e293b;
}

/* =========================================================
TOPBAR
========================================================= */

.topbar{
position:sticky;
top:0;
z-index:999;
background:rgba(2,6,23,.92);
backdrop-filter:blur(18px);
padding:18px;
border-bottom:
1px solid rgba(255,255,255,.05);
}

.top-flex{
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
}

.logo{
font-size:32px;
font-weight:900;
}

.logo span{
color:#4ade80;
}

.profile{
width:48px;
height:48px;
border-radius:50%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
border:1px solid rgba(255,255,255,.06);
}

/* =========================================================
SEARCH
========================================================= */

.search-wrap{
margin-top:18px;
display:flex;
gap:12px;
}

.search{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:18px;
background:#0f172a;
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.06);
}

.search-btn{
padding:0 22px;
border:none;
border-radius:18px;
background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);
color:white;
font-weight:bold;
cursor:pointer;
}

/* =========================================================
BANNER
========================================================= */

.banner{
margin:22px 18px 0;
padding:30px;
border-radius:32px;
background:
linear-gradient(
135deg,
#052e16,
#064e3b,
#16a34a
);
position:relative;
overflow:hidden;
}

.banner h1{
font-size:42px;
font-weight:900;
line-height:1.2;
}

.banner p{
margin-top:16px;
line-height:1.9;
max-width:700px;
opacity:.92;
}

.banner-btn{
margin-top:25px;
padding:16px 24px;
border:none;
border-radius:18px;
background:white;
color:#16a34a;
font-weight:800;
font-size:16px;
cursor:pointer;
}

/* =========================================================
TABS
========================================================= */

.tabs{
display:flex;
gap:14px;
overflow:auto;
padding:25px 18px 5px;
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab{
padding:14px 20px;
border-radius:18px;
background:#0f172a;
border:1px solid rgba(255,255,255,.05);
white-space:nowrap;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.tab.active{
background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);
}

/* =========================================================
GRID
========================================================= */

.grid{
padding:20px 18px 120px;
display:grid;
grid-template-columns:
repeat(4,1fr);
gap:20px;
}

/* =========================================================
CARD
========================================================= */

.card{
background:#0f172a;
border-radius:28px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
transition:.35s;
position:relative;
}

.card:hover{
transform:translateY(-8px);
}

.cover{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
background:#081225;
}

.card-body{
padding:18px;
}

.book-title{
font-size:18px;
font-weight:800;
line-height:1.4;
}

.author{
margin-top:8px;
opacity:.72;
font-size:14px;
}

.meta{
display:flex;
justify-content:space-between;
margin-top:14px;
font-size:14px;
opacity:.82;
}

.price{
margin-top:16px;
font-size:24px;
font-weight:900;
color:#4ade80;
}

.open-btn{
width:100%;
margin-top:18px;
padding:15px;
border:none;
border-radius:16px;
background:
linear-gradient(
90deg,
#16a34a,
#4ade80
);
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.badge{
position:absolute;
top:14px;
left:14px;
padding:8px 14px;
border-radius:30px;
font-size:12px;
font-weight:bold;
background:rgba(0,0,0,.55);
backdrop-filter:blur(10px);
}

/* =========================================================
LOADER
========================================================= */

.loader{
grid-column:1/-1;
padding:80px;
text-align:center;
}

.spin{
width:70px;
height:70px;
border-radius:50%;
border:5px solid rgba(255,255,255,.08);
border-top:5px solid #22c55e;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

/* =========================================================
EMPTY
========================================================= */

.empty{
grid-column:1/-1;
padding:100px 20px;
text-align:center;
font-size:24px;
opacity:.7;
}

/* =========================================================
BOTTOM NAV
========================================================= */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:78px;
background:
rgba(7,17,31,.95);
display:flex;
justify-content:space-around;
align-items:center;
border-top:
1px solid rgba(255,255,255,.05);
backdrop-filter:blur(20px);
z-index:999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:5px;
font-size:11px;
font-weight:600;
color:#94a3b8;
width:70px;
height:60px;
border-radius:18px;
cursor:pointer;
transition:.3s;
}

.nav-item.active{
background:
rgba(34,197,94,.14);
color:#4ade80;
}

.nav-icon{
font-size:24px;
}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:1200px){

.grid{
grid-template-columns:
repeat(3,1fr);
}

}

@media(max-width:850px){

.grid{
grid-template-columns:
repeat(2,1fr);
}

.banner h1{
font-size:32px;
}

}

@media(max-width:520px){

.grid{
grid-template-columns:1fr;
}

.banner{
padding:24px;
}

.banner h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- ===================================================== -->
<!-- TOPBAR -->
<!-- ===================================================== -->

<div class="topbar">

<div class="top-flex">

<div class="logo">
Creator<span>Hub</span>
</div>

<div class="profile">
👤
</div>

</div>

<div class="search-wrap">

<input
type="text"
id="search"
class="search"
placeholder="Search ebooks, authors, categories..."
>

<button
class="search-btn"
onclick="searchBooks()">

Search

</button>

</div>

</div>

<!-- ===================================================== -->
<!-- HERO -->
<!-- ===================================================== -->

<div class="banner">

<h1>
Explore Premium AI Ebooks
</h1>

<p>

Discover trending digital books,
professional guides, AI generated
content and premium knowledge
resources from creators worldwide.

</p>

<button
class="banner-btn"
onclick="location.href='upload.html'">

Start Publishing

</button>

</div>

<!-- ===================================================== -->
<!-- TABS -->
<!-- ===================================================== -->

<div class="tabs">

<div class="tab active"
onclick="filterBooks('all',event)">
All
</div>

<div class="tab"
onclick="filterBooks('trending',event)">
Trending
</div>

<div class="tab"
onclick="filterBooks('free',event)">
Free
</div>

<div class="tab"
onclick="filterBooks('premium',event)">
Premium
</div>

<div class="tab"
onclick="filterBooks('business',event)">
Business
</div>

<div class="tab"
onclick="filterBooks('ai',event)">
AI
</div>

</div>

<!-- ===================================================== -->
<!-- GRID -->
<!-- ===================================================== -->

<div
id="grid"
class="grid">

<div class="loader">

<div class="spin"></div>

<p style="margin-top:20px;">
Loading Ebooks...
</p>

</div>

</div>

<!-- ===================================================== -->
<!-- NAV -->
<!-- ===================================================== -->

<div class="bottom-nav">

<div class="nav-item"
onclick="location.href='index.html'">

<div class="nav-icon">
🏠
</div>

<div>
Home
</div>

</div>

<div class="nav-item active">

<div class="nav-icon">
🔍
</div>

<div>
Explore
</div>

</div>

<div class="nav-item"
onclick="location.href='library.html'">

<div class="nav-icon">
📚
</div>

<div>
Library
</div>

</div>

<div class="nav-item"
onclick="location.href='upload.html'">

<div class="nav-icon">
⬆️
</div>

<div>
Upload
</div>

</div>

<div class="nav-item"
onclick="location.href='profile.html'">

<div class="nav-icon">
👤
</div>

<div>
Profile
</div>

</div>

</div>

<script>

/* =========================================================
API
========================================================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxIe0DzgOp0CNE8t8V92Llce6gBgCozDQmqlGdr8p2tmSuADOSYpK6z6dX3kuHaC-lM/exec"

/* =========================================================
GLOBAL
========================================================= */

let ALL_BOOKS = []

/* =========================================================
DRIVE IMAGE
========================================================= */

function driveImage(link){

if(!link){

return "https://picsum.photos/500"

}

let id = ""

if(link.includes("id=")){

id =
link.split("id=")[1]
.split("&")[0]

}

else if(link.includes("/d/")){

id =
link.split("/d/")[1]
.split("/")[0]

}

else{

id = link

}

return `https://drive.google.com/thumbnail?id=${id}&sz=w1000&t=${Date.now()}`

}

/* =========================================================
LOAD BOOKS
========================================================= */

async function loadBooks(){

try{

let res =
await fetch(
PRODUCT_API +
"?action=products&t=" +
Date.now()
)

let data =
await res.json()

ALL_BOOKS =
data.products || []

renderBooks(ALL_BOOKS)

}catch(err){

console.log(err)

document.getElementById("grid")
.innerHTML = `

<div class="empty">

Failed To Load Ebooks

</div>

`

}

}

loadBooks()

/* =========================================================
RENDER
========================================================= */

function renderBooks(books){

let grid =
document.getElementById("grid")

grid.innerHTML = ""

if(books.length === 0){

grid.innerHTML = `

<div class="empty">

No Ebooks Found

</div>

`

return

}

books.forEach(book=>{

let image =
driveImage(
book.front_cover
)

grid.innerHTML += `

<div class="card">

<div class="badge">
${book.category || "Ebook"}
</div>

<img
class="cover"
loading="lazy"
src="${image}"
onerror="this.src='https://picsum.photos/500'"
>

<div class="card-body">

<div class="book-title">

${book.title || "Untitled"}

</div>

<div class="author">

by ${book.author || "Unknown"}

</div>

<div class="meta">

<div>
⭐ ${book.rating || "0.0"}
</div>

<div>
🔥 ${book.trending || 0}
</div>

</div>

<div class="price">

₹${book.price || 0}

</div>

<button
class="open-btn"
onclick="goToPayment('${book.id}')"

🛒 Buy Ebook

</button>

</div>

</div>

`

})

}

/* =========================================================
OPEN
========================================================= */

function openBook(id){

let book =
ALL_BOOKS.find(b =>

String(b.id) ===
String(id)

)

if(!book){

alert("Book not found")
return

}

localStorage.setItem(
"viewerBook",
JSON.stringify(book)
)

localStorage.setItem(
"viewerPDF",
book.pdf_url || ""
)

location.href =
"viewer.html?id=" + id

}

/* =========================================================
SEARCH
========================================================= */

function searchBooks(){

let q =
document.getElementById("search")
.value
.toLowerCase()
.trim()

if(!q){

renderBooks(ALL_BOOKS)
return

}

let filtered =
ALL_BOOKS.filter(book => {

return (

String(book.title)
.toLowerCase()
.includes(q)

||

String(book.author)
.toLowerCase()
.includes(q)

||

String(book.category)
.toLowerCase()
.includes(q)

||

String(book.tags)
.toLowerCase()
.includes(q)

)

})

renderBooks(filtered)

}

/* =========================================================
FILTER
========================================================= */

function filterBooks(type,event){

document
.querySelectorAll(".tab")
.forEach(tab =>

tab.classList.remove("active")

)

event.target
.classList.add("active")

let books = []

if(type === "all"){

books = ALL_BOOKS

}

else if(type === "trending"){

books =
ALL_BOOKS.filter(book =>

Number(book.trending || 0) > 0

)

}

else if(type === "free"){

books =
ALL_BOOKS.filter(book =>

Number(book.price || 0) <= 0

)

}

else if(type === "premium"){

books =
ALL_BOOKS.filter(book =>

Number(book.price || 0) > 0

)

}

else{

books =
ALL_BOOKS.filter(book =>

String(book.category)
.toLowerCase()
.includes(type)

)

}

renderBooks(books)

}

/* =========================================================
PAYMENT
========================================================= */

function goToPayment(id){

let book =
ALL_BOOKS.find(b =>

String(b.id) ===
String(id)

)

if(!book){

alert("Book not found")
return

}

/* SAVE BOOK */

localStorage.setItem(
"paymentBook",
JSON.stringify(book)
)

/* OPEN PAYMENT */

location.href =
"payment.html?id=" + id

}

</script>

</body>
  </html>
