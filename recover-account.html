<button onclick="recoverAccount()">
Recover My Account
</button>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

async function recoverAccount(){

let user =
JSON.parse(localStorage.getItem("user") || "null");

if(!user || !user.email){

alert("Login required");

location.href="login.html";

return;

}

if(!confirm("Recover your account?")) return;

try{

let res = await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"recover_account",
email:user.email

})

});

let data = await res.json();

if(data.success){

alert("Account recovered successfully ✅");

location.href="dashboard.html";

}else{

alert(data.message || "Recovery failed");

}

}catch(e){

console.log(e);

alert("Server error ❌");

}

}

</script>
