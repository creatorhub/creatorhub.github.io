<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Wallet Control</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.row{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:12px;
}

input{
width:120px;
padding:8px;
border:none;
border-radius:6px;
background:#111827;
color:white;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white;
margin-left:8px;
}

.save{background:#22c55e;}
.approve{background:#2563eb;}
.reject{background:#dc2626;}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Wallet Control Panel</div>
</div>

<div class="container">

<div class="card">
<h2>User Wallets</h2>
<div id="walletList">Loading...</div>
</div>

<div class="card">
<h2>Withdraw Requests</h2>
<div id="withdrawList">Loading...</div>
</div>

</div>

<script>

const ADMIN="ayushprajpati6@gmail.com"

/* PAYMENT API */

const API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){
alert("Admin Only")
location.href="index.html"
}

/* GET DB */

async function getDB(db){

let r=await fetch(API+"?db="+db+"&t="+Date.now())
let data=await r.json()

return Array.isArray(data)?data:[]

}

/* LOAD WALLETS */

async function loadWallets(){

let wallets=await getDB("wallets")

let box=document.getElementById("walletList")

box.innerHTML=""

if(!wallets.length){
box.innerHTML="No Wallets"
return
}

wallets.forEach(w=>{

let safeId=w.email.replace(/[^a-zA-Z0-9]/g,"_")

box.innerHTML+=`

<div class="row">

<b>${w.email}</b>

<br><br>

Balance ₹

<input type="number"
value="${Number(w.balance)||0}"
id="bal_${safeId}">

<button class="save"
onclick="updateBalance('${w.email}','${safeId}')">
Save
</button>

</div>

`

})

}

/* UPDATE BALANCE */

async function updateBalance(email,id){

let wallets=await getDB("wallets")

let input=document.getElementById("bal_"+id)

let newAmount=Number(input.value)||0

if(newAmount<0){
alert("Balance cannot be negative")
return
}

let wallet=wallets.find(w=>w.email===email)

if(!wallet){
wallet={email:email,balance:0}
wallets.push(wallet)
}

wallet.balance=newAmount

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"update_wallet",
wallets:wallets
})
})

alert("Wallet Updated")

loadWallets()

}

/* LOAD WITHDRAW REQUESTS */

async function loadWithdraw(){

let withdraws=await getDB("withdrawals")

let box=document.getElementById("withdrawList")

box.innerHTML=""

if(!withdraws.length){
box.innerHTML="No Requests"
return
}

withdraws.reverse().forEach(w=>{

box.innerHTML+=`

<div class="row">

<b>${w.email}</b>

<br>

UPI: ${w.upi}

<br>

Amount: ₹${w.amount}

<br><br>

Status: ${w.status}

${w.status==="processing"?`

<button class="approve"
onclick="approveWithdraw('${w.id}')">
Approve
</button>

<button class="reject"
onclick="rejectWithdraw('${w.id}')">
Reject
</button>

`:""}

</div>

`

})

}

/* APPROVE WITHDRAW */

async function approveWithdraw(id){

let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"approve_withdraw",
id:id,
admin_key:"creatorhub_admin_secret_987"
})
})

let data=await res.json()

if(data.success){

alert("Withdraw Approved")

}else{

alert(data.message||"Error")

}

loadWithdraw()

}

/* REJECT WITHDRAW */

async function rejectWithdraw(id){

let withdraws=await getDB("withdrawals")
let wallets=await getDB("wallets")

let w=withdraws.find(x=>x.id===id)

if(!w) return

w.status="rejected"

let userWallet=wallets.find(x=>x.email===w.email)

if(userWallet){
userWallet.balance+=Number(w.amount)
}

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"update_wallet",
wallets:wallets
})
})

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"update_withdrawals",
withdrawals:withdraws
})
})

alert("Withdraw Rejected & Refunded")

loadWithdraw()

}

/* INIT */

loadWallets()
loadWithdraw()

</script>

</body>
</html>
