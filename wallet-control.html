<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Wallet Control</title>

<style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
}

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.title{
font-size:20px;
font-weight:bold;
color:var(--accent);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:linear-gradient(145deg,#111827,#020617);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid #1f2937;
}

.row{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:12px;
border:1px solid #1f2937;
}

input{
width:130px;
padding:8px;
border-radius:8px;
border:1px solid #1f2937;
background:#111827;
color:white;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-left:8px;
}

.save{
background:#22c55e;
color:black;
}

</style>

</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Wallet Control Panel</div>
</div>

<div class="container">

<div class="card">

<h2>User Wallets</h2>

<div id="walletList">Loading...</div>

</div>

</div>


<script>

const ADMIN="ayushprajpati6@gmail.com"

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email || user.email!==ADMIN){

alert("Admin Only")

location.href="index.html"

}


/* SAFE TEXT */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}


/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch{

return[]

}

}


/* LOAD WALLETS */

async function loadWallets(){

let wallets=await getDB("wallets")

let box=document.getElementById("walletList")

box.innerHTML=""

if(!wallets.length){

box.innerHTML="No Wallets Found"

return

}

wallets.forEach(w=>{

let safeId=w.email.replace(/[^a-zA-Z0-9]/g,"_")

box.innerHTML+=`

<div class="row">

<b>${escapeHTML(w.email)}</b>

<br><br>

Balance ₹

<input type="number"
value="${Number(w.balance)||0}"
id="bal_${safeId}">

<button class="save"
onclick="updateBalance('${w.email}','${safeId}')">
Save
</button>

</div>

`

})

}


/* UPDATE BALANCE */

async function updateBalance(email,id){

if(!confirm("Update wallet balance?")) return

let wallets=await getDB("wallets")

let input=document.getElementById("bal_"+id)

let newAmount=Number(input.value)||0

let wallet=wallets.find(w=>w.email===email)

if(!wallet){

wallet={email:email,balance:newAmount}

wallets.push(wallet)

}else{

wallet.balance=newAmount

}

await fetch(API,{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

action:"update_wallet",

wallets:wallets

})

})

alert("Wallet Updated")

loadWallets()

}


loadWallets()

</script>

</body>
</html>
