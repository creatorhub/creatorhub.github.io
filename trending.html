<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Trending Books</title><style>

:root{
--bg:#020617;
--card:#111827;
--accent:#22c55e;
}

*{
box-sizing:border-box;
}

/* PAGE */

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:white;
animation:fadePage .6s ease;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
background:#020617;
position:sticky;
top:0;
z-index:999;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
color:var(--accent);
transition:.2s;
}

.back:hover{
transform:translateX(-5px);
}

.title{
font-size:20px;
font-weight:bold;
color:var(--accent);
}

/* CONTAINER */

.container{
padding:25px;
max-width:900px;
margin:auto;
}

/* LIST */

.list{
display:flex;
flex-direction:column;
gap:18px;
animation:fadeUp .7s ease;
}

/* CARD */

.card{

display:flex;

gap:14px;

background:linear-gradient(145deg,#111827,#020617);

padding:14px;

border-radius:14px;

border:1px solid #1f2937;

box-shadow:0 10px 25px rgba(0,0,0,0.6);

cursor:pointer;

transition:.25s;

}

.card:hover{

transform:translateY(-6px) scale(1.02);

box-shadow:0 20px 40px rgba(0,0,0,.9);

}

/* IMAGE */

.card img{

width:90px;

aspect-ratio:2/3;

object-fit:cover;

border-radius:10px;

}

/* INFO */

.info{
flex:1;
}

/* NAME */

.name{
font-size:17px;
font-weight:bold;
}

/* PRICE */

.price{
color:var(--accent);
margin-top:6px;
}

/* META */

.meta{
font-size:13px;
color:#9ca3af;
margin-top:4px;
}

/* BUY BUTTON */

.buy{

margin-top:10px;

padding:8px 12px;

border:none;

border-radius:8px;

cursor:pointer;

background:linear-gradient(90deg,#22c55e,#4ade80);

color:black;

font-weight:bold;

transition:.2s;

}

.buy:hover{
transform:scale(1.05);
box-shadow:0 0 10px #22c55e;
}

/* BADGE */

.badge{

font-size:11px;

background:#22c55e;

color:black;

padding:2px 6px;

border-radius:6px;

margin-left:6px;

}

/* ANIMATION */

@keyframes fadePage{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style></head><body><div class="header">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Trending Books</div>
</div><div class="container"><div id="books" class="list">
Loading...
</div></div><script>

/* API */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

/* IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"
}

}catch{}

return link

}

/* LOAD TRENDING */

async function load(){

try{

let productsRes=await fetch(API+"?db=products&t="+Date.now())
let products=await productsRes.json()

let ordersRes=await fetch(API+"?db=orders&t="+Date.now())
let orders=await ordersRes.json()

if(!Array.isArray(products)) products=[]
if(!Array.isArray(orders)) orders=[]

/* APPROVED PRODUCTS */

products=products.filter(p=>p.ai_status==="approved")

/* CALCULATE TREND */

products.forEach(p=>{

let sales=orders.filter(o=>

String(o.productId)===String(p.id) &&
o.payment==="paid"

).length

p.sales=sales

p.trendingScore=sales*5

})

/* SORT */

products.sort((a,b)=>b.trendingScore-a.trendingScore)

let box=document.getElementById("books")

let html=""

/* SHOW TOP 20 */

products.slice(0,20).forEach((p,i)=>{

html+=`

<div class="card" onclick="openBook('${p.id}')">

<img src="${driveImage(p.image)}">

<div class="info">

<div class="name">

${p.title || "Untitled"}

${i<3?'<span class="badge">Trending</span>':''}

</div>

<div class="price">

₹ ${p.price || 0}

</div>

<div class="meta">

📈 ${p.sales} sales

</div>

<button class="buy"
onclick="buyNow(event,'${p.id}')">

Buy

</button>

</div>

</div>

`

})

box.innerHTML=html || "No Books Found"

}catch{

document.getElementById("books").innerHTML="Books Loading Failed"

}

}

/* OPEN BOOK */

function openBook(id){

location.href="ebook.html?id="+id

}

/* BUY */

function buyNow(e,id){

e.stopPropagation()

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}

load()

</script></body>
</html>
