<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Trending Books</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
padding:18px;
}

.list{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
display:flex;
gap:15px;
background:#111827;
padding:12px;
border-radius:12px;
align-items:center;
box-shadow:0 10px 20px black;
cursor:pointer;
}

.card img{
width:90px;
aspect-ratio:2/3;
object-fit:cover;
border-radius:8px;
}

.info{
flex:1;
}

.name{
font-size:17px;
font-weight:bold;
}

.price{
color:#22c55e;
margin-top:5px;
}

.buy{
padding:8px 12px;
border:none;
background:#22c55e;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:6px;
}

.badge{
font-size:11px;
background:#22c55e;
padding:2px 6px;
border-radius:6px;
margin-left:6px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="history.back()">⬅</div>

<div class="title">
Trending Books
</div>

</div>

<div class="container">

<div id="books" class="list">
Loading...
</div>

</div>

<script>

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"
}

}catch{}

return link

}

/* LOAD TRENDING */

async function load(){

try{

let productsRes=await fetch(PRODUCT_API+"?db=products&t="+Date.now())
let products=await productsRes.json()

let ordersRes=await fetch(PAYMENT_API+"?db=orders&t="+Date.now())
let orders=await ordersRes.json()

let reviewsRes=await fetch(PRODUCT_API+"?db=reviews&t="+Date.now())
let reviews=await reviewsRes.json()

if(!Array.isArray(products)) products=[]
if(!Array.isArray(orders)) orders=[]
if(!Array.isArray(reviews)) reviews=[]

products=products.filter(p=>p.status==="approved")

/* CALCULATE DATA */

products.forEach(p=>{

let sales=orders.filter(o=>

String(o.productId)===String(p.id) &&
o.status==="paid"

).length

let productReviews=reviews.filter(r=>

String(r.productId)===String(p.id)

)

let total=0

productReviews.forEach(r=>{
total+=Number(r.rating||0)
})

let rating=productReviews.length
? total/productReviews.length
:0

/* TRENDING SCORE */

p.trendingScore=(sales*5)+(rating*10)

p.sales=sales
p.rating=rating

})

/* SORT */

products.sort((a,b)=>b.trendingScore-a.trendingScore)

let box=document.getElementById("books")

let html=""

products.slice(0,20).forEach((p,i)=>{

html+=`

<div class="card" onclick="openBook('${p.id}')">

<img src="${driveImage(p.image)}">

<div class="info">

<div class="name">

${p.title || "Untitled"}

${i<3?'<span class="badge">Trending</span>':''}

</div>

<div class="price">
₹ ${p.price || 0}
</div>

<div style="font-size:13px;color:#aaa">
⭐ ${p.rating.toFixed(1)} • 📈 ${p.sales} sales
</div>

<button class="buy"
onclick="buyNow(event,'${p.id}')">
Buy
</button>

</div>

</div>

`

})

box.innerHTML=html || "No Books Found"

}catch{

document.getElementById("books").innerHTML="Books Loading Failed"

}

}

/* OPEN BOOK */

function openBook(id){

location.href="ebook.html?id="+id

}

/* BUY */

function buyNow(e,id){

e.stopPropagation()

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}

load()

</script>

</body>
</html>
