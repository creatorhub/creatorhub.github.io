<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Trending Books</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
padding:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;
}

.card{
background:#111827;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.card img{
width:100%;
height:210px;
object-fit:cover;
border-radius:10px;
}

.name{
margin-top:8px;
font-weight:bold;
}

.price{
color:#22c55e;
font-size:14px;
margin-top:4px;
}

.buy{
margin-top:8px;
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="history.back()">⬅</div>

<div class="title">
🔥 Trending Books
</div>

</div>

<div class="container">

<div id="books" class="grid">
Loading...
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";


/* DRIVE IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"
}

}catch{}

return link

}


/* LOAD PRODUCTS */

async function load(){

try{

let r=await fetch(API+"?db=products&t="+Date.now())
let products=await r.json()

if(!Array.isArray(products)) products=[]

let box=document.getElementById("books")

products.reverse()

let html=""

products.slice(0,20).forEach(p=>{

html+=`

<div class="card">

<img src="${driveImage(p.image)}"
onclick="openBook('${p.id}')">

<div class="name">
${p.title || "Untitled"}
</div>

<div class="price">
₹ ${p.price || 0}
</div>

<button class="buy"
onclick="buyNow(event,'${p.id}')">

Buy Now

</button>

</div>

`

})

box.innerHTML=html || "No Books Found"

}catch{

document.getElementById("books").innerHTML="Books Loading Failed"

}

}


/* OPEN DETAILS */

function openBook(id){

location.href="ebook.html?id="+id

}


/* BUY */

function buyNow(e,id){

e.stopPropagation()

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}


load()

</script>

</body>
</html>
