<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Product Control</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
}

.row{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:12px;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white;
margin:5px;
}

.edit{background:orange;}
.delete{background:red;}

#editBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
overflow:auto;
z-index:99999;
}

.editContent{
background:#111827;
max-width:520px;
margin:40px auto;
padding:20px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

</style>
</head>
<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Product Control</div>
</div>

<div class="container">
<div class="card">

<h2>All Products</h2>

<div id="products">Loading...</div>

</div>
</div>

<div id="editBox">
<div class="editContent">

<h2>Edit Ebook</h2>

<input id="eTitle" placeholder="Title">
<input id="ePrice" type="number" placeholder="Price">
<input id="eSeller" placeholder="Seller Email">
<textarea id="eDesc" placeholder="Description"></textarea>

<button class="edit" onclick="saveEdit()">Save</button>
<button onclick="closeEdit()">Cancel</button>

</div>
</div>

<script>

const ADMIN="ayushprajpati6@gmail.com"

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){

alert("Admin Only")

location.href="index.html"

}

let products=[]
let editID=null


/* GET PRODUCTS */

async function getProducts(){

try{

let r=await fetch(API+"?db=products&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}catch(e){

console.log(e)

return[]

}

}


/* LOAD PRODUCTS */

async function loadProducts(){

products=await getProducts()

let box=document.getElementById("products")

if(products.length===0){

box.innerHTML="No Products Found"

return

}

let html=""

products.slice().reverse().forEach(p=>{

html+=`

<div class="row">

<b>${p.title || "Untitled"}</b><br>

Price : ₹${p.price || 0}<br>

Seller : ${p.owner || "-"}<br>

<button class="edit" onclick="openEdit('${p.id}')">
Edit
</button>

<button class="delete" onclick="deleteProduct('${p.id}')">
Delete
</button>

</div>

`

})

box.innerHTML=html

}


/* OPEN EDIT */

function openEdit(id){

editID=id

let p=products.find(x=>String(x.id)===String(id))

if(!p) return

document.getElementById("eTitle").value=p.title||""

document.getElementById("ePrice").value=p.price||0

document.getElementById("eSeller").value=p.owner||""

document.getElementById("eDesc").value=p.description||""

document.getElementById("editBox").style.display="block"

}


/* CLOSE EDIT */

function closeEdit(){

document.getElementById("editBox").style.display="none"

}


/* SAVE EDIT */

async function saveEdit(){

let title=document.getElementById("eTitle").value.trim()

let price=Number(document.getElementById("ePrice").value)

let owner=document.getElementById("eSeller").value.trim()

let description=document.getElementById("eDesc").value.trim()

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"editProduct",
id:editID,
title:title,
price:price,
owner:owner,
description:description

})

})

let data=await res.json()

if(data.success){

alert("Product Updated ✅")

closeEdit()

loadProducts()

}else{

alert(data.message || "Update Failed")

}

}


/* DELETE PRODUCT */

async function deleteProduct(id){

if(!confirm("Delete this ebook?")) return

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"deleteProduct",
id:id

})

})

let data=await res.json()

if(data.success){

alert("Product Deleted 🗑")

loadProducts()

}else{

alert(data.message || "Delete Failed")

}

}


/* INIT */

loadProducts()

</script>

</body>
</html>
