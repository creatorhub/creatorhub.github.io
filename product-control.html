<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Product Control</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
}

.row{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:12px;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white;
margin:5px;
}

.edit{background:orange;}
.delete{background:red;}
.approve{background:#22c55e;}
.reject{background:#ef4444;}

#editBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
overflow:auto;
z-index:99999;
}

.editContent{
background:#111827;
max-width:520px;
margin:40px auto;
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Product Control</div>
</div>

<div class="container">
<div class="card">

<h2>All Products</h2>

<div id="products">Loading...</div>

</div>
</div>

<div id="editBox">
<div class="editContent">

<h2>Edit Ebook</h2>

<input id="eTitle" placeholder="Title">
<input id="ePrice" type="number" placeholder="Price">
<input id="eSeller" placeholder="Seller Email">

<button class="approve" onclick="saveEdit()">Save</button>
<button class="delete" onclick="deleteEdit()">Delete Ebook</button>
<button onclick="closeEdit()">Cancel</button>

</div>
</div>

<script>

const ADMIN="ayushprajpati6@gmail.com"

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){
alert("Admin Only")
location.href="index.html"
}

let products=[]
let editID=null


async function getProducts(){

try{

let r=await fetch(API+"?db=products&t="+Date.now())
let data=await r.json()

return Array.isArray(data)?data:[]

}catch(e){

console.log(e)
return[]

}

}


async function saveProducts(){

try{

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
db:"products",
data:products
})
})

let json=await res.json()

return json.success===true

}catch(e){

console.log(e)
alert("Save Failed")
return false

}

}


async function loadProducts(){

products=await getProducts()

let box=document.getElementById("products")

if(products.length==0){
box.innerHTML="No Products Found"
return
}

let html=""

products.slice().reverse().forEach(p=>{

html+=`

<div class="row">

<b>${p.title||"Untitled"}</b><br>

₹${p.price||0}<br>

Seller : ${p.owner||"-"}<br>

Status : ${p.status||"pending"}<br>

<button class="edit" onclick="openEdit('${p.id}')">Edit</button>

<button class="delete" onclick="deleteProduct('${p.id}')">Delete</button>

${p.status!="approved"
? `<button class="approve" onclick="approve('${p.id}')">Approve</button>
<button class="reject" onclick="reject('${p.id}')">Reject</button>`
:""}

</div>

`

})

box.innerHTML=html

}


function openEdit(id){

editID=id

let p=products.find(x=>String(x.id)===String(id))

if(!p)return

document.getElementById("eTitle").value=p.title||""
document.getElementById("ePrice").value=p.price||0
document.getElementById("eSeller").value=p.owner||""

document.getElementById("editBox").style.display="block"

}

function closeEdit(){
document.getElementById("editBox").style.display="none"
}


async function saveEdit(){

products=products.map(p=>{
if(String(p.id)===String(editID)){
p.title=document.getElementById("eTitle").value
p.price=Number(document.getElementById("ePrice").value)
p.owner=document.getElementById("eSeller").value
}
return p
})

let ok = await saveProducts()

if(ok){

alert("Updated")
closeEdit()
loadProducts()

}

}


async function deleteEdit(){

await deleteProduct(editID)
closeEdit()

}

async function deleteProduct(id){

if(!confirm("Delete Ebook?"))return

products=products.filter(p=>String(p.id)!==String(id))

let ok = await saveProducts()

if(ok){
loadProducts()
}

}


async function approve(id){

products=products.map(p=>{
if(String(p.id)===String(id)){
p.status="approved"
}
return p
})

let ok = await saveProducts()

if(ok){

alert("Approved")
loadProducts()

}

}


async function reject(id){

await deleteProduct(id)

}


loadProducts()

</script>

</body>
</html>
