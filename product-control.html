<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Product Control</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
}

.row{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:12px;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white;
margin:5px;
}

.edit{background:orange;}
.delete{background:red;}
.approve{background:#22c55e;}
.reject{background:#ef4444;}

#editBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
overflow:auto;
z-index:99999;
}

.editContent{
background:#111827;
max-width:520px;
margin:40px auto;
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Product Control</div>
</div>

<div class="container">
<div class="card">

<h2>All Products</h2>

<div id="products">Loading...</div>

</div>
</div>

<!-- EDIT BOX -->

<div id="editBox">
<div class="editContent">

<h2>Edit Ebook</h2>

<input id="eTitle" placeholder="Title">
<input id="ePrice" type="number" placeholder="Price">
<input id="eSeller" placeholder="Seller Email">

<p>Change Cover Image</p>
<input type="file" id="cover" accept="image/*">

<p>Change Ebook PDF</p>
<input type="file" id="pdf" accept="application/pdf">

<button class="approve" onclick="saveEdit()">Save</button>
<button class="delete" onclick="deleteEdit()">Delete Ebook</button>
<button onclick="closeEdit()">Cancel</button>

</div>
</div>

<script>

/* ADMIN EMAIL */

const ADMIN="ayushprajpati6@gmail.com";

/* API */

const API="https://script.google.com/macros/s/AKfycbx-Bu9s127GGueMP9w-BHp-J2oGz4YNLpPhaQ33oYGZNPpOnXRVl1BVKhCQz2y8E14R/exec";

let user=JSON.parse(localStorage.getItem("user"));

if(!user || user.email!==ADMIN){
alert("Admin Only");
location.href="index.html";
}


/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let data=await r.json();

return Array.isArray(data)?data:[];

}catch(e){

console.log(e);

return [];

}

}


async function saveDB(db,data){

await fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({db:db,data:data})
});

}


/* BASE64 */

function fileBase64(file){

return new Promise(resolve=>{

if(!file){resolve("");return;}

let reader=new FileReader();

reader.onload=()=>resolve(reader.result);

reader.readAsDataURL(file);

});

}


/* DRIVE UPLOAD */

async function uploadDrive(image,pdf){

let body={action:"uploadFile"};

if(image) body.image=image;
if(pdf) body.pdf=pdf;

let r=await fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify(body)
});

return await r.json();

}


/* LOAD PRODUCTS */

let editID=null;

async function loadProducts(){

let products=await getDB("products");

let box=document.getElementById("products");

if(products.length===0){

box.innerHTML="❌ No Products";
return;

}

let html="";

products.reverse().forEach(p=>{

html+=`

<div class="row">

<b>${escapeHTML(p.title||"Untitled")}</b>

<br>

₹${p.price||0}

<br>

Seller : ${p.owner||"-"}

<br>

Status : ${p.status||"pending"}

<br>

<button class="edit" onclick="openEdit('${p.id}')">Edit</button>

<button class="delete" onclick="deleteProduct('${p.id}')">Delete</button>

${p.status!=="approved"
? `<button class="approve" onclick="approve('${p.id}')">Approve</button>
<button class="reject" onclick="reject('${p.id}')">Reject</button>`
:""}

</div>

`;

});

box.innerHTML=html;

}


/* EDIT */

async function openEdit(id){

editID=id;

let products=await getDB("products");

let p=products.find(x=>String(x.id)===String(id));

if(!p) return;

eTitle.value=p.title||"";
ePrice.value=p.price||0;
eSeller.value=p.owner||"";

editBox.style.display="block";

}

function closeEdit(){
editBox.style.display="none";
}


/* SAVE EDIT */

async function saveEdit(){

let products=await getDB("products");

let coverFile=document.getElementById("cover").files[0];
let pdfFile=document.getElementById("pdf").files[0];

let image64=await fileBase64(coverFile);
let pdf64=await fileBase64(pdfFile);

let upload=null;

if(image64 || pdf64){
upload=await uploadDrive(image64,pdf64);
}

products=products.map(p=>{

if(String(p.id)===String(editID)){

p.title=eTitle.value;
p.price=Number(ePrice.value);
p.owner=eSeller.value;

if(upload){

if(upload.image) p.image=upload.image;
if(upload.pdf) p.pdf=upload.pdf;

}

}

return p;

});

await saveDB("products",products);

alert("Updated");

closeEdit();

loadProducts();

}


/* DELETE */

async function deleteEdit(){
await deleteProduct(editID);
closeEdit();
}

async function deleteProduct(id){

if(!confirm("Delete Ebook?")) return;

let products=await getDB("products");

products=products.filter(p=>String(p.id)!==String(id));

await saveDB("products",products);

loadProducts();

}


/* APPROVE */

async function approve(id){

let products=await getDB("products");

products=products.map(p=>{

if(String(p.id)===String(id)){
p.status="approved";
}

return p;

});

await saveDB("products",products);

alert("Approved");

loadProducts();

}


/* REJECT */

async function reject(id){
await deleteProduct(id);
}


/* SECURITY */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m];

});

}


/* START */

loadProducts();

</script>

</body>
</html>
