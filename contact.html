<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact CreatorHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg-primary: #f8fafc;       
    --bg-secondary: #ffffff;     
    --text-primary: #0f172a;     
    --text-secondary: #475569;   
    --text-muted: #94a3b8;
    --accent-blue: #2563eb;     
    --accent-blue-hover: #1d4ed8;
    --accent-blue-light: #eff6ff;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.02);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.05);
}

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body{
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    animation: fadePage .5s ease;
}

.header{
    height: 75px;
    background-color: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 999;
    box-shadow: var(--shadow-sm);
}

.back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s ease;
    user-select: none;
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 10px;
    background: var(--bg-secondary);
}

.back-btn:hover {
    color: var(--accent-blue);
    border-color: var(--accent-blue);
    background-color: var(--accent-blue-light);
    transform: translateX(-3px);
}

.title{
    flex: 1;
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-right: 80px; 
}

.container{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 75px);
    padding: 40px 20px;
}

.card{
    width: 100%;
    max-width: 500px;
    background-color: var(--bg-secondary);
    padding: 40px;
    border-radius: 24px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-md);
    animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1);
}

h2{
    font-size: 26px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
}

.desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 28px;
    font-weight: 500;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
}

input, textarea{
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: all 0.2s ease;
}

input:focus, textarea:focus{
    border-color: var(--accent-blue);
    background: var(--bg-secondary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

textarea{
    min-height: 130px;
    resize: none;
    line-height: 1.6;
}

.status-box {
    display: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.4;
}
.status-box.loading {
    display: block;
    background: var(--accent-blue-light);
    color: var(--accent-blue);
    border: 1px solid rgba(37, 99, 235, 0.15);
}
.status-box.success {
    display: block;
    background: #dcfce7;
    color: #15803d;
    border: 1px solid #bbf7d0;
}
.status-box.error {
    display: block;
    background: #fee2e2;
    color: #b91c1c;
    border: 1px solid #fecaca;
}

button{
    width: 100%;
    height: 54px;
    border: none;
    border-radius: 12px;
    background: var(--accent-blue);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

button:hover{
    background-color: var(--accent-blue-hover);
    transform: translateY(-1px);
}

button:disabled {
    background-color: var(--text-muted);
    box-shadow: none;
    cursor: not-allowed;
}

@keyframes fadePage{
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp{
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@media(max-width: 600px) {
    .header { padding: 0 20px; }
    .title { margin-right: 40px; font-size: 18px; }
    .card { padding: 25px; }
}
</style>
</head>

<body>

<div class="header">
    <div class="back-btn" onclick="history.back()">
        <span>←</span> Back
    </div>
    <div class="title">Contact CreatorHub</div>
</div>

<div class="container">
    <div class="card">
        <h2>📩 Support Request</h2>
        <div class="desc">Fill in details to sync message blocks direct to cloud server channels.</div>
        
        <div id="statusMessage" class="status-box"></div>

        <form id="contactForm" onsubmit="executeDirectMessageSubmit(event)">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Your Email Address</label>
                <input type="email" id="email" placeholder="name@email.com" required>
            </div>

            <div class="form-group">
                <label for="msg">Message Context</label>
                <textarea id="msg" placeholder="Write your message here..." required></textarea>
            </div>

            <button type="submit" id="submitBtn">Send Message</button>
        </form>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbixoNFY7P2j1eSoIPyt4w2Jb0Ai8DvJty_YrwC351y1AlN9OiG7P7Fz1Gsz_oDuWna/exec";

async function executeDirectMessageSubmit(event){
    event.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg").value.trim();
    const submitBtn = document.getElementById("submitBtn");

    submitBtn.disabled = true;
    updateStatusDisplay("loading", "📡 Transmission channel active... Dispatching support log variables.");

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
                action: "contact_form_ticket",
                name: name,
                email: email,
                message: msg
            })
        });

        const rawTextData = await response.text();
        const result = JSON.parse(rawTextData);

        if(result.success) {
            updateStatusDisplay("success", "🎉 Support ticket committed cleanly! Message dispatched direct to inbox database.");
            document.getElementById("contactForm").reset();
        } else {
            throw new Error(result.message || "Execution Error");
        }
    } catch(err) {
        console.error("Pipeline breakdown:", err);
        updateStatusDisplay("error", "⚠️ Gateway timeout. Try re-submitting data packets.");
    } finally {
        submitBtn.disabled = false;
    }
}

function updateStatusDisplay(stateClassType, alertMessageText) {
    const statusBox = document.getElementById("statusMessage");
    statusBox.className = "status-box " + stateClassType;
    statusBox.innerText = alertMessageText;
}
</script>

</body>
</html>
