<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Premium Activated</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding-top:100px;
}

.card{
background:#111827;
padding:40px;
border-radius:14px;
max-width:500px;
margin:auto;
box-shadow:0 10px 30px black;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h2>Checking Premium Status...</h2>

<p id="status">
Please wait...
</p>

<button onclick="goHome()">
Go To Marketplace
</button>

</div>

<script>

/* API */

const API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* USER */

let user=JSON.parse(localStorage.getItem("user")||"null")

if(!user){

alert("Login first")
location.href="login.html"

}

/* CHECK PREMIUM */

async function checkPremium(){

try{

let r=await fetch(API+"?db=subscriptions&t="+Date.now())

let subs=await r.json()

let active=subs.find(s=>s.email===user.email)

if(active){

document.querySelector("h2").innerText="Premium Activated 🎉"

document.getElementById("status").innerText=
"You now have unlimited ebook reading access."

}else{

document.querySelector("h2").innerText="Premium Not Found"

document.getElementById("status").innerText=
"No active subscription detected."

}

}catch{

document.getElementById("status").innerText=
"Server error"

}

}

checkPremium()

function goHome(){

location.href="index.html"

}

</script>

</body>

</html>
