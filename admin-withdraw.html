<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Withdraw Requests</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding:20px;
}

h2{
color:#22c55e;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:12px;
}

.email{
font-weight:bold;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
margin-right:5px;
color:white;
}

.approve{
background:#22c55e;
}

.reject{
background:#ef4444;
}

.status{
margin-top:5px;
font-size:14px;
}

.pending{
color:#f59e0b;
}

.approved{
color:#22c55e;
}

.rejected{
color:#ef4444;
}

</style>

</head>

<body>

<h2>Withdraw Requests</h2>

<div id="list">Loading...</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

const ADMIN="ayushprajpati6@gmail.com"

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){

alert("Admin only")
location.href="index.html"

}

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now())
let d=await r.json()

return Array.isArray(d)?d:[]

}catch{

return[]

}

}

async function load(){

let withdraws=await getDB("withdrawals")

let html=""

if(!withdraws.length){

document.getElementById("list").innerHTML="No Requests"
return

}

withdraws.reverse().forEach(w=>{

let statusClass="pending"

if(w.status==="approved") statusClass="approved"
if(w.status==="rejected") statusClass="rejected"

let amount=Number(w.amount||0)

html+=`

<div class="card">

<div class="email">${escapeHTML(w.email)}</div>

Amount : ₹${amount}<br>

UPI : ${escapeHTML(w.upi)}

<div class="status ${statusClass}">
Status : ${escapeHTML(w.status)}
</div>

${w.status==="pending"?`

<button class="approve"
onclick="approve('${w.id}')">
Approve
</button>

<button class="reject"
onclick="reject('${w.id}')">
Reject
</button>

`:""}

</div>

`

})

document.getElementById("list").innerHTML=html

}

load()

async function approve(id){

if(!confirm("Send payout?")) return

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"approve_withdraw",
id:id

})

})

let data=await res.json()

if(data.success){

alert("Payout Approved")

}else{

alert(data.message||"Error")

}

}catch{

alert("Server Error")

}

load()

}

async function reject(id){

if(!confirm("Reject withdraw?")) return

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"reject_withdraw",
id:id

})

})

let data=await res.json()

if(data.success){

alert("Withdraw Rejected")

}else{

alert("Error")

}

}catch{

alert("Server Error")

}

load()

}

</script>

</body>

</html>
